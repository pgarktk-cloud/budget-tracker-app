              <Tooltip formatter={v=>`$${Math.round(v).toLocaleString("en-US")}`}/>
              <Line type="monotone" dataKey="value" stroke={P.br} strokeWidth={2} dot={false}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Add trade modal */}
      {tradeModal&&(
        <Portal>
        <div className="modal-bg" onClick={()=>setTradeModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <h3 style={{margin:0,fontSize:16,fontWeight:600,color:P.ink}}>
                Add trade — {invs.find(x=>x.id===tradeModal)?.ticker||""}
              </h3>
              <button onClick={()=>setTradeModal(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {["buy","sell"].map(t=>(
                <button key={t} onClick={()=>setTradeForm(f=>({...f,type:t}))}
                  style={{flex:1,borderRadius:10,padding:"8px 0",fontSize:14,fontWeight:600,textTransform:"capitalize",
                    background:tradeForm.type===t?(t==="buy"?P.jade:P.wine):"transparent",
                    color:tradeForm.type===t?"#fff":(t==="buy"?P.jade:P.wine),
                    border:`2px solid ${t==="buy"?P.jade:P.wine}`}}>
                  {t==="buy"?"▲ Buy":"▼ Sell"}
                </button>
              ))}
            </div>
            {[["date","Date","date"],["shares","Shares","number"],["price","Price per share (USD)","number"]].map(([k,label,type])=>(
              <div key={k} style={{marginBottom:12}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>{label}</div>
                <input type={type} value={tradeForm[k]} onChange={e=>setTradeForm(f=>({...f,[k]:e.target.value}))}
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
              </div>
            ))}
            {tradeForm.shares&&tradeForm.price&&(
              <div style={{background:"rgba(0,0,0,.05)",borderRadius:10,padding:10,marginBottom:12,fontSize:13,color:P.sub}} className="tnum">
                Total: ${(Number(tradeForm.shares)*Number(tradeForm.price)).toLocaleString("en-US",{minimumFractionDigits:2})}
              </div>
            )}
            <button onClick={submitTrade}
              style={{width:"100%",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,
                background:tradeForm.type==="buy"?P.jade:P.wine,color:"#fff",border:"none"}}>
              Confirm {tradeForm.type==="buy"?"Purchase":"Sale"}
            </button>
          </div>
        </div>
        </Portal>
      )}
    </div>
  );
}

/* ── Asset / liability row (top-level so it doesn't remount on each keystroke) ── */
function AssetRow({a,updateAsset,removeAsset}){
  return(
    <div style={{padding:"12px 16px",borderBottom:"1px solid rgba(0,0,0,.06)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <input value={a.name} onChange={e=>updateAsset(a.id,{name:e.target.value})} className="bare" style={{fontSize:14,fontWeight:600,flex:1,minWidth:0,color:P.neuInk}}/>
        <select value={a.currency} onChange={e=>updateAsset(a.id,{currency:e.target.value})} style={{...neu(8),padding:"2px 6px",fontSize:12,border:"none",color:P.neuSub}}>
          {BANK_CCY.map(c=><option key={c}>{c}</option>)}
        </select>
        <button onClick={()=>removeAsset(a.id)} style={{background:"transparent",border:"none",color:P.wine,opacity:.4}}><I.X size={15}/></button>
      </div>
      {a.kind==="asset"?(
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:12,color:P.neuSub}}>{a.currency}</span>
          <input type="number" value={a.value} onChange={e=>updateAsset(a.id,{value:Number(e.target.value)})}
            className="bare tnum" style={{width:120,textAlign:"right",fontSize:14,fontWeight:600,color:P.neuInk}}/>
        </div>
      ):(
        /* Liability installment mode */
        <div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <button onClick={()=>updateAsset(a.id,{installment:true})} className={a.installment?"":"neu-btn"}
              style={{flex:1,borderRadius:8,padding:"5px 0",fontSize:12,fontWeight:600,border:"none",
                ...(a.installment?{background:P.jade,color:"#fff"}:{color:P.neuSub})}}>
              Installment
            </button>
            <button onClick={()=>updateAsset(a.id,{installment:false})} className={!a.installment?"":"neu-btn"}
              style={{flex:1,borderRadius:8,padding:"5px 0",fontSize:12,fontWeight:600,border:"none",
                ...(!a.installment?{background:P.jade,color:"#fff"}:{color:P.neuSub})}}>
              Fixed amount
            </button>
          </div>
          {a.installment?(
            <div style={{display:"flex",flexWrap:"wrap",gap:10,fontSize:13}}>
              <label style={{color:P.neuSub,display:"flex",flexDirection:"column",gap:3}}>
                <span style={{fontSize:11}}>Monthly payment ({a.currency})</span>
                <input type="number" value={a.monthly||""} onChange={e=>updateAsset(a.id,{monthly:Number(e.target.value)})}
                  className="bare tnum" style={{...neuInset(6),width:110,fontSize:14,fontWeight:600,padding:"4px 6px",color:P.neuInk}}/>
              </label>
              <label style={{color:P.neuSub,display:"flex",flexDirection:"column",gap:3}}>
                <span style={{fontSize:11}}>Months remaining (as of)</span>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="number" value={a.monthsRemaining||""} onChange={e=>updateAsset(a.id,{monthsRemaining:Number(e.target.value)})}
                    className="bare tnum" style={{...neuInset(6),width:56,fontSize:14,fontWeight:600,padding:"4px 6px",color:P.neuInk}}/>
                  <input type="month" value={(a.asOfDate||"").slice(0,7)} onChange={e=>updateAsset(a.id,{asOfDate:e.target.value+"-01"})}
                    style={{...neuInset(6),fontSize:12,padding:"4px 6px",border:"none",color:P.neuInk}}/>
                </div>
              </label>
              {(a.monthly&&a.monthsRemaining&&a.asOfDate)&&(()=>{
                const bal=liabilityBalance(a);
                const now=new Date();const ref=new Date(a.asOfDate);
                const elapsed=Math.max(0,(now.getFullYear()-ref.getFullYear())*12+(now.getMonth()-ref.getMonth()));
                const remaining=Math.max(0,a.monthsRemaining-elapsed);
                const donePct=Math.min(100,(elapsed/a.monthsRemaining)*100);
                return(
                  <div style={{width:"100%",...neu(10),padding:10,marginTop:4}}>
                    <div style={{fontSize:12,color:P.neuSub}}>Balance today: <strong className="tnum" style={{color:P.neuInk}}>{a.currency} {Math.round(bal).toLocaleString("en-US")}</strong></div>
                    <div style={{fontSize:11,color:P.neuSub,marginTop:2,opacity:.85}}>{remaining} months remaining · {elapsed} months paid</div>
                    <div style={{...neuInset(999),marginTop:6,height:8,overflow:"hidden"}}>
                      <div className="liquid-fill" style={{width:`${donePct}%`,height:"100%",background:liquidFillBg(P.jade)}}/>
                    </div>
                  </div>
                );
              })()}
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:12,color:P.neuSub}}>{a.currency}</span>
              <input type="number" value={a.value||""} onChange={e=>updateAsset(a.id,{value:Number(e.target.value)})}
                className="bare tnum" style={{width:120,textAlign:"right",fontSize:14,fontWeight:600,color:P.neuInk}}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── NET WORTH VIEW — installment liabilities ── */
function NetWorthView({netWorth,banksSar,invSar,assetSar,liabSar,sarRate,convert,cur,ratesErr,assets,addAsset,updateAsset,removeAsset,history,captureSnapshot,addPastSnap,removeSnap}){
  const[gran,setGran]=useState("month");
  const[pm,setPm]=useState(new Date().toISOString().slice(0,7));
  const[pv,setPv]=useState("");
  // `netWorth` (and banksSar/invSar/assetSar/liabSar) are already totaled in
  // the user's base_currency (`cur`) — see App-level baseOf/baseRate (Phase 3)
  const sar=n=>`${cur} ${Math.round(n).toLocaleString("en-US")}`;
  // secondary reference readouts — two other well-known currencies that
  // aren't already the selected base currency (mirrors BanksView refCcys)
  const refCcys=["USD","SAR","PHP"].filter(c=>c!==cur).slice(0,2);
  const refTotals=refCcys.map(c=>({code:c,amount:convert?convert(netWorth,cur,c):null}));
  const parts=[{label:"Bank accounts",value:banksSar,color:SEG[0]},{label:"Investments",value:invSar,color:SEG[3]},{label:"Other assets",value:assetSar,color:SEG[5]},{label:"Liabilities",value:-liabSar,color:P.red}];
  const gross=banksSar+invSar+assetSar;
  const fmtMo=m=>{const[y,mo]=m.split("-");return new Date(Number(y),Number(mo)-1,1).toLocaleDateString("en-US",{month:"short",year:"2-digit"});};
  const sorted=[...history].sort((a,b)=>a.month.localeCompare(b.month));
  let pts;
  if(gran==="year"){const m={};sorted.forEach(s=>{m[s.month.slice(0,4)]=s;});pts=Object.entries(m).map(([y,s])=>({label:y,net:s.net}));}
  else pts=sorted.map(s=>({label:fmtMo(s.month),net:s.net}));
  const last=sorted[sorted.length-1];
  const delta=last?netWorth-last.net:null;
  const assetItems=assets.filter(a=>a.kind==="asset");
  const liabItems=assets.filter(a=>a.kind==="liability");

  return(
    <div style={{background:P.neuBg,borderRadius:24,padding:"14px 12px 18px",margin:"0 -4px"}}>
      <div className="fade-up" style={{borderRadius:18,padding:20,marginBottom:16,background:P.deep,color:"#fff",
        boxShadow:`7px 7px 15px ${P.neuLo},-7px -7px 15px ${P.neuHi}`}}>
        <div style={{fontSize:12,fontWeight:500,color:P.deepHi,marginBottom:4}}>Net worth</div>
        <span key={Math.round(netWorth)} className="serif tnum num-flash" style={{fontSize:38,fontWeight:600}}>{sar(netWorth)}</span>
        <div className="tnum" style={{display:"flex",flexWrap:"wrap",gap:16,marginTop:6,color:P.deepHi,fontSize:14}}>
          {refTotals.map(({code,amount})=>
            <span key={code}>{amount!=null?`≈ ${code} ${Math.round(amount).toLocaleString("en-US")}`:`${code} —`}</span>
          )}
        </div>
        {refTotals.some(r=>r.amount==null)&&<div style={{fontSize:11,marginTop:6,color:"#E89B8C"}}>{ratesErr?"Couldn't load live rates — tap refresh in Currency tab.":"Loading live rates…"}</div>}
        {delta!=null&&<div className="tnum" style={{fontSize:14,marginTop:6,color:delta>=0?"#6FC6DA":"#E89B8C"}}>{delta>=0?"▲":"▼"} {sar(Math.abs(delta))} since last snapshot</div>}
      </div>

      <div className="fade-up-1" style={{...neu(16),padding:16,marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:600,margin:"0 0 12px",color:P.neuSub}}>Composition</h3>
        <div style={{...neuInset(999),height:12,width:"100%",overflow:"hidden",marginBottom:12,position:"relative"}}>
          <div style={{display:"flex",height:"100%",width:"100%"}}>
            {parts.slice(0,3).map(p=>gross>0&&p.value>0&&<div key={p.label} className="bar-animated liquid-fill" style={{width:`${(p.value/gross)*100}%`,height:"100%",background:liquidFillBg(p.color)}}/>)}
          </div>
        </div>
        {parts.map(p=>(
          <div key={p.label} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",fontSize:14}}>
            <span style={{display:"flex",alignItems:"center",gap:8,color:P.neuInk}}><span style={{width:10,height:10,borderRadius:999,background:p.color}}/>{p.label}</span>
            <span className="tnum" style={{color:p.value<0?P.wine:P.neuSub}}>{p.value<0?`− ${sar(-p.value)}`:sar(p.value)}</span>
          </div>
        ))}
      </div>

      <div className="fade-up-2" style={{...neu(16),overflow:"hidden",marginBottom:16}}>
        <div style={{padding:"10px 16px",fontSize:14,fontWeight:600,color:P.neuSub}}>Assets</div>
        {assetItems.map(a=><AssetRow key={a.id} a={a} updateAsset={updateAsset} removeAsset={removeAsset}/>)}
        <button onClick={()=>addAsset("asset")} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.jade,background:"transparent",border:"none"}}><I.Plus size={14}/>Add asset</button>
        <div style={{padding:"10px 16px",fontSize:14,fontWeight:600,color:P.neuSub,borderTop:"1px solid rgba(0,0,0,.06)"}}>Liabilities</div>
        {liabItems.map(a=><AssetRow key={a.id} a={a} updateAsset={updateAsset} removeAsset={removeAsset}/>)}
        <button onClick={()=>addAsset("liability")} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.wine,background:"transparent",border:"none"}}><I.Plus size={14}/>Add liability</button>
      </div>

      <div className="fade-up-3" style={{...neu(16),padding:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <h3 style={{fontSize:14,fontWeight:600,margin:0,color:P.neuSub}}>Net worth over time</h3>
          <div style={{display:"flex",gap:4}}>
            {["month","year"].map(gv=>(
              <button key={gv} onClick={()=>setGran(gv)} className={gran===gv?"":"neu-btn"}
                style={{borderRadius:999,padding:"3px 10px",fontSize:12,textTransform:"capitalize",border:"none",
                  ...(gran===gv?{background:P.jade,color:"#fff"}:{color:P.neuSub})}}>{gv}</button>
            ))}
          </div>
        </div>
        {pts.length>0?(
          <div style={{width:"100%",height:200}}>
            <ResponsiveContainer>
              <LineChart data={pts} margin={{top:8,right:8,bottom:0,left:-12}}>
                <CartesianGrid strokeDasharray="3 3" stroke={P.neuLo} opacity={.4}/>
                <XAxis dataKey="label" tick={{fontSize:11,fill:P.neuSub}}/>
                <YAxis tick={{fontSize:11,fill:P.neuSub}} tickFormatter={v=>`${Math.round(v/1000)}k`}/>
                <Tooltip formatter={v=>sar(v)}/>
                <Line type="monotone" dataKey="net" stroke={P.jade} strokeWidth={2} dot={{r:3}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        ):<p style={{fontSize:13,color:P.neuSub}}>No snapshots yet — this month will save automatically once you add a bank, investment, or asset.</p>}
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:10,marginTop:12}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:P.jade,fontWeight:500}}>
            <I.Check size={13}/>This month syncs automatically
          </div>
          <button onClick={captureSnapshot} className="neu-btn" style={{padding:"6px 12px",fontSize:12,fontWeight:500,color:P.neuSub}}>Force refresh now</button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"flex-end",gap:8,marginTop:12,paddingTop:12,borderTop:"1px solid rgba(0,0,0,.06)"}}>
          <div><div style={{color:P.neuSub,fontSize:10}}>Month</div><input type="month" value={pm} onChange={e=>setPm(e.target.value)} style={{...neuInset(8),padding:"4px 8px",fontSize:14,border:"none",color:P.neuInk}}/></div>
          <div><div style={{color:P.neuSub,fontSize:10}}>Net worth ({cur})</div><input type="number" value={pv} placeholder="0" onChange={e=>setPv(e.target.value)} className="tnum" style={{...neuInset(8),padding:"4px 8px",fontSize:14,border:"none",color:P.neuInk,width:120}}/></div>
          <button onClick={()=>{if(pm&&Number(pv)){addPastSnap(pm,Number(pv));setPv("");}}} className="neu-btn" style={{padding:"6px 12px",fontSize:14,fontWeight:500,color:P.jade}}>Add entry</button>
        </div>
        {sorted.length>0&&(
          <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:6}}>
            {sorted.map(s=>(
              <span key={s.id} className="tnum neu-btn" style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 10px",fontSize:12,color:P.neuSub,borderRadius:999}}>
                {fmtMo(s.month)} · {sar(s.net)}
                <button onClick={()=>removeSnap(s.id)} style={{background:"transparent",border:"none",color:P.wine}}><I.X size={11}/></button>
              </span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── CURRENCY VIEW ── */
function CurrencyView({rates,ratesAt,ratesErr,ratesLoading,onRefresh,convert,fxAmount,setFxAmount,fxFrom,setFxFrom,fxTo,setFxTo}){
  const amount=fxAmount,from=fxFrom,to=fxTo;
  const setAmount=setFxAmount,setFrom=setFxFrom,setTo=setFxTo;
  const result=convert(amount,from,to);
  const one=convert(1,from,to);
  const card={background:P.neuBg,borderRadius:16,boxShadow:`6px 6px 13px ${P.neuLo},-6px -6px 13px ${P.neuHi}`};
  return(
    <div style={{background:P.neuBg,borderRadius:24,padding:"14px 12px 18px",margin:"0 -4px"}}>
      <div className="fade-up" style={{...card,padding:16,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:600,color:P.neuSub}}>Live converter</span>
          <button onClick={onRefresh} disabled={ratesLoading} className="neu-btn" style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",fontSize:12,fontWeight:500,color:P.jade}}>
            <I.Refresh size={13} style={ratesLoading?{animation:"spin .9s linear infinite"}:null}/>Refresh
          </button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:8}}>
          <input type="number" value={amount} onChange={e=>setAmount(Number(e.target.value))} className="tnum"
            style={{...neuInset(10),padding:"8px 10px",fontSize:18,fontWeight:600,width:130,border:"none",color:P.neuInk}}/>
          <select value={from} onChange={e=>setFrom(e.target.value)} style={{...neu(10),padding:"8px 10px",fontSize:14,border:"none",color:P.neuInk}}>
            {FX_CODES.map(c=><option key={c}>{c}</option>)}
          </select>
          <button onClick={()=>{setFrom(to);setTo(from);}} className="neu-btn" style={{borderRadius:999,padding:8,color:P.neuSub}}><I.Swap size={16}/></button>
          <select value={to} onChange={e=>setTo(e.target.value)} style={{...neu(10),padding:"8px 10px",fontSize:14,border:"none",color:P.neuInk}}>
            {FX_CODES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div style={{marginTop:14}}>
          {result!=null
            ?<div>
              <div key={`${from}${to}${amount}`} className="serif tnum num-flash" style={{fontSize:30,fontWeight:600,color:P.neuInk}}>{result.toLocaleString("en-US",{maximumFractionDigits:2})} <span style={{fontSize:16,color:P.neuSub}}>{to}</span></div>
              <div style={{fontSize:12,color:P.neuSub}}>1 {from} = {one.toLocaleString("en-US",{maximumFractionDigits:4})} {to}</div>
            </div>
            :<div style={{fontSize:14,color:P.wine}}>{ratesErr?"Rates unavailable — tap refresh.":"Loading rates…"}</div>
          }
        </div>
      </div>
      <div className="fade-up-1" style={{...card,padding:16}}>
        <div style={{fontSize:13,fontWeight:600,color:P.neuSub,marginBottom:10}}>Quick rates</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
          {[["USD","SAR"],["SAR","PHP"],["USD","PHP"],["AED","PHP"]].map(([f,t])=>{
            const v=convert(1,f,t);
            return(
              <div key={f+t} style={{...neuInset(12),padding:12}}>
                <div style={{fontSize:11,color:P.neuSub}}>1 {f} →</div>
                <div className="tnum" style={{fontSize:18,fontWeight:600,color:P.neuInk}}>
                  {v==null?"—":v.toLocaleString("en-US",{maximumFractionDigits:t==="PHP"?2:4})} <span style={{fontSize:12,color:P.neuSub}}>{t}</span>
                </div>
              </div>
            );
          })}
        </div>
        {ratesAt&&<div style={{fontSize:11,color:P.neuSub,marginTop:10}}>Updated {new Date(ratesAt).toLocaleString()}</div>}
      </div>
    </div>
  );
}


/* ── GOAL SQUARE CARD (top-level so inputs keep focus) ── */
function GoalSquare({g,fmt,updateGoal,removeGoal,openAdd,openDetails,openTypePicker}){
  const saved=(g.contributions||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
  const pctDone=g.target>0?Math.min(100,(saved/g.target)*100):0;
  const Icon=goalIcon(g.type);
  const R=26,C=2*Math.PI*R;
  // amounts are entered natively in whichever currency this goal is saved in
  const fmtG=n=>`${g.currency||"SAR"} ${Math.round(Number(n)||0).toLocaleString("en-US")}`;
  return(
    <div style={{borderRadius:16,padding:14,background:P.neuBg,boxShadow:`6px 6px 13px ${P.neuLo},-6px -6px 13px ${P.neuHi}`,display:"flex",flexDirection:"column",gap:8}}>
      {/* top row: type icon + delete */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={()=>openTypePicker(g.id)} title="Change goal type"
          style={{display:"flex",alignItems:"center",justifyContent:"center",width:34,height:34,borderRadius:10,
            background:g.color+"22",color:g.color,border:"none"}}>
          <Icon size={18}/>
        </button>
        <button onClick={()=>removeGoal(g.id)} style={{background:"transparent",border:"none",color:P.wine,opacity:.4,padding:2}}><I.X size={15}/></button>
      </div>

      {/* name */}
      <input value={g.name} onChange={e=>updateGoal(g.id,{name:e.target.value})} className="bare"
        style={{fontSize:14,fontWeight:600,width:"100%",minWidth:0,color:P.neuInk}}/>

      {/* ring progress */}
      <div style={{display:"flex",justifyContent:"center",padding:"2px 0"}}>
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r={R} stroke={P.neuLo} strokeWidth="7" fill="none" opacity=".5"/>
          <circle cx="36" cy="36" r={R} stroke={g.color} strokeWidth="7" fill="none" strokeLinecap="round"
            strokeDasharray={C} strokeDashoffset={C*(1-pctDone/100)} transform="rotate(-90 36 36)"
            style={{transition:"stroke-dashoffset .5s"}}/>
          <text x="36" y="40" textAnchor="middle" fontSize="15" fontWeight="700" fill={P.neuInk} className="tnum">{pctDone.toFixed(0)}%</text>
        </svg>
      </div>

      {/* saved / target */}
      <div style={{textAlign:"center"}} className="tnum">
        <div style={{fontSize:14,fontWeight:700,color:P.neuInk}}>{fmtG(saved)}</div>
        <div style={{fontSize:11,color:P.neuSub}}>of {fmtG(g.target)}</div>
      </div>

      {/* actions */}
      <div style={{display:"flex",gap:6,marginTop:"auto"}}>
        <button onClick={()=>openAdd(g.id)}
          style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:4,borderRadius:999,padding:"6px 0",fontSize:12,fontWeight:600,background:g.color,color:"#fff",border:"none"}}>
          <I.Plus size={12}/>Add
        </button>
        <button onClick={()=>openDetails(g.id)} title="Details" className="neu-btn"
          style={{display:"flex",alignItems:"center",justifyContent:"center",borderRadius:999,padding:"6px 10px",fontSize:12,fontWeight:600,color:P.neuSub}}>
          ⋯
        </button>
      </div>
    </div>
  );
}

  const openTypePicker=id=>setTypePicker(id);

  return(
    <div style={{background:P.neuBg,borderRadius:24,padding:"14px 12px 18px",margin:"0 -4px"}}>
      {(isSingle?["me"]:["me","wife"]).map(ok=>{
        const list=goals.filter(g=>g.owner===ok);
        return(
          <section key={ok} style={{marginBottom:22}}>
            {!isSingle&&
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <span style={{width:8,height:8,borderRadius:999,background:ok==="me"?P.jade:P.br}}/>
                <h2 style={{fontSize:14,fontWeight:600,color:ok==="me"?P.jade:P.br,margin:0}}>{owners[ok]}'s goals</h2>
              </div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:10}}>
              {list.map(g=>(
                <GoalSquare key={g.id} {...{g,fmt,updateGoal,removeGoal,openAdd,openDetails,openTypePicker}}/>
              ))}
              {/* add-goal square */}
              <button onClick={()=>addGoal(ok)} className="neu-btn"
                style={{borderRadius:16,padding:14,minHeight:150,color:P.jade,
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,fontSize:13,fontWeight:500}}>
                <I.Plus size={20}/>Add goal
              </button>
            </div>
          </section>
        );
      })}

      {/* ── Type picker modal ── */}
      {typePicker&&(()=>{
        const g=goals.find(x=>x.id===typePicker);
        if(!g)return null;
        return(
          <Portal>
          <div className="modal-bg" onClick={()=>setTypePicker(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <h3 style={{margin:0,fontSize:16,fontWeight:600,color:P.ink}}>Goal type — {g.name}</h3>
                <button onClick={()=>setTypePicker(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {GOAL_TYPES.map(([key,label])=>{
                  const Icon=goalIcon(key);
                  const active=g.type===key;
                  return(
                    <button key={key} onClick={()=>{updateGoal(g.id,{type:key});setTypePicker(null);}}
                      style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"12px 6px",borderRadius:12,
                        background:active?g.color+"22":"rgba(0,0,0,.04)",color:active?g.color:P.sub,
                        border:active?`1px solid ${g.color}`:"1px solid transparent",fontSize:11,fontWeight:600,textAlign:"center",lineHeight:1.2}}>
                      <Icon size={22}/>{label}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
          </Portal>
        );
      })()}

      {/* ── Add money modal ── */}
      {addModal&&(()=>{
        const g=goals.find(x=>x.id===addModal);
        if(!g)return null;
        const saved=(g.contributions||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
        const fmtG=n=>`${g.currency||"SAR"} ${Math.round(Number(n)||0).toLocaleString("en-US")}`;
        return(
          <Portal>
          <div className="modal-bg" onClick={()=>setAddModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <h3 style={{margin:0,fontSize:16,fontWeight:600,color:P.ink}}>Add money — {g.name}</h3>
                <button onClick={()=>setAddModal(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
              </div>
              <div style={{background:"rgba(0,0,0,.05)",borderRadius:12,padding:12,marginBottom:16}}>
                <div style={{fontSize:12,color:P.sub}}>Current saved</div>
                <div className="serif tnum" style={{fontSize:24,fontWeight:600,color:P.ink}}>{fmtG(saved)}</div>
                <div style={{fontSize:12,color:P.faint}}>Target: {fmtG(g.target)} · {g.target>0?((saved/g.target)*100).toFixed(0):0}% there</div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Amount to add ({g.currency||"SAR"})</div>
                <input type="text" inputMode="decimal" value={addAmount} onChange={e=>setAddAmount(e.target.value)}
                  onBlur={e=>setAddAmount(e.target.value.trim()===""?"":String(evalMathExpr(e.target.value,Number(addAmount)||0)))}
                  onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}}
                  placeholder="0" autoFocus
                  style={{width:"100%",borderRadius:10,padding:"10px",fontSize:18,fontWeight:600,background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Note (optional)</div>
                <input value={addNote} onChange={e=>setAddNote(e.target.value)} placeholder="e.g. Monthly deposit"
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
              </div>
              {addAmount&&Number(addAmount)>0&&(
                <div style={{fontSize:13,color:P.sub,marginBottom:12}} className="tnum">
                  New total: {fmtG(saved+Number(addAmount))} ({g.target>0?(((saved+Number(addAmount))/g.target)*100).toFixed(0):0}%)
                </div>
              )}
              <button onClick={()=>{if(Number(addAmount)>0){addContribution(addModal,addAmount,addNote);setAddModal(null);}}}
                style={{width:"100%",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,background:P.jade,color:"#fff",border:"none"}}>
                Add {addAmount?fmtG(Number(addAmount)):"money"}
              </button>
            </div>
          </div>
          </Portal>
        );
      })()}

      {/* ── Details modal: edit target/monthly + contributions ── */}
      {detailModal&&(()=>{
        const g=goals.find(x=>x.id===detailModal);
        if(!g)return null;
        const saved=(g.contributions||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
        const remain=Math.max(0,g.target-saved);
        const months=g.monthly>0?Math.ceil(remain/g.monthly):null;
        const Icon=goalIcon(g.type);
        const fmtG=n=>`${g.currency||"SAR"} ${Math.round(Number(n)||0).toLocaleString("en-US")}`;
        return(
          <Portal>
          <div className="modal-bg" onClick={()=>setDetailModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                <span style={{display:"flex",alignItems:"center",justifyContent:"center",width:34,height:34,borderRadius:10,background:g.color+"22",color:g.color}}><Icon size={18}/></span>
                <input value={g.name} onChange={e=>updateGoal(g.id,{name:e.target.value})} className="bare" style={{fontSize:16,fontWeight:600,flex:1,minWidth:0,color:P.ink}}/>
                <button onClick={()=>setDetailModal(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
              </div>

              <div style={{display:"flex",gap:10,marginBottom:14}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:P.faint,textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Target</div>
                  <input type="number" value={g.target} onChange={e=>updateGoal(g.id,{target:Number(e.target.value)})}
                    className="tnum" style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,fontWeight:600,background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:P.faint,textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Saving in</div>
                  <select value={g.currency||"SAR"} onChange={e=>updateGoal(g.id,{currency:e.target.value})}
                    style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,fontWeight:600,background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}>
                    {FX_CODES.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:P.faint,textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Monthly</div>
                  <input type="number" value={g.monthly} onChange={e=>updateGoal(g.id,{monthly:Number(e.target.value)})}
                    className="tnum" style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,fontWeight:600,background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
                </div>
              </div>
              <div style={{fontSize:12,color:P.sub,marginBottom:14}} className="tnum">
                Saved {fmtG(saved)} · {fmtG(remain)} to go{months!=null?` · ~${months} mo at this pace`:""}
              </div>

              <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Contributions</div>
              {(g.contributions||[]).length>0?(
                <div style={{borderRadius:10,overflow:"hidden",background:"rgba(0,0,0,.03)",marginBottom:8}}>
                  {[...(g.contributions||[])].sort((a,b)=>b.date.localeCompare(a.date)).map(c=>(
                    <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:"1px solid rgba(0,0,0,.06)",fontSize:13}}>
                      <span style={{color:P.faint,fontSize:11}}>{c.date}</span>
                      <span className="tnum" style={{fontWeight:600,color:P.jade}}>+{fmtG(c.amount)}</span>
                      {c.note&&<span style={{color:P.sub,flex:1,fontSize:12}}>{c.note}</span>}
                      <button onClick={()=>removeContribution(g.id,c.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4,marginLeft:"auto"}}><I.X size={12}/></button>
                    </div>
                  ))}
                </div>
              ):<div style={{fontSize:12,color:P.faint,marginBottom:8}}>No contributions yet.</div>}

              <button onClick={()=>{setDetailModal(null);openAdd(g.id);}}
                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:10,padding:"9px 0",fontSize:14,fontWeight:600,background:g.color,color:"#fff",border:"none"}}>
                <I.Plus size={14}/>Add money
              </button>
            </div>
          </div>
          </Portal>
        );
      })()}
    </div>
  );
}

/* ── OVERVIEW VIEW ── */
/* ── TARGETS / FORECAST VIEW ──────────────────────────────────────────────
   Trend-based capital forecasting. Unlike Goals (manual-contribution pots),
   a Target's progress is derived live: pick which budget categories count as
   "savings rate" toward it, and it projects your current invested + cash
   balances forward at two separately-editable conservative growth rates. ── */
function TargetsView({targets,addTarget,updateTarget,removeTarget,plans,activePlanId,owners,invSar,banksSar,cur,convert,fmt}){
  const[openId,setOpenId]=useState(null);
  const[catPickerId,setCatPickerId]=useState(null);

  // invSar/banksSar arrive totaled in the account's base currency (`cur`).
  // Each target can be saved *in* a different currency (e.g. a USD brokerage
  // target while your base currency is SAR) — convert the current invested
  // + cash balances into that target's own currency before comparing/forecasting.
  const toTargetCcy=(t,amtInBase)=>{
    const tc=t.currency||cur;
    if(tc===cur)return amtInBase;
    const v=convert?convert(amtInBase,cur,tc):null;
    return v==null?amtInBase:v;
  };

  // only the CURRENT plan per owner — `plans` holds one entry per month
  // (carry-forward history), so looping over all of them would repeat
  // every category once per past month
  const allCats=useMemo(()=>{
    const activeIds=new Set([activePlanId?.me,activePlanId?.wife].filter(Boolean));
    const out=[];
    (plans||[]).filter(p=>activeIds.has(p.id)).forEach(p=>(p.categories||[]).forEach(c=>{
      out.push({id:c.id,name:c.name,owner:p.owner,amount:Number(c.amount)||0});
    }));
    return out;
  },[plans,activePlanId]);

  const open=targets.find(t=>t.id===openId);
  const catPickerTarget=targets.find(t=>t.id===catPickerId);

  // sum a target's tagged categories into invest vs cash monthly flows
  const splitMonthly=t=>{
    const alloc=t.categoryAlloc||{};
    let monthlyInvest=0,monthlyCash=0,count=0;
    allCats.forEach(c=>{
      const dest=alloc[c.id];
      if(dest==="invest"){monthlyInvest+=c.amount;count++;}
      else if(dest==="cash"){monthlyCash+=c.amount;count++;}
    });
    return{monthlyInvest,monthlyCash,count};
  };

  return(
    <div style={{background:P.neuBg,borderRadius:24,padding:"14px 12px 18px",margin:"0 -4px"}}>
      <div style={{fontSize:12,color:P.neuSub,marginBottom:14,lineHeight:1.5}}>
        Pick which budget categories count toward each target, and tag each one
        as going into stocks (grows at the invest rate) or cash/time deposit
        (grows at the cash rate). A GoTrade contribution and a Seabank
        contribution compound differently — this keeps them separate.
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10}}>
        {targets.map(t=>{
          const{monthlyInvest,monthlyCash,count}=splitMonthly(t);
          const invT=toTargetCcy(t,invSar),banksT=toTargetCcy(t,banksSar);
          const monthlyInvestT=toTargetCcy(t,monthlyInvest),monthlyCashT=toTargetCcy(t,monthlyCash);
          const{hitMonth}=computeTargetForecast(invT,banksT,monthlyInvestT,monthlyCashT,t.investRate,t.cashRate,t.targetAmount);
          const current=invT+banksT;
          const pct=t.targetAmount>0?Math.min(100,(current/t.targetAmount)*100):0;
          const fmtT=n=>`${t.currency||cur} ${Math.round(Number(n)||0).toLocaleString("en-US")}`;
          return(
            <button key={t.id} onClick={()=>setOpenId(t.id)}
              style={{textAlign:"left",padding:14,minHeight:150,...neu(16),
                display:"flex",flexDirection:"column",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{width:8,height:8,borderRadius:999,background:t.color||P.jade}}/>
                <span style={{fontSize:13,fontWeight:600,color:P.neuInk}}>{t.name}</span>
              </div>
              <div style={{fontSize:11,color:P.neuSub}}>Target</div>
              <div className="tnum" style={{fontSize:15,fontWeight:700,color:P.neuInk}}>{fmtT(t.targetAmount)}</div>
              <div style={{...neuInset(999),height:8,overflow:"hidden",marginTop:2}}>
                <div className="liquid-fill" style={{height:"100%",width:`${pct}%`,background:liquidFillBg(t.color||P.jade)}}/>
              </div>
              <div style={{fontSize:11,color:P.neuSub,marginTop:"auto"}}>
                {count===0?"No categories selected"
                  :hitMonth===null?"30+ yrs at current pace"
                  :hitMonth===0?"Target already reached"
                  :`~${hitMonth} mo (${(hitMonth/12).toFixed(1)} yrs) to go`}
              </div>
            </button>
          );
        })}
        <button onClick={addTarget} className="neu-btn"
          style={{borderRadius:16,padding:14,minHeight:150,color:P.jade,
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,fontSize:13,fontWeight:500}}>
          <I.Plus size={20}/>Add target
        </button>
      </div>

      {/* ── Detail / edit modal ── */}
      {open&&(()=>{
        const{monthlyInvest,monthlyCash,count}=splitMonthly(open);
        const invT=toTargetCcy(open,invSar),banksT=toTargetCcy(open,banksSar);
        const monthlyInvestT=toTargetCcy(open,monthlyInvest),monthlyCashT=toTargetCcy(open,monthlyCash);
        const{series,hitMonth}=computeTargetForecast(invT,banksT,monthlyInvestT,monthlyCashT,open.investRate,open.cashRate,open.targetAmount);
        const fmtT=n=>`${open.currency||cur} ${Math.round(Number(n)||0).toLocaleString("en-US")}`;
        return(
        <Portal>
        <div className="modal-bg" onClick={()=>setOpenId(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:420}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <input value={open.name} onChange={e=>updateTarget(open.id,{name:e.target.value})}
                className="bare" style={{fontSize:17,fontWeight:700,flex:1,color:P.ink}}/>
              <button onClick={()=>setOpenId(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
            </div>

            <div style={{display:"flex",gap:12,marginBottom:12,fontSize:13}}>
              <label style={{flex:1,color:P.sub}}>Target amount ({open.currency||cur})
                <input type="number" value={open.targetAmount} onChange={e=>updateTarget(open.id,{targetAmount:Number(e.target.value)})}
                  className="bare tnum" style={{display:"block",width:"100%",fontWeight:600,fontSize:15,marginTop:2,color:P.ink}}/>
              </label>
              <label style={{flex:1,color:P.sub}}>Saving in
                <select value={open.currency||cur} onChange={e=>updateTarget(open.id,{currency:e.target.value})}
                  className="bare tnum" style={{display:"block",width:"100%",fontWeight:600,fontSize:15,marginTop:2,color:P.ink}}>
                  {FX_CODES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </label>
              <label style={{flex:1,color:P.sub}}>Target date
                <input type="date" value={open.targetDate||""} onChange={e=>updateTarget(open.id,{targetDate:e.target.value})}
                  className="bare tnum" style={{display:"block",width:"100%",fontWeight:600,fontSize:13,marginTop:2,color:P.ink}}/>
              </label>
            </div>

            <div style={{display:"flex",gap:12,marginBottom:14,fontSize:13}}>
              <label style={{flex:1,color:P.sub}}>Invest rate %/yr
                <input type="number" step="0.5" value={open.investRate} onChange={e=>updateTarget(open.id,{investRate:Number(e.target.value)})}
                  className="bare tnum" style={{display:"block",width:"100%",fontWeight:600,fontSize:15,marginTop:2,color:P.ink}}/>
              </label>
              <label style={{flex:1,color:P.sub}}>Cash rate %/yr
                <input type="number" step="0.25" value={open.cashRate} onChange={e=>updateTarget(open.id,{cashRate:Number(e.target.value)})}
                  className="bare tnum" style={{display:"block",width:"100%",fontWeight:600,fontSize:15,marginTop:2,color:P.ink}}/>
              </label>
            </div>

            <div style={{marginBottom:14}}>
              <button onClick={()=>setCatPickerId(open.id)}
                style={{width:"100%",textAlign:"left",padding:"10px 12px",borderRadius:10,background:"rgba(0,0,0,.05)",border:"none",fontSize:13}}>
                <div style={{color:P.sub,marginBottom:6}}>Savings-rate categories ({count} selected)</div>
                <div style={{display:"flex",gap:16}}>
                  <div>
                    <div style={{fontSize:10,color:P.faint}}>→ Stocks</div>
                    <div className="tnum" style={{fontWeight:600,color:P.ink}}>{fmt(monthlyInvest)}/mo</div>
                  </div>
                  <div>
                    <div style={{fontSize:10,color:P.faint}}>→ Cash</div>
                    <div className="tnum" style={{fontWeight:600,color:P.ink}}>{fmt(monthlyCash)}/mo</div>
                  </div>
                </div>
                {(open.currency||cur)!==cur&&(
                  <div className="tnum" style={{fontSize:10,color:P.faint,marginTop:6}}>
                    ≈ {fmtT(monthlyInvestT)} + {fmtT(monthlyCashT)} /mo once converted to {open.currency}
                  </div>
                )}
              </button>
            </div>

            <div style={{borderRadius:14,padding:12,background:"rgba(0,0,0,.05)",marginBottom:14}}>
              <div style={{fontSize:12,color:P.sub,marginBottom:6}}>
                {count===0?"Select at least one category to project a timeline."
                  :hitMonth===null?"Target isn't reached within 30 years at this pace — raise the monthly rate or the growth rates."
                  :`Projected: ~${hitMonth} months (${(hitMonth/12).toFixed(1)} years) from today.`}
              </div>
              <div style={{width:"100%",height:150}}>
                <ResponsiveContainer>
                  <LineChart data={series} margin={{top:8,right:8,bottom:0,left:-16}}>
                    <CartesianGrid strokeDasharray="3 3" stroke={P.line}/>
                    <XAxis dataKey="m" tick={{fontSize:10,fill:P.faint}} tickFormatter={v=>`${Math.round(v/12)}y`}/>
                    <YAxis tick={{fontSize:10,fill:P.faint}} tickFormatter={v=>`${Math.round(v/1000)}k`}/>
                    <Tooltip formatter={v=>fmtT(v)} labelFormatter={v=>`Month ${v}`}/>
                    <Line type="monotone" dataKey="total" stroke={open.color||P.jade} strokeWidth={2} dot={false}/>
                  </LineChart>
                </ResponsiveContainer>
              </div>
            </div>

            <button onClick={()=>{removeTarget(open.id);setOpenId(null);}}
              style={{width:"100%",padding:"10px",borderRadius:10,background:"transparent",border:`1px solid ${P.line}`,color:P.red,fontSize:13,fontWeight:500}}>
              <I.Trash size={13} style={{marginRight:6,verticalAlign:-2}}/>Delete target
            </button>
          </div>
        </div>
        </Portal>
        );
      })()}

      {/* ── Category picker modal ── */}
      {catPickerTarget&&(
        <Portal>
        <div className="modal-bg" onClick={()=>setCatPickerId(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:380}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <h3 style={{margin:0,fontSize:15,fontWeight:600,color:P.ink}}>Savings-rate categories</h3>
              <button onClick={()=>setCatPickerId(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
            </div>
            <div style={{fontSize:11,color:P.faint,marginBottom:10,lineHeight:1.4}}>
              Tag each category as going into stocks or cash — it changes which
              growth rate applies to that money.
            </div>
            <div style={{maxHeight:320,overflowY:"auto",display:"flex",flexDirection:"column",gap:2}}>
              {["me","wife"].map(ok=>{
                const cats=allCats.filter(c=>c.owner===ok);
                if(!cats.length)return null;
                return(
                  <div key={ok} style={{marginBottom:6}}>
                    <div style={{fontSize:11,fontWeight:600,color:P.faint,textTransform:"uppercase",margin:"6px 2px"}}>{owners?.[ok]||ok}</div>
                    {cats.map(c=>{
                      const alloc=catPickerTarget.categoryAlloc||{};
                      const dest=alloc[c.id]||null;
                      const setDest=d=>{
                        const next={...alloc};
                        if(d===null)delete next[c.id];else next[c.id]=d;
                        updateTarget(catPickerTarget.id,{categoryAlloc:next});
                      };
                      const segBtn=(val,label)=>(
                        <button onClick={()=>setDest(dest===val?null:val)}
                          style={{padding:"4px 9px",borderRadius:7,fontSize:11,fontWeight:600,border:"none",
                            background:dest===val?(val==="invest"?P.jade:P.br):"rgba(0,0,0,.05)",
                            color:dest===val?"#fff":P.sub}}>
                          {label}
                        </button>
                      );
                      return(
                        <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 6px",fontSize:13}}>
                          <span style={{flex:1,color:P.ink,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.name}</span>
                          <span className="tnum" style={{color:P.faint,fontSize:11}}>{fmt(c.amount)}</span>
                          <div style={{display:"flex",gap:4}}>
                            {segBtn("invest","Stocks")}
                            {segBtn("cash","Cash")}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
        </Portal>
      )}
    </div>
  );
}

/* ── SETTINGS MODAL ── */
/* ── Conflict resolution — shown when local and cloud data disagree and this
   device has unsynced changes. Blocking modal by design: the person must
   pick a side rather than risk either copy being silently lost. ── */
function ConflictModal({conflict,onKeepLocal,onUseCloud,onSaveLocalToCloud}){
  const remoteWhen=conflict.remoteSavedAt?new Date(conflict.remoteSavedAt).toLocaleString():"an unknown time";
  const choiceBtn={borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:600,border:`1px solid ${P.line}`,background:P.sfA,color:P.ink,textAlign:"left",display:"block"};
  return(
    <div className="modal-bg">
      <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
        <h3 style={{margin:"0 0 8px",fontWeight:600}}>Cloud and local data differ</h3>
        <p style={{fontSize:13,color:P.sub,lineHeight:1.5,marginBottom:14}}>
          This device has changes that haven't been saved to the cloud, and the cloud copy — last saved {remoteWhen} — is different. Choose which one to keep.
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={onKeepLocal} style={choiceBtn}>
            Keep Local<div style={{fontWeight:400,fontSize:12,color:P.faint,marginTop:2}}>Stay on this device's data. Cloud is left as-is.</div>
          </button>
          <button onClick={onUseCloud} style={choiceBtn}>
            Use Cloud<div style={{fontWeight:400,fontSize:12,color:P.faint,marginTop:2}}>Replace this device's data with the cloud copy. A backup of your local data is kept.</div>
          </button>
          <button onClick={onSaveLocalToCloud} style={{...choiceBtn,border:"none",background:P.gr,color:"#fff"}}>
            Save Local to Cloud<div style={{fontWeight:400,fontSize:12,opacity:.85,marginTop:2}}>Overwrite the cloud copy with this device's data.</div>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Device profile picker — asked once per device, then remembered locally
   (never synced) so Budget/Expenses default to the right person. ── */
function ProfilePickerModal({owners,onChoose,dismissable,onClose}){
  return(
    <div className="modal-bg" onClick={dismissable?onClose:undefined}>
      <div className="modal" style={{maxWidth:340,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
        <div style={{color:P.gr,marginBottom:6,display:"flex",justifyContent:"center"}}><I.Users size={22}/></div>
        <h3 style={{margin:"0 0 6px",fontWeight:600}}>Whose budget?</h3>
        <p style={{fontSize:13,color:P.sub,margin:"0 0 16px",lineHeight:1.5}}>
          Pick which profile this device should show by default in Budget and Expenses. You can still switch anytime with the in-app toggle — this just sets what loads first.
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {["me","wife"].map(ok=>(
            <button key={ok} onClick={()=>onChoose(ok)}
              style={{borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:600,border:`1px solid ${P.line}`,
                background:ok==="me"?P.grS:P.brS,color:ok==="me"?P.grD:P.br}}>
              {owners?.[ok]||(ok==="me"?"Me":"Wife")}
            </button>
          ))}
        </div>
        {dismissable&&
          <button onClick={onClose} style={{marginTop:14,background:"transparent",border:"none",color:P.faint,fontSize:12}}>Cancel</button>}
      </div>
    </div>
  );
}

function SettingsModal({data,setData,onClose,pullFromCloud,saveToCloud,kvReady,hasUnsyncedChanges,lastCloudSavedAt,lastCloudPulledAt,changesSinceSave,syncOp,preCloudBackupAt,restorePreCloudBackup,openProfilePicker,setOwnerName,owners,toggleTheme,setPayPeriod,session,onLogOut,isSingle}){
  const[confirm,setConfirm]=useState(false);
  const[msg,setMsg]=useState("");
  const fileRef=useRef(null);
  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(""),2500);};
  const download=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`allocation-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
    flash("Backup downloaded ✓");
  };
  const onFile=e=>{
    const f=e.target.files&&e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(String(r.result));if(!Array.isArray(d.plans))throw 0;setData(migrate(d));flash("Backup loaded ✓");}catch{flash("Not a valid backup.");}};
    r.readAsText(f);
  };
  const btn={background:P.sfA,border:`1px solid ${P.line}`,color:P.ink,borderRadius:10,padding:"8px 12px",fontSize:14,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6};
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h3 style={{margin:0,fontWeight:600}}>Settings</h3>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
        </div>
        {session&&
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Account</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,borderRadius:10,padding:"9px 12px",
              background:P.sfA,border:`1px solid ${P.line}`}}>
              <span style={{fontSize:13,color:P.ink,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {session.user&&session.user.email}
              </span>
              <button onClick={onLogOut}
                style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,borderRadius:999,padding:"6px 12px",fontSize:12,fontWeight:600,
                  background:P.redS,color:P.red,border:`1px solid ${P.redS}`}}>
                <I.LogOut size={13}/>Log Out
              </button>
            </div>
          </div>}
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Appearance</div>
        <button onClick={toggleTheme}
          style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",borderRadius:10,padding:"9px 12px",fontSize:14,fontWeight:500,marginBottom:16,
            background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}>
          <span style={{display:"flex",alignItems:"center",gap:8}}>
            {data.theme==="dark"?<I.Moon size={15}/>:<I.Sun size={15}/>}
            {data.theme==="dark"?"Dark mode":"Light mode"}
          </span>
          <span style={{fontSize:12,color:P.gr,fontWeight:600}}>Switch to {data.theme==="dark"?"light":"dark"}</span>
        </button>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>{isSingle?"Your name":"Who's who"}</div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <input value={owners.me} onChange={e=>setOwnerName("me",e.target.value)} placeholder="Your name" style={{flex:1,borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
          {!isSingle&&
            <input value={owners.wife} onChange={e=>setOwnerName("wife",e.target.value)} placeholder="Wife's name" style={{flex:1,borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>}
        </div>
        {!isSingle&&
          <button onClick={openProfilePicker}
            style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,width:"100%",borderRadius:10,padding:"8px 12px",fontSize:13,fontWeight:500,marginBottom:16,
              background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}>
            <I.Users size={14}/>Change default profile for this device
          </button>}
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Pay periods</div>
        <div style={{fontSize:11,color:P.faint,marginBottom:8,lineHeight:1.5}}>
          Budget and track expenses by paycheck instead of calendar month. Off by default — when off, that person's Budget and Expenses tabs work exactly as before.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {(isSingle?["me"]:["me","wife"]).map(ok=>{
            const cfg=(data.payPeriods||{})[ok]||{enabled:false,payday:1};
            return(
              <div key={ok} style={{borderRadius:10,padding:"10px 12px",background:P.sfA,border:`1px solid ${P.line}`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:cfg.enabled?8:0}}>
                  <span style={{fontSize:13,fontWeight:600,color:P.ink}}>{isSingle?"Pay period":owners[ok]}</span>
                  <button onClick={()=>setPayPeriod(ok,{enabled:!cfg.enabled})}
                    style={{borderRadius:999,padding:"4px 10px",fontSize:12,fontWeight:600,
                      background:cfg.enabled?P.gr:P.sf,color:cfg.enabled?"#fff":P.sub,border:`1px solid ${cfg.enabled?P.gr:P.line}`}}>
                    {cfg.enabled?"On":"Off"}
                  </button>
                </div>
                {cfg.enabled&&(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,color:P.sub}}>Payday</span>
                    <input type="number" min="1" max="31" value={cfg.payday}
                      onChange={e=>setPayPeriod(ok,{payday:Math.min(31,Math.max(1,Number(e.target.value)||1))})}
                      className="tnum" style={{width:56,borderRadius:8,padding:"5px 8px",fontSize:13,background:P.sf,border:`1px solid ${P.line}`,color:P.ink}}/>
                    <span style={{fontSize:11,color:P.faint}}>of each month{cfg.payday>28?" (clamped to last day in short months)":""}</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Base currency</div>
        <select value={data.currency} onChange={e=>setData(d=>({...d,currency:e.target.value}))}
          style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,marginBottom:16,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}>
          {BANK_CCY.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Cloudflare KV Sync</div>
        {kvReady
          ?<div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:hasUnsyncedChanges?P.amber:P.gr,marginBottom:8,padding:"8px 10px",
              background:hasUnsyncedChanges?P.amberS:P.grS,borderRadius:10,lineHeight:1.6}}>
              {hasUnsyncedChanges
                ?`⚠️ Local changes pending${changesSinceSave?` (${changesSinceSave})`:""}`
                :"✅ Cloud is up to date"}
              <div style={{fontSize:11,color:P.faint,marginTop:4}}>
                Last saved to cloud: {lastCloudSavedAt?lastCloudSavedAt.toLocaleString():"never"}<br/>
                Last pulled from cloud: {lastCloudPulledAt?lastCloudPulledAt.toLocaleString():"never"}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <button onClick={()=>saveToCloud()} disabled={syncOp==="push"} style={btn}>
                <I.Cloud size={14}/>{syncOp==="push"?"Saving…":"Save to Cloud"}
              </button>
              <button onClick={()=>pullFromCloud()} disabled={syncOp==="pull"} style={btn}>
                <I.Refresh size={14}/>{syncOp==="pull"?"Pulling…":"Pull from Cloud"}
              </button>
            </div>
            {preCloudBackupAt&&
              <button onClick={restorePreCloudBackup} style={{...btn,width:"100%",marginBottom:8}}>
                <I.Reset size={14}/>Restore previous local copy
              </button>}
            <div style={{fontSize:11,color:P.faint,lineHeight:1.6,marginBottom:8}}>
              Changes save automatically on this device. Cloud upload only happens when you tap Save to Cloud. Opening the app checks the cloud automatically — pull-to-sync on mobile saves pending changes first, or pulls the latest copy when this device is already clean.
            </div>
            <div style={{fontSize:11,color:P.sub,padding:"8px 10px",background:P.sfA,borderRadius:10}}>
              Pull before editing on another device. Save to Cloud when finished — you and {owners.wife||"your partner"} share this dataset.
            </div>
          </div>
          :<div style={{marginBottom:16,fontSize:12,color:P.sub,padding:"10px 12px",background:P.sfA,borderRadius:10,lineHeight:1.6}}>
            Add your Worker URL to <code>index.html</code> and sign in to enable sync — each account's data is kept private and isolated by your login.
            See the setup guide for instructions.
          </div>
        }
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Manual backup</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <button onClick={download} style={btn}><I.Download size={14}/>Download</button>
          <button onClick={()=>fileRef.current&&fileRef.current.click()} style={btn}><I.Upload size={14}/>Import</button>
        </div>
        <input ref={fileRef} type="file" accept=".json" onChange={onFile} style={{display:"none"}}/>
        {msg&&<div style={{fontSize:12,color:P.gr,marginBottom:12}}>{msg}</div>}
        <button onClick={()=>confirm?(setData(defaultData()),flash("Reset done")):setConfirm(true)}
          style={{display:"flex",width:"100%",alignItems:"center",justifyContent:"center",gap:8,borderRadius:10,padding:"8px 12px",fontSize:14,fontWeight:500,marginTop:4,
            background:confirm?P.red:P.sfA,color:confirm?"#fff":P.red,border:`1px solid ${confirm?P.red:P.line}`}}>
          <I.Reset size={14}/>{confirm?"Tap again to confirm reset":"Reset to sample data"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
window.__hideLoading=function(){
  var el=document.getElementById("loading");
  if(el){el.style.opacity="0";el.style.transition="opacity 0.3s";setTimeout(function(){el.remove();},300);}
};
setTimeout(window.__hideLoading,8000);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => {
        console.log('SW Registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
