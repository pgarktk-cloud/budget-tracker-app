          <span className="serif tnum" style={{fontSize:30,fontWeight:600}}>{sar(total)}</span>
          <div className="tnum" style={{marginTop:6,display:"flex",gap:16,color:P.deepHi,fontSize:14}}>
            <span>{usdTotal!=null?`≈ $${usdTotal.toLocaleString("en-US")}`:"USD —"}</span>
            <span>{phpTotal!=null?`≈ ₱${Math.round(phpTotal).toLocaleString("en-US")}`:"PHP —"}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:10,flex:"1 1 220px"}}>
          <div style={{flex:1,background:"rgba(255,255,255,.08)",borderRadius:12,padding:"10px 12px"}}>
            <div style={{fontSize:11,color:P.deepHi}}>{owners.me}</div>
            <div className="tnum" style={{fontSize:16,fontWeight:700}}>{sar(meTotal)}</div>
          </div>
          <div style={{flex:1,background:"rgba(255,255,255,.08)",borderRadius:12,padding:"10px 12px"}}>
            <div style={{fontSize:11,color:P.deepHi}}>{owners.wife}</div>
            <div className="tnum" style={{fontSize:16,fontWeight:700}}>{sar(wifeTotal)}</div>
          </div>
        </div>
      </div>

      {/* ── card grid, per owner ── */}
      {["me","wife"].map(ok=>{
        const items=banks.filter(b=>b.owner===ok);
        return(
          <section key={ok} style={{marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{width:8,height:8,borderRadius:999,background:ok==="me"?P.gr:P.br}}/>
              <h2 style={{fontSize:14,fontWeight:600,color:ok==="me"?P.grD:P.br,margin:0}}>{owners[ok]}'s accounts</h2>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
              {items.map(Card)}
              <button onClick={()=>addBank(ok)}
                style={{borderRadius:18,minHeight:150,background:P.sf,border:`1px dashed ${P.line}`,color:P.gr,
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,fontSize:13,fontWeight:500}}>
                <I.Plus size={20}/>Add {owners[ok]}'s account
              </button>
            </div>
          </section>
        );
      })}
    </div>
  );
}

/* ── INVESTMENTS VIEW — trade log ── */
function InvestmentsView({invs,addInv,updateInv,removeInv,addTrade,removeTrade,livePrice,setLivePrice,sarRate,convert,projection,setProjection,portHistory,addPortSnap}){
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[updatedAt,setUpdatedAt]=useState(null);
  const[tradeModal,setTradeModal]=useState(null); // invId
  const[tradeForm,setTradeForm]=useState({type:"buy",shares:"",price:"",date:new Date().toISOString().slice(0,10)});
  const[expandedId,setExpandedId]=useState(null);
  const[fetchingName,setFetchingName]=useState({});

  /* Look up a company / fund name for a ticker.
     1) Cloudflare proxy → Yahoo (best for ETFs like VWRA, using the mapped symbol)
     2) Finnhub search (good for US stocks)                                   */
  const fetchName=async(id,ticker)=>{
    const t=(ticker||"").trim().toUpperCase();
    if(!t)return;
    setFetchingName(s=>({...s,[id]:true}));
    let name=null;
    if(!PROXY_URL.startsWith("PASTE_")){
      try{
        const ys=toYahooSym(t);
        const res=await fetch(`${PROXY_URL}/name?symbol=${encodeURIComponent(ys)}`);
        if(res.ok){const j=await res.json();if(j&&j.name)name=j.name;}
      }catch(e){}
    }
    if(!name&&!FINNHUB_KEY.startsWith("PASTE_")){
      try{
        const res=await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(t)}&token=${FINNHUB_KEY}`);
        const j=await res.json();
        const list=j.result||[];
        const match=list.find(x=>x.symbol===t)||list.find(x=>x.symbol===t+".US")||list.find(x=>x.symbol===baseKey(t))||list[0];
        if(match&&match.description)name=match.description;
      }catch(e){}
    }
    if(name)updateInv(id,{name});
    setFetchingName(s=>{const n={...s};delete n[id];return n;});
  };

  const usd=n=>`$${(Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;

  const rows=invs.map(hld=>{
    const{shares,avgCost,totalCost}=holdingStats(hld.trades);
    const price=livePrice[baseKey(hld.ticker||"")]||0;
    const value=shares*price;
    const gain=value-totalCost;
    const gainPct=totalCost>0?(gain/totalCost)*100:0;
    return{...hld,shares,avgCost,totalCost,price,value,gain,gainPct};
  });
  const totVal=rows.reduce((s,r)=>s+r.value,0);
  const totCost=rows.reduce((s,r)=>s+r.totalCost,0);
  const totGain=totVal-totCost;
  const totGainPct=totCost>0?(totGain/totCost)*100:0;

  const refresh=async()=>{
    const tickers=[...new Set(invs.map(h=>(h.ticker||"").trim().toUpperCase()).filter(Boolean))];
    if(!tickers.length){setErr("Add a ticker symbol first.");return;}
    setLoading(true);setErr("");
    try{
      const q=await fetchQuotes(tickers);
      setLivePrice(q);
      setUpdatedAt(Date.now());
      const hit=tickers.filter(t=>q[baseKey(t)]!=null).length;
      if(!hit)setErr("No prices found. Check your Worker URL or ticker symbols.");
      else if(hit<tickers.length)setErr(`Got ${hit}/${tickers.length} prices — remaining tickers not found.`);
      else setErr("");
      // auto-capture portfolio snapshot for the history chart
      const newTotVal=invs.reduce((s,hld)=>{
        const{shares}=holdingStats(hld.trades);
        const p=q[baseKey(hld.ticker||"")]||livePrice[baseKey(hld.ticker||"")]||0;
        return s+shares*p;
      },0);
      if(newTotVal>0)addPortSnap(newTotVal);
    }catch(e){
      setErr(PROXY_URL.startsWith("PASTE_")&&FINNHUB_KEY.startsWith("PASTE_")
        ?"Set up your Cloudflare Worker (for VWRA/LSE) and/or Finnhub key (for US stocks) — see the setup guide."
        :"Price fetch failed — check your Worker URL or Finnhub key.");
    }
    setLoading(false);
  };

  const openTrade=invId=>{
    setTradeModal(invId);
    setTradeForm({type:"buy",shares:"",price:"",date:new Date().toISOString().slice(0,10)});
  };
  const submitTrade=()=>{
    if(!tradeForm.shares||!tradeForm.price)return;
    addTrade(tradeModal,{type:tradeForm.type,shares:Number(tradeForm.shares),price:Number(tradeForm.price),date:tradeForm.date});
    setTradeModal(null);
  };

  const gTone=n=>n>0?P.gr:n<0?P.red:P.sub;
  const series=projectSeries(totVal,projection.monthly,projection.years,projection.rate||8);
  const projData=series.map((v,i)=>({year:`Y${i}`,value:v}));

  return(
    <div>
      {/* hero */}
      <div className="fade-up" style={{borderRadius:16,padding:20,marginBottom:16,background:P.deep,color:"#fff"}}>
        <div style={{fontSize:12,fontWeight:500,color:P.deepHi,marginBottom:4}}>Portfolio value (USD)</div>
        <span key={Math.round(totVal)} className="serif tnum num-flash" style={{fontSize:38,fontWeight:600}}>{usd(totVal)}</span>
        {(sarRate||convert)&&(
          <div className="tnum" style={{display:"flex",flexWrap:"wrap",gap:16,marginTop:4,fontSize:14,color:P.deepHi}}>
            {sarRate&&<span>≈ SAR {Math.round(totVal*sarRate).toLocaleString("en-US")}</span>}
            {(()=>{const php=convert?convert(totVal,"USD","PHP"):null;return php!=null?<span>≈ ₱{Math.round(php).toLocaleString("en-US")}</span>:null;})()}
          </div>
        )}
        <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:20,fontSize:14}} className="tnum">
          <span style={{color:P.deepHi}}>Cost {usd(totCost)}</span>
          <span style={{color:totGain>=0?"#6FC6DA":"#E89B8C",fontWeight:600}}>
            {totGain>=0?"▲":"▼"} {usd(Math.abs(totGain))} ({totGainPct.toFixed(1)}%)
          </span>
        </div>
      </div>

      {/* portfolio history chart */}
      {portHistory.length>0&&(()=>{
        const pts=[...portHistory].sort((a,b)=>a.month.localeCompare(b.month));
        const first=pts[0].value,last=pts[pts.length-1].value;
        const trending=last>=first;
        const chartColor=trending?"#4ADE80":"#F87171";
        const fmtMo=m=>{const[y,mo]=m.split("-");return new Date(Number(y),Number(mo)-1,1).toLocaleDateString("en-US",{month:"short",year:"2-digit"});};
        const data=pts.map(p=>({label:fmtMo(p.month),value:p.value}));
        const pctChange=first>0?((last-first)/first*100):0;
        return(
          <div className="fade-up-1" style={{borderRadius:16,padding:16,marginBottom:16,background:P.sf,border:`1px solid ${P.line}`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <h3 style={{fontSize:14,fontWeight:600,color:P.sub,margin:0}}>Portfolio over time</h3>
              <span className="tnum" style={{fontSize:13,fontWeight:600,color:trending?P.gr:P.red}}>
                {trending?"▲":"▼"} {Math.abs(pctChange).toFixed(1)}% total
              </span>
            </div>
            <div style={{width:"100%",height:160}}>
              <ResponsiveContainer>
                <LineChart data={data} margin={{top:4,right:8,bottom:0,left:-16}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={P.sfA}/>
                  <XAxis dataKey="label" tick={{fontSize:10,fill:P.faint}}/>
                  <YAxis tick={{fontSize:10,fill:P.faint}} tickFormatter={v=>`$${Math.round(v/1000)}k`}/>
                  <Tooltip formatter={v=>`$${Math.round(v).toLocaleString("en-US")}`}/>
                  <Line type="monotone" dataKey="value" stroke={chartColor} strokeWidth={2.5} dot={{r:3,fill:chartColor}}/>
                </LineChart>
              </ResponsiveContainer>
            </div>
            <div style={{fontSize:11,color:P.faint,marginTop:6}}>
              Captured monthly when you refresh prices · {pts.length} data point{pts.length!==1?"s":""}
            </div>
          </div>
        );
      })()}

      {/* controls */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <h2 style={{fontSize:14,fontWeight:600,color:P.sub,margin:0}}>Holdings</h2>
        <button onClick={refresh} disabled={loading}
          style={{display:"flex",alignItems:"center",gap:6,borderRadius:999,padding:"6px 12px",fontSize:14,fontWeight:500,background:P.gr,color:"#fff",border:"none",opacity:loading?.6:1}}>
          <I.Refresh size={14} style={loading?{animation:"spin .9s linear infinite"}:null}/>
          {loading?"Fetching…":"Refresh prices"}
        </button>
      </div>
      {err&&<div style={{fontSize:12,color:P.red,marginBottom:8,padding:"8px 12px",background:P.redS,borderRadius:8}}>{err}</div>}
      {updatedAt&&!err&&<div style={{fontSize:11,color:P.faint,marginBottom:8}}>Prices updated {new Date(updatedAt).toLocaleTimeString()}</div>}

      {/* holdings list */}
      <div style={{borderRadius:16,overflow:"hidden",marginBottom:16,background:P.sf,border:`1px solid ${P.line}`}}>
        {rows.map(r=>(
          <div key={r.id} style={{borderBottom:`1px solid ${P.sfA}`}}>
            {/* summary row */}
            <div style={{padding:"12px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <input value={r.ticker} placeholder="TICKER"
                  onChange={e=>updateInv(r.id,{ticker:e.target.value.toUpperCase()})}
                  onBlur={e=>{
                    const t=(e.target.value||"").trim().toUpperCase();
                    if(!t||r.name)return; // don't overwrite an existing name
                    fetchName(r.id,t);
                  }}
                  className="bare" style={{fontSize:14,fontWeight:700,width:80,letterSpacing:".03em"}}/>
                <input value={r.name} placeholder={fetchingName[r.id]?"fetching name…":"Name"} onChange={e=>updateInv(r.id,{name:e.target.value})} className="bare" style={{fontSize:13,color:P.sub,flex:1,minWidth:0}}/>
                <span className="tnum" style={{fontSize:14,fontWeight:600}}>{usd(r.value)}</span>
                <button onClick={()=>removeInv(r.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4}}><I.X size={15}/></button>
              </div>
              <div style={{marginTop:6,display:"flex",flexWrap:"wrap",alignItems:"center",gap:14,fontSize:13,color:P.sub}} className="tnum">
                <span>{r.shares.toFixed(4)} shares</span>
                <span>Avg {usd(r.avgCost)}</span>
                <span>Price {r.price>0?usd(r.price):"—"}</span>
                <span style={{color:gTone(r.gain),fontWeight:600,marginLeft:"auto"}}>
                  {r.gain>=0?"▲":"▼"} {usd(Math.abs(r.gain))} ({r.gainPct.toFixed(1)}%)
                </span>
              </div>
              {/* trade log toggle + add trade */}
              <div style={{marginTop:8,display:"flex",gap:8}}>
                <button onClick={()=>openTrade(r.id)}
                  style={{display:"flex",alignItems:"center",gap:5,borderRadius:999,padding:"4px 10px",fontSize:12,fontWeight:500,background:P.grS,color:P.grD,border:"none"}}>
                  <I.Plus size={12}/>Add trade
                </button>
                {(r.trades||[]).length>0&&(
                  <button onClick={()=>setExpandedId(expandedId===r.id?null:r.id)}
                    style={{display:"flex",alignItems:"center",gap:5,borderRadius:999,padding:"4px 10px",fontSize:12,color:P.sub,background:P.sfA,border:`1px solid ${P.line}`}}>
                    {expandedId===r.id?"Hide":"Show"} {r.trades.length} trade{r.trades.length!==1?"s":""}
                  </button>
                )}
              </div>
            </div>

            {/* trade history */}
            {expandedId===r.id&&(r.trades||[]).length>0&&(
              <div style={{background:P.sfA,borderTop:`1px solid ${P.line}`}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 32px",gap:4,padding:"6px 16px",fontSize:11,fontWeight:600,color:P.faint,textTransform:"uppercase",letterSpacing:".06em"}}>
                  <span>Date</span><span style={{textAlign:"right"}}>Type</span><span style={{textAlign:"right"}}>Shares</span><span style={{textAlign:"right"}}>Price</span><span/>
                </div>
                {[...(r.trades||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(tr=>(
                  <div key={tr.id} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 32px",gap:4,padding:"6px 16px",fontSize:13,alignItems:"center",borderTop:`1px solid ${P.line}`}}>
                    <span className="tnum" style={{color:P.sub}}>{tr.date}</span>
                    <span style={{textAlign:"right",fontWeight:600,color:tr.type==="buy"?P.gr:P.red,textTransform:"uppercase",fontSize:11}}>{tr.type}</span>
                    <span className="tnum" style={{textAlign:"right"}}>{(Number(tr.shares)||0).toFixed(4)}</span>
                    <span className="tnum" style={{textAlign:"right"}}>{usd(tr.price)}</span>
                    <button onClick={()=>removeTrade(r.id,tr.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4,padding:4}}><I.X size={12}/></button>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
        <button onClick={addInv} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.gr,background:"transparent",border:"none"}}>
          <I.Plus size={14}/>Add holding
        </button>
      </div>

      {/* projection */}
      <div style={{borderRadius:16,padding:16,background:P.sf,border:`1px solid ${P.line}`}}>
        <h3 style={{fontSize:14,fontWeight:600,color:P.sub,margin:"0 0 8px"}}>Growth projection ({projection.rate||8}%/yr)</h3>
        <div style={{display:"flex",flexWrap:"wrap",gap:16,marginBottom:10,fontSize:13}}>
          <label style={{color:P.sub}}>+$/mo <input type="number" value={projection.monthly} onChange={e=>setProjection({monthly:Number(e.target.value)})} className="bare tnum" style={{width:80,fontWeight:600}}/></label>
          <label style={{color:P.sub}}>Years <input type="number" value={projection.years} onChange={e=>setProjection({years:Number(e.target.value)})} className="bare tnum" style={{width:56,fontWeight:600}}/></label>
          <label style={{color:P.sub}}>Rate % <input type="number" value={projection.rate??8} onChange={e=>setProjection({rate:Number(e.target.value)})} className="bare tnum" style={{width:48,fontWeight:600}} step="0.5" min="0" max="30"/></label>
          <span className="tnum" style={{marginLeft:"auto",fontWeight:600,color:P.gr}}>→ ${series[series.length-1].toLocaleString("en-US")}</span>
        </div>
        <div style={{width:"100%",height:180}}>
          <ResponsiveContainer>
            <LineChart data={projData} margin={{top:8,right:8,bottom:0,left:-12}}>
              <CartesianGrid strokeDasharray="3 3" stroke={P.sfA}/>
              <XAxis dataKey="year" tick={{fontSize:11,fill:P.faint}}/>
              <YAxis tick={{fontSize:11,fill:P.faint}} tickFormatter={v=>`${Math.round(v/1000)}k`}/>
              <Tooltip formatter={v=>`$${Math.round(v).toLocaleString("en-US")}`}/>
              <Line type="monotone" dataKey="value" stroke={P.br} strokeWidth={2} dot={false}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Add trade modal */}
      {tradeModal&&(
        <Portal>
        <div className="modal-bg" onClick={()=>setTradeModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <h3 style={{margin:0,fontSize:16,fontWeight:600}}>
                Add trade — {invs.find(x=>x.id===tradeModal)?.ticker||""}
              </h3>
              <button onClick={()=>setTradeModal(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {["buy","sell"].map(t=>(
                <button key={t} onClick={()=>setTradeForm(f=>({...f,type:t}))}
                  style={{flex:1,borderRadius:10,padding:"8px 0",fontSize:14,fontWeight:600,textTransform:"capitalize",
                    background:tradeForm.type===t?(t==="buy"?P.gr:P.red):"transparent",
                    color:tradeForm.type===t?"#fff":(t==="buy"?P.gr:P.red),
                    border:`2px solid ${t==="buy"?P.gr:P.red}`}}>
                  {t==="buy"?"▲ Buy":"▼ Sell"}
                </button>
              ))}
            </div>
            {[["date","Date","date"],["shares","Shares","number"],["price","Price per share (USD)","number"]].map(([k,label,type])=>(
              <div key={k} style={{marginBottom:12}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>{label}</div>
                <input type={type} value={tradeForm[k]} onChange={e=>setTradeForm(f=>({...f,[k]:e.target.value}))}
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
              </div>
            ))}
            {tradeForm.shares&&tradeForm.price&&(
              <div style={{background:P.sfA,borderRadius:10,padding:10,marginBottom:12,fontSize:13,color:P.sub}} className="tnum">
                Total: ${(Number(tradeForm.shares)*Number(tradeForm.price)).toLocaleString("en-US",{minimumFractionDigits:2})}
              </div>
            )}
            <button onClick={submitTrade}
              style={{width:"100%",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,
                background:tradeForm.type==="buy"?P.gr:P.red,color:"#fff",border:"none"}}>
              Confirm {tradeForm.type==="buy"?"Purchase":"Sale"}
            </button>
          </div>
        </div>
        </Portal>
      )}
    </div>
  );
}

/* ── Asset / liability row (top-level so it doesn't remount on each keystroke) ── */
function AssetRow({a,updateAsset,removeAsset}){
  return(
    <div style={{padding:"12px 16px",borderBottom:`1px solid ${P.sfA}`}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <input value={a.name} onChange={e=>updateAsset(a.id,{name:e.target.value})} className="bare" style={{fontSize:14,fontWeight:600,flex:1,minWidth:0}}/>
        <select value={a.currency} onChange={e=>updateAsset(a.id,{currency:e.target.value})} style={{borderRadius:8,padding:"2px 6px",fontSize:12,background:P.sfA,border:`1px solid ${P.line}`,color:P.sub}}>
          {BANK_CCY.map(c=><option key={c}>{c}</option>)}
        </select>
        <button onClick={()=>removeAsset(a.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4}}><I.X size={15}/></button>
      </div>
      {a.kind==="asset"?(
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:12,color:P.faint}}>{a.currency}</span>
          <input type="number" value={a.value} onChange={e=>updateAsset(a.id,{value:Number(e.target.value)})}
            className="bare tnum" style={{width:120,textAlign:"right",fontSize:14,fontWeight:600}}/>
        </div>
      ):(
        /* Liability installment mode */
        <div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <button onClick={()=>updateAsset(a.id,{installment:true})}
              style={{flex:1,borderRadius:8,padding:"5px 0",fontSize:12,fontWeight:600,background:a.installment?P.gr:"transparent",color:a.installment?"#fff":P.sub,border:`1px solid ${a.installment?P.gr:P.line}`}}>
              Installment
            </button>
            <button onClick={()=>updateAsset(a.id,{installment:false})}
              style={{flex:1,borderRadius:8,padding:"5px 0",fontSize:12,fontWeight:600,background:!a.installment?P.gr:"transparent",color:!a.installment?"#fff":P.sub,border:`1px solid ${!a.installment?P.gr:P.line}`}}>
              Fixed amount
            </button>
          </div>
          {a.installment?(
            <div style={{display:"flex",flexWrap:"wrap",gap:10,fontSize:13}}>
              <label style={{color:P.sub,display:"flex",flexDirection:"column",gap:3}}>
                <span style={{fontSize:11}}>Monthly payment ({a.currency})</span>
                <input type="number" value={a.monthly||""} onChange={e=>updateAsset(a.id,{monthly:Number(e.target.value)})}
                  className="bare tnum" style={{width:110,fontSize:14,fontWeight:600,padding:"4px 6px",background:P.sfA,borderRadius:6}}/>
              </label>
              <label style={{color:P.sub,display:"flex",flexDirection:"column",gap:3}}>
                <span style={{fontSize:11}}>Months remaining (as of)</span>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="number" value={a.monthsRemaining||""} onChange={e=>updateAsset(a.id,{monthsRemaining:Number(e.target.value)})}
                    className="bare tnum" style={{width:56,fontSize:14,fontWeight:600,padding:"4px 6px",background:P.sfA,borderRadius:6}}/>
                  <input type="month" value={(a.asOfDate||"").slice(0,7)} onChange={e=>updateAsset(a.id,{asOfDate:e.target.value+"-01"})}
                    style={{fontSize:12,padding:"4px 6px",background:P.sfA,border:`1px solid ${P.line}`,borderRadius:6,color:P.ink}}/>
                </div>
              </label>
              {(a.monthly&&a.monthsRemaining&&a.asOfDate)&&(()=>{
                const bal=liabilityBalance(a);
                const now=new Date();const ref=new Date(a.asOfDate);
                const elapsed=Math.max(0,(now.getFullYear()-ref.getFullYear())*12+(now.getMonth()-ref.getMonth()));
                const remaining=Math.max(0,a.monthsRemaining-elapsed);
                return(
                  <div style={{width:"100%",background:P.sfA,borderRadius:10,padding:10,marginTop:4}}>
                    <div style={{fontSize:12,color:P.sub}}>Balance today: <strong className="tnum">{a.currency} {Math.round(bal).toLocaleString("en-US")}</strong></div>
                    <div style={{fontSize:11,color:P.faint,marginTop:2}}>{remaining} months remaining · {elapsed} months paid</div>
                    <div style={{marginTop:6,height:6,background:P.line,borderRadius:999,overflow:"hidden"}}>
                      <div style={{width:`${Math.min(100,(elapsed/a.monthsRemaining)*100)}%`,height:"100%",background:P.gr}}/>
                    </div>
                  </div>
                );
              })()}
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:12,color:P.faint}}>{a.currency}</span>
              <input type="number" value={a.value||""} onChange={e=>updateAsset(a.id,{value:Number(e.target.value)})}
                className="bare tnum" style={{width:120,textAlign:"right",fontSize:14,fontWeight:600}}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── NET WORTH VIEW — installment liabilities ── */
function NetWorthView({netWorth,banksSar,invSar,assetSar,liabSar,sarRate,convert,ratesErr,assets,addAsset,updateAsset,removeAsset,history,captureSnapshot,addPastSnap,removeSnap}){
  const[gran,setGran]=useState("month");
  const[pm,setPm]=useState(new Date().toISOString().slice(0,7));
  const[pv,setPv]=useState("");
  const sar=n=>`SAR ${Math.round(n).toLocaleString("en-US")}`;
  const usd=sarRate?Math.round(netWorth/sarRate):null;
  const php=convert?convert(netWorth,"SAR","PHP"):null;
  const parts=[{label:"Bank accounts",value:banksSar,color:SEG[0]},{label:"Investments",value:invSar,color:SEG[3]},{label:"Other assets",value:assetSar,color:SEG[5]},{label:"Liabilities",value:-liabSar,color:P.red}];
  const gross=banksSar+invSar+assetSar;
  const fmtMo=m=>{const[y,mo]=m.split("-");return new Date(Number(y),Number(mo)-1,1).toLocaleDateString("en-US",{month:"short",year:"2-digit"});};
  const sorted=[...history].sort((a,b)=>a.month.localeCompare(b.month));
  let pts;
  if(gran==="year"){const m={};sorted.forEach(s=>{m[s.month.slice(0,4)]=s;});pts=Object.entries(m).map(([y,s])=>({label:y,net:s.net}));}
  else pts=sorted.map(s=>({label:fmtMo(s.month),net:s.net}));
  const last=sorted[sorted.length-1];
  const delta=last?netWorth-last.net:null;
  const assetItems=assets.filter(a=>a.kind==="asset");
  const liabItems=assets.filter(a=>a.kind==="liability");

  return(
    <div>
      <div className="fade-up" style={{borderRadius:16,padding:20,marginBottom:16,background:P.deep,color:"#fff"}}>
        <div style={{fontSize:12,fontWeight:500,color:P.deepHi,marginBottom:4}}>Net worth</div>
        <span key={Math.round(netWorth)} className="serif tnum num-flash" style={{fontSize:38,fontWeight:600}}>{sar(netWorth)}</span>
        <div className="tnum" style={{display:"flex",flexWrap:"wrap",gap:16,marginTop:6,color:P.deepHi,fontSize:14}}>
          <span>{usd!=null?`≈ $${usd.toLocaleString("en-US")}`:"USD —"}</span>
          <span>{php!=null?`≈ ₱${Math.round(php).toLocaleString("en-US")}`:"PHP —"}</span>
        </div>
        {(usd==null||php==null)&&<div style={{fontSize:11,marginTop:6,color:"#E89B8C"}}>{ratesErr?"Couldn't load live rates — tap refresh in Currency tab.":"Loading live rates…"}</div>}
        {delta!=null&&<div className="tnum" style={{fontSize:14,marginTop:6,color:delta>=0?"#6FC6DA":"#E89B8C"}}>{delta>=0?"▲":"▼"} {sar(Math.abs(delta))} since last snapshot</div>}
      </div>

      <div className="fade-up-1" style={{borderRadius:16,padding:16,marginBottom:16,background:P.sf,border:`1px solid ${P.line}`}}>
        <h3 style={{fontSize:14,fontWeight:600,margin:"0 0 12px",color:P.sub}}>Composition</h3>
        <div style={{display:"flex",height:12,width:"100%",overflow:"hidden",borderRadius:999,marginBottom:12,background:P.sfA}}>
          {parts.slice(0,3).map(p=>gross>0&&p.value>0&&<div key={p.label} className="bar-animated" style={{width:`${(p.value/gross)*100}%`,height:"100%",background:p.color}}/>)}
        </div>
        {parts.map(p=>(
          <div key={p.label} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",fontSize:14}}>
            <span style={{display:"flex",alignItems:"center",gap:8}}><span style={{width:10,height:10,borderRadius:999,background:p.color}}/>{p.label}</span>
            <span className="tnum" style={{color:p.value<0?P.red:P.sub}}>{p.value<0?`− ${sar(-p.value)}`:sar(p.value)}</span>
          </div>
        ))}
      </div>

      <div className="fade-up-2" style={{borderRadius:16,overflow:"hidden",marginBottom:16,background:P.sf,border:`1px solid ${P.line}`}}>
        <div style={{padding:"10px 16px",fontSize:14,fontWeight:600,background:P.sfA,borderBottom:`1px solid ${P.line}`}}>Assets</div>
        {assetItems.map(a=><AssetRow key={a.id} a={a} updateAsset={updateAsset} removeAsset={removeAsset}/>)}
        <button onClick={()=>addAsset("asset")} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.gr,background:"transparent",border:"none"}}><I.Plus size={14}/>Add asset</button>
        <div style={{padding:"10px 16px",fontSize:14,fontWeight:600,background:P.sfA,borderTop:`1px solid ${P.line}`,borderBottom:`1px solid ${P.line}`}}>Liabilities</div>
        {liabItems.map(a=><AssetRow key={a.id} a={a} updateAsset={updateAsset} removeAsset={removeAsset}/>)}
        <button onClick={()=>addAsset("liability")} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.red,background:"transparent",border:"none"}}><I.Plus size={14}/>Add liability</button>
      </div>

      <div className="fade-up-3" style={{borderRadius:16,padding:16,background:P.sf,border:`1px solid ${P.line}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <h3 style={{fontSize:14,fontWeight:600,margin:0,color:P.sub}}>Net worth over time</h3>
          <div style={{display:"flex",gap:4}}>
            {["month","year"].map(gv=>(
              <button key={gv} onClick={()=>setGran(gv)} style={{borderRadius:999,padding:"3px 10px",fontSize:12,textTransform:"capitalize",background:gran===gv?P.ink:P.sfA,color:gran===gv?"#fff":P.sub,border:"none"}}>{gv}</button>
            ))}
          </div>
        </div>
        {pts.length>0?(
          <div style={{width:"100%",height:200}}>
            <ResponsiveContainer>
              <LineChart data={pts} margin={{top:8,right:8,bottom:0,left:-12}}>
                <CartesianGrid strokeDasharray="3 3" stroke={P.sfA}/>
                <XAxis dataKey="label" tick={{fontSize:11,fill:P.faint}}/>
                <YAxis tick={{fontSize:11,fill:P.faint}} tickFormatter={v=>`${Math.round(v/1000)}k`}/>
                <Tooltip formatter={v=>sar(v)}/>
                <Line type="monotone" dataKey="net" stroke={P.gr} strokeWidth={2} dot={{r:3}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        ):<p style={{fontSize:13,color:P.faint}}>No snapshots yet — this month will save automatically once you add a bank, investment, or asset.</p>}
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:10,marginTop:12}}>
          <div style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:P.gr,fontWeight:500}}>
            <I.Check size={13}/>This month syncs automatically
          </div>
          <button onClick={captureSnapshot} style={{borderRadius:999,padding:"6px 12px",fontSize:12,fontWeight:500,background:P.sfA,color:P.sub,border:`1px solid ${P.line}`}}>Force refresh now</button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"flex-end",gap:8,marginTop:12,paddingTop:12,borderTop:`1px solid ${P.sfA}`}}>
          <div><div style={{color:P.faint,fontSize:10}}>Month</div><input type="month" value={pm} onChange={e=>setPm(e.target.value)} style={{borderRadius:8,padding:"4px 8px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/></div>
          <div><div style={{color:P.faint,fontSize:10}}>Net worth (SAR)</div><input type="number" value={pv} placeholder="0" onChange={e=>setPv(e.target.value)} className="tnum" style={{borderRadius:8,padding:"4px 8px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink,width:120}}/></div>
          <button onClick={()=>{if(pm&&Number(pv)){addPastSnap(pm,Number(pv));setPv("");}}} style={{borderRadius:8,padding:"6px 12px",fontSize:14,fontWeight:500,background:P.sfA,color:P.gr,border:`1px solid ${P.line}`}}>Add entry</button>
        </div>
        {sorted.length>0&&(
          <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:6}}>
            {sorted.map(s=>(
              <span key={s.id} className="tnum" style={{display:"inline-flex",alignItems:"center",gap:4,borderRadius:999,padding:"4px 10px",fontSize:12,background:P.sfA,color:P.sub}}>
                {fmtMo(s.month)} · {sar(s.net)}
                <button onClick={()=>removeSnap(s.id)} style={{background:"transparent",border:"none",color:P.red}}><I.X size={11}/></button>
              </span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── CURRENCY VIEW ── */
function CurrencyView({rates,ratesAt,ratesErr,ratesLoading,onRefresh,convert,fxAmount,setFxAmount,fxFrom,setFxFrom,fxTo,setFxTo}){
  const amount=fxAmount,from=fxFrom,to=fxTo;
  const setAmount=setFxAmount,setFrom=setFxFrom,setTo=setFxTo;
  const result=convert(amount,from,to);
  const one=convert(1,from,to);
  const card={background:P.sf,border:`1px solid ${P.line}`,borderRadius:16};
  return(
    <div>
      <div className="fade-up" style={{...card,padding:16,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:600,color:P.sub}}>Live converter</span>
          <button onClick={onRefresh} disabled={ratesLoading} style={{display:"flex",alignItems:"center",gap:6,borderRadius:999,padding:"5px 10px",fontSize:12,fontWeight:500,background:P.sfA,color:P.gr,border:`1px solid ${P.line}`}}>
            <I.Refresh size={13} style={ratesLoading?{animation:"spin .9s linear infinite"}:null}/>Refresh
          </button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:8}}>
          <input type="number" value={amount} onChange={e=>setAmount(Number(e.target.value))} className="tnum"
            style={{borderRadius:10,padding:"8px 10px",fontSize:18,fontWeight:600,width:130,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
          <select value={from} onChange={e=>setFrom(e.target.value)} style={{borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`}}>
            {FX_CODES.map(c=><option key={c}>{c}</option>)}
          </select>
          <button onClick={()=>{setFrom(to);setTo(from);}} style={{borderRadius:999,padding:8,background:P.sfA,border:`1px solid ${P.line}`,color:P.sub}}><I.Swap size={16}/></button>
          <select value={to} onChange={e=>setTo(e.target.value)} style={{borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`}}>
            {FX_CODES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div style={{marginTop:14}}>
          {result!=null
            ?<div>
              <div key={`${from}${to}${amount}`} className="serif tnum num-flash" style={{fontSize:30,fontWeight:600,color:P.ink}}>{result.toLocaleString("en-US",{maximumFractionDigits:2})} <span style={{fontSize:16,color:P.sub}}>{to}</span></div>
              <div style={{fontSize:12,color:P.faint}}>1 {from} = {one.toLocaleString("en-US",{maximumFractionDigits:4})} {to}</div>
            </div>
            :<div style={{fontSize:14,color:P.red}}>{ratesErr?"Rates unavailable — tap refresh.":"Loading rates…"}</div>
          }
        </div>
      </div>
      <div className="fade-up-1" style={{...card,padding:16}}>
        <div style={{fontSize:13,fontWeight:600,color:P.sub,marginBottom:10}}>Quick rates</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
          {[["USD","SAR"],["SAR","PHP"],["USD","PHP"],["AED","PHP"]].map(([f,t])=>{
            const v=convert(1,f,t);
            return(
              <div key={f+t} style={{borderRadius:12,padding:12,background:P.sfA}}>
                <div style={{fontSize:11,color:P.faint}}>1 {f} →</div>
                <div className="tnum" style={{fontSize:18,fontWeight:600,color:P.ink}}>
                  {v==null?"—":v.toLocaleString("en-US",{maximumFractionDigits:t==="PHP"?2:4})} <span style={{fontSize:12,color:P.sub}}>{t}</span>
                </div>
              </div>
            );
          })}
        </div>
        {ratesAt&&<div style={{fontSize:11,color:P.faint,marginTop:10}}>Updated {new Date(ratesAt).toLocaleString()}</div>}
      </div>
    </div>
  );
}


/* ── GOAL SQUARE CARD (top-level so inputs keep focus) ── */
function GoalSquare({g,fmt,updateGoal,removeGoal,openAdd,openDetails,openTypePicker}){
  const saved=(g.contributions||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
  const pctDone=g.target>0?Math.min(100,(saved/g.target)*100):0;
  const Icon=goalIcon(g.type);
  const R=26,C=2*Math.PI*R;
  return(
    <div style={{borderRadius:16,padding:14,background:P.sf,border:`1px solid ${P.line}`,display:"flex",flexDirection:"column",gap:8}}>
      {/* top row: type icon + delete */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={()=>openTypePicker(g.id)} title="Change goal type"
          style={{display:"flex",alignItems:"center",justifyContent:"center",width:34,height:34,borderRadius:10,
            background:g.color+"22",color:g.color,border:"none"}}>
          <Icon size={18}/>
        </button>
        <button onClick={()=>removeGoal(g.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4,padding:2}}><I.X size={15}/></button>
      </div>

      {/* name */}
      <input value={g.name} onChange={e=>updateGoal(g.id,{name:e.target.value})} className="bare"
        style={{fontSize:14,fontWeight:600,width:"100%",minWidth:0}}/>

      {/* ring progress */}
      <div style={{display:"flex",justifyContent:"center",padding:"2px 0"}}>
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r={R} stroke={P.sfA} strokeWidth="7" fill="none"/>
          <circle cx="36" cy="36" r={R} stroke={g.color} strokeWidth="7" fill="none" strokeLinecap="round"
            strokeDasharray={C} strokeDashoffset={C*(1-pctDone/100)} transform="rotate(-90 36 36)"
            style={{transition:"stroke-dashoffset .5s"}}/>
          <text x="36" y="40" textAnchor="middle" fontSize="15" fontWeight="700" fill={P.ink} className="tnum">{pctDone.toFixed(0)}%</text>
        </svg>
      </div>

      {/* saved / target */}
      <div style={{textAlign:"center"}} className="tnum">
        <div style={{fontSize:14,fontWeight:700,color:P.ink}}>{fmt(saved)}</div>
        <div style={{fontSize:11,color:P.faint}}>of {fmt(g.target)}</div>
      </div>

      {/* actions */}
      <div style={{display:"flex",gap:6,marginTop:"auto"}}>
        <button onClick={()=>openAdd(g.id)}
          style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:4,borderRadius:999,padding:"6px 0",fontSize:12,fontWeight:600,background:g.color,color:"#fff",border:"none"}}>
          <I.Plus size={12}/>Add
        </button>
        <button onClick={()=>openDetails(g.id)} title="Details"
          style={{display:"flex",alignItems:"center",justifyContent:"center",borderRadius:999,padding:"6px 10px",fontSize:12,fontWeight:600,color:P.sub,background:P.sfA,border:`1px solid ${P.line}`}}>
          ⋯
        </button>
      </div>
    </div>
  );
}

/* ── GOALS VIEW — square cards with type icons ── */
function GoalsView({goals,fmt,addGoal,updateGoal,removeGoal,addContribution,removeContribution,owners}){
  const[addModal,setAddModal]=useState(null);     // goalId for "add money"
  const[addAmount,setAddAmount]=useState("");
  const[addNote,setAddNote]=useState("");
  const[detailModal,setDetailModal]=useState(null); // goalId for details
  const[typePicker,setTypePicker]=useState(null);    // goalId for type picker

  const openAdd=id=>{setAddModal(id);setAddAmount("");setAddNote("");};
  const openDetails=id=>setDetailModal(id);
  const openTypePicker=id=>setTypePicker(id);

  return(
    <div>
      {["me","wife"].map(ok=>{
        const list=goals.filter(g=>g.owner===ok);
        return(
          <section key={ok} style={{marginBottom:22}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
              <span style={{width:8,height:8,borderRadius:999,background:ok==="me"?P.gr:P.br}}/>
              <h2 style={{fontSize:14,fontWeight:600,color:ok==="me"?P.grD:P.br,margin:0}}>{owners[ok]}'s goals</h2>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(148px,1fr))",gap:10}}>
              {list.map(g=>(
                <GoalSquare key={g.id} {...{g,fmt,updateGoal,removeGoal,openAdd,openDetails,openTypePicker}}/>
              ))}
              {/* add-goal square */}
              <button onClick={()=>addGoal(ok)}
                style={{borderRadius:16,padding:14,minHeight:150,background:P.sf,border:`1px dashed ${P.line}`,color:P.gr,
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,fontSize:13,fontWeight:500}}>
                <I.Plus size={20}/>Add goal
              </button>
            </div>
          </section>
        );
      })}

      {/* ── Type picker modal ── */}
      {typePicker&&(()=>{
        const g=goals.find(x=>x.id===typePicker);
        if(!g)return null;
        return(
          <Portal>
          <div className="modal-bg" onClick={()=>setTypePicker(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <h3 style={{margin:0,fontSize:16,fontWeight:600}}>Goal type — {g.name}</h3>
                <button onClick={()=>setTypePicker(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {GOAL_TYPES.map(([key,label])=>{
                  const Icon=goalIcon(key);
                  const active=g.type===key;
                  return(
                    <button key={key} onClick={()=>{updateGoal(g.id,{type:key});setTypePicker(null);}}
                      style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"12px 6px",borderRadius:12,
                        background:active?g.color+"22":P.sfA,color:active?g.color:P.sub,
                        border:`1px solid ${active?g.color:P.line}`,fontSize:11,fontWeight:600,textAlign:"center",lineHeight:1.2}}>
                      <Icon size={22}/>{label}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
          </Portal>
        );
      })()}

      {/* ── Add money modal ── */}
      {addModal&&(()=>{
        const g=goals.find(x=>x.id===addModal);
        if(!g)return null;
        const saved=(g.contributions||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
        return(
          <Portal>
          <div className="modal-bg" onClick={()=>setAddModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <h3 style={{margin:0,fontSize:16,fontWeight:600}}>Add money — {g.name}</h3>
                <button onClick={()=>setAddModal(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
              </div>
              <div style={{background:P.sfA,borderRadius:12,padding:12,marginBottom:16}}>
                <div style={{fontSize:12,color:P.sub}}>Current saved</div>
                <div className="serif tnum" style={{fontSize:24,fontWeight:600}}>{fmt(saved)}</div>
                <div style={{fontSize:12,color:P.faint}}>Target: {fmt(g.target)} · {g.target>0?((saved/g.target)*100).toFixed(0):0}% there</div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Amount to add</div>
                <input type="text" inputMode="decimal" value={addAmount} onChange={e=>setAddAmount(e.target.value)}
                  onBlur={e=>setAddAmount(e.target.value.trim()===""?"":String(evalMathExpr(e.target.value,Number(addAmount)||0)))}
                  onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}}
                  placeholder="0" autoFocus
                  style={{width:"100%",borderRadius:10,padding:"10px",fontSize:18,fontWeight:600,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Note (optional)</div>
                <input value={addNote} onChange={e=>setAddNote(e.target.value)} placeholder="e.g. Monthly deposit"
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
              </div>
              {addAmount&&Number(addAmount)>0&&(
                <div style={{fontSize:13,color:P.sub,marginBottom:12}} className="tnum">
                  New total: {fmt(saved+Number(addAmount))} ({g.target>0?(((saved+Number(addAmount))/g.target)*100).toFixed(0):0}%)
                </div>
              )}
              <button onClick={()=>{if(Number(addAmount)>0){addContribution(addModal,addAmount,addNote);setAddModal(null);}}}
                style={{width:"100%",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,background:P.gr,color:"#fff",border:"none"}}>
                Add {addAmount?fmt(Number(addAmount)):"money"}
              </button>
            </div>
          </div>
          </Portal>
        );
      })()}

      {/* ── Details modal: edit target/monthly + contributions ── */}
      {detailModal&&(()=>{
        const g=goals.find(x=>x.id===detailModal);
        if(!g)return null;
        const saved=(g.contributions||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
        const remain=Math.max(0,g.target-saved);
        const months=g.monthly>0?Math.ceil(remain/g.monthly):null;
        const Icon=goalIcon(g.type);
        return(
          <Portal>
          <div className="modal-bg" onClick={()=>setDetailModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                <span style={{display:"flex",alignItems:"center",justifyContent:"center",width:34,height:34,borderRadius:10,background:g.color+"22",color:g.color}}><Icon size={18}/></span>
                <input value={g.name} onChange={e=>updateGoal(g.id,{name:e.target.value})} className="bare" style={{fontSize:16,fontWeight:600,flex:1,minWidth:0}}/>
                <button onClick={()=>setDetailModal(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
              </div>

              <div style={{display:"flex",gap:10,marginBottom:14}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:P.faint,textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Target</div>
                  <input type="number" value={g.target} onChange={e=>updateGoal(g.id,{target:Number(e.target.value)})}
                    className="tnum" style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,fontWeight:600,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:P.faint,textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Monthly</div>
                  <input type="number" value={g.monthly} onChange={e=>updateGoal(g.id,{monthly:Number(e.target.value)})}
                    className="tnum" style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,fontWeight:600,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
                </div>
              </div>
              <div style={{fontSize:12,color:P.sub,marginBottom:14}} className="tnum">
                Saved {fmt(saved)} · {fmt(remain)} to go{months!=null?` · ~${months} mo at this pace`:""}
              </div>

              <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Contributions</div>
              {(g.contributions||[]).length>0?(
                <div style={{borderRadius:10,overflow:"hidden",border:`1px solid ${P.line}`,marginBottom:8}}>
                  {[...(g.contributions||[])].sort((a,b)=>b.date.localeCompare(a.date)).map(c=>(
                    <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:`1px solid ${P.sfA}`,fontSize:13}}>
                      <span style={{color:P.faint,fontSize:11}}>{c.date}</span>
                      <span className="tnum" style={{fontWeight:600,color:P.gr}}>+{fmt(c.amount)}</span>
                      {c.note&&<span style={{color:P.sub,flex:1,fontSize:12}}>{c.note}</span>}
                      <button onClick={()=>removeContribution(g.id,c.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4,marginLeft:"auto"}}><I.X size={12}/></button>
                    </div>
                  ))}
                </div>
              ):<div style={{fontSize:12,color:P.faint,marginBottom:8}}>No contributions yet.</div>}

              <button onClick={()=>{setDetailModal(null);openAdd(g.id);}}
                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:10,padding:"9px 0",fontSize:14,fontWeight:600,background:g.color,color:"#fff",border:"none"}}>
                <I.Plus size={14}/>Add money
              </button>
            </div>
          </div>
          </Portal>
        );
      })()}
    </div>
  );
}

/* ── OVERVIEW VIEW ── */

  const card={background:P.sf,border:`1px solid ${P.line}`,borderRadius:16};
  return(
    <div>
      <div style={{...card,padding:16,marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:600,color:P.sub,margin:"0 0 8px"}}>Where the {fmt(plan.income)} goes</h3>
        <div style={{width:"100%",height:240}}>
          <ResponsiveContainer>
            <PieChart>
              <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={90} innerRadius={48} paddingAngle={2}>
                {pieData.map((_,i)=><Cell key={i} fill={SEG[i%SEG.length]}/>)}
              </Pie>
              <Tooltip formatter={v=>fmt(v)}/>
            </PieChart>
          </ResponsiveContainer>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:8}}>
          {pieData.map((d,i)=>(
            <span key={d.name} style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,color:P.sub}}>
              <span style={{width:9,height:9,borderRadius:999,background:SEG[i%SEG.length]}}/>{d.name} · {pct(d.value).toFixed(0)}%
            </span>
          ))}
        </div>
      </div>
      <div style={{...card,padding:16}}>
        {[["Income",plan.income,P.ink],["Allocated",allocated,P.ink],["Unallocated / Over",remaining,remaining<0?P.red:P.gr]].map(([l,v,c])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:14,padding:"5px 0",borderTop:l==="Unallocated / Over"?`1px solid ${P.sfA}`:"none",marginTop:l==="Unallocated / Over"?6:0}}>
            <span style={{color:P.sub}}>{l}</span><span className="tnum" style={{fontWeight:600,color:c}}>{l==="Unallocated / Over"&&remaining<0?"−":""}{fmt(Math.abs(v))}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── SETTINGS MODAL ── */
/* ── Conflict resolution — shown when local and cloud data disagree and this
   device has unsynced changes. Blocking modal by design: the person must
   pick a side rather than risk either copy being silently lost. ── */
function ConflictModal({conflict,onKeepLocal,onUseCloud,onSaveLocalToCloud}){
  const remoteWhen=conflict.remoteSavedAt?new Date(conflict.remoteSavedAt).toLocaleString():"an unknown time";
  const choiceBtn={borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:600,border:`1px solid ${P.line}`,background:P.sfA,color:P.ink,textAlign:"left",display:"block"};
  return(
    <div className="modal-bg">
      <div className="modal" style={{maxWidth:380}} onClick={e=>e.stopPropagation()}>
        <h3 style={{margin:"0 0 8px",fontWeight:600}}>Cloud and local data differ</h3>
        <p style={{fontSize:13,color:P.sub,lineHeight:1.5,marginBottom:14}}>
          This device has changes that haven't been saved to the cloud, and the cloud copy — last saved {remoteWhen} — is different. Choose which one to keep.
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          <button onClick={onKeepLocal} style={choiceBtn}>
            Keep Local<div style={{fontWeight:400,fontSize:12,color:P.faint,marginTop:2}}>Stay on this device's data. Cloud is left as-is.</div>
          </button>
          <button onClick={onUseCloud} style={choiceBtn}>
            Use Cloud<div style={{fontWeight:400,fontSize:12,color:P.faint,marginTop:2}}>Replace this device's data with the cloud copy. A backup of your local data is kept.</div>
          </button>
          <button onClick={onSaveLocalToCloud} style={{...choiceBtn,border:"none",background:P.gr,color:"#fff"}}>
            Save Local to Cloud<div style={{fontWeight:400,fontSize:12,opacity:.85,marginTop:2}}>Overwrite the cloud copy with this device's data.</div>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ── Device profile picker — asked once per device, then remembered locally
   (never synced) so Budget/Expenses default to the right person. ── */
function ProfilePickerModal({owners,onChoose,dismissable,onClose}){
  return(
    <div className="modal-bg" onClick={dismissable?onClose:undefined}>
      <div className="modal" style={{maxWidth:340,textAlign:"center"}} onClick={e=>e.stopPropagation()}>
        <div style={{color:P.gr,marginBottom:6,display:"flex",justifyContent:"center"}}><I.Users size={22}/></div>
        <h3 style={{margin:"0 0 6px",fontWeight:600}}>Whose budget?</h3>
        <p style={{fontSize:13,color:P.sub,margin:"0 0 16px",lineHeight:1.5}}>
          Pick which profile this device should show by default in Budget and Expenses. You can still switch anytime with the in-app toggle — this just sets what loads first.
        </p>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {["me","wife"].map(ok=>(
            <button key={ok} onClick={()=>onChoose(ok)}
              style={{borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:600,border:`1px solid ${P.line}`,
                background:ok==="me"?P.grS:P.brS,color:ok==="me"?P.grD:P.br}}>
              {owners?.[ok]||(ok==="me"?"Me":"Wife")}
            </button>
          ))}
        </div>
        {dismissable&&
          <button onClick={onClose} style={{marginTop:14,background:"transparent",border:"none",color:P.faint,fontSize:12}}>Cancel</button>}
      </div>
    </div>
  );
}

function SettingsModal({data,setData,onClose,pullFromCloud,saveToCloud,kvReady,hasUnsyncedChanges,lastCloudSavedAt,lastCloudPulledAt,changesSinceSave,syncOp,preCloudBackupAt,restorePreCloudBackup,openProfilePicker,setOwnerName,owners,toggleTheme,setPayPeriod}){
  const[confirm,setConfirm]=useState(false);
  const[msg,setMsg]=useState("");
  const fileRef=useRef(null);
  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(""),2500);};
  const download=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`allocation-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
    flash("Backup downloaded ✓");
  };
  const onFile=e=>{
    const f=e.target.files&&e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(String(r.result));if(!Array.isArray(d.plans))throw 0;setData(migrate(d));flash("Backup loaded ✓");}catch{flash("Not a valid backup.");}};
    r.readAsText(f);
  };
  const btn={background:P.sfA,border:`1px solid ${P.line}`,color:P.ink,borderRadius:10,padding:"8px 12px",fontSize:14,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6};
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h3 style={{margin:0,fontWeight:600}}>Settings</h3>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
        </div>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Appearance</div>
        <button onClick={toggleTheme}
          style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",borderRadius:10,padding:"9px 12px",fontSize:14,fontWeight:500,marginBottom:16,
            background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}>
          <span style={{display:"flex",alignItems:"center",gap:8}}>
            {data.theme==="dark"?<I.Moon size={15}/>:<I.Sun size={15}/>}
            {data.theme==="dark"?"Dark mode":"Light mode"}
          </span>
          <span style={{fontSize:12,color:P.gr,fontWeight:600}}>Switch to {data.theme==="dark"?"light":"dark"}</span>
        </button>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Who's who</div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <input value={owners.me} onChange={e=>setOwnerName("me",e.target.value)} placeholder="Your name" style={{flex:1,borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
          <input value={owners.wife} onChange={e=>setOwnerName("wife",e.target.value)} placeholder="Wife's name" style={{flex:1,borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
        </div>
        <button onClick={openProfilePicker}
          style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,width:"100%",borderRadius:10,padding:"8px 12px",fontSize:13,fontWeight:500,marginBottom:16,
            background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}>
          <I.Users size={14}/>Change default profile for this device
        </button>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Pay periods</div>
        <div style={{fontSize:11,color:P.faint,marginBottom:8,lineHeight:1.5}}>
          Budget and track expenses by paycheck instead of calendar month. Off by default — when off, that person's Budget and Expenses tabs work exactly as before.
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:16}}>
          {["me","wife"].map(ok=>{
            const cfg=(data.payPeriods||{})[ok]||{enabled:false,payday:1};
            return(
              <div key={ok} style={{borderRadius:10,padding:"10px 12px",background:P.sfA,border:`1px solid ${P.line}`}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:cfg.enabled?8:0}}>
                  <span style={{fontSize:13,fontWeight:600,color:P.ink}}>{owners[ok]}</span>
                  <button onClick={()=>setPayPeriod(ok,{enabled:!cfg.enabled})}
                    style={{borderRadius:999,padding:"4px 10px",fontSize:12,fontWeight:600,
                      background:cfg.enabled?P.gr:P.sf,color:cfg.enabled?"#fff":P.sub,border:`1px solid ${cfg.enabled?P.gr:P.line}`}}>
                    {cfg.enabled?"On":"Off"}
                  </button>
                </div>
                {cfg.enabled&&(
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:12,color:P.sub}}>Payday</span>
                    <input type="number" min="1" max="31" value={cfg.payday}
                      onChange={e=>setPayPeriod(ok,{payday:Math.min(31,Math.max(1,Number(e.target.value)||1))})}
                      className="tnum" style={{width:56,borderRadius:8,padding:"5px 8px",fontSize:13,background:P.sf,border:`1px solid ${P.line}`,color:P.ink}}/>
                    <span style={{fontSize:11,color:P.faint}}>of each month{cfg.payday>28?" (clamped to last day in short months)":""}</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Currency label</div>
        <input value={data.currency} onChange={e=>setData(d=>({...d,currency:e.target.value}))} style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,marginBottom:16,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Cloudflare KV Sync</div>
        {kvReady
          ?<div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:hasUnsyncedChanges?P.amber:P.gr,marginBottom:8,padding:"8px 10px",
              background:hasUnsyncedChanges?P.amberS:P.grS,borderRadius:10,lineHeight:1.6}}>
              {hasUnsyncedChanges
                ?`⚠️ Local changes pending${changesSinceSave?` (${changesSinceSave})`:""}`
                :"✅ Cloud is up to date"}
              <div style={{fontSize:11,color:P.faint,marginTop:4}}>
                Last saved to cloud: {lastCloudSavedAt?lastCloudSavedAt.toLocaleString():"never"}<br/>
                Last pulled from cloud: {lastCloudPulledAt?lastCloudPulledAt.toLocaleString():"never"}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
              <button onClick={()=>saveToCloud()} disabled={syncOp==="push"} style={btn}>
                <I.Cloud size={14}/>{syncOp==="push"?"Saving…":"Save to Cloud"}
              </button>
              <button onClick={()=>pullFromCloud()} disabled={syncOp==="pull"} style={btn}>
                <I.Refresh size={14}/>{syncOp==="pull"?"Pulling…":"Pull from Cloud"}
              </button>
            </div>
            {preCloudBackupAt&&
              <button onClick={restorePreCloudBackup} style={{...btn,width:"100%",marginBottom:8}}>
                <I.Reset size={14}/>Restore previous local copy
              </button>}
            <div style={{fontSize:11,color:P.faint,lineHeight:1.6,marginBottom:8}}>
              Changes save automatically on this device. Cloud upload only happens when you tap Save to Cloud. Opening the app checks the cloud automatically — pull-to-sync on mobile saves pending changes first, or pulls the latest copy when this device is already clean.
            </div>
            <div style={{fontSize:11,color:P.sub,padding:"8px 10px",background:P.sfA,borderRadius:10}}>
              Pull before editing on another device. Save to Cloud when finished — you and {owners.wife||"your partner"} share this dataset.
            </div>
          </div>
          :<div style={{marginBottom:16,fontSize:12,color:P.sub,padding:"10px 12px",background:P.sfA,borderRadius:10,lineHeight:1.6}}>
            Add your Worker URL and Sync Token to <code>index.html</code> to enable sync.
            See the setup guide for instructions.
          </div>
        }
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Manual backup</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <button onClick={download} style={btn}><I.Download size={14}/>Download</button>
          <button onClick={()=>fileRef.current&&fileRef.current.click()} style={btn}><I.Upload size={14}/>Import</button>
        </div>
        <input ref={fileRef} type="file" accept=".json" onChange={onFile} style={{display:"none"}}/>
        {msg&&<div style={{fontSize:12,color:P.gr,marginBottom:12}}>{msg}</div>}
        <button onClick={()=>confirm?(setData(defaultData()),flash("Reset done")):setConfirm(true)}
          style={{display:"flex",width:"100%",alignItems:"center",justifyContent:"center",gap:8,borderRadius:10,padding:"8px 12px",fontSize:14,fontWeight:500,marginTop:4,
            background:confirm?P.red:P.sfA,color:confirm?"#fff":P.red,border:`1px solid ${confirm?P.red:P.line}`}}>
          <I.Reset size={14}/>{confirm?"Tap again to confirm reset":"Reset to sample data"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
window.__hideLoading=function(){
  var el=document.getElementById("loading");
  if(el){el.style.opacity="0";el.style.transition="opacity 0.3s";setTimeout(function(){el.remove();},300);}
};
setTimeout(window.__hideLoading,8000);
</script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => {
        console.log('SW Registration failed:', err);
      });
    });
  }
</script>
</body>
</html>
