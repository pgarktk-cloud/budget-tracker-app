              {mode==="login"?"Sign up":"Log in"}
            </button>
          </div>

          {!supabaseReady&&
            <div style={{marginTop:16,fontSize:11,color:P.faint,background:P.sfA,borderRadius:10,padding:"8px 10px",lineHeight:1.6}}>
              Supabase isn't configured yet. Add SUPABASE_URL and SUPABASE_ANON_KEY at the top of index.html to enable sign in.
            </div>}
        </form>
      </div>
    </div>
  );
}

/* ════════════════════════════════════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════════════════════════════════════ */
function App(){
  const[data,setData]=useState(defaultData);
  const[loaded,setLoaded]=useState(false);
  const[tab,setTab]=useState("budget");
  const[planMenu,setPlanMenu]=useState(false);
  const[showSettings,setShowSettings]=useState(false);
  const[globalAddTrigger,setGlobalAddTrigger]=useState(0); // bumped to tell ExpenseTrackerView to open the add-transaction modal
  const[syncMsg,setSyncMsg]=useState("");
  const[themeTick,setThemeTick]=useState(0); // bumped to force re-render after P/SEG mutate
  const skipSave=useRef(false);
  const kvReady=!PROXY_URL.startsWith("PASTE_");

  /* ── Supabase auth session ──
     undefined = still checking on first load, null = signed out,
     object = signed in. access_token / user.id live on session.* and
     will be handed to the sync engine in a later phase. */
  const[session,setSession]=useState(undefined);
  // Registration-time choice (Personal vs Shared), set at signup and stored
  // on the Supabase user itself. The Worker uses this to seed the right
  // template on a user's very first /sync.
  // Phase 4: this now actually drives the root layout split. Blank/missing
  // metadata (e.g. accounts created before this field existed) falls back
  // to "single" per spec — NOTE: any pre-Phase-4 couple household that
  // never got account_mode written to its metadata will render as
  // single-profile until that field is backfilled; flag this to Jastine
  // if that's not the intended migration behavior for existing users.
  // Declared immediately after `session` (as early as possible in the
  // component) so nothing above it can ever reference it before init.
  const accountMode=(session&&session.user&&session.user.user_metadata&&session.user.user_metadata.account_mode)||"single";
  const isSingle=accountMode==="single";
  useEffect(()=>{
    if(!supabaseClient){setSession(null);return;}
    supabaseClient.auth.getSession().then(({data})=>setSession(data.session||null));
    const{data:sub}=supabaseClient.auth.onAuthStateChange((_event,newSession)=>{
      setSession(newSession||null);
    });
    return()=>sub.subscription.unsubscribe();
  },[]);
  const logOut=async()=>{
    if(supabaseClient)await supabaseClient.auth.signOut();
    setSession(null);
  };
  // Stable identity for effect deps — `session` itself gets a new object
  // reference on every silent token refresh, which would otherwise
  // re-trigger cloud sync effects every time the JWT rotates.
  const sessionUserId=session&&session.user&&session.user.id;
  const sessionRef=useRef(session);
  useEffect(()=>{sessionRef.current=session;},[session]);
  // Registration-time choice (Personal vs Shared) already resolved to
  // accountMode/isSingle right after `session` above.
  useEffect(()=>{if(isSingle&&tab==="household")setTab("budget");},[isSingle,tab]);

  /* ── local-first sync state ──────────────────────────────────────────── */
  const[hasUnsyncedChanges,setHasUnsyncedChanges]=useState(false);
  const[lastCloudSavedAt,setLastCloudSavedAt]=useState(null);
  const[lastCloudPulledAt,setLastCloudPulledAt]=useState(null);
  const[changesSinceSave,setChangesSinceSave]=useState(0);
  const[syncOp,setSyncOp]=useState(null); // null | "push" | "pull"
  const[conflict,setConflict]=useState(null); // {local,remote,remoteSavedAt} | null
  const[preCloudBackupAt,setPreCloudBackupAt]=useState(()=>{
    try{const raw=localStorage.getItem(PRE_CLOUD_BACKUP_KEY);if(raw)return JSON.parse(raw).at;}catch(e){}
    return null;
  });
  const syncing=syncOp!=null;
  const lastCloudSnapshotRef=useRef(null);
  const dataRef=useRef(data);
  useEffect(()=>{dataRef.current=data;},[data]);
  const hasUnsyncedRef=useRef(false);
  useEffect(()=>{hasUnsyncedRef.current=hasUnsyncedChanges;},[hasUnsyncedChanges]);

  /* ── device-remembered default profile (Me / Wife) ───────────────────────
     Asked once per device on first open, then remembered locally. Never
     synced to the cloud — purely a per-device UI preference. The in-session
     owner toggle (OwnerToggle) can still switch views without changing
     this remembered default; only "Change default profile" in Settings
     updates it. ────────────────────────────────────────────────────────── */
  const[budgetOwner,setBudgetOwner]=useState(()=>{
    try{return localStorage.getItem(PROFILE_KEY)||"me";}catch(e){return "me";}
  });
  const[showProfilePicker,setShowProfilePicker]=useState(()=>{
    try{return !localStorage.getItem(PROFILE_KEY);}catch(e){return false;}
  });
  // Single-profile accounts have nothing to pick between — always "me",
  // toggle never shown, first-run picker never surfaced.
  const effectiveBudgetOwner=isSingle?"me":budgetOwner;
  const[profilePickerDismissable,setProfilePickerDismissable]=useState(false);
  const chooseDefaultProfile=ok=>{
    setBudgetOwner(ok);
    try{localStorage.setItem(PROFILE_KEY,ok);}catch(e){}
    setShowProfilePicker(false);
  };
  const openProfilePicker=()=>{setProfilePickerDismissable(true);setShowProfilePicker(true);};

  const stashPreCloudBackup=d=>{
    try{
      const at=new Date().toISOString();
      localStorage.setItem(PRE_CLOUD_BACKUP_KEY,JSON.stringify({at,data:d}));
      setPreCloudBackupAt(at);
    }catch(e){}
  };
  const restorePreCloudBackup=()=>{
    try{
      const raw=localStorage.getItem(PRE_CLOUD_BACKUP_KEY);
      if(!raw)return;
      const backup=JSON.parse(raw);
      const restored=migrate(backup.data);
      skipSave.current=true;
      setData(restored);
      try{localStorage.setItem(STORAGE_KEY,JSON.stringify(restored));}catch(e){}
      const dirty=fingerprint(restored)!==lastCloudSnapshotRef.current;
      setHasUnsyncedChanges(dirty);
      const meta=loadSyncMeta();meta.hasUnsyncedChanges=dirty;saveSyncMeta(meta);
      setSyncMsg("Previous local copy restored");
      setTimeout(()=>setSyncMsg(""),3000);
    }catch(e){}
  };

  /* load — local-first startup policy:
     • No unsynced local changes  → safe to auto-pull the cloud copy, as before.
     • Unsynced local changes exist from a previous session → NEVER silently
       overwrite them. Check the cloud copy; if it's identical, mark clean;
       if it differs, keep local data and surface the conflict modal. */
  useEffect(()=>{
    // Never make user-specific network calls before auth finishes checking
    // (undefined) or while signed out (null) — only a real session may pull
    // this account's cloud data. Local-only startup is handled below.
    if(!session)return;
    let cancelled=false;
    (async()=>{
      let initial="light";
      const meta=loadSyncMeta();
      let localResolved=null;
      try{
        const raw=localStorage.getItem(STORAGE_KEY);
        if(raw)localResolved=migrate(JSON.parse(raw));
      }catch(e){}

      let resolved=localResolved;
      let remoteRaw=null;
      if(kvReady){
        try{remoteRaw=await KVSync.load(session.access_token);}catch(e){}
      }

      if(meta.hasUnsyncedChanges&&localResolved){
        if(remoteRaw&&Array.isArray(remoteRaw.plans)){
          const remoteMigrated=migrate(remoteRaw);
          const localFP=fingerprint(localResolved);
          const remoteFP=fingerprint(remoteMigrated);
          if(localFP===remoteFP){
            lastCloudSnapshotRef.current=remoteFP;
            meta.hasUnsyncedChanges=false;
            meta.lastCloudSnapshot=remoteFP;
            meta.lastCloudPulledAt=new Date().toISOString();
            saveSyncMeta(meta);
          }else{
            const merged=tryAutoMergeExpenses(localResolved,remoteMigrated);
            if(merged){
              resolved=merged;
              lastCloudSnapshotRef.current=remoteFP;
              meta.hasUnsyncedChanges=true;
              meta.lastCloudSnapshot=remoteFP;
              meta.lastCloudPulledAt=new Date().toISOString();
              saveSyncMeta(meta);
            }else if(!cancelled){
              setConflict({local:localResolved,remote:remoteMigrated,remoteSavedAt:KVSync.lastPulledAt});
            }
          }
        }
        // remote fetch failed or unconfigured → keep local, stay dirty, don't touch meta
      }else if(remoteRaw&&Array.isArray(remoteRaw.plans)){
        const remoteMigrated=migrate(remoteRaw);
        resolved=remoteMigrated;
        const fp=fingerprint(remoteMigrated);
        lastCloudSnapshotRef.current=fp;
        meta.hasUnsyncedChanges=false;
        meta.lastCloudSnapshot=fp;
        meta.lastCloudPulledAt=new Date().toISOString();
        saveSyncMeta(meta);
      }

      if(cancelled)return;

      if(!lastCloudSnapshotRef.current&&meta.lastCloudSnapshot){
        lastCloudSnapshotRef.current=meta.lastCloudSnapshot;
      }

      if(resolved){
        // skip the very next autosave so loading data doesn't immediately
        // re-trigger a dirty-marking round-trip
        skipSave.current=true;
        setData(resolved);
        initial=resolved.theme||"light";
        try{localStorage.setItem(STORAGE_KEY,JSON.stringify(resolved));}catch(e){}
      }
      try{
        const savedTheme=localStorage.getItem("allocation:theme");
        if(savedTheme)initial=savedTheme;
      }catch(e){}

      setHasUnsyncedChanges(!!meta.hasUnsyncedChanges);
      setChangesSinceSave(meta.changesSinceSave||0);
      if(meta.lastCloudSavedAt)setLastCloudSavedAt(new Date(meta.lastCloudSavedAt));
      if(meta.lastCloudPulledAt)setLastCloudPulledAt(new Date(meta.lastCloudPulledAt));

      applyTheme(initial);
      applySegTheme(initial);
      setThemeTick(t=>t+1);
      setLoaded(true);
      if(typeof window.__hideLoading==="function")window.__hideLoading();
    })();
    return()=>{cancelled=true;};
  },[sessionUserId]);

  const toggleTheme=()=>{
    const next=(data.theme||"light")==="dark"?"light":"dark";
    applyTheme(next);
    applySegTheme(next);
    try{localStorage.setItem("allocation:theme",next);}catch(e){}
    setThemeTick(t=>t+1);
    setData(d=>({...d,theme:next}));
  };

  /* persist — LOCAL ONLY. Never calls KVSync.save(). Marks the app dirty
     whenever the data no longer matches the last cloud-synced snapshot. */
  useEffect(()=>{
    if(!loaded)return;
    if(skipSave.current){skipSave.current=false;return;}
    const t=setTimeout(()=>{
      try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}
      const fp=fingerprint(data);
      const dirty=fp!==lastCloudSnapshotRef.current;
      const meta=loadSyncMeta();
      meta.hasUnsyncedChanges=dirty;
      if(dirty)meta.changesSinceSave=(meta.changesSinceSave||0)+1;
      saveSyncMeta(meta);
      setHasUnsyncedChanges(dirty);
      setChangesSinceSave(meta.changesSinceSave||0);
    },450);
    return()=>clearTimeout(t);
  },[data,loaded]);

  /* ── manual Save to Cloud — the ONLY place that calls KVSync.save() ──── */
  const savingRef=useRef(false);
  const saveToCloud=async(fromGesture=false)=>{
    if(!kvReady){setSyncMsg("Cloudflare sync isn't configured");setTimeout(()=>setSyncMsg(""),3000);return;}
    const activeSession=sessionRef.current;
    if(!activeSession){setSyncMsg("Sign in to sync to the cloud");setTimeout(()=>setSyncMsg(""),3000);return;}
    if(savingRef.current)return;
    savingRef.current=true;
    setSyncOp("push");
    try{
      const token=activeSession.access_token;
      const payload=dataRef.current;
      const result=await KVSync.save(payload,token);
      if(result&&result.conflict){
        try{
          const remoteRaw=await KVSync.load(token);
          if(remoteRaw&&Array.isArray(remoteRaw.plans)){
            const remoteMigrated=migrate(remoteRaw);
            const merged=tryAutoMergeExpenses(payload,remoteMigrated);
            const retry=merged?await KVSync.save(merged,token):null;
            if(merged&&retry&&!retry.conflict&&retry.ok!==false){
              skipSave.current=true;
              setData(merged);
              try{localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));}catch(e){}
              const fp=fingerprint(merged);
              lastCloudSnapshotRef.current=fp;
              const now=new Date();
              const meta=loadSyncMeta();
              meta.hasUnsyncedChanges=false;meta.lastCloudSnapshot=fp;meta.lastCloudSavedAt=now.toISOString();meta.changesSinceSave=0;
              saveSyncMeta(meta);
              setLastCloudSavedAt(now);setHasUnsyncedChanges(false);setChangesSinceSave(0);
              setSyncMsg("Merged with cloud changes and saved ✓");
            }else{
              setHasUnsyncedChanges(true);
              setSyncMsg("⚠️ Cloud changed — review before saving");
              setConflict({local:payload,remote:remoteMigrated,remoteSavedAt:KVSync.lastPulledAt});
            }
          }
        }catch(e){
          setHasUnsyncedChanges(true);
          setSyncMsg("⚠️ Cloud changed — review before saving");
        }
      }else if(!result||result.ok===false){
        setSyncMsg("Cloud save failed — data is safe on this device");
      }else{
        const fp=fingerprint(payload);
        lastCloudSnapshotRef.current=fp;
        const now=new Date();
        const meta=loadSyncMeta();
        meta.hasUnsyncedChanges=false;
        meta.lastCloudSnapshot=fp;
        meta.lastCloudSavedAt=now.toISOString();
        meta.changesSinceSave=0;
        saveSyncMeta(meta);
        setLastCloudSavedAt(now);
        setHasUnsyncedChanges(false);
        setChangesSinceSave(0);
        setSyncMsg(fromGesture?"Cloud saved and synced ✓":"Cloud saved ✓");
      }
    }catch(e){
      setSyncMsg("Cloud save failed — data is safe on this device");
    }
    setSyncOp(null);
    savingRef.current=false;
    setTimeout(()=>setSyncMsg(""),3000);
  };
  const saveToCloudRef=useRef(saveToCloud);
  useEffect(()=>{saveToCloudRef.current=saveToCloud;});

  /* ── Ctrl+S / Cmd+S — save & sync to cloud without reaching for the mouse ── */
  useEffect(()=>{
    const onKeyDown=e=>{
      if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&!e.altKey&&(e.key==="s"||e.key==="S")){
        e.preventDefault();
        saveToCloudRef.current();
      }
    };
    window.addEventListener("keydown",onKeyDown);
    return()=>window.removeEventListener("keydown",onKeyDown);
  },[]);

  /* ── manual Pull from Cloud — GET only, never POSTs ──────────────────── */
  const pullFromCloud=async()=>{
    if(!kvReady){setSyncMsg("Add Worker URL first");setTimeout(()=>setSyncMsg(""),3000);return;}
    const activeSession=sessionRef.current;
    if(!activeSession){setSyncMsg("Sign in to sync to the cloud");setTimeout(()=>setSyncMsg(""),3000);return;}
    setSyncOp("pull");setSyncMsg("Pulling…");
    try{
      const remoteRaw=await KVSync.load(activeSession.access_token);
      if(remoteRaw&&Array.isArray(remoteRaw.plans)){
        const remoteMigrated=migrate(remoteRaw);
        if(hasUnsyncedRef.current){
          const localFP=fingerprint(dataRef.current);
          const remoteFP=fingerprint(remoteMigrated);
          if(localFP===remoteFP){
            lastCloudSnapshotRef.current=remoteFP;
            const now=new Date();
            const meta=loadSyncMeta();meta.hasUnsyncedChanges=false;meta.lastCloudSnapshot=remoteFP;meta.lastCloudPulledAt=now.toISOString();saveSyncMeta(meta);
            setHasUnsyncedChanges(false);
            setLastCloudPulledAt(now);
            setSyncMsg("Already up to date ✓");
          }else{
            const merged=tryAutoMergeExpenses(dataRef.current,remoteMigrated);
            if(merged){
              skipSave.current=true;
              setData(merged);
              try{localStorage.setItem(STORAGE_KEY,JSON.stringify(merged));}catch(e){}
              lastCloudSnapshotRef.current=remoteFP;
              const now=new Date();
              const meta=loadSyncMeta();meta.hasUnsyncedChanges=true;meta.lastCloudSnapshot=remoteFP;meta.lastCloudPulledAt=now.toISOString();saveSyncMeta(meta);
              setHasUnsyncedChanges(true);setLastCloudPulledAt(now);
              setSyncMsg("Merged with cloud changes — save to sync ✓");
            }else{
              setSyncMsg("");
              setConflict({local:dataRef.current,remote:remoteMigrated,remoteSavedAt:KVSync.lastPulledAt});
            }
          }
        }else{
          stashPreCloudBackup(dataRef.current);
          skipSave.current=true;
          setData(remoteMigrated);
          try{localStorage.setItem(STORAGE_KEY,JSON.stringify(remoteMigrated));}catch(e){}
          const fp=fingerprint(remoteMigrated);
          lastCloudSnapshotRef.current=fp;
          const now=new Date();
          const meta=loadSyncMeta();meta.hasUnsyncedChanges=false;meta.lastCloudSnapshot=fp;meta.lastCloudPulledAt=now.toISOString();saveSyncMeta(meta);
          setHasUnsyncedChanges(false);
          setLastCloudPulledAt(now);
          setSyncMsg("Cloud data loaded ✓");
        }
      }else{
        setSyncMsg("Nothing saved yet — will sync on next Save to Cloud");
      }
    }catch(e){
      setSyncMsg("Pull failed — using local data");
    }
    setSyncOp(null);
    setTimeout(()=>setSyncMsg(""),3000);
  };
  const pullFromCloudRef=useRef(pullFromCloud);
  useEffect(()=>{pullFromCloudRef.current=pullFromCloud;});

  /* ── conflict resolution actions ─────────────────────────────────────── */
  const resolveKeepLocal=()=>setConflict(null);
  const resolveUseCloud=()=>{
    if(!conflict)return;
    stashPreCloudBackup(dataRef.current);
    const remoteMigrated=conflict.remote;
    skipSave.current=true;
    setData(remoteMigrated);
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(remoteMigrated));}catch(e){}
    const fp=fingerprint(remoteMigrated);
    lastCloudSnapshotRef.current=fp;
    const now=new Date();
    const meta=loadSyncMeta();meta.hasUnsyncedChanges=false;meta.lastCloudSnapshot=fp;meta.lastCloudPulledAt=now.toISOString();meta.changesSinceSave=0;saveSyncMeta(meta);
    setHasUnsyncedChanges(false);
    setChangesSinceSave(0);
    setLastCloudPulledAt(now);
    setConflict(null);
    setSyncMsg("Cloud data loaded ✓");
    setTimeout(()=>setSyncMsg(""),3000);
  };
  const resolveSaveLocalToCloud=async()=>{
    setConflict(null);
    await saveToCloud();
  };

  /* ── pull-to-refresh ──────────────────────────────────────────────────────
     Standard mobile pattern: dragging down from the very top of the page
     triggers a sync pull. pullDist drives the visible indicator; the touch
     math lives in refs so the listeners don't need to be re-attached on
     every move (only pullDist is state, purely for rendering). ─────────── */
  const PULL_THRESHOLD=68,PULL_MAX=110;
  const[pullDist,setPullDist]=useState(0);
  const pullStartY=useRef(null);
  const pullArmed=useRef(false);
  const pullDistRef=useRef(0);
  useEffect(()=>{
    const atTop=()=>(window.scrollY||document.documentElement.scrollTop||0)<=0;
    const onStart=e=>{
      if(!atTop()){pullArmed.current=false;return;}
      pullStartY.current=e.touches[0].clientY;
      pullArmed.current=true;
    };
    const onMove=e=>{
      if(!pullArmed.current||pullStartY.current==null)return;
      if(!atTop()){pullArmed.current=false;pullDistRef.current=0;setPullDist(0);return;}
      const dy=e.touches[0].clientY-pullStartY.current;
      if(dy<=0){pullDistRef.current=0;setPullDist(0);return;}
      e.preventDefault();
      const val=Math.min(PULL_MAX,dy*0.45);
      pullDistRef.current=val;
      setPullDist(val);
    };
    const onEnd=()=>{
      if(pullArmed.current&&pullDistRef.current>=PULL_THRESHOLD){
        // context-aware: pending local changes save first; otherwise this
        // is a plain safe pull. Read handlers via refs so this listener
        // (attached once, on mount) always calls the latest version.
        if(hasUnsyncedRef.current)saveToCloudRef.current(true);
        else pullFromCloudRef.current();
      }
      pullArmed.current=false;
      pullStartY.current=null;
      pullDistRef.current=0;
      setPullDist(0);
    };
    window.addEventListener("touchstart",onStart,{passive:true});
    window.addEventListener("touchmove",onMove,{passive:false});
    window.addEventListener("touchend",onEnd,{passive:true});
    window.addEventListener("touchcancel",onEnd,{passive:true});
    return()=>{
      window.removeEventListener("touchstart",onStart);
      window.removeEventListener("touchmove",onMove);
      window.removeEventListener("touchend",onEnd);
      window.removeEventListener("touchcancel",onEnd);
    };
  },[]);

  /* which owner is active in Budget/Expenses tabs — budgetOwner/setBudgetOwner
     declared near the top of App() alongside the device-remembered default. */

  /* Currency converter selections — lifted here so they persist across tab switches */
  const[fxAmount,setFxAmount]=useState(100);
  const[fxFrom,setFxFrom]=useState("USD");
  const[fxTo,setFxTo]=useState("SAR");

  /* active plan for each owner */
  const activePlanId=data.activePlanId||{me:data.plans?.[0]?.id,wife:null};
  const plan=data.plans.find(p=>p.id===activePlanId[budgetOwner])||
             data.plans.find(p=>p.owner===budgetOwner)||
             data.plans[0];
  const cur=data.currency;

  /* plan mutators — always operate on current budgetOwner's plan */
  const patchPlan=patch=>setData(d=>({...d,plans:d.plans.map(p=>p.id===plan.id?{...p,...patch}:p)}));
  const setCats=cats=>patchPlan({categories:cats});
  const setGrps=gs=>patchPlan({groups:gs});
  const updateCat=(id,patch)=>setCats(plan.categories.map(c=>c.id===id?{...c,...patch}:c));
  const addCat=gid=>setCats([...plan.categories,{id:uid(),name:"New category",amount:0,groupId:gid,color:SEG[plan.categories.length%SEG.length],subs:[],trackExpenses:true}]);
  const removeCat=id=>setCats(plan.categories.filter(c=>c.id!==id));
  const addSub=catId=>setCats(plan.categories.map(c=>c.id===catId?{...c,subs:[...(c.subs||[]),{id:uid(),name:"New item",amount:0}]}:c));
  const updateSub=(catId,subId,patch)=>setCats(plan.categories.map(c=>c.id===catId?{...c,subs:(c.subs||[]).map(s=>s.id===subId?{...s,...patch}:s)}:c));
  const removeSub=(catId,subId)=>setCats(plan.categories.map(c=>c.id===catId?{...c,subs:(c.subs||[]).filter(s=>s.id!==subId)}:c));
  const addGroup=()=>setGrps([...plan.groups,{id:uid(),name:"New group"}]);
  const renameGroup=(id,name)=>setGrps(plan.groups.map(g=>g.id===id?{...g,name}:g));
  const removeGroup=id=>{setCats(plan.categories.filter(c=>c.groupId!==id));setGrps(plan.groups.filter(g=>g.id!==id));};

  /* add a new plan for the current owner */
  const addPlan=()=>{
    const id=uid();
    setData(d=>({...d,
      activePlanId:{...activePlanId,[budgetOwner]:id},
      plans:[...d.plans,{id,owner:budgetOwner,name:"New plan",month:monthLabel(),
        income:0,groups:[{id:uid(),name:"General"}],categories:[]}]
    }));
    setPlanMenu(false);
  };
  const removePlan=id=>setData(d=>{
    const ownerPlans=d.plans.filter(p=>p.owner===budgetOwner);
    if(ownerPlans.length<=1)return d;
    const plans=d.plans.filter(p=>p.id!==id);
    const fallback=plans.find(p=>p.owner===budgetOwner)?.id||plans[0]?.id;
    return{...d,plans,activePlanId:{...activePlanId,[budgetOwner]:fallback}};
  });
  const renamePlan=(id,name)=>setData(d=>({...d,plans:d.plans.map(p=>p.id===id?{...p,name}:p)}));
  const switchPlan=id=>setData(d=>({...d,activePlanId:{...activePlanId,[budgetOwner]:id}}));

  /* ── generic plan-by-id mutators (used by month-aware Budget tab) ──
     These let the Budget tab edit whichever plan maps to the viewed month,
     rather than only the active plan. */
  const patchPlanById=(pid,patch)=>setData(d=>({...d,plans:d.plans.map(p=>p.id===pid?{...p,...patch}:p)}));
  const setCatsFor=(pid,updater)=>setData(d=>({...d,plans:d.plans.map(p=>p.id===pid?{...p,categories:typeof updater==="function"?updater(p.categories||[]):updater}:p)}));
  const setGrpsFor=(pid,updater)=>setData(d=>({...d,plans:d.plans.map(p=>p.id===pid?{...p,groups:typeof updater==="function"?updater(p.groups||[]):updater}:p)}));

  /* ── monthly budget plans ──
     monthlyPlans: [{ month:"2026-06", planId:"p1" }]
     Maps each calendar month to a specific budget plan.
     Falls back to activePlanId when no mapping exists. */
  const monthlyPlans=data.monthlyPlans||[];

  /* owner-aware: find the plan for a given month + owner */
  const planForMonth=(mo,owner=budgetOwner)=>{
    const mapping=monthlyPlans.find(m=>m.month===mo&&m.owner===owner);
    const pid=mapping?mapping.planId:activePlanId[owner];
    return data.plans.find(p=>p.id===pid)||data.plans.find(p=>p.owner===owner)||data.plans[0];
  };

  const assignPlanToMonth=(mo,planId,owner=budgetOwner)=>setData(d=>({
    ...d,
    monthlyPlans:[...(d.monthlyPlans||[]).filter(m=>!(m.month===mo&&m.owner===owner)),{month:mo,owner,planId}]
  }));

  const clonePlanForMonth=(mo,sourcePlanId,owner=budgetOwner,label)=>{
    const source=data.plans.find(p=>p.id===sourcePlanId)||data.plans[0];
    const newId=uid();
    // `label` lets the caller supply a bucket-aware display name (calendar
    // month OR pay-period range); falls back to the old calendar-month-only
    // parsing if no label is given, for any caller that hasn't been updated.
    const derivedLabel=label||(()=>{
      const parts=mo.split("-");
      return new Date(Number(parts[0]),Number(parts[1])-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
    })();
    const cloned={
      ...source,
      id:newId,
      name:derivedLabel,
      month:derivedLabel,
      // deep-clone groups and categories so edits don't affect source
      groups:source.groups.map(g=>({...g,id:uid()})),
      categories:source.categories.map((c,i)=>{
        const newGid=source.groups[source.groups.findIndex(g=>g.id===c.groupId)];
        return{...c,id:uid(),subs:(c.subs||[]).map(s=>({...s,id:uid()}))};
      }),
    };
    // fix groupIds to point to new group ids
    const groupIdMap={};
    source.groups.forEach((g,i)=>{groupIdMap[g.id]=cloned.groups[i].id;});
    cloned.categories=cloned.categories.map(c=>({...c,groupId:groupIdMap[c.groupId]||c.groupId}));

    cloned.owner=owner;
    setData(d=>({
      ...d,
      plans:[...d.plans,cloned],
      monthlyPlans:[...(d.monthlyPlans||[]).filter(m=>!(m.month===mo&&m.owner===owner)),{month:mo,owner,planId:newId}]
    }));
    return newId;
  };

  const removePlanForMonth=(mo,owner=budgetOwner)=>setData(d=>({
    ...d,monthlyPlans:(d.monthlyPlans||[]).filter(m=>!(m.month===mo&&m.owner===owner))
  }));

  /* goals */
  const addGoal=owner=>setData(d=>({...d,goals:[...d.goals,{id:uid(),owner,name:"New goal",type:"savings",target:10000,contributions:[],monthly:500,currency:cur,color:SEG[d.goals.length%SEG.length]}]}));
  const updateGoal=(id,patch)=>setData(d=>({...d,goals:d.goals.map(g=>g.id===id?{...g,...patch}:g)}));
  const removeGoal=id=>setData(d=>({...d,goals:d.goals.filter(g=>g.id!==id)}));
  const addContribution=(goalId,amount,note="")=>{
    const contrib={id:uid(),date:new Date().toISOString().slice(0,10),amount:Number(amount),note};
    setData(d=>({...d,goals:d.goals.map(g=>g.id===goalId?{...g,contributions:[...(g.contributions||[]),contrib]}:g)}));
  };
  const removeContribution=(goalId,cid)=>setData(d=>({...d,goals:d.goals.map(g=>g.id===goalId?{...g,contributions:(g.contributions||[]).filter(c=>c.id!==cid)}:g)}));

  /* investments */
  const invs=data.investments||[];
  const addInv=()=>setData(d=>({...d,investments:[...(d.investments||[]),{id:uid(),ticker:"",name:"",broker:"",trades:[]}]}));
  const updateInv=(id,patch)=>setData(d=>({...d,investments:(d.investments||[]).map(x=>x.id===id?{...x,...patch}:x)}));
  const removeInv=id=>setData(d=>({...d,investments:(d.investments||[]).filter(x=>x.id!==id)}));
  const addTrade=(invId,trade)=>setData(d=>({...d,investments:(d.investments||[]).map(x=>x.id===invId?{...x,trades:[...(x.trades||[]),{id:uid(),...trade}]}:x)}));
  const removeTrade=(invId,tid)=>setData(d=>({...d,investments:(d.investments||[]).map(x=>x.id===invId?{...x,trades:(x.trades||[]).filter(t=>t.id!==tid)}:x)}));
  const setProjection=patch=>setData(d=>({...d,projection:{...(d.projection||{monthly:1500,years:20,rate:8}),...patch}}));

  /* runway/capital targets — trend-based forecasting toward a custom goal.
     Distinct from `goals` (manual-contribution pots): a target's progress is
     derived live from (a) the budget categories you tag as counting toward it
     and (b) your current invested/cash balances, projected forward at two
     separately-editable conservative rates. */
  const targets=data.targets||[];
  const addTarget=()=>setData(d=>({...d,targets:[...(d.targets||[]),{
    id:uid(),name:"New target",targetAmount:100000,targetDate:"",
    categoryAlloc:{},investRate:4,cashRate:1,currency:cur,color:SEG[(d.targets||[]).length%SEG.length],
  }]}));
  const updateTarget=(id,patch)=>setData(d=>({...d,targets:(d.targets||[]).map(t=>t.id===id?{...t,...patch}:t)}));
  const removeTarget=id=>setData(d=>({...d,targets:(d.targets||[]).filter(t=>t.id!==id)}));
  const livePrice=data.livePrice||{};
  const setLivePrice=prices=>setData(d=>({...d,livePrice:{...(d.livePrice||{}),...prices}}));

  /* portfolio history — snapshot of total USD value taken when user refreshes prices */
  const portHistory=data.portHistory||[];
  const addPortSnap=(valueUSD)=>{
    const month=new Date().toISOString().slice(0,7);
    setData(d=>{
      const rest=(d.portHistory||[]).filter(h=>h.month!==month);
      return{...d,portHistory:[...rest,{id:uid(),month,value:Math.round(valueUSD)}].sort((a,b)=>a.month.localeCompare(b.month))};
    });
  };

  /* expense tracker — transactions per budget category.
     Schema: {id,catId,name,note,amount,date,owner,isTransfer}
     `name` is the recurring/short title (e.g. "Amazon Now"), `note` is the
     free-form detail (e.g. "bought a charger + cable"). isTransfer marks
     quick-transfer logs against untracked categories. */
  const expenses=(data.expenses||[]).filter(e=>!e.deletedAt);
  const addExpenseTx=(catId,name,note,amount,date,owner=budgetOwner,isTransfer=false)=>setData(d=>({...d,expenses:[...(d.expenses||[]),{id:uid(),catId,name,note:note||"",amount:Number(amount),date,owner,isTransfer:!!isTransfer,updatedAt:new Date().toISOString()}]}));
  const updateExpenseTx=(id,patch)=>setData(d=>({...d,expenses:(d.expenses||[]).map(e=>e.id===id?{...e,...patch,amount:patch.amount!==undefined?Number(patch.amount):e.amount,updatedAt:new Date().toISOString()}:e)}));
  const removeExpenseTx=id=>setData(d=>({...d,expenses:(d.expenses||[]).map(e=>e.id===id?{...e,deletedAt:new Date().toISOString(),updatedAt:new Date().toISOString()}:e)}));

  /* quick-transfer: logs a transaction against an untracked category (e.g. Savings)
     and remembers the actual amount transferred, since it doesn't always match
     the budgeted figure exactly. Keyed by category id. */
  const quickTransferLast=data.quickTransferLast||{};
  const quickTransfer=(catId,catName,amount,date,owner=budgetOwner)=>{
    addExpenseTx(catId,catName,"Quick transfer",amount,date,owner,true);
    setData(d=>({...d,quickTransferLast:{...(d.quickTransferLast||{}),[catId]:Number(amount)}}));
  };

  /* FX */
  const[rates,setRates]=useState(null);
  const[ratesAt,setRatesAt]=useState(null);
  const[ratesErr,setRatesErr]=useState(false);
  const[ratesLoading,setRatesLoading]=useState(false);
  const loadRates=async()=>{
    setRatesLoading(true);setRatesErr(false);
    try{const{rates:r,at}=await fetchRates();setRates(r);setRatesAt(at);}
    catch(e){setRatesErr(true);}
    setRatesLoading(false);
  };
  useEffect(()=>{loadRates();},[]);
  /* Phase 3 — one-time migration for existing local history: portHistory was
     previously always stored as raw USD, and net-worth history snapshots were
     always computed in SAR. Once live FX rates are available, convert any
     pre-Phase-3 entries into the user's own base_currency exactly once
     (flagged so it never re-converts on a later load). Pilot this on your
     own account before assuming it's safe for Charlene's data too. */
  useEffect(()=>{
    if(!rates||!cur)return;
    setData(d=>{
      if(d.baseCurrencyMigratedV1)return d;
      const conv=(amt,from,to)=>{
        if(!rates[from]||!rates[to])return amt;
        return(Number(amt)||0)/rates[from]*rates[to];
      };
      const newPortHistory=(d.portHistory||[]).map(h=>({...h,value:Math.round(conv(h.value,"USD",cur))}));
      const newHistory=(d.history||[]).map(h=>({...h,
        net:Math.round(conv(h.net,"SAR",cur)),
        banks:Math.round(conv(h.banks,"SAR",cur)),
        investments:Math.round(conv(h.investments,"SAR",cur)),
        assets:Math.round(conv(h.assets,"SAR",cur)),
        liabilities:Math.round(conv(h.liabilities,"SAR",cur)),
      }));
      return{...d,portHistory:newPortHistory,history:newHistory,baseCurrencyMigratedV1:true};
    });
  },[rates,cur]);
  const convert=(amt,from,to)=>{
    if(!rates||!rates[from]||!rates[to])return null;
    return(Number(amt)||0)/rates[from]*rates[to];
  };
  const sarRate=rates&&rates.SAR?rates.SAR:null;
  const baseRate=rates&&rates[cur]?rates[cur]:null; // USD → user's base_currency (Phase 3)

  /* banks */
  const banks=data.banks||[];
  const addBank=owner=>setData(d=>({...d,banks:[...(d.banks||[]),{id:uid(),owner,name:"New account",bank:"",country:"SA",currency:d.currency||"SAR",balance:0}]}));
  const updateBank=(id,patch)=>setData(d=>({...d,banks:(d.banks||[]).map(b=>b.id===id?{...b,...patch}:b)}));
  const removeBank=id=>setData(d=>({...d,banks:(d.banks||[]).filter(b=>b.id!==id)}));

  /* assets */
  const assets=data.assets||[];
  const addAsset=kind=>setData(d=>({...d,assets:[...(d.assets||[]),
    kind==="liability"
      ?{id:uid(),name:"New liability",kind:"liability",currency:d.currency||"SAR",value:0,installment:true,monthly:0,monthsRemaining:0,asOfDate:new Date().toISOString().slice(0,10)}
      :{id:uid(),name:"New asset",kind:"asset",currency:d.currency||"SAR",value:0}
  ]}));
  const updateAsset=(id,patch)=>setData(d=>({...d,assets:(d.assets||[]).map(a=>a.id===id?{...a,...patch}:a)}));
  const removeAsset=id=>setData(d=>({...d,assets:(d.assets||[]).filter(a=>a.id!==id)}));

  /* net worth — NOTE: despite the historical "Sar" naming, these variables
     now total in the user's own base_currency (`cur`), not hardcoded SAR.
     Kept the names to avoid a sweeping rename across every prop/consumer. */
  const baseOf=(amt,ccy)=>{const v=convert(amt,ccy,cur);return v==null?0:v;};
  const banksSar=banks.reduce((s,b)=>s+baseOf(b.balance,b.currency),0);
  const invSar=invs.reduce((s,hld)=>{
    const{shares}=holdingStats(hld.trades);
    const price=livePrice[baseKey(hld.ticker)]||0;
    return s+shares*price*(baseRate||0);
  },0);
  const assetSar=assets.filter(a=>a.kind==="asset").reduce((s,a)=>s+baseOf(a.value,a.currency),0);
  const liabSar=assets.filter(a=>a.kind==="liability").reduce((s,a)=>s+baseOf(liabilityBalance(a),a.currency),0);
  const netWorth=banksSar+invSar+assetSar-liabSar;

  /* history */
  const history=data.history||[];
  const captureSnapshot=()=>{
    const month=new Date().toISOString().slice(0,7);
    setData(d=>{const rest=(d.history||[]).filter(h=>h.month!==month);
      return{...d,history:[...rest,{id:uid(),month,net:Math.round(netWorth),banks:Math.round(banksSar),investments:Math.round(invSar),assets:Math.round(assetSar),liabilities:Math.round(liabSar)}].sort((a,b)=>a.month.localeCompare(b.month))};});
  };
  const addPastSnap=(month,net)=>setData(d=>{const rest=(d.history||[]).filter(h=>h.month!==month);
    return{...d,history:[...rest,{id:uid(),month,net:Math.round(net),banks:0,investments:0,assets:0,liabilities:0}].sort((a,b)=>a.month.localeCompare(b.month))};});
  const removeSnap=id=>setData(d=>({...d,history:(d.history||[]).filter(h=>h.id!==id)}));

  /* net worth auto-pull — silently keeps this month's snapshot in sync with
     live bank/investment/asset balances, so the timeline stays accurate
     without needing a manual "Capture this month" tap every time. Only
     updates the CURRENT month's entry, debounced, and only once balances
     have settled (loaded + non-zero so we don't overwrite real history with
     a startup 0 before data finishes loading). */
  const netWorthReady=loaded&&!!rates&&(banks.length>0||invs.length>0||assets.length>0);
  useEffect(()=>{
    if(!netWorthReady)return;
    const t=setTimeout(()=>{
      const month=new Date().toISOString().slice(0,7);
      setData(d=>{
        const existing=(d.history||[]).find(h=>h.month===month);
        const rounded=Math.round(netWorth);
        if(existing&&existing.net===rounded&&existing.banks===Math.round(banksSar)&&existing.investments===Math.round(invSar)&&existing.assets===Math.round(assetSar)&&existing.liabilities===Math.round(liabSar)){
          return d; // no change, skip write to avoid loops
        }
        const rest=(d.history||[]).filter(h=>h.month!==month);
        return{...d,history:[...rest,{id:existing?.id||uid(),month,net:rounded,banks:Math.round(banksSar),investments:Math.round(invSar),assets:Math.round(assetSar),liabilities:Math.round(liabSar),auto:true}].sort((a,b)=>a.month.localeCompare(b.month))};
      });
    },1200);
    return()=>clearTimeout(t);
  },[netWorth,banksSar,invSar,assetSar,liabSar,netWorthReady]);

  /* household */
  const hh=data.household||{splitMine:50,expenses:[]};
  const setSplit=v=>setData(d=>({...d,household:{...(d.household||{splitMine:50,expenses:[]}),splitMine:v}}));
  const addExpense=()=>setData(d=>{const h=d.household||{splitMine:50,expenses:[]};return{...d,household:{...h,expenses:[...h.expenses,{id:uid(),name:"New expense",amount:0,color:SEG[h.expenses.length%SEG.length]}]}};});
  const updateExpense=(id,patch)=>setData(d=>{const h=d.household;return{...d,household:{...h,expenses:h.expenses.map(e=>e.id===id?{...e,...patch}:e)}};});
  const removeExpense=id=>setData(d=>{const h=d.household;return{...d,household:{...h,expenses:h.expenses.filter(e=>e.id!==id)}};});

  const setOwnerName=(key,name)=>setData(d=>({...d,owners:{...d.owners,[key]:name}}));
  const setPayPeriod=(owner,patch)=>setData(d=>({...d,payPeriods:{...(d.payPeriods||{}),[owner]:{...((d.payPeriods||{})[owner]||{enabled:false,payday:1}),...patch}}}));

  /* derived */
  const allocated=useMemo(()=>plan.categories.reduce((s,c)=>s+(Number(c.amount)||0),0),[plan]);
  const remaining=(Number(plan.income)||0)-allocated;
  const fmt=n=>`${cur} ${Math.round(Number(n)||0).toLocaleString("en-US")}`;
  const fmt2=n=>`${cur} ${(Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
  const pct=n=>plan.income>0?((Number(n)||0)/plan.income)*100:0;
  const setInvestTarget=patch=>setData(d=>({...d,investTarget:{...(d.investTarget||{}),[budgetOwner]:{...((d.investTarget||{})[budgetOwner]||{thresholdPct:20,groupNames:[]}),...patch}}}));

  const TABS=[
    ["budget","Budget",I.Wallet],["expenses","Expenses",I.Receipt],["household","Household",I.Users],
    ["banks","Banks",I.Bank],["investments","Investments",I.Trending],
    ["networth","Net Worth",I.Gem],["goals","Goals",I.Target],
    ["targets","Forecast",I.TrendUp],
    ["currency","Currency",I.Swap],
  ].filter(([id])=>!(isSingle&&id==="household")); // single-profile: Shared Split has no meaning with one profile

  if(session===undefined){
    return(
      <div style={{background:P.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div className="loader"/>
      </div>
    );
  }
  if(!session){
    return <AuthScreen/>;
  }

  return(
    <div style={{background:P.bg,color:P.ink,minHeight:"100vh"}}>
      {/* pull-to-sync indicator */}
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:60,display:"flex",flexDirection:"column",
        alignItems:"center",pointerEvents:"none",
        paddingTop:`calc(env(safe-area-inset-top) + ${Math.max(8,pullDist-30)}px)`,
        opacity:pullDist>0||syncing?Math.min(1,pullDist/PULL_THRESHOLD)||(syncing?1:0):0,
        transition:pullDist===0?"opacity .2s ease":"none"}}>
        <div style={{width:32,height:32,borderRadius:999,background:P.sf,border:`1px solid ${P.line}`,
          display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 14px rgba(12,22,40,.18)"}}>
          <I.Refresh size={15} style={{color:pullDist>=PULL_THRESHOLD||syncing?P.gr:P.faint,
            transform:syncing?"none":`rotate(${Math.min(pullDist,PULL_THRESHOLD)/PULL_THRESHOLD*360}deg)`,
            ...(syncing?{animation:"spin .8s linear infinite"}:{})}}/>
        </div>
        {(pullDist>0||syncing)&&
          <div style={{marginTop:6,fontSize:11,color:P.sub,background:P.sf,padding:"2px 8px",borderRadius:999,border:`1px solid ${P.line}`}}>
            {syncOp==="push"?"Saving to cloud…"
              :syncOp==="pull"?"Checking cloud…"
              :pullDist>=PULL_THRESHOLD?(hasUnsyncedChanges?"Release to save & sync":"Release to pull")
              :(hasUnsyncedChanges?"Pull to save & sync":"Pull to check cloud")}
          </div>}
      </div>
      <div style={{maxWidth:920,margin:"0 auto",padding:"0 16px 80px"}}>

        {/* header */}
        <header style={{paddingTop:28,paddingBottom:16}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
            <div style={{display:"flex",alignItems:"center",gap:8,color:P.gr}}>
              <I.Wallet size={18} sw={2.2}/>
              <span style={{fontSize:12,fontWeight:600,letterSpacing:".18em",textTransform:"uppercase"}}>Where'dItGo</span>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {syncMsg&&<span style={{fontSize:11,color:P.sub}}>{syncMsg}</span>}
              <button onClick={toggleTheme} title={data.theme==="dark"?"Switch to light mode":"Switch to dark mode"}
                style={{display:"flex",alignItems:"center",justifyContent:"center",borderRadius:999,padding:8,color:P.sub,background:"transparent",border:"none"}}>
                {data.theme==="dark"?<I.Sun size={17}/>:<I.Moon size={17}/>}
              </button>
              <button onClick={()=>pullFromCloud()} disabled={syncOp==="pull"}
                title={kvReady?"Pull from Cloud":"Configure Worker URL to enable sync"}
                style={{display:"flex",alignItems:"center",justifyContent:"center",borderRadius:999,padding:8,
                  color:P.sub,background:"transparent",border:`1px solid ${P.line}`,opacity:kvReady?1:.5}}>
                <I.Refresh size={14} style={syncOp==="pull"?{animation:"spin .9s linear infinite"}:null}/>
              </button>
              <button onClick={()=>saveToCloud()} disabled={!kvReady||syncOp==="push"}
                title={kvReady?(hasUnsyncedChanges?"Save to Cloud":"Cloud is up to date"):"Configure Worker URL to enable sync"}
                style={{position:"relative",display:"flex",alignItems:"center",gap:5,borderRadius:999,padding:"5px 10px",fontSize:12,fontWeight:500,
                  background:!kvReady?P.sf:P.grS,color:!kvReady?P.sub:P.grD,border:`1px solid ${!kvReady?P.line:P.grS}`,opacity:kvReady?1:.5}}>
                <I.Cloud size={13} style={syncOp==="push"?{animation:"spin .9s linear infinite"}:null}/>
                {syncOp==="push"?"Saving…":hasUnsyncedChanges?`Save to Cloud${changesSinceSave?` (${changesSinceSave})`:""}`:"Cloud saved"}
                {hasUnsyncedChanges&&kvReady&&syncOp!=="push"&&
                  <span style={{position:"absolute",top:-2,right:-2,width:7,height:7,borderRadius:999,background:P.red,border:`1px solid ${P.bg}`}}/>}
              </button>
              <button onClick={()=>setShowSettings(true)} style={{borderRadius:999,padding:8,color:P.sub,background:"transparent",border:"none"}}>
                <I.Settings size={18}/>
              </button>
            </div>
          </div>

          {kvReady&&
            <div style={{marginTop:8,fontSize:11,color:P.faint}}>
              {hasUnsyncedChanges?"Saved on this device — not yet in the cloud. ":"Saved on this device. "}
              Pull before editing on another device; Save to Cloud when finished.
            </div>}

          <div style={{marginTop:16,display:"flex",flexWrap:"wrap",alignItems:"flex-end",justifyContent:"space-between",gap:16}}>
            {!isSingle&&
              <div style={{display:"flex",alignItems:"center",gap:6,color:P.sub}}>
                <I.Wallet size={13}/>
                <span style={{fontSize:12}}>{data.owners?.me||"Me"} &amp; {data.owners?.wife||"Wife"}</span>
              </div>}
            <div style={{textAlign:"right",marginLeft:isSingle?"auto":0}}>
              <div style={{fontSize:11,color:P.faint,textTransform:"uppercase",letterSpacing:".1em"}}>Income</div>
              <div style={{display:"flex",alignItems:"baseline",gap:6,justifyContent:"flex-end"}}>
                <span style={{fontSize:14,color:P.sub}}>{cur}</span>
                <input type="number" value={plan.income} onChange={e=>patchPlan({income:Number(e.target.value)})}
                  className="bare tnum serif" style={{fontSize:30,fontWeight:600,width:170,textAlign:"right",color:P.ink}}/>
              </div>
            </div>
          </div>
        </header>

        {/* tabs */}
        <nav style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:20}}>
          {TABS.map(([id,label,Icon])=>(
            <button key={id} onClick={()=>setTab(id)} className="glass-btn"
              style={tab===id
                ?{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",fontSize:14,fontWeight:600,color:P.jade}
                :{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",fontSize:14,fontWeight:500,color:P.neuSub,background:"transparent",backdropFilter:"none",WebkitBackdropFilter:"none",border:"1px solid transparent",boxShadow:"none"}}>
              <Icon size={14}/>{label}
            </button>
          ))}
        </nav>

        <TabPane tab={tab}>
          {tab==="budget"&&<BudgetView {...{planForMonth,monthlyPlans,plans:data.plans,clonePlanForMonth,removePlanForMonth,activePlanId,setCatsFor,setGrpsFor,patchPlanById,fmt:fmt2,cur,budgetOwner:effectiveBudgetOwner,setBudgetOwner,isSingle,owners:data.owners,payPeriods:data.payPeriods,investTarget:(data.investTarget||{})[effectiveBudgetOwner]||{thresholdPct:20,groupNames:[]},setInvestTarget}}/>}
          {tab==="expenses"&&<ExpenseTrackerView {...{data,plans:data.plans,planForMonth,clonePlanForMonth,assignPlanToMonth,removePlanForMonth,expenses,addExpenseTx,updateExpenseTx,removeExpenseTx,quickTransfer,quickTransferLast,fmt:fmt2,cur,budgetOwner:effectiveBudgetOwner,setBudgetOwner,isSingle,owners:data.owners,payPeriods:data.payPeriods,goals:data.goals,addContribution,setCatsFor,globalAddTrigger}}/>}
          {tab==="household"&&<HouseholdView {...{hh,setSplit,addExpense,updateExpense,removeExpense,fmt,owners:data.owners}}/>}
          {tab==="banks"&&<BanksView {...{banks,addBank,updateBank,removeBank,convert,sarRate,mainCcy:data.currency||"SAR",owners:data.owners,isSingle}}/>}
          {tab==="investments"&&<InvestmentsView {...{invs,addInv,updateInv,removeInv,addTrade,removeTrade,livePrice,setLivePrice,sarRate,convert,cur,projection:data.projection||{monthly:1500,years:20,rate:8},setProjection,portHistory,addPortSnap}}/>}
          {tab==="networth"&&<NetWorthView {...{netWorth,banksSar,invSar,assetSar,liabSar,sarRate,convert,cur,ratesErr,assets,addAsset,updateAsset,removeAsset,history,captureSnapshot,addPastSnap,removeSnap}}/>}
          {tab==="currency"&&<CurrencyView {...{rates,ratesAt,ratesErr,ratesLoading,onRefresh:loadRates,convert,fxAmount,setFxAmount,fxFrom,setFxFrom,fxTo,setFxTo}}/>}
          {tab==="goals"&&<GoalsView {...{goals:data.goals,fmt,addGoal,updateGoal,removeGoal,addContribution,removeContribution,owners:data.owners,isSingle}}/>}
          {tab==="targets"&&<TargetsView {...{targets,addTarget,updateTarget,removeTarget,plans:data.plans,activePlanId:data.activePlanId,owners:data.owners,invSar,banksSar,cur,convert,fmt}}/>}
        </TabPane>
      </div>
      {showSettings&&<SettingsModal {...{data,setData,onClose:()=>setShowSettings(false),
        pullFromCloud,saveToCloud,kvReady,hasUnsyncedChanges,lastCloudSavedAt,lastCloudPulledAt,changesSinceSave,syncOp,
        preCloudBackupAt,restorePreCloudBackup,openProfilePicker,setOwnerName,owners:data.owners,toggleTheme,setPayPeriod,
        session,onLogOut:logOut,isSingle}}/>}
      {conflict&&<ConflictModal conflict={conflict} onKeepLocal={resolveKeepLocal} onUseCloud={resolveUseCloud} onSaveLocalToCloud={resolveSaveLocalToCloud}/>}
      {showProfilePicker&&!isSingle&&<ProfilePickerModal owners={data.owners} dismissable={profilePickerDismissable}
        onChoose={chooseDefaultProfile} onClose={()=>setShowProfilePicker(false)}/>}
      {tab!=="expenses"&&
        <button aria-label="Quick add transaction" onClick={()=>{setTab("expenses");setGlobalAddTrigger(n=>n+1);}}
          style={{position:"fixed",right:16,bottom:"calc(env(safe-area-inset-bottom) + 24px)",zIndex:70,
            width:56,height:56,borderRadius:999,background:P.gr,color:"#fff",border:"none",
            display:"flex",alignItems:"center",justifyContent:"center",
            boxShadow:"0 6px 20px rgba(12,22,40,.35)",cursor:"pointer"}}>
          <I.Plus size={24}/>
        </button>}
    </div>
  );
}

/* ── BUDGET VIEW — month-aware, percentage shown inline beside amount ── */
function BudgetView({planForMonth,monthlyPlans,plans,clonePlanForMonth,removePlanForMonth,activePlanId,setCatsFor,setGrpsFor,patchPlanById,fmt,cur,budgetOwner,setBudgetOwner,isSingle,owners,payPeriods,investTarget,setInvestTarget}){
  const usesPayPeriod=ownerUsesPayPeriod(payPeriods,budgetOwner);
  const nowMonth=bucketNow(payPeriods,budgetOwner);
  const[viewMonth,setViewMonth]=useState(nowMonth);
  // when switching owners, OR when pay-period settings finish loading/change
  // (e.g. the cloud sync pull resolves after this component already mounted
  // with default settings), re-anchor to that owner's "now" so we're never
  // holding a calendar-month key while in pay-period mode (or vice versa) —
  // that mismatch is what produces "Invalid Date".
  useEffect(()=>{setViewMonth(bucketNow(payPeriods,budgetOwner));},[budgetOwner,JSON.stringify(payPeriods)]);
  const[expandedSubs,setExpandedSubs]=useState({});
  const toggleSubs=id=>setExpandedSubs(s=>({...s,[id]:!s[id]}));
  const[showInvestSettings,setShowInvestSettings]=useState(false);
  /* neumorphic + glass helpers, scoped to this view */
  const card={background:P.neuBg,borderRadius:18,boxShadow:`7px 7px 15px ${P.neuLo},-7px -7px 15px ${P.neuHi}`};
  const neu=(r=18)=>({background:P.neuBg,borderRadius:r,boxShadow:`7px 7px 15px ${P.neuLo},-7px -7px 15px ${P.neuHi}`});
  const neuInset=(r=14)=>({background:P.neuBg,borderRadius:r,boxShadow:`inset 4px 4px 9px ${P.neuLo},inset -4px -4px 9px ${P.neuHi}`});
  const neuBtn=(active)=>({background:P.neuBg,borderRadius:999,border:"none",color:active?P.jade:P.neuInk,
    boxShadow:active?`inset 3px 3px 7px ${P.neuLo},inset -3px -3px 7px ${P.neuHi}`:`4px 4px 9px ${P.neuLo},-4px -4px 9px ${P.neuHi}`});
  const glassPanel=(r=20)=>({background:P.glassBg,backdropFilter:"blur(16px) saturate(160%)",WebkitBackdropFilter:"blur(16px) saturate(160%)",
    border:`1px solid ${P.glassBorder}`,boxShadow:`0 10px 26px ${P.glassShadow}, inset 0 1px 0 ${P.glassHi}`,borderRadius:r});

  const addMonths=(ym,n)=>bucketShift(ym,payPeriods,budgetOwner,n);
  const fmtMonth=m=>bucketLabel(m,payPeriods,budgetOwner);
  const isFuture=viewMonth>nowMonth;
  const isNow=viewMonth===nowMonth;
  const isPast=viewMonth<nowMonth;

  /* the plan that applies to the viewed month for this owner */
  const monthPlan=planForMonth(viewMonth,budgetOwner);
  const hasOwnPlan=!!(monthlyPlans||[]).find(m=>m.month===viewMonth&&m.owner===budgetOwner);
  /* Current month always edits the carry-forward base plan directly.
     Other months are only editable once a custom copy exists. */
  const editable=isNow||hasOwnPlan;
  const pid=monthPlan.id;

  /* keep a category's stored amount in sync with its sub-items' sum */
  const syncAmt=c=>{const subs=c.subs||[];return subs.length>0?{...c,amount:subs.reduce((s,x)=>s+(Number(x.amount)||0),0)}:c;};

  /* month-scoped mutators — all target the viewed month's plan id, atomically */
  const updateCat=(id,patch)=>setCatsFor(pid,cats=>cats.map(c=>c.id===id?{...c,...patch}:c));
  const addCat=gid=>setCatsFor(pid,cats=>[...cats,{id:uid(),name:"New category",amount:0,groupId:gid,color:SEG[cats.length%SEG.length],subs:[],trackExpenses:true}]);
  const removeCat=id=>setCatsFor(pid,cats=>cats.filter(c=>c.id!==id));
  const updateSub=(catId,subId,patch)=>setCatsFor(pid,cats=>cats.map(c=>c.id===catId?syncAmt({...c,subs:(c.subs||[]).map(s=>s.id===subId?{...s,...patch}:s)}):c));
  const removeSub=(catId,subId)=>setCatsFor(pid,cats=>cats.map(c=>c.id===catId?syncAmt({...c,subs:(c.subs||[]).filter(s=>s.id!==subId)}):c));
  const addGroup=()=>setGrpsFor(pid,gs=>[...gs,{id:uid(),name:"New group"}]);
  const renameGroup=(id,name)=>setGrpsFor(pid,gs=>gs.map(g=>g.id===id?{...g,name}:g));
  const removeGroup=id=>{setCatsFor(pid,cats=>cats.filter(c=>c.groupId!==id));setGrpsFor(pid,gs=>gs.filter(g=>g.id!==id));};
  const setIncome=v=>patchPlanById(pid,{income:Number(v)||0});

  const handleAddSub=catId=>{
    setCatsFor(pid,cats=>cats.map(c=>c.id===catId?syncAmt({...c,subs:[...(c.subs||[]),{id:uid(),name:"New item",amount:0}]}):c));
    setExpandedSubs(s=>({...s,[catId]:true}));
  };
  const handleSubChange=(catId,subId,patch)=>updateSub(catId,subId,patch);
  const handleRemoveSub=(catId,subId)=>removeSub(catId,subId);

  const effectiveAmt=c=>{
    const subs=c.subs||[];
    if(subs.length>0)return subs.reduce((s,sub)=>s+(Number(sub.amount)||0),0);
    return Number(c.amount)||0;
  };

  /* month-scoped totals */
  const income=Number(monthPlan.income)||0;
  const allocated=(monthPlan.categories||[]).reduce((s,c)=>s+effectiveAmt(c),0);
  const remaining=income-allocated;
  const pct=n=>income>0?((Number(n)||0)/income)*100:0;

  /* Default: copy whatever is currently being previewed for this month
     (fixes the old bug where this silently pulled from the base plan
     instead of the shown carry-forward/custom plan). */
  const createCopy=()=>clonePlanForMonth(viewMonth,pid,budgetOwner,fmtMonth(viewMonth));
  const[showCopyPicker,setShowCopyPicker]=useState(false);
  const[copySourceId,setCopySourceId]=useState("");
  const ownerPlanOptions=(plans||[]).filter(p=>p.owner===budgetOwner);
  const createCopyFrom=()=>{if(copySourceId){clonePlanForMonth(viewMonth,copySourceId,budgetOwner,fmtMonth(viewMonth));setShowCopyPicker(false);}};

  return(
    <div style={{background:P.neuBg,borderRadius:24,padding:"14px 12px 18px",margin:"0 -4px",transition:"background .25s ease"}}>
      {/* ── owner toggle (couple accounts only) ── */}
      {!isSingle&&<OwnerToggle owner={budgetOwner} setOwner={setBudgetOwner} owners={owners}/>}

      {/* ── month navigator (glass — floating nav chrome) ── */}
      <div className="fade-up glass-panel" style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"10px 14px"}}>
        <button className="glass-btn" onClick={()=>setViewMonth(m=>addMonths(m,-1))}
          style={{padding:"4px 10px",fontSize:18,lineHeight:1}}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:P.ink}}>{fmtMonth(viewMonth)}</div>
          <div style={{fontSize:11,fontWeight:600,marginTop:1,color:isFuture?P.br:isNow?P.jade:P.faint}}>
            {isFuture?"Planning ahead":isNow?(usesPayPeriod?"Current pay period":"Current month"):(usesPayPeriod?"Past pay period":"Past month")}
          </div>
        </div>
        <button className="glass-btn" onClick={()=>setViewMonth(m=>addMonths(m,1))}
          style={{padding:"4px 10px",fontSize:18,lineHeight:1}}>›</button>
        {viewMonth!==nowMonth&&(
          <button className="glass-btn" onClick={()=>setViewMonth(nowMonth)}
            style={{padding:"4px 10px",fontSize:12,fontWeight:600,color:P.jadeD||P.jade}}>Today</button>
        )}
      </div>

      {/* ── plan status banner (neumorphic raised, subtly tinted) ── */}
      <div style={{...neu(14),padding:"12px 14px",marginBottom:12,
        display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:600,color:isNow?P.jade:hasOwnPlan?P.br:P.neuSub}}>
            {isNow?"📋 Carry-forward plan":hasOwnPlan?`📋 Custom plan for ${fmtMonth(viewMonth)}`:"📋 Carry-forward (preview)"}
          </div>
          <div style={{fontSize:11,color:isNow?P.gr:hasOwnPlan?P.br:P.faint,marginTop:2}}>
            {isNow
              ?"This is your base budget. Edits here carry forward to every future month automatically."
              :hasOwnPlan
                ?"A custom copy for this month. Edits here only affect this month."
                :`Showing your carry-forward budget. Create a copy to customize ${fmtMonth(viewMonth)} without touching other months.`}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          {!isNow&&(hasOwnPlan
            ?<button onClick={()=>removePlanForMonth(viewMonth,budgetOwner)} className="neu-btn"
                style={{fontSize:11,padding:"5px 12px",color:P.wine,fontWeight:500}}>Remove</button>
            :<>
              <button onClick={createCopy} className="neu-btn"
                  style={{fontSize:11,padding:"5px 12px",color:P.jade,fontWeight:600,whiteSpace:"nowrap"}}>+ Create copy</button>
              <button onClick={()=>setShowCopyPicker(v=>!v)}
                  style={{fontSize:10,background:"transparent",border:"none",color:P.neuSub,padding:0,textDecoration:"underline",whiteSpace:"nowrap"}}>copy from a different month</button>
            </>
          )}
        </div>
      </div>

      {/* ── optional: pick a specific source plan to copy from ── */}
      {!isNow&&!hasOwnPlan&&showCopyPicker&&(
        <div style={{...neuInset(14),padding:12,marginBottom:12,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <select value={copySourceId} onChange={e=>setCopySourceId(e.target.value)}
            style={{fontSize:12,borderRadius:8,padding:"5px 8px",background:P.neuBg,border:"none",color:P.neuInk,flex:1,minWidth:160}}>
            <option value="">Select a plan to copy…</option>
            {ownerPlanOptions.map(p=>(
              <option key={p.id} value={p.id}>{p.name||p.month} ({cur} {(p.income||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})})</option>
            ))}
          </select>
          <button onClick={createCopyFrom} disabled={!copySourceId} className="neu-btn"
            style={{fontSize:11,padding:"6px 14px",color:copySourceId?P.jade:P.neuSub,fontWeight:600}}>Copy</button>
        </div>
      )}

      {/* ── income + allocation summary ── */}
      <div style={{...neu(16),padding:16,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"baseline",gap:6}}>
            <span style={{fontSize:12,color:P.neuSub,textTransform:"uppercase",letterSpacing:".08em"}}>Income</span>
            <span style={{fontSize:13,color:P.neuSub}}>{cur}</span>
            <input type="number" value={income} disabled={!editable}
              onChange={e=>setIncome(e.target.value)}
              className="bare tnum serif" style={{fontSize:22,fontWeight:600,width:130,color:editable?P.neuInk:P.neuSub,
                ...(editable?neuInset(8):{}),padding:editable?"2px 8px":undefined}}/>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:600,color:P.neuSub}}>Allocated {fmt(allocated)}</span>
          <span key={remaining} className="num-flash" style={{fontSize:13,fontWeight:600,color:remaining<0?P.wine:P.jade}}>
            {remaining<0?"Over by ":"Left "}{fmt(Math.abs(remaining))}
          </span>
        </div>
      </div>

      {/* ── allocation breakdown: donut + list (replaces the old linear bar; also folds in what used to be the separate Overview tab) ── */}
      {(()=>{
        const groupData=(monthPlan.groups||[]).map((g,i)=>({
          name:g.name,
          value:(monthPlan.categories||[]).filter(c=>c.groupId===g.id).reduce((s,c)=>s+effectiveAmt(c),0),
          color:SEG[i%SEG.length],
        })).filter(d=>d.value>0);
        return(
          <div style={{display:"flex",gap:16,marginBottom:16,flexWrap:"wrap"}}>
            <div style={{...neu(16),padding:16,flex:"1 1 200px",minWidth:200}}>
              <div style={{width:"100%",height:190}}>
                <ResponsiveContainer>
                  <PieChart>
                    <Pie data={groupData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={78} innerRadius={44} paddingAngle={2}>
                      {groupData.map((d,i)=><Cell key={i} fill={d.color}/>)}
                    </Pie>
                    <Tooltip formatter={v=>fmt(v)}/>
                  </PieChart>
                </ResponsiveContainer>
              </div>
            </div>
            <div style={{...neu(16),padding:16,flex:"1 1 200px",minWidth:200,display:"flex",flexDirection:"column",justifyContent:"center"}}>
              <div style={{fontSize:11,fontWeight:600,color:P.neuSub,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Where {fmt(income)} goes</div>
              {groupData.map(d=>(
                <div key={d.name} style={{display:"flex",alignItems:"center",gap:8,fontSize:13,padding:"4px 0"}}>
                  <span style={{width:9,height:9,borderRadius:999,background:d.color,flexShrink:0}}/>
                  <span style={{flex:1,color:P.neuSub,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.name}</span>
                  <span className="tnum" style={{color:P.neuSub,fontSize:12,opacity:.75}}>{pct(d.value).toFixed(2)}%</span>
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* ── Invest & Grow target badge ── */}
      {(()=>{
        const investGroupNames=investTarget?.groupNames||[];
        const investAmt=(monthPlan.categories||[]).filter(c=>{
          const g=(monthPlan.groups||[]).find(gr=>gr.id===c.groupId);
          return g&&investGroupNames.includes(g.name);
        }).reduce((s,c)=>s+effectiveAmt(c),0);
        const investPct=pct(investAmt);
        const thresholdPct=Number(investTarget?.thresholdPct)||0;
        const meetsTarget=thresholdPct>0&&investPct>=thresholdPct;
        const gapSar=Math.max(0,(thresholdPct/100)*income-investAmt);
        const barPct=thresholdPct>0?Math.min(100,(investPct/thresholdPct)*100):Math.min(100,investPct);
        const fillColor=thresholdPct===0?P.neuSub:meetsTarget?P.jade:P.br;
        return(
          <div style={{...neu(16),padding:"12px 14px",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
              <div style={{fontSize:13,fontWeight:600,color:thresholdPct===0?P.neuSub:meetsTarget?P.jade:P.br}}>
                {thresholdPct>0&&(meetsTarget?"✓ ":"⚠ ")}
                Invest &amp; Grow — {investPct.toFixed(2)}% of income
                {thresholdPct>0&&(meetsTarget
                  ?` · meeting your ${thresholdPct}% target`
                  :` · ${fmt(gapSar)} short of ${thresholdPct}% target`)}
              </div>
              <button onClick={()=>setShowInvestSettings(v=>!v)} title="Edit target"
                style={{background:"transparent",border:"none",color:thresholdPct===0?P.neuSub:meetsTarget?P.jade:P.br,padding:2,display:"flex"}}>
                <I.Settings size={14}/>
              </button>
            </div>
            {/* ── signature: liquid-glass fill in a neumorphic inset trough ── */}
            <div style={{...neuInset(999),height:14,marginTop:10,overflow:"hidden"}}>
              <div className="bar-animated liquid-fill" style={{width:`${barPct}%`,
                background:`linear-gradient(180deg, rgba(255,255,255,.65) 0%, rgba(255,255,255,.08) 45%, ${fillColor}CC 45%, ${fillColor} 100%)`}}/>
            </div>
            {showInvestSettings&&(
              <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${P.line}`}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
                  <span style={{fontSize:12,color:P.neuSub}}>Target</span>
                  <input type="number" value={thresholdPct}
                    onChange={e=>setInvestTarget({thresholdPct:Number(e.target.value)||0})}
                    className="bare tnum" style={{...neuInset(6),width:50,fontSize:13,fontWeight:600,textAlign:"right",padding:"2px 4px",color:P.neuInk}}/>
                  <span style={{fontSize:12,color:P.neuSub}}>% of income</span>
                </div>
                <div style={{fontSize:11,color:P.neuSub,marginBottom:6}}>Groups counted toward this target:</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                  {(monthPlan.groups||[]).map(g=>{
                    const checked=investGroupNames.includes(g.name);
                    return(
                      <label key={g.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:P.neuSub,cursor:"pointer"}}>
                        <input type="checkbox" checked={checked} onChange={()=>{
                          const next=checked?investGroupNames.filter(n=>n!==g.name):[...investGroupNames,g.name];
                          setInvestTarget({groupNames:next});
                        }}/>
                        {g.name}
                      </label>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        );
      })()}

      {/* ── locked preview hint for non-current months without a copy ── */}
      {!editable&&(
        <div style={{...neuInset(14),padding:"14px 16px",marginBottom:16,textAlign:"center"}}>
          <div style={{fontSize:13,color:P.neuSub,marginBottom:10}}>
            You're previewing your carry-forward budget for {fmtMonth(viewMonth)}.<br/>
            Create a copy to add categories or change amounts just for this month.
          </div>
          <button onClick={createCopy} className="neu-btn"
            style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",fontSize:14,fontWeight:600,color:P.jade}}>
            <I.Plus size={14}/>Create copy for {fmtMonth(viewMonth)}
          </button>
        </div>
      )}

      {editable&&(monthPlan.groups||[]).map(g=>{
        const items=(monthPlan.categories||[]).filter(c=>c.groupId===g.id);
        const groupTotal=items.reduce((s,c)=>s+effectiveAmt(c),0);
        return(
          <section key={g.id} style={{...neu(16),overflow:"hidden",marginBottom:16}}>
            {/* Group header */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px"}}>
              <input value={g.name} onChange={e=>renameGroup(g.id,e.target.value)} className="bare" style={{fontSize:14,fontWeight:600,color:P.neuInk}}/>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:13,fontWeight:600,color:P.neuSub}} className="tnum">{fmt(groupTotal)}</span>
                <button onClick={()=>removeGroup(g.id)} style={{background:"transparent",border:"none",color:P.wine,opacity:.5}}><I.Trash size={14}/></button>
              </div>
            </div>

            {items.map(c=>{
              const subs=c.subs||[];
              const hasSubs=subs.length>0;
              const effAmt=effectiveAmt(c);
              const subsOpen=expandedSubs[c.id];
              return(
                <div key={c.id} style={{borderBottom:"1px solid rgba(0,0,0,.06)"}}>
                  {/* Category row */}
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px"}}>
                    <span style={{width:10,height:10,borderRadius:999,background:c.color,flexShrink:0}}/>
                    <input value={c.name} onChange={e=>updateCat(c.id,{name:e.target.value})} className="bare"
                      style={{flex:1,fontSize:14,minWidth:0,fontWeight:hasSubs?600:400,
                        color:c.trackExpenses===false?P.neuSub:P.neuInk,fontStyle:c.trackExpenses===false?"italic":"normal"}}/>
                    <span className="tnum" style={{fontSize:12,color:P.neuSub,width:44,textAlign:"right",opacity:.75}}>{pct(effAmt).toFixed(2)}%</span>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:11,color:P.neuSub}}>{cur}</span>
                      {hasSubs
                        /* when subs exist, show computed total (read-only style) */
                        ?<span className="tnum" style={{width:88,textAlign:"right",fontSize:14,fontWeight:600,color:P.jade}}>{effAmt.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
                        /* no subs — manual input as before */
                        :<input type="text" inputMode="decimal" value={c.amount} onChange={e=>updateCat(c.id,{amount:e.target.value})}
                          onBlur={e=>updateCat(c.id,{amount:evalMathExpr(e.target.value,0)})}
                          onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}}
                          className="bare tnum" style={{width:88,textAlign:"right",fontSize:14,fontWeight:600,color:P.neuInk}}/>
                      }
                    </div>
                    {/* tracking toggle */}
                    <button onClick={()=>updateCat(c.id,{trackExpenses:c.trackExpenses===false})}
                      title={c.trackExpenses===false?"Re-enable expense tracking for this category":"Exclude this category from expense tracking (one-time transfers, e.g. Savings)"}
                      style={{background:"transparent",border:"none",color:c.trackExpenses===false?P.br:P.neuSub,padding:2,display:"flex",alignItems:"center",opacity:c.trackExpenses===false?1:.5}}>
                      {c.trackExpenses===false?<I.EyeOff size={14}/>:<I.Receipt size={14}/>}
                    </button>
                    {/* sub-toggle button */}
                    <button onClick={()=>toggleSubs(c.id)} title={subsOpen?"Hide sub-items":"Show sub-items"}
                      style={{background:"transparent",border:"none",color:subsOpen?P.jade:P.neuSub,padding:2,display:"flex",alignItems:"center"}}>
                      <I.Chevron size={14} style={{transform:subsOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform .2s"}}/>
                    </button>
                    <button onClick={()=>removeCat(c.id)} style={{background:"transparent",border:"none",color:P.wine,opacity:.4}}><I.X size={15}/></button>
                  </div>

                  {/* Sub-items panel */}
                  {subsOpen&&(
                    <div style={{...neuInset(0),borderRadius:0,padding:"2px 0"}}>
                      {subs.map(sub=>(
                        <div key={sub.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 16px 7px 36px",borderBottom:"1px solid rgba(0,0,0,.05)"}}>
                          {/* indent indicator */}
                          <span style={{width:6,height:6,borderRadius:999,background:P.neuSub,flexShrink:0}}/>
                          <input value={sub.name} onChange={e=>handleSubChange(c.id,sub.id,{name:e.target.value})}
                            className="bare" style={{flex:1,fontSize:13,minWidth:0,color:P.neuInk}}/>
                          <div style={{display:"flex",alignItems:"center",gap:4}}>
                            <span style={{fontSize:11,color:P.neuSub}}>{cur}</span>
                            <input type="text" inputMode="decimal" value={sub.amount} onChange={e=>handleSubChange(c.id,sub.id,{amount:e.target.value})}
                              onBlur={e=>handleSubChange(c.id,sub.id,{amount:evalMathExpr(e.target.value,0)})}
                              onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}}
                              className="bare tnum" style={{width:80,textAlign:"right",fontSize:13,fontWeight:600,color:P.neuInk}}/>
                          </div>
                          <button onClick={()=>handleRemoveSub(c.id,sub.id)} style={{background:"transparent",border:"none",color:P.wine,opacity:.4}}><I.X size={13}/></button>
                        </div>
                      ))}
                      {/* sub total when multiple subs */}
                      {subs.length>1&&(
                        <div style={{display:"flex",justifyContent:"flex-end",padding:"5px 16px 5px 36px",fontSize:12,color:P.neuSub}} className="tnum">
                          Subtotal: {cur} {effAmt.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}
                        </div>
                      )}
                      <button onClick={()=>handleAddSub(c.id)}
                        style={{display:"flex",alignItems:"center",gap:5,padding:"7px 16px 7px 36px",fontSize:13,color:P.jade,background:"transparent",border:"none",width:"100%"}}>
                        <I.Plus size={12}/>Add sub-item
                      </button>
                    </div>
                  )}

                  {/* Quick "add sub-item" link when panel is closed (only shows when no subs yet) */}
                  {!subsOpen&&!hasSubs&&(
                    <div style={{paddingLeft:36,paddingBottom:6,marginTop:-4}}>
                      <button onClick={()=>handleAddSub(c.id)}
                        style={{fontSize:11,color:P.neuSub,background:"transparent",border:"none",padding:"0 0 2px",display:"flex",alignItems:"center",gap:4}}>
                        <I.Plus size={10}/>add sub-items
                      </button>
                    </div>
                  )}
                </div>
              );
            })}

            <button onClick={()=>addCat(g.id)} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.jade,background:"transparent",border:"none"}}>
              <I.Plus size={14}/>Add category
            </button>
          </section>
        );
      })}
      {editable&&(
        <button onClick={addGroup} className="neu-btn" style={{display:"flex",alignItems:"center",gap:6,padding:"8px 14px",fontSize:14,fontWeight:500,color:P.jade}}>
          <I.Plus size={14}/>Add group
        </button>
      )}
    </div>
  );
}

/* ── EXPENSE TRACKER VIEW ── */
function ExpenseTrackerView({data,plans,planForMonth,clonePlanForMonth,assignPlanToMonth,removePlanForMonth,expenses,addExpenseTx,updateExpenseTx,removeExpenseTx,quickTransfer,quickTransferLast,fmt,cur,budgetOwner,setBudgetOwner,isSingle,owners,payPeriods,goals,addContribution,setCatsFor,globalAddTrigger}){
  const usesPayPeriod=ownerUsesPayPeriod(payPeriods,budgetOwner);
  const nowMonth=bucketNow(payPeriods,budgetOwner);
  const[viewMonth,setViewMonth]=useState(nowMonth);
  // when switching owners, OR when pay-period settings finish loading/change,
  // re-anchor to that owner's "now" — see BudgetView for why this also
  // depends on payPeriods, not just budgetOwner.
  useEffect(()=>{setViewMonth(bucketNow(payPeriods,budgetOwner));},[budgetOwner,JSON.stringify(payPeriods)]);
  const[showAdd,setShowAdd]=useState(false);
  const[addMode,setAddMode]=useState("tracked"); // "tracked" | "untracked" | "goals" — unified add-transaction modal routing
  const[editTx,setEditTx]=useState(null); // transaction id being edited, or null for "add" mode
  const[filterCat,setFilterCat]=useState("all");
  const[logGrouping,setLogGrouping]=useState("category"); // "month" | "category"
  const[collapsedCats,setCollapsedCats]=useState({});
  const[collapsedMonths,setCollapsedMonths]=useState({});
  const[showPlanPicker,setShowPlanPicker]=useState(false);
  const[showReorder,setShowReorder]=useState(false);
  const[untrackedOpen,setUntrackedOpen]=useState(false);
  const[logExpanded,setLogExpanded]=useState(false);
  const[cloneSource,setCloneSource]=useState("");
  const[transferModal,setTransferModal]=useState(null); // {catId,name,budget} for quick transfer

  /* neumorphic + glass helpers, scoped to this view (same recipe as BudgetView) */
  const neu=(r=18)=>({background:P.neuBg,borderRadius:r,boxShadow:`7px 7px 15px ${P.neuLo},-7px -7px 15px ${P.neuHi}`});
  const neuInset=(r=14)=>({background:P.neuBg,borderRadius:r,boxShadow:`inset 4px 4px 9px ${P.neuLo},inset -4px -4px 9px ${P.neuHi}`});

  const addMonths=(ym,n)=>bucketShift(ym,payPeriods,budgetOwner,n);
  const fmtMonth=m=>bucketLabel(m,payPeriods,budgetOwner);
  const isFuture=viewMonth>nowMonth;
  const isNow=viewMonth===nowMonth;

  /* which plan applies to the viewed month */
  const monthPlan=planForMonth(viewMonth,budgetOwner);
  const hasOwnPlan=!!(data.monthlyPlans||[]).find(m=>m.month===viewMonth&&m.owner===budgetOwner);

  /* move a category earlier(-1)/later(+1) in the viewed month's plan —
     the transaction log below groups by this same order */
  const moveCat=(catId,dir)=>setCatsFor(monthPlan.id,cats=>{
    const arr=[...cats];
    const i=arr.findIndex(c=>c.id===catId);
    const j=i+dir;
    if(i<0||j<0||j>=arr.length)return arr;
    [arr[i],arr[j]]=[arr[j],arr[i]];
    return arr;
  });

  /* envelopes from the MONTH'S plan (not necessarily the active plan) —
     split into tracked (shown with full progress bars + add transaction)
     and untracked (one-time transfers like Savings, shown as quick-transfer cards) */
  const{envelopes,untrackedEnvelopes}=useMemo(()=>{
    const env=[],untracked=[];
    (monthPlan.groups||[]).forEach(g=>{
      (monthPlan.categories||[]).filter(c=>c.groupId===g.id).forEach(c=>{
        const effAmt=(c.subs||[]).length>0
          ?(c.subs||[]).reduce((s,sub)=>s+(Number(sub.amount)||0),0)
          :Number(c.amount)||0;
        if(effAmt<=0)return;
        const item={id:c.id,name:c.name,group:g.name,budget:effAmt,color:c.color};
        if(c.trackExpenses===false)untracked.push(item);
        else env.push(item);
      });
    });
    return{envelopes:env,untrackedEnvelopes:untracked};
  },[monthPlan]);

  /* all categories (tracked + untracked) for the transaction form's dropdown,
     grouped by their group id so the <optgroup> mapping below is a simple filter */
  const allCatOptions=useMemo(()=>{
    const out=[];
    (monthPlan.groups||[]).forEach(g=>{
      (monthPlan.categories||[]).filter(c=>c.groupId===g.id).forEach(c=>out.push({id:c.id,name:c.name,groupId:g.id,group:g.name,tracked:c.trackExpenses!==false}));
    });
    return out;
  },[monthPlan]);

  const viewMonthExpenses=useMemo(()=>
    expenses.filter(e=>e.date&&(e.owner||'me')===budgetOwner&&bucketKeyFor(e.date,payPeriods,budgetOwner)===viewMonth)
  ,[expenses,viewMonth,budgetOwner,payPeriods]);

  const spentMap=useMemo(()=>{
    const m={};
