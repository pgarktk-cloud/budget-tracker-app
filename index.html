<style>
:root{
  --bg:#E4E7E9;--ink:#15243B;--sub:#56657E;--faint:#8A98AD;
  --line:rgba(34,41,44,.09);--sf:#EEF0F1;--sfA:#DADEE0;
  --gr:#1E6E5C;--grD:#154F42;--grS:#DCEAE5;
  --br:#2E8BB0;--brS:#E0EEF4;--red:#9B4A4E;
  --deep:#15243B;--deepHi:#9DB0CC;
  --neuBg:#E4E7E9;--neuHi:#FFFFFF;--neuLo:#B8C1C5;--neuInk:#22292C;--neuSub:#5C6B70;
  --jade:#1E6E5C;--jadeS:#DCEAE5;--wine:#9B4A4E;--wineS:#F3E2E1;
  --glassBg:rgba(255,255,255,.5);--glassBgStrong:rgba(255,255,255,.68);--glassBorder:rgba(255,255,255,.85);--glassShadow:rgba(34,41,44,.16);--glassHi:rgba(255,255,255,.6);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);transition:background .25s ease;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);-webkit-text-size-adjust:100%;}
.serif{font-family:"Iowan Old Style",Georgia,serif;}
.tnum{font-variant-numeric:tabular-nums;}
input.bare{background:transparent;border:none;outline:none;padding:1px 2px;border-radius:4px;transition:background .12s,box-shadow .12s;font:inherit;color:inherit;}
input.bare:hover{background:rgba(127,143,168,.12);}
input.bare:focus{background:rgba(91,143,217,.12);box-shadow:0 0 0 1px rgba(91,143,217,.4);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
button{cursor:pointer;font:inherit;}
select{font:inherit;}

/* ── Keyframes ── */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes numFlash{0%{opacity:1}30%{opacity:.35}100%{opacity:1}}
@keyframes slideInRight{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
@keyframes sheetDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
@keyframes sheetBgIn{from{opacity:0}to{opacity:1}}

/* ── Top sheet (mobile-first modal alternative) — anchored near the top of
   the viewport so it's visible immediately on open, no scrolling needed,
   and stays clear of the on-screen keyboard which eats the bottom half. ── */
.sheet-bg{
  position:fixed;inset:0;z-index:40;display:flex;align-items:flex-start;justify-content:center;
  background:rgba(21,25,27,.32);
  backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
  animation:sheetBgIn .25s ease both;
  overflow-y:auto;
  padding:calc(env(safe-area-inset-top) + 16px) 12px 16px;
}
.sheet{
  border-radius:20px;padding:18px;
  width:100%;max-width:480px;max-height:calc(100vh - env(safe-area-inset-top) - 32px);overflow-y:auto;
  background:var(--glassBgStrong);
  border:1px solid var(--glassBorder);box-shadow:0 16px 40px var(--glassShadow),inset 0 1px 0 var(--glassHi);
  animation:sheetDown .28s cubic-bezier(.22,1,.36,1) both;
}
.sheet-handle{display:none;}


.spin{animation:spin .9s linear infinite;}
:focus-visible{outline:2px solid var(--gr);outline-offset:1px;}

/* ── Tab content fade ── */
.tab-enter{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both;}
.tab-enter-right{animation:slideInRight .45s cubic-bezier(.22,1,.36,1) both;}
.tab-enter-left{animation:slideInLeft .45s cubic-bezier(.22,1,.36,1) both;}

/* ── Cards / sections fade up on mount ── */
.fade-up{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;}
.fade-up-1{animation:fadeUp .5s .1s cubic-bezier(.22,1,.36,1) both;}
.fade-up-2{animation:fadeUp .5s .2s cubic-bezier(.22,1,.36,1) both;}
.fade-up-3{animation:fadeUp .5s .3s cubic-bezier(.22,1,.36,1) both;}
.fade-up-4{animation:fadeUp .5s .4s cubic-bezier(.22,1,.36,1) both;}
.fade-up-5{animation:fadeUp .5s .5s cubic-bezier(.22,1,.36,1) both;}

/* ── List item appear ── */
.list-item-enter{animation:fadeUp .38s cubic-bezier(.22,1,.36,1) both;}

/* ── Number flash when value changes ── */
.num-flash{animation:numFlash .6s ease both;}

/* ── Modal overlay + panel ── */
.modal-bg{
  position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:16px;
  background:rgba(21,25,27,.32);
  backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
  animation:overlayIn .3s ease both;
}
.modal{
  border-radius:20px;padding:20px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;
  background:var(--glassBgStrong);
  border:1px solid var(--glassBorder);box-shadow:0 16px 40px var(--glassShadow),inset 0 1px 0 var(--glassHi);
  animation:scaleIn .4s cubic-bezier(.22,1,.36,1) both;
}

/* ── Button & interactive transitions ── */
button{transition:opacity .18s,transform .15s,background .22s,color .22s,box-shadow .22s;}
button:active{transform:scale(.96);}
select{transition:background .22s;}

/* ── Progress bars ── */
.bar-animated{transition:width .8s cubic-bezier(.22,1,.36,1);}
.bar-color{transition:background .5s;}

/* ── Neumorphism + liquid-glass (Budget pilot) ──
   Neumorphic surfaces are matte, same hue as their bed, carved via dual
   soft shadows (a light "highlight" + a dark "depth" tint of the same
   stone color — never pure black, which reads cheap). Glass is reserved
   for floating/overlay chrome: translucent, blurred, edge-lit. */
.neu-raised{
  background:var(--neuBg);border-radius:18px;
  box-shadow:7px 7px 15px var(--neuLo),-7px -7px 15px var(--neuHi);
  transition:box-shadow .25s ease;
}
.neu-inset{
  background:var(--neuBg);border-radius:14px;
  box-shadow:inset 4px 4px 9px var(--neuLo),inset -4px -4px 9px var(--neuHi);
}
.neu-btn{
  background:var(--neuBg);border-radius:999px;border:none;color:var(--neuInk);
  box-shadow:4px 4px 9px var(--neuLo),-4px -4px 9px var(--neuHi);
  transition:box-shadow .15s ease,transform .12s ease;
}
.neu-btn:active{
  box-shadow:inset 3px 3px 6px var(--neuLo),inset -3px -3px 6px var(--neuHi);
  transform:scale(.97);
}
.neu-btn.is-active{
  box-shadow:inset 3px 3px 7px var(--neuLo),inset -3px -3px 7px var(--neuHi);
  color:var(--jade);
}
.glass-panel{
  background:var(--glassBg);
  backdrop-filter:blur(16px) saturate(160%);-webkit-backdrop-filter:blur(16px) saturate(160%);
  border:1px solid var(--glassBorder);
  box-shadow:0 10px 26px var(--glassShadow),inset 0 1px 0 var(--glassHi);
  border-radius:20px;
}
.glass-btn{
  background:var(--glassBgStrong);
  backdrop-filter:blur(10px) saturate(160%);-webkit-backdrop-filter:blur(10px) saturate(160%);
  border:1px solid var(--glassBorder);
  box-shadow:0 4px 12px var(--glassShadow),inset 0 1px 0 var(--glassHi);
  border-radius:999px;color:var(--neuInk);
  transition:box-shadow .15s ease,transform .12s ease;
}
.glass-btn:active{transform:scale(.96);}
/* liquid-fill progress: an inset trough (neu-inset) contains this —
   a translucent gradient body with a glassy highlight riding the top,
   like liquid settling in a tube. */
.liquid-fill{
  position:relative;height:100%;border-radius:999px;
  transition:width .8s cubic-bezier(.22,1,.36,1);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.5),inset 0 -6px 10px -4px rgba(0,0,0,.18);
}

/* ── Reduced motion override ── */
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important;}
}

#root{padding-top:env(safe-area-inset-top);}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-family:-apple-system,sans-serif;color:#56657E;font-size:14px;transition:background .25s;}
.loader{width:32px;height:32px;border:3px solid #DADEE0;border-top-color:#1E6E5C;border-radius:50%;animation:spin .8s linear infinite;}
</style>

<script type="text/babel" data-presets="react">
const{useState,useEffect,useMemo,useRef,useCallback}=React;
/* Renders children directly onto document.body instead of in the normal DOM
   tree. Needed for any fixed-position overlay (modals/sheets): tab panes are
   wrapped in an entrance-animation div whose transform never fully clears
   (fill-mode "both" keeps translateX(0) applied after the animation ends),
   which silently turns that div into the containing block for *all*
   position:fixed descendants — so "fixed" modals inside it end up anchored
   to the scrollable page instead of the viewport. Portaling to <body> sidesteps
   that entirely. */
function Portal({children}){
  return ReactDOM.createPortal(children,document.body);
}
const _RC=(typeof Recharts!=='undefined')?Recharts:window.Recharts||{};
const{PieChart,Pie,Cell,ResponsiveContainer,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip}=_RC;

/* ── Animation helpers ── */

/* Flash a DOM node's class briefly when a value changes */
function useFlash(val,ref){
  const prev=useRef(val);
  useEffect(()=>{
    if(prev.current===val){return;}
    prev.current=val;
    const el=ref.current;
    if(!el)return;
    el.classList.remove("num-flash");
    // force reflow so re-adding the class restarts the animation
    void el.offsetWidth;
    el.classList.add("num-flash");
    const t=setTimeout(()=>el.classList.remove("num-flash"),400);
    return()=>clearTimeout(t);
  },[val]);
}

/* Tab direction tracker so we can slide left or right */
const TAB_ORDER=["budget","expenses","household","banks","investments","networth","goals","targets","currency"];
function TabPane({tab,children}){
  const prevTab=useRef(tab);
  const dir=useRef("right");
  if(prevTab.current!==tab){
    const pi=TAB_ORDER.indexOf(prevTab.current);
    const ci=TAB_ORDER.indexOf(tab);
    dir.current=ci>pi?"right":"left";
    prevTab.current=tab;
  }
  const cls=dir.current==="right"?"tab-enter-right":"tab-enter-left";
  return <div key={tab} className={cls}>{children}</div>;
}

/* Staggered fade-up wrapper for a list of items */
function FadeList({items,renderItem,keyFn}){
  return items.map((item,i)=>(
    <div key={keyFn?keyFn(item):i} className={`fade-up-${Math.min(i+1,5)}`}>
      {renderItem(item,i)}
    </div>
  ));
}

/* ── palette ──
   P's properties are mutated in place (not reassigned) when switching themes,
   so every component that reads P.xxx at render time picks up the new value
   without needing prop-drilling or context. */
const PALETTE_LIGHT={bg:"#E4E7E9",ink:"#15243B",sub:"#56657E",faint:"#8A98AD",line:"rgba(34,41,44,.09)",sf:"#EEF0F1",sfA:"#DADEE0",gr:"#1E6E5C",grD:"#154F42",grS:"#DCEAE5",br:"#2E8BB0",brS:"#E0EEF4",red:"#9B4A4E",deep:"#15243B",deepHi:"#9DB0CC",redS:"#F3E2E1",amberS:"#FEF4E8",amber:"#B5651D",
  neuBg:"#E4E7E9",neuHi:"#FFFFFF",neuLo:"#B8C1C5",neuInk:"#22292C",neuSub:"#5C6B70",
  jade:"#1E6E5C",jadeS:"#DCEAE5",jadeD:"#154F42",
  wine:"#9B4A4E",wineS:"#F3E2E1",
  glassBg:"rgba(255,255,255,.5)",glassBgStrong:"rgba(255,255,255,.68)",glassBorder:"rgba(255,255,255,.85)",glassShadow:"rgba(34,41,44,.16)",glassHi:"rgba(255,255,255,.6)"};
const PALETTE_DARK={bg:"#15191B",ink:"#EAF0FA",sub:"#9FB0C8",faint:"#647289",line:"rgba(255,255,255,.09)",sf:"#1E2427",sfA:"#0E1213",gr:"#3FBF9E",grD:"#8FE3CC",grS:"#17322B",br:"#4FA9C7",brS:"#1A323B",red:"#C97177",deep:"#0A1119",deepHi:"#7E93B5",redS:"#3A2224",amberS:"#3A2E18",amber:"#E0A85C",
  neuBg:"#15191B",neuHi:"#232A2D",neuLo:"#060809",neuInk:"#E7ECEC",neuSub:"#93A1A7",
  jade:"#3FBF9E",jadeS:"#17322B",jadeD:"#8FE3CC",
  wine:"#C97177",wineS:"#3A2224",
  glassBg:"rgba(255,255,255,.07)",glassBgStrong:"rgba(255,255,255,.12)",glassBorder:"rgba(255,255,255,.16)",glassShadow:"rgba(0,0,0,.5)",glassHi:"rgba(255,255,255,.18)"};
const P={...PALETTE_LIGHT};
function applyTheme(mode){
  const src=mode==="dark"?PALETTE_DARK:PALETTE_LIGHT;
  Object.keys(src).forEach(k=>{P[k]=src[k];});
  const root=document.documentElement;
  root.style.setProperty("--bg",src.bg);
  root.style.setProperty("--ink",src.ink);
  root.style.setProperty("--sub",src.sub);
  root.style.setProperty("--faint",src.faint);
  root.style.setProperty("--line",src.line);
  root.style.setProperty("--sf",src.sf);
  root.style.setProperty("--sfA",src.sfA);
  root.style.setProperty("--gr",src.gr);
  root.style.setProperty("--grD",src.grD);
  root.style.setProperty("--grS",src.grS);
  root.style.setProperty("--br",src.br);
  root.style.setProperty("--brS",src.brS);
  root.style.setProperty("--red",src.red);
  root.style.setProperty("--deep",src.deep);
  root.style.setProperty("--deepHi",src.deepHi);
  root.style.setProperty("--neuBg",src.neuBg);
  root.style.setProperty("--neuHi",src.neuHi);
  root.style.setProperty("--neuLo",src.neuLo);
  root.style.setProperty("--neuInk",src.neuInk);
  root.style.setProperty("--neuSub",src.neuSub);
  root.style.setProperty("--jade",src.jade);
  root.style.setProperty("--jadeS",src.jadeS);
  root.style.setProperty("--wine",src.wine);
  root.style.setProperty("--wineS",src.wineS);
  root.style.setProperty("--glassBg",src.glassBg);
  root.style.setProperty("--glassBgStrong",src.glassBgStrong);
  root.style.setProperty("--glassBorder",src.glassBorder);
  root.style.setProperty("--glassShadow",src.glassShadow);
  root.style.setProperty("--glassHi",src.glassHi);
  root.setAttribute("data-theme",mode);
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.setAttribute("content",src.bg);
}

/* ── global neumorphic + liquid-glass style helpers ──
   Read P.xxx live, so they always reflect the current theme. Used across
   every view now, not just Budget/Expense Tracker. */
function neu(r=18){return{background:P.neuBg,borderRadius:r,boxShadow:`7px 7px 15px ${P.neuLo},-7px -7px 15px ${P.neuHi}`};}
function neuSm(r=14){return{background:P.neuBg,borderRadius:r,boxShadow:`4px 4px 10px ${P.neuLo},-4px -4px 10px ${P.neuHi}`};}
function neuInset(r=14){return{background:P.neuBg,borderRadius:r,boxShadow:`inset 4px 4px 9px ${P.neuLo},inset -4px -4px 9px ${P.neuHi}`};}
function neuBtnStyle(active){return{background:P.neuBg,borderRadius:999,border:"none",color:active?P.jade:P.neuInk,
  boxShadow:active?`inset 3px 3px 7px ${P.neuLo},inset -3px -3px 7px ${P.neuHi}`:`4px 4px 9px ${P.neuLo},-4px -4px 9px ${P.neuHi}`};}
function glassPanel(r=20){return{background:P.glassBg,backdropFilter:"blur(16px) saturate(160%)",WebkitBackdropFilter:"blur(16px) saturate(160%)",
  border:`1px solid ${P.glassBorder}`,boxShadow:`0 10px 26px ${P.glassShadow}, inset 0 1px 0 ${P.glassHi}`,borderRadius:r};}
function liquidFillBg(color){return `linear-gradient(180deg, rgba(255,255,255,.6) 0%, rgba(255,255,255,.05) 45%, ${color}CC 45%, ${color} 100%)`;}
const SEG_LIGHT=["#2C5FA8","#6FA0D6","#1B3E73","#2E8BB0","#4C6E9C","#8FB4DD","#173B5E","#5BA7C2","#3D5A86","#7E97C4","#2A6F8E","#9DB8D9","#244C7A","#4F8FB0","#6678A8","#87A9CE"];
const SEG_DARK=["#6FA0D6","#8FB4DD","#5BA7C2","#9DB8D9","#4FA9C7","#7E97C4","#87A9CE","#6678A8","#4C6E9C","#2C5FA8","#9FC1ED","#5B8FD9","#3D5A86","#2A6F8E","#1B3E73","#173B5E"];
let SEG=[...SEG_LIGHT];
function applySegTheme(mode){const src=mode==="dark"?SEG_DARK:SEG_LIGHT;SEG.length=0;SEG.push(...src);}

/* ── icons ── */

const MATH_CHARS_RE=/^[0-9+\-*/. ()]+$/;
const evalMathExpr=(raw,fallback=0)=>{
  if(raw==null)return fallback;

  if(s==="")return fallback;

/* ── Pay-period utilities ──────────────────────────────────────────────────
   Pay-periods are an opt-in alternative to calendar-month budgeting, for
   people whose salary lands on a fixed day rather than the 1st. A period is
   identified by a "period key" — the ISO date (YYYY-MM-DD) of its START day
   — so it sorts and compares like any other date string. When pay-periods
   are off for an owner, the rest of the app keeps using plain "YYYY-MM"
   calendar-month keys exactly as before; these utilities are only called
   when `payPeriod.enabled` is true for that owner.

   "payday" = day of month (1-31) salary arrives; the period covering a given
   date runs from that day through the day before the same day next month.
   A payday beyond a short month (e.g. 31 in February) clamps to the last
   actual day of that month, the conventional way to handle this. ───────── */

/* Last valid calendar day of a given year/month (month is 1-12) */
function daysInCalMonth(y,m){return new Date(y,m,0).getDate();}

/* Resolve a payday (1-31) against a specific year/month, clamping to the
   month's last real day so "31" in February becomes that February's 28/29. */
function clampPayday(y,m,payday){return Math.min(Math.max(1,Number(payday)||1),daysInCalMonth(y,m));}

/* Build a Date for the period START that contains `dateStr`, given a payday.
   Returns a plain Date at local midnight. */
function periodStartFor(dateStr,payday){
  const d=new Date(dateStr+"T00:00:00");
  const y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();
  const thisMonthPayday=clampPayday(y,m,payday);
  if(day>=thisMonthPayday){
    return new Date(y,m-1,thisMonthPayday);
  }
  // falls before this month's payday → belongs to the period that started last month
  const py=m===1?y-1:y, pm=m===1?12:m-1;
  return new Date(py,pm-1,clampPayday(py,pm,payday));
}

/* The period KEY (YYYY-MM-DD of the period's start) containing a given date */
function periodKeyFor(dateStr,payday){
  const start=periodStartFor(dateStr,payday);
  return`${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,"0")}-${String(start.getDate()).padStart(2,"0")}`;
}

/* {start,end} Date objects (inclusive) for the period identified by a key */
function periodRange(periodKey,payday){
  let[y,m,d]=(periodKey||"").split("-").map(Number);
  if(!y||!m||!d){
    // Malformed or stale key — e.g. a calendar-month key ("YYYY-MM") briefly
    // passed in for one render right as pay-periods finish loading/turn on,
    // before the owning view's re-anchoring effect has run. Falling back to
    // the period containing today (instead of building an Invalid Date,
    // which throws once it hits toLocaleDateString) is what was producing
    // the stuck "Invalid Date" budget header.
    [y,m,d]=periodKeyFor(todayISO(),payday).split("-").map(Number);
  }
  const start=new Date(y,m-1,d);
  const nextY=m===12?y+1:y, nextM=m===12?1:m+1;
  const nextPayday=clampPayday(nextY,nextM,payday);
  const end=new Date(nextY,nextM-1,nextPayday-1);
  return{start,end};
}

/* Number of days in a period (inclusive of both ends) */
function periodLength(periodKey,payday){
  const{start,end}=periodRange(periodKey,payday);
  return Math.round((end-start)/86400000)+1;
}

/* Step a period key forward/back n periods */
function shiftPeriod(periodKey,payday,n){
  let key=periodKey;
  if(n>0){for(let i=0;i<n;i++){const{end}=periodRange(key,payday);const next=new Date(end);next.setDate(next.getDate()+1);key=periodKeyFor(`${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,"0")}-${String(next.getDate()).padStart(2,"0")}`,payday);}}
  else if(n<0){for(let i=0;i<-n;i++){const{start}=periodRange(key,payday);const prevDay=new Date(start);prevDay.setDate(prevDay.getDate()-1);key=periodKeyFor(`${prevDay.getFullYear()}-${String(prevDay.getMonth()+1).padStart(2,"0")}-${String(prevDay.getDate()).padStart(2,"0")}`,payday);}}
  return key;
}

/* Human label for a period: "Jun 28 – Jul 27, 2026" */
function periodLabel(periodKey,payday){
  const{start,end}=periodRange(periodKey,payday);
  const sameYear=start.getFullYear()===end.getFullYear();
  const startStr=start.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  if(sameYear){
    const endStr=end.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    return`${startStr} – ${endStr}, ${end.getFullYear()}`;
  }
  // crosses a year boundary: show both years explicitly, e.g. "Dec 28, 2025 – Jan 27, 2026"
  const startWithYear=start.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const endWithYear=end.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  return`${startWithYear} – ${endWithYear}`;
}

/* Today's date as YYYY-MM-DD, local time */
function todayISO(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}

/* ── Unified period helpers — these are what views actually call.
   They check the owner's payPeriod settings and transparently fall back to
   plain calendar-month bucketing ("YYYY-MM") when pay-periods are off,
   so existing calendar-month logic and stored data are untouched. ───────── */
function ownerUsesPayPeriod(payPeriods,owner){
  const cfg=(payPeriods||{})[owner];
  return!!(cfg&&cfg.enabled&&cfg.payday);
}
function bucketKeyFor(dateStr,payPeriods,owner){
  const cfg=(payPeriods||{})[owner];
  if(cfg&&cfg.enabled&&cfg.payday)return periodKeyFor(dateStr,cfg.payday);
  return(dateStr||"").slice(0,7);
}
function bucketLabel(bucketKey,payPeriods,owner){
  const cfg=(payPeriods||{})[owner];
  if(cfg&&cfg.enabled&&cfg.payday)return periodLabel(bucketKey,cfg.payday);
  const[y,mo]=bucketKey.split("-");
  return new Date(Number(y),Number(mo)-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
}
function bucketShift(bucketKey,payPeriods,owner,n){
  const cfg=(payPeriods||{})[owner];
  if(cfg&&cfg.enabled&&cfg.payday)return shiftPeriod(bucketKey,cfg.payday,n);
  const[y,m]=bucketKey.split("-").map(Number);
  const d=new Date(y,m-1+n,1);
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}
function bucketNow(payPeriods,owner){
  return bucketKeyFor(todayISO(),payPeriods,owner);
}
/* Days elapsed / total in the CURRENT bucket, for burn-rate projections.
   For calendar months this is identical to the old daysInMonth/dayOfMonth
   logic; for pay-periods it uses the period's actual start/end. */
function bucketProgress(bucketKey,payPeriods,owner){
  const cfg=(payPeriods||{})[owner];
  if(cfg&&cfg.enabled&&cfg.payday){
    const{start,end}=periodRange(bucketKey,cfg.payday);
    const total=periodLength(bucketKey,cfg.payday);
    const now=new Date();now.setHours(0,0,0,0);
    const elapsed=Math.max(1,Math.min(total,Math.round((now-start)/86400000)+1));
    return{elapsed,total};
  }
  const[y,m]=bucketKey.split("-").map(Number);
  const total=daysInCalMonth(y,m);
  const elapsed=new Date().getDate();
  return{elapsed,total};
}

    const syms=tickers.map(toYahooSym).join(",");
    try{
      const r=await fetch(`${PROXY_URL}/quote?symbols=${encodeURIComponent(syms)}`);
      if(r.ok){
        const j=await r.json();
        Object.entries(j).forEach(([sym,price])=>{
          if(price>0)out[baseKey(sym)]=price;
        });
      }
    }catch(e){}
  }

  /* ── 2. Finnhub direct (US, real-time, no proxy needed) ── */
  if(!FINNHUB_KEY.startsWith("PASTE_")){
    const missing=tickers.filter(t=>!out[baseKey(t)]);
    await Promise.all(missing.map(async t=>{
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(baseKey(t))}&token=${FINNHUB_KEY}`);
        if(!r.ok)return;
        const j=await r.json();
        const p=j.c>0?j.c:(j.pc>0?j.pc:null);
        if(p)out[baseKey(t)]=p;
      }catch(e){}
    }));
  }

  if(Object.keys(out).length===0)throw new Error("no quotes");
  return out;
}

/* ── Projection helper ── */
function projectSeries(start,monthly,years,annualPct){
  const r=annualPct/100/12;const out=[];
  for(let y=0;y<=years;y++){
    const m=y*12;
    const fv=r===0?start+monthly*m:start*Math.pow(1+r,m)+monthly*((Math.pow(1+r,m)-1)/r);
    out.push(Math.round(fv));
  }
  return out;
}

/* ── Target forecast: simulate invested + cash pools growing at separate
   conservative rates. Each category's monthly amount is routed to whichever
   pool the person tagged it as (invest vs cash) — a "GoTrade" contribution
   compounds at the invest rate, a "Seabank/time-deposit" contribution
   compounds at the cash rate. Returns a month-by-month series plus the
   first month the total crosses the target, or null if it doesn't within
   30 years. ── */
function computeTargetForecast(startInvest,startCash,monthlyInvest,monthlyCash,investRatePct,cashRatePct,targetAmount){
  const rInv=(Number(investRatePct)||0)/100/12,rCash=(Number(cashRatePct)||0)/100/12;
  let inv=Number(startInvest)||0,cash=Number(startCash)||0;
  const MAX_MONTHS=360;
  const series=[];let hitMonth=null;
  for(let m=0;m<=MAX_MONTHS;m++){
    const total=inv+cash;
    if(hitMonth===null&&targetAmount>0&&total>=targetAmount)hitMonth=m;
    if(m%3===0||m===MAX_MONTHS||m===hitMonth)series.push({m,total:Math.round(total)});
    if(hitMonth!==null&&m>=hitMonth)break;
    inv=inv*(1+rInv)+(Number(monthlyInvest)||0);
    cash=cash*(1+rCash)+(Number(monthlyCash)||0);
  }
  return{series,hitMonth};
}

/* ── Compute holding stats from trade log ── */
function holdingStats(trades=[]){
  let shares=0,cost=0;
  (trades||[]).forEach(tr=>{
    const s=Number(tr.shares)||0,p=Number(tr.price)||0;
    if(tr.type==="buy"){shares+=s;cost+=s*p;}
    else if(tr.type==="sell"){
      const avgBefore=shares>0?cost/shares:0;
      shares=Math.max(0,shares-s);
      cost=shares*avgBefore;
    }
  });
  const avgCost=shares>0?cost/shares:0;
  return{shares,avgCost,totalCost:cost};
}

/* ── Liability remaining balance (auto-decrements by month) ── */
function liabilityBalance(liab){
  if(!liab.installment)return Number(liab.value)||0;
  const{monthly,monthsRemaining,asOfDate}=liab;
  if(!monthly||!monthsRemaining||!asOfDate)return Number(liab.value)||0;
  const now=new Date();
  const ref=new Date(asOfDate);
  const elapsed=Math.max(0,(now.getFullYear()-ref.getFullYear())*12+(now.getMonth()-ref.getMonth()));
  const remaining=Math.max(0,monthsRemaining-elapsed);
  return(Number(monthly)||0)*remaining;
}

function migrate(d){
  if(!d||typeof d!=="object")return defaultData();
  if(!d.owners)d.owners={me:"Me",wife:"My wife"};
  // migrate activePlanId from string to {me, wife}
  if(typeof d.activePlanId==="string"){
    const oldId=d.activePlanId;
    d.activePlanId={me:oldId,wife:null};
    // create a blank wife plan if none exists
    if(!(d.plans||[]).find(p=>p.owner==="wife")){
      const wid=uid();
      d.plans=[...(d.plans||[]),{id:wid,owner:"wife",name:"Monthly Salary",
        month:monthLabel(),income:0,
        groups:[{id:uid(),name:"Savings"},{id:uid(),name:"Essentials"},{id:uid(),name:"Personal"}],
        categories:[]}];
      d.activePlanId.wife=wid;
    }
  }
  if(!d.activePlanId||typeof d.activePlanId!=="object")d.activePlanId={me:(d.plans||[])[0]?.id,wife:null};
  // ensure all plans have an owner
  (d.plans||[]).forEach(p=>{if(!p.owner)p.owner="me";});
  // ensure wife activePlanId points to a real plan
  if(!d.activePlanId.wife){
    const wifePlan=(d.plans||[]).find(p=>p.owner==="wife");
    if(wifePlan)d.activePlanId.wife=wifePlan.id;
  }
  // ensure expenses have owner + split name/note (old data had a single "name" field
  // used as the transaction title; keep that as-is for `name`, add empty `note`)
  (d.expenses||[]).forEach(e=>{
    if(!e.owner)e.owner="me";
    if(e.note===undefined)e.note="";
    if(!e.updatedAt)e.updatedAt=e.date?`${e.date}T00:00:00.000Z`:new Date().toISOString();
  });
  // ensure monthlyPlans have owner
  (d.monthlyPlans||[]).forEach(m=>{if(!m.owner)m.owner="me";});
  (d.banks||[]).forEach(b=>{if(!b.owner)b.owner="me";});
  (d.goals||[]).forEach(g=>{
    if(!g.owner)g.owner="me";
    if(!g.type)g.type="savings";
    // migrate old saved→contributions
    if(g.saved!==undefined&&!g.contributions){
      g.contributions=[{id:uid(),date:new Date().toISOString().slice(0,10),amount:g.saved,note:"Migrated balance"}];
      delete g.saved;
    }
    if(!g.contributions)g.contributions=[];
    // Phase 3.1 — which currency this goal is saved *in*; existing goals
    // default to the account's base currency (no conversion, just a label)
    if(!g.currency)g.currency=d.currency||"SAR";
  });
  (d.plans||[]).forEach(plan=>{
    (plan.categories||[]).forEach(c=>{
      if(!c.subs)c.subs=[];
      // default every category to tracked unless explicitly marked otherwise,
      // so existing budgets behave exactly as before this feature shipped
      if(c.trackExpenses===undefined)c.trackExpenses=true;
    });
  });
  (d.investments||[]).forEach(inv=>{
    // migrate old shares/avgCost→trades
    if(!inv.trades){
      const s=Number(inv.shares)||0,a=Number(inv.avgCost)||0;
      inv.trades=s>0?[{id:uid(),date:new Date().toISOString().slice(0,10),type:"buy",shares:s,price:a}]:[];
      delete inv.shares;delete inv.avgCost;
    }
  });
  (d.assets||[]).forEach(a=>{
    if(a.kind==="liability"&&!a.installment){a.installment=false;}
  });
  if(!d.livePrice)d.livePrice={};
  if(!d.portHistory)d.portHistory=[];
  if(!d.expenses)d.expenses=[];
  if(!d.monthlyPlans)d.monthlyPlans=[];
  if(!d.theme)d.theme="light";
  if(!d.payPeriods)d.payPeriods={me:{enabled:false,payday:28},wife:{enabled:false,payday:1}};
  if(!d.payPeriods.me)d.payPeriods.me={enabled:false,payday:28};
  if(!d.payPeriods.wife)d.payPeriods.wife={enabled:false,payday:1};
  if(!d.quickTransferLast)d.quickTransferLast={};
  if(!d.netWorthAutoHistory)d.netWorthAutoHistory=[];
  if(!d.targets)d.targets=[];
  if(!d.investTarget)d.investTarget={};
  // migrate old single shared shape {thresholdPct,groupNames} to per-owner {me:{...},wife:{...}}
  if(d.investTarget.thresholdPct!==undefined||d.investTarget.groupNames!==undefined){
    d.investTarget={me:{thresholdPct:d.investTarget.thresholdPct||20,groupNames:d.investTarget.groupNames||[]},wife:{thresholdPct:20,groupNames:[]}};
  }
  if(!d.investTarget.me)d.investTarget.me={thresholdPct:20,groupNames:[]};
  if(!d.investTarget.wife)d.investTarget.wife={thresholdPct:20,groupNames:[]};
  (d.targets||[]).forEach(t=>{
    if(!t.categoryAlloc){
      // migrate old flat categoryIds (everything treated as "cash") into the
      // new destination-tagged map so nothing silently resets
      t.categoryAlloc={};
      (t.categoryIds||[]).forEach(id=>{t.categoryAlloc[id]="cash";});
    }
    delete t.categoryIds;
    if(t.investRate===undefined)t.investRate=4;   // conservative default, user-editable
    if(t.cashRate===undefined)t.cashRate=1;        // conservative default, user-editable
    if(!t.currency)t.currency=d.currency||"SAR";
    if(!t.color)t.color=P.gr;
  });
  return d;
}

/* ── Cloudflare KV Sync ──────────────────────────────────────────────────────
   Multi-tenant: every request is authenticated with the signed-in user's
   Supabase JWT (session.access_token), sent as a standard bearer token.
   The Worker verifies the signature and scopes storage to that user's id —
   there is no shared static secret anymore. The Worker URL is set above as
   PROXY_URL. Callers must pass the current access_token into load()/save().
   ─────────────────────────────────────────────────────────────────────────── */
const KVSync={
  lastPulledAt:null,
  _ready(){return !PROXY_URL.startsWith("PASTE_");},
  _headers(token){return{"Content-Type":"application/json","Authorization":`Bearer ${token}`};},
  async load(token){
    if(!this._ready()||!token)return null;
    const r=await fetch(`${PROXY_URL}/sync`,{headers:this._headers(token)});
    if(!r.ok)return null;
    const j=await r.json();
    if(j.savedAt)this.lastPulledAt=j.savedAt;
    return j.data||null;
  },
  async save(data,token){
    if(!this._ready()||!token)return{ok:false,reason:"not configured"};
    const body=JSON.stringify({data,savedAt:new Date().toISOString(),lastPulledAt:this.lastPulledAt});
    const r=await fetch(`${PROXY_URL}/sync`,{method:"POST",headers:this._headers(token),body});
    if(!r.ok)return{ok:false,reason:`HTTP ${r.status}`};
    const j=await r.json();
    if(j.savedAt)this.lastPulledAt=j.savedAt;
    return j;
  },
  async checkMeta(token){
    if(!this._ready()||!token)return null;
    const r=await fetch(`${PROXY_URL}/sync/meta`,{headers:this._headers(token)});
    if(!r.ok)return null;
    return await r.json();
  },
};

/* ── Local-first sync metadata ──────────────────────────────────────────────
   Local-only bookkeeping about the sync state itself (never sent to the
   cloud, never mixed into the financial dataset). Kept in its own
   localStorage key so closing/reopening the app doesn't lose track of
   whether this device has unsaved work. ─────────────────────────────────── */
const SYNC_META_KEY="salaryPlanner:v3:syncMeta";
const PRE_CLOUD_BACKUP_KEY="salaryPlanner:v3:preCloudRestore";
const PROFILE_KEY="allocation:preferredProfile";

const fingerprint=d=>{try{return JSON.stringify(d);}catch(e){return "";}};

/* union transactions by id; on overlap, newer updatedAt wins. Deletes are
   tombstones (deletedAt set on the record), so they merge like any other
   edit — no separate delete-handling needed. */
function mergeExpenseArrays(localExp,remoteExp){
  const map=new Map();
  (localExp||[]).forEach(e=>map.set(e.id,e));
  (remoteExp||[]).forEach(re=>{
    const le=map.get(re.id);
    if(!le){map.set(re.id,re);return;}
    const lt=le.updatedAt||le.date||"";
    const rt=re.updatedAt||re.date||"";
    map.set(re.id,rt>lt?re:le);
  });
  return Array.from(map.values());
}
/* Auto-reconcile local vs remote when ONLY the expenses array differs.
   Returns the merged data (no modal needed) or null if something else
   (plans/goals/settings) also diverged, so the caller falls back to
   the conflict modal — with expenses already merged either way. */
function tryAutoMergeExpenses(local,remote){
  const merged=mergeExpenseArrays(local.expenses,remote.expenses);
  if(fingerprint({...local,expenses:[]})===fingerprint({...remote,expenses:[]})){
    return{...local,expenses:merged};
  }
  return null;
}

const loadSyncMeta=()=>{
  try{
    const raw=localStorage.getItem(SYNC_META_KEY);
    if(raw)return JSON.parse(raw);
  }catch(e){}
  return{hasUnsyncedChanges:false,lastCloudSavedAt:null,lastCloudPulledAt:null,lastCloudSnapshot:null,changesSinceSave:0};
};
const saveSyncMeta=m=>{try{localStorage.setItem(SYNC_META_KEY,JSON.stringify(m));}catch(e){}};
