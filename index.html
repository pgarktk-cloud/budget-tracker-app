    viewMonthExpenses.forEach(e=>{m[e.catId]=(m[e.catId]||0)+e.amount;});
    return m;
  },[viewMonthExpenses]);

  /* funded map — how much has been transferred into each untracked category this month */
  const fundedMap=spentMap; // same underlying transaction log, just interpreted differently per category

  const totalBudget=envelopes.reduce((s,e)=>s+e.budget,0);
  const totalSpent=envelopes.reduce((s,e)=>s+(spentMap[e.id]||0),0);
  const totalLeft=totalBudget-totalSpent;

  /* salary remaining — income minus EVERY logged transaction (tracked + untracked),
     since untracked transfers (Savings, Investment) still consume real salary. */
  const totalIncome=Number(monthPlan.income)||0;
  const totalLoggedAllCats=viewMonthExpenses.reduce((s,e)=>s+e.amount,0);
  const totalUnallocatedOrUntransferred=totalIncome-totalLoggedAllCats;

  const statusColor=(spent,budget)=>{
    if(budget===0)return P.sub;
    const r=spent/budget;
    if(r>=1)return P.red;
    if(r>=0.8)return"#E07B2A";
    return P.gr;
  };
  const statusBg=(spent,budget)=>{
    if(budget===0)return P.sfA;
    const r=spent/budget;
    if(r>=1)return P.redS;
    if(r>=0.8)return P.amberS;
    return P.sfA;
  };
  
  /* pace-vs-calendar flag — only fires in the "on track" green zone
     (spend<80%), when spend ratio is already outrunning elapsed-days ratio */
  const paceHot=(spent,budget,expectedRatio)=>{
    if(budget<=0||expectedRatio==null)return false;
    const r=spent/budget;
    return r<0.8&&r>expectedRatio;
  };

  /* default transaction date for the currently viewed bucket — the bucket's
     own start date when using pay-periods (viewMonth IS that date already),
     or the 1st of the calendar month otherwise */
  const defaultDateForBucket=isNow?todayISO():(usesPayPeriod?viewMonth:viewMonth+"-01");

  const blankForm={catId:"",goalId:"",name:"",note:"",amount:"",date:defaultDateForBucket};
  const[form,setForm]=useState(blankForm);
  useEffect(()=>{if(!editTx)setForm(f=>({...f,date:defaultDateForBucket}));},[viewMonth]);

  /* active goals for this owner — used by the "Goals" mode of the unified add-transaction modal */
  const ownerGoals=useMemo(()=>(goals||[]).filter(g=>g.owner===budgetOwner),[goals,budgetOwner]);

  /* recurring-name memory: previously used transaction names, most recent first,
     scoped to this owner so suggestions stay relevant */
  const recentNames=useMemo(()=>{
    const seen=new Map();
    [...expenses].filter(e=>(e.owner||'me')===budgetOwner&&e.name&&!e.isTransfer)
      .sort((a,b)=>(b.date||"").localeCompare(a.date||""))
      .forEach(e=>{if(!seen.has(e.name))seen.set(e.name,e.catId);});
    return[...seen.keys()].slice(0,40);
  },[expenses,budgetOwner]);
  /* names filtered to the currently selected category, falling back to all names */
  const nameSuggestions=useMemo(()=>{
    if(!form.catId)return recentNames.slice(0,8);
    const scoped=[...expenses].filter(e=>(e.owner||'me')===budgetOwner&&e.catId===form.catId&&e.name&&!e.isTransfer)
      .sort((a,b)=>(b.date||"").localeCompare(a.date||""));
    const seen=new Set();const out=[];
    scoped.forEach(e=>{if(!seen.has(e.name)){seen.add(e.name);out.push(e.name);}});
    return out.slice(0,8);
  },[expenses,budgetOwner,form.catId,recentNames]);

  const openAdd=(presetCatId)=>{
    setEditTx(null);
    setAddMode("tracked");
    setForm({...blankForm,catId:presetCatId||"",date:defaultDateForBucket});
    setShowAdd(true);
  };
  // Global FAB (in App) bumps globalAddTrigger to ask us to open the add-transaction
  // modal from wherever the user was. Trigger starts at 0 (falsy), so the initial
  // mount is a no-op — only real bumps (1,2,3...) fire this.
  useEffect(()=>{if(globalAddTrigger)openAdd();},[globalAddTrigger]);
  const openEdit=(tx)=>{
    setEditTx(tx.id);
    setAddMode("tracked"); // edits always go through the tracked flow — transfers/goal contributions aren't editable here
    setForm({catId:tx.catId,goalId:"",name:tx.name||"",note:tx.note||"",amount:String(tx.amount),date:tx.date});
    // jump the month/period navigator to the transaction's own bucket so the
    // category dropdown reflects whichever plan was active for that bucket
    const txBucket=tx.date?bucketKeyFor(tx.date,payPeriods,budgetOwner):"";
    if(txBucket&&txBucket!==viewMonth)setViewMonth(txBucket);
    setShowAdd(true);
  };
  const closeForm=()=>{setShowAdd(false);setEditTx(null);};

  const submitTx=()=>{
    if(editTx){
      if(!form.catId||!form.name||!form.amount)return;
      updateExpenseTx(editTx,{catId:form.catId,name:form.name,note:form.note,amount:evalMathExpr(form.amount,Number(form.amount)||0),date:form.date});
      closeForm();
      return;
    }
    const amt=evalMathExpr(form.amount,Number(form.amount)||0);
    if(!amt)return;
    if(addMode==="tracked"){
      if(!form.catId||!form.name)return;
      addExpenseTx(form.catId,form.name,form.note,amt,form.date,budgetOwner);
    }else if(addMode==="untracked"){
      if(!form.catId)return;
      const env=untrackedEnvelopes.find(e=>e.id===form.catId);
      quickTransfer(form.catId,form.name||env?.name||"",amt,form.date,budgetOwner);
    }else if(addMode==="goals"){
      if(!form.goalId)return;
      const goal=ownerGoals.find(g=>g.id===form.goalId);
      // deduct from salary/budget as a transfer, same as an untracked category…
      addExpenseTx(form.goalId,form.name||(goal?`${goal.name} (goal)`:"Goal contribution"),form.note,amt,form.date,budgetOwner,true);
      // …and route the money into the goal's own progress
      addContribution(form.goalId,amt,form.note);
    }
    closeForm();
  };

  /* transaction log grouped by bucket (calendar month or pay period) */
  const ownerExpenses=expenses.filter(e=>(e.owner||'me')===budgetOwner);
  const allFiltered=filterCat==="all"?[...ownerExpenses]:ownerExpenses.filter(e=>e.catId===filterCat);
  const byMonth={};
  allFiltered.forEach(tx=>{
    if(!tx.date)return;
    const mo=bucketKeyFor(tx.date,payPeriods,budgetOwner);
    if(!byMonth[mo])byMonth[mo]=[];
    byMonth[mo].push(tx);
  });
  const allMonths=Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));

  /* transaction log grouped by category name — names (not raw catId) are the
     grouping key because each month/pay-period can carry its own cloned plan
     with brand-new category ids, so the same conceptual category ("Groceries")
     may have a different id per bucket. Falls back to a "Goals" pseudo-group
     for goal-contribution transfers (logged with the goal's id as catId), and
     finally to the transaction's own title for entries whose category can no
     longer be found (e.g. a category that was later deleted from that
     bucket's plan). */
  const GOALS_GROUP_COLOR=P.gr;
  const byCategory={};
  allFiltered.forEach(tx=>{
    if(!tx.date)return;
    const mo=bucketKeyFor(tx.date,payPeriods,budgetOwner);
    const moPlan=planForMonth(mo);
    const cat=(moPlan.categories||[]).find(c=>c.id===tx.catId);
    let name,color;
    if(cat){name=cat.name;color=cat.color;}
    else if((goals||[]).some(g=>g.id===tx.catId)){name="Goals";color=GOALS_GROUP_COLOR;}
    else{name="Uncategorized";color=P.faint;}
    if(!byCategory[name])byCategory[name]={name,color,txs:[],total:0};
    byCategory[name].txs.push(tx);
    byCategory[name].total+=tx.amount;
  });
  /* order the log's category sections to match the viewed month's plan
     order (as controlled by "Reorder categories" below); groups that don't
     correspond to a live plan category (Goals, Uncategorized) sort after,
     by total spent */
  const catOrderIndex=useMemo(()=>{
    const idx={};
    (monthPlan.categories||[]).forEach((c,i)=>{idx[c.name]=i;});
    return idx;
  },[monthPlan]);
  const categoryGroups=Object.values(byCategory).sort((a,b)=>{
    const ai=catOrderIndex[a.name],bi=catOrderIndex[b.name];
    if(ai!=null&&bi!=null)return ai-bi;
    if(ai!=null)return -1;
    if(bi!=null)return 1;
    return b.total-a.total;
  });

  /* shared row renderer — used by both the month-grouped and
     category-grouped transaction log so the two stay visually identical */
  const renderTxRow=(tx,idx,total)=>{
    const mo=bucketKeyFor(tx.date,payPeriods,budgetOwner);
    const moPlan=planForMonth(mo);
    const env=(moPlan.categories||[]).find(c=>c.id===tx.catId);
    const goal=!env?(goals||[]).find(g=>g.id===tx.catId):null;
    const dotColor=env?.color||(goal?GOALS_GROUP_COLOR:P.faint);
    const subLabel=env?env.name:goal?goal.name:"";
    return(
      <div key={tx.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",
        borderBottom:idx<total-1?"1px solid rgba(0,0,0,.06)":"none"}}>
        <div style={{width:8,height:8,borderRadius:999,
          background:dotColor,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:500,color:P.neuInk,
            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"flex",alignItems:"center",gap:6}}>
            {tx.name}
            {tx.isTransfer&&<span style={{fontSize:9,fontWeight:700,color:P.br,background:P.brS,borderRadius:999,padding:"1px 6px",flexShrink:0}}>TRANSFER</span>}
          </div>
          <div style={{fontSize:11,color:P.neuSub,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
            {tx.date}{subLabel?` · ${subLabel}`:""}{tx.note?` · ${tx.note}`:""}
          </div>
        </div>
        <span className="tnum" style={{fontSize:14,fontWeight:600,color:P.neuInk}}>{fmt(tx.amount)}</span>
        <button onClick={()=>openEdit(tx)}
          style={{background:"transparent",border:"none",color:P.jade,opacity:.6}}>
          <I.Edit size={13}/>
        </button>
        <button onClick={()=>removeExpenseTx(tx.id)}
          style={{background:"transparent",border:"none",color:P.wine,opacity:.5}}>
          <I.X size={14}/>
        </button>
      </div>
    );
  };

  /* budget-vs-actual trend: trailing 3 buckets (excluding the viewed one)
     average spend per tracked envelope, to flag categories running hot or cold */
  const trendByCat=useMemo(()=>{
    const out={};
    const priorMonths=[addMonths(viewMonth,-1),addMonths(viewMonth,-2),addMonths(viewMonth,-3)];
    envelopes.forEach(env=>{
      const vals=priorMonths.map(mo=>
        expenses.filter(e=>(e.owner||'me')===budgetOwner&&e.catId===env.id&&e.date&&bucketKeyFor(e.date,payPeriods,budgetOwner)===mo)
          .reduce((s,e)=>s+e.amount,0)
      );
      const have=vals.filter(v=>v>0);
      out[env.id]={avg:have.length?have.reduce((a,b)=>a+b,0)/have.length:null,vals:vals.reverse()};
    });
    return out;
  },[envelopes,expenses,budgetOwner,viewMonth,payPeriods]);

  /* burn-rate depletion projection for the viewed bucket (only meaningful for
     the current bucket, where "days elapsed" has real significance) */
  const{elapsed:dayOfMonth,total:daysInMonth}=isNow
    ?bucketProgress(viewMonth,payPeriods,budgetOwner)
    :{elapsed:isFuture?0:9999,total:bucketProgress(viewMonth,payPeriods,budgetOwner).total};
  const burnFor=(env)=>{
    const spent=spentMap[env.id]||0;
    if(dayOfMonth<=0||env.budget<=0)return null;
    const dailyRate=spent/dayOfMonth;
    if(dailyRate<=0)return{onPace:true,depleteDay:null,dailyRate:0};
    const depleteDay=Math.ceil(env.budget/dailyRate);
    const onPace=depleteDay>=daysInMonth;
    let depleteDate=null;
    if(!onPace){
      const{start}=usesPayPeriod?periodRange(viewMonth,(payPeriods||{})[budgetOwner]?.payday||1):{start:(()=>{const[y,mo]=viewMonth.split("-").map(Number);return new Date(y,mo-1,1);})()};
      depleteDate=new Date(start);
      depleteDate.setDate(depleteDate.getDate()+Math.min(depleteDay,daysInMonth)-1);
    }
    return{onPace,depleteDay,depleteDate,dailyRate};
  };

  /* handle clone/assign */
  const handleCreatePlan=()=>{
    const sourceId=cloneSource||(ownerPlans[0]?.id||plans[0]?.id||"");
    if(sourceId)clonePlanForMonth(viewMonth,sourceId,budgetOwner,fmtMonth(viewMonth));
    setShowPlanPicker(false);
    setCloneSource("");
  };
  const handleAssignExisting=(pid)=>{
    assignPlanToMonth(viewMonth,pid,budgetOwner);
    setShowPlanPicker(false);
  };

  /* owner's plans for the plan picker */
  const ownerPlans=(plans||[]).filter(p=>p.owner===budgetOwner);

  return(
    <div style={{background:P.neuBg,borderRadius:24,padding:"14px 12px 18px",margin:"0 -4px",transition:"background .25s ease"}}>
      {/* ── owner toggle (couple accounts only) ── */}
      {!isSingle&&<OwnerToggle owner={budgetOwner} setOwner={setBudgetOwner} owners={owners}/>}

      {/* ── month navigator (glass) ── */}
      <div className="glass-panel" style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,padding:"10px 14px"}}>
        <button className="glass-btn" onClick={()=>setViewMonth(m=>addMonths(m,-1))}
          style={{padding:"4px 10px",fontSize:18,lineHeight:1}}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:P.ink}}>{fmtMonth(viewMonth)}</div>
          <div style={{fontSize:11,fontWeight:600,marginTop:1,
            color:isFuture?P.br:isNow?P.jade:P.faint}}>
            {isFuture?"Planning ahead":isNow?(usesPayPeriod?"Current pay period":"Current month"):(usesPayPeriod?"Past pay period":"Past month")}
          </div>
        </div>
        <button className="glass-btn" onClick={()=>setViewMonth(m=>addMonths(m,1))}
          style={{padding:"4px 10px",fontSize:18,lineHeight:1}}>›</button>
        {viewMonth!==nowMonth&&(
          <button className="glass-btn" onClick={()=>setViewMonth(nowMonth)}
            style={{padding:"4px 10px",fontSize:12,fontWeight:600,color:P.jade}}>
            Today
          </button>
        )}
      </div>

      {/* ── monthly plan banner ── */}
      <div style={{...neu(14),padding:"12px 14px",marginBottom:12,
        display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:600,color:hasOwnPlan?P.jade:P.neuSub}}>
            {hasOwnPlan?`📋 ${monthPlan.name}`:"📋 Using default plan"}
          </div>
          <div style={{fontSize:11,color:hasOwnPlan?P.jade:P.neuSub,marginTop:2,opacity:.85}}>
            {hasOwnPlan
              ?`Income: ${cur} ${(monthPlan.income||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})} · Custom budget for ${fmtMonth(viewMonth)}`
              :`Showing allocations from "${monthPlan.name}". Create a custom plan for ${fmtMonth(viewMonth)} to set a different income or allocation.`
            }
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0}}>
          {hasOwnPlan
            ?<button onClick={()=>removePlanForMonth(viewMonth,budgetOwner)} className="neu-btn"
                style={{fontSize:11,padding:"5px 12px",color:P.wine,fontWeight:500}}>
                Remove
              </button>
            :<button onClick={()=>{setCloneSource(plans[0]?.id||"");setShowPlanPicker(true);}} className="neu-btn"
                style={{fontSize:11,padding:"5px 12px",color:P.jade,fontWeight:600}}>
                + Create plan
              </button>
          }
        </div>
      </div>

      {/* ── remaining-to-allocate / untransferred salary ── */}
      <div className="fade-up" style={{...neu(14),padding:"12px 14px",marginBottom:12,
        display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
        <div>
          <div style={{fontSize:11,fontWeight:600,color:totalUnallocatedOrUntransferred<0?P.wine:P.br,textTransform:"uppercase",letterSpacing:".06em"}}>
            {totalUnallocatedOrUntransferred<0?"Over-transferred":"Salary not yet spent or transferred"}
          </div>
          <div style={{fontSize:11,color:P.neuSub,marginTop:1}}>Income minus every logged transaction, tracked or not</div>
        </div>
        <span className="tnum" key={totalUnallocatedOrUntransferred} style={{fontSize:18,fontWeight:700,color:totalUnallocatedOrUntransferred<0?P.wine:P.br}}>
          {fmt(Math.abs(totalUnallocatedOrUntransferred))}
        </span>
      </div>

      {/* ── hero summary (neumorphic dark tile + signature liquid-glass bar) ── */}
      <div className="fade-up-1" style={{borderRadius:18,padding:16,marginBottom:16,
        background:isFuture?`linear-gradient(135deg,${P.br} 0%,${P.grD} 100%)`:P.deep,color:"#fff",
        boxShadow:`7px 7px 15px ${P.neuLo},-7px -7px 15px ${P.neuHi}`}}>
        <div style={{fontSize:12,fontWeight:500,color:P.deepHi,marginBottom:4}}>
          {fmtMonth(viewMonth)} {isFuture?"plan":"spending"}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:20,alignItems:"baseline"}}>
          <div>
            <div style={{fontSize:11,color:P.deepHi}}>{isFuture?"Planned":"Spent"}</div>
            <div key={totalSpent} className="serif tnum num-flash" style={{fontSize:28,fontWeight:600,
              color:totalSpent>totalBudget?"#F87171":"#fff"}}>{fmt(totalSpent)}</div>
          </div>
          <div>
            <div style={{fontSize:11,color:P.deepHi}}>Budget</div>
            <div className="tnum" style={{fontSize:20,fontWeight:600,color:P.deepHi}}>{fmt(totalBudget)}</div>
          </div>
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:11,color:P.deepHi}}>{totalLeft>=0?(isFuture?"Available":"Remaining"):"Over budget"}</div>
            <div key={totalLeft} className="tnum num-flash" style={{fontSize:20,fontWeight:600,
              color:totalLeft>=0?"#4ADE80":"#F87171"}}>{fmt(Math.abs(totalLeft))}</div>
          </div>
        </div>
        <div style={{marginTop:12,height:10,background:"rgba(0,0,0,.28)",borderRadius:999,overflow:"hidden",
          boxShadow:"inset 2px 2px 5px rgba(0,0,0,.35),inset -1px -1px 3px rgba(255,255,255,.06)"}}>
          {(()=>{
            const fc=totalSpent>=totalBudget?"#F87171":totalSpent/totalBudget>=.8?"#E07B2A":"#4ADE80";
            return <div className="bar-animated liquid-fill" style={{width:`${Math.min(100,totalBudget>0?(totalSpent/totalBudget)*100:0)}%`,
              background:`linear-gradient(180deg, rgba(255,255,255,.6) 0%, rgba(255,255,255,.05) 45%, ${fc}CC 45%, ${fc} 100%)`}}/>;
          })()}
        </div>
      </div>

      {/* ── envelopes ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <h2 style={{fontSize:14,fontWeight:600,color:P.neuSub,margin:0}}>Envelopes</h2>
        <button onClick={()=>openAdd()} className="neu-btn"
          style={{display:"flex",alignItems:"center",gap:6,padding:"6px 14px",
            fontSize:14,fontWeight:500,color:isFuture?P.br:P.jade}}>
          <I.Plus size={14}/>{isFuture?"Plan transaction":"Add transaction"}
        </button>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
        {envelopes.length===0
          ?<div style={{...neuInset(14),padding:16,textAlign:"center",fontSize:13,color:P.neuSub}}>
              No tracked categories found. Add categories in the Budget tab, or check that they aren't marked "Untracked".
            </div>
          :envelopes.map(env=>{
            const spent=spentMap[env.id]||0;
            const left=env.budget-spent;
            const ratio=env.budget>0?spent/env.budget:0;
            const trend=trendByCat[env.id];
            const burn=isNow?burnFor(env):null;
            const expectedRatio=isNow&&daysInMonth>0?dayOfMonth/daysInMonth:null;
            const pacing=paceHot(spent,env.budget,expectedRatio);
            const color=pacing?P.amber:statusColor(spent,env.budget);
            const bg=pacing?P.amberS:statusBg(spent,env.budget);
            return(
              <div key={env.id} style={{...neu(14),padding:"12px 16px"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <span style={{width:8,height:8,borderRadius:999,background:env.color,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:14,fontWeight:600,color:P.neuInk}}>{env.name}</span>
                  {pacing&&(
                    <span title="Spending is outpacing the calendar for this period"
                      style={{fontSize:10,fontWeight:600,color:P.amber,display:"flex",alignItems:"center",gap:2}}>
                      <I.TrendUp size={10}/>pace
                    </span>
                  )}
                  {trend&&trend.avg!=null&&(
                    <span title={`3-month avg: ${fmt(trend.avg)}`}
                      style={{fontSize:10,fontWeight:600,color:spent>trend.avg*1.15?P.wine:spent<trend.avg*0.85?P.jade:P.neuSub,
                        display:"flex",alignItems:"center",gap:2}}>
                      {spent>trend.avg*1.15?<I.ArrowUp size={10}/>:spent<trend.avg*0.85?<I.ArrowDown size={10}/>:null}
                      avg {fmt(trend.avg)}
                    </span>
                  )}
                  <span style={{fontSize:11,color:P.neuSub}}>{env.group}</span>
                </div>
                {/* liquid-glass fill in a neumorphic inset trough */}
                <div style={{...neuInset(999),height:8,marginBottom:6,position:"relative",overflow:"hidden"}}>
                  <div className="bar-animated liquid-fill" style={{width:`${Math.min(100,ratio*100)}%`,height:"100%",
                    background:`linear-gradient(180deg, rgba(255,255,255,.6) 0%, rgba(255,255,255,.05) 45%, ${color}CC 45%, ${color} 100%)`}}/>
                  {expectedRatio!=null&&expectedRatio<1&&(
                    <div style={{position:"absolute",top:0,bottom:0,left:`${Math.min(100,expectedRatio*100)}%`,width:1,background:"rgba(0,0,0,.3)"}} title="Even pace for today"/>
                  )}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12}} className="tnum">
                  <span style={{color:P.neuSub}}>
                    {isFuture?"Planned":"Spent"} <strong style={{color:P.neuInk}}>{fmt(spent)}</strong> of {fmt(env.budget)}
                  </span>
                  <span style={{fontWeight:600,color,background:bg,borderRadius:8,padding:"1px 8px"}}>
                    {left>=0?`${fmt(left)} left`:`${fmt(-left)} over`}
                  </span>
                </div>
                {burn&&!burn.onPace&&burn.depleteDate&&(
                  <div style={{marginTop:8,display:"flex",alignItems:"center",gap:6,fontSize:11,fontWeight:600,color:P.amber,background:P.amberS,borderRadius:8,padding:"5px 8px"}}>
                    <I.TrendUp size={12}/>
                    At this pace, depletes around {burn.depleteDate.toLocaleDateString("en-US",{month:"short",day:"numeric"})}
                  </div>
                )}
                <button onClick={()=>openAdd(env.id)}
                  style={{marginTop:8,display:"flex",alignItems:"center",gap:5,fontSize:12,fontWeight:500,color:P.jade,background:"transparent",border:"none",padding:0}}>
                  <I.Plus size={12}/>Add to {env.name}
                </button>
              </div>
            );
          })
        }
      </div>

      {/* ── untracked categories — quick transfer ── */}
      {untrackedEnvelopes.length>0&&(
        <>
          <button onClick={()=>setUntrackedOpen(o=>!o)}
            style={{display:"flex",alignItems:"center",gap:6,marginBottom:untrackedOpen?10:20,width:"100%",
              background:"transparent",border:"none",padding:0,cursor:"pointer",textAlign:"left"}}>
            <I.Chevron size={13} style={{color:P.neuSub,transform:untrackedOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform .2s",flexShrink:0}}/>
            <h2 style={{fontSize:14,fontWeight:600,color:P.neuSub,margin:0}}>Untracked transfers</h2>
            <span style={{fontSize:11,color:P.neuSub,opacity:.75}}>{untrackedOpen?"one-time allocations, not itemized":`${untrackedEnvelopes.length} hidden`}</span>
          </button>
          {untrackedOpen&&<div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
            {untrackedEnvelopes.map(env=>{
              const funded=fundedMap[env.id]||0;
              const isFunded=funded>=env.budget&&funded>0;
              const lastAmt=quickTransferLast?.[env.id];
              return(
                <div key={env.id} style={{...neu(14),padding:"12px 16px",display:"flex",alignItems:"center",gap:12}}>
                  <span style={{width:8,height:8,borderRadius:999,background:env.color,flexShrink:0}}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,color:P.neuInk}}>{env.name}</div>
                    <div className="tnum" style={{fontSize:11,color:isFunded?P.jade:P.neuSub,marginTop:1}}>
                      {isFunded?`✓ Transferred ${fmt(funded)}`:`Budgeted ${fmt(env.budget)} · not yet transferred`}
                    </div>
                  </div>
                  <button onClick={()=>setTransferModal({catId:env.id,name:env.name,budget:env.budget,suggested:lastAmt||env.budget})}
                    className={isFunded?"neu-btn":""}
                    style={{display:"flex",alignItems:"center",gap:5,borderRadius:999,padding:"6px 12px",fontSize:12,fontWeight:600,
                      background:isFunded?undefined:P.br,color:isFunded?P.neuSub:"#fff",border:"none",flexShrink:0}}>
                    <I.Send size={11}/>{isFunded?"Add more":"Transfer"}
                  </button>
                </div>
              );
            })}
          </div>}
        </>
      )}

      {/* ── transaction log — collapsed by default, expand to browse ── */}
      <button onClick={()=>setLogExpanded(o=>!o)}
        style={{display:"flex",alignItems:"center",gap:6,marginBottom:logExpanded?8:20,width:"100%",
          background:"transparent",border:"none",padding:0,cursor:"pointer",textAlign:"left"}}>
        <I.Chevron size={13} style={{color:P.neuSub,transform:logExpanded?"rotate(180deg)":"rotate(0deg)",transition:"transform .2s",flexShrink:0}}/>
        <h2 style={{fontSize:14,fontWeight:600,color:P.neuSub,margin:0}}>All transactions</h2>
        <span style={{fontSize:11,color:P.neuSub,opacity:.75}}>{logExpanded?`${allFiltered.length} entries`:`${allFiltered.length} hidden`}</span>
      </button>

      {logExpanded&&(
        <>
          <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",marginBottom:8,flexWrap:"wrap",gap:8}}>
            {logGrouping==="category"&&(monthPlan.categories||[]).length>1&&(
              <button onClick={()=>setShowReorder(true)} className="neu-btn"
                style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",
                  fontSize:12,fontWeight:600,color:P.neuSub}}>
                <I.ArrowUp size={10}/><I.ArrowDown size={10}/>Reorder
              </button>
            )}
            <div style={{display:"flex",gap:4,...neuInset(999),padding:3}}>
              {[["month","Month"],["category","Category"]].map(([gv,label])=>(
                <button key={gv} onClick={()=>setLogGrouping(gv)}
                  style={{borderRadius:999,padding:"3px 10px",fontSize:12,fontWeight:600,border:"none",
                    background:logGrouping===gv?P.jade:"transparent",color:logGrouping===gv?"#fff":P.neuSub}}>
                  {label}
                </button>
              ))}
            </div>
            <select value={filterCat} onChange={e=>setFilterCat(e.target.value)}
              style={{...neu(999),padding:"4px 10px",fontSize:12,border:"none",color:P.neuSub}}>
              <option value="all">All categories</option>
              {envelopes.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
              {untrackedEnvelopes.map(e=><option key={e.id} value={e.id}>{e.name} (untracked)</option>)}
            </select>
          </div>

          {allFiltered.length===0
            ?<div style={{...neuInset(16),padding:"24px 16px",textAlign:"center",fontSize:13,color:P.neuSub,marginBottom:20}}>
                No transactions yet. Tap "Add transaction" to start tracking.
              </div>
            :logGrouping==="category"
            ?categoryGroups.map(catGroup=>{
              const isOpen=collapsedCats[catGroup.name]===undefined?false:!collapsedCats[catGroup.name];
              const txs=[...catGroup.txs].sort((a,b)=>b.date.localeCompare(a.date));
              return(
                <div key={catGroup.name} style={{...neu(16),overflow:"hidden",marginBottom:10}}>
                  <button
                    onClick={()=>setCollapsedCats(c=>({...c,[catGroup.name]:isOpen}))}
                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",
                      padding:"12px 16px",background:"transparent",border:"none",cursor:"pointer",
                      borderBottom:isOpen?"1px solid rgba(0,0,0,.06)":"none",textAlign:"left"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <I.Chevron size={14} style={{color:P.neuSub,transform:isOpen?"rotate(180deg)":"rotate(0deg)",
                        transition:"transform .2s",flexShrink:0}}/>
                      <span style={{width:8,height:8,borderRadius:999,background:catGroup.color,flexShrink:0}}/>
                      <span style={{fontSize:14,fontWeight:700,color:P.neuInk}}>{catGroup.name}</span>
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span className="tnum" style={{fontSize:12,color:P.neuSub}}>{txs.length} tx</span>
                      <span className="tnum" style={{fontSize:13,fontWeight:700,color:P.neuInk}}>{fmt(catGroup.total)}</span>
                    </div>
                  </button>
                  {isOpen&&txs.map((tx,idx)=>renderTxRow(tx,idx,txs.length))}
                </div>
              );
            })
            :allMonths.map(mo=>{
              const txs=[...byMonth[mo]].sort((a,b)=>b.date.localeCompare(a.date));
              const isCurrent=mo===nowMonth;
              const isViewing=mo===viewMonth;
              const isFutureMo=mo>nowMonth;
              const defaultOpen=isCurrent||isFutureMo||isViewing;
              const isOpen=collapsedMonths[mo]===undefined?defaultOpen:!collapsedMonths[mo];
              const monthTotal=txs.reduce((s,t)=>s+t.amount,0);
              const moLabel=fmtMonth(mo);

              const labelColor=isCurrent?P.jade:isFutureMo?P.br:P.neuInk;

              return(
                <div key={mo} style={{...neu(16),overflow:"hidden",marginBottom:10,
                  ...(isViewing?{boxShadow:`0 0 0 2px ${P.jade}, 7px 7px 15px ${P.neuLo}, -7px -7px 15px ${P.neuHi}`}:{}),
                  transition:"box-shadow .2s"}}>
                  <button
                    onClick={()=>setCollapsedMonths(c=>({...c,[mo]:isOpen}))}
                    style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",
                      padding:"12px 16px",background:"transparent",border:"none",cursor:"pointer",
                      borderBottom:isOpen?"1px solid rgba(0,0,0,.06)":"none",textAlign:"left"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <I.Chevron size={14} style={{color:P.neuSub,transform:isOpen?"rotate(180deg)":"rotate(0deg)",
                        transition:"transform .2s",flexShrink:0}}/>
                      <span style={{fontSize:14,fontWeight:700,color:labelColor}}>{moLabel}</span>
                      {isCurrent&&<span style={{fontSize:10,borderRadius:999,padding:"2px 7px",
                        background:P.jade,color:"#fff",fontWeight:700}}>NOW</span>}
                      {isFutureMo&&<span style={{fontSize:10,borderRadius:999,padding:"2px 7px",
                        background:P.br,color:"#fff",fontWeight:700}}>PLANNED</span>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span className="tnum" style={{fontSize:12,color:P.neuSub}}>{txs.length} tx</span>
                      <span className="tnum" style={{fontSize:13,fontWeight:700,color:P.neuInk}}>{fmt(monthTotal)}</span>
                    </div>
                  </button>

                  {isOpen&&txs.map((tx,idx)=>renderTxRow(tx,idx,txs.length))}
                </div>
              );
            })
          }
        </>
      )}

      {/* ── add/edit transaction modal ── */}
      {showAdd&&(
        <Portal>
        <div className="sheet-bg" onClick={closeForm}>
          <div className="sheet" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <h3 style={{margin:0,fontSize:16,fontWeight:600,color:P.ink}}>
                {editTx?"Edit transaction":isFuture?"Plan transaction":"Add transaction"}
              </h3>
              <button onClick={closeForm}
                style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
            </div>

            <div style={{fontSize:12,color:isFuture?P.br:P.faint,marginBottom:14}}>
              {editTx?`Editing entry for ${fmtMonth(form.date?bucketKeyFor(form.date,payPeriods,budgetOwner):viewMonth)}`:isFuture?`Planning ahead for ${fmtMonth(viewMonth)}`:`Recording for ${fmtMonth(viewMonth)}`}
            </div>

            {/* ── segmented control: Tracked / Untracked / Goals — hidden while editing an existing entry ── */}
            {!editTx&&(
              <div style={{display:"flex",gap:4,marginBottom:14,background:"rgba(0,0,0,.05)",borderRadius:999,padding:3}}>
                {[["tracked","Tracked"],["untracked","Untracked"],["goals","Goals"]].map(([mv,label])=>(
                  <button key={mv} onClick={()=>{setAddMode(mv);setForm(f=>({...f,catId:"",goalId:"",name:""}));}}
                    style={{flex:1,borderRadius:999,padding:"6px 0",fontSize:12,fontWeight:600,border:"none",
                      background:addMode===mv?P.jade:"transparent",color:addMode===mv?"#fff":P.sub}}>
                    {label}
                  </button>
                ))}
              </div>
            )}

            {/* ── category / envelope / goal dropdown, dynamic by mode ── */}
            {addMode==="goals"&&!editTx?(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Goal</div>
                <select value={form.goalId} onChange={e=>setForm(f=>({...f,goalId:e.target.value}))}
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,
                    background:"rgba(0,0,0,.05)",border:form.goalId?"none":`1px solid ${P.red}`,color:P.ink}}>
                  <option value="">Select a goal…</option>
                  {ownerGoals.map(g=><option key={g.id} value={g.id}>{g.name}</option>)}
                </select>
                {ownerGoals.length===0&&<div style={{fontSize:11,color:P.faint,marginTop:4}}>No active goals for {owners[budgetOwner]} yet — add one in the Goals tab.</div>}
              </div>
            ):(
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Category</div>
                <select value={form.catId} onChange={e=>setForm(f=>({...f,catId:e.target.value}))}
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,
                    background:"rgba(0,0,0,.05)",border:form.catId?"none":`1px solid ${P.red}`,color:P.ink}}>
                  <option value="">Select a category…</option>
                  {addMode==="untracked"&&!editTx
                    ?untrackedEnvelopes.map(e=><option key={e.id} value={e.id}>{e.name}</option>)
                    :(monthPlan.groups||[]).map(g=>{
                        const opts=allCatOptions.filter(c=>c.groupId===g.id&&c.tracked);
                        if(opts.length===0)return null;
                        return(
                          <optgroup key={g.id} label={g.name}>
                            {opts.map(c=>(
                              <option key={c.id} value={c.id}>{c.name}</option>
                            ))}
                          </optgroup>
                        );
                      })
                  }
                </select>
              </div>
            )}

            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Title{addMode==="goals"&&!editTx?<span style={{color:P.faint,fontWeight:400}}> (optional)</span>:null}</div>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
                placeholder={addMode==="goals"&&!editTx?"e.g. Monthly deposit":"e.g. Amazon Now"} list="tx-name-suggestions"
                style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,
                  background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
              <datalist id="tx-name-suggestions">
                {nameSuggestions.map(n=><option key={n} value={n}/>)}
              </datalist>
              {nameSuggestions.length>0&&!form.name&&addMode==="tracked"&&(
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:6}}>
                  {nameSuggestions.slice(0,5).map(n=>(
                    <button key={n} onClick={()=>setForm(f=>({...f,name:n}))}
                      style={{fontSize:11,borderRadius:999,padding:"3px 9px",background:"rgba(0,0,0,.05)",border:"none",color:P.sub}}>
                      {n}
                    </button>
                  ))}
                </div>
              )}
            </div>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Note <span style={{color:P.faint,fontWeight:400}}>(optional)</span></div>
              <input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))}
                placeholder="e.g. bought a charger + cable"
                style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,
                  background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
            </div>

            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Amount ({cur})</div>
                <input type="text" inputMode="decimal" value={form.amount}
                  onChange={e=>setForm(f=>({...f,amount:e.target.value}))}
                  onBlur={e=>setForm(f=>({...f,amount:e.target.value.trim()===""?"":String(evalMathExpr(e.target.value,Number(f.amount)||0))}))}
                  onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}}
                  placeholder="0"
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,
                    background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Date</div>
                <input type="date" value={form.date}
                  onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,
                    background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
              </div>
            </div>

            {addMode==="tracked"&&form.catId&&form.amount&&(()=>{
              const env=envelopes.find(e=>e.id===form.catId);
              if(!env)return null;
              const editingTx=editTx?expenses.find(e=>e.id===editTx):null;
              const excludeAmt=(editingTx&&editingTx.catId===form.catId)?editingTx.amount:0;
              const already=(spentMap[form.catId]||0)-excludeAmt;
              const after=already+Number(form.amount);
              const left=env.budget-after;
              return(
                <div style={{borderRadius:10,padding:10,marginBottom:12,
                  background:left<0?P.redS:left/env.budget<.2?P.amberS:"rgba(0,0,0,.05)",
                  fontSize:13}} className="tnum">
                  <span style={{color:P.sub}}>{env.name}: </span>
                  <span style={{fontWeight:600,color:statusColor(after,env.budget)}}>
                    {left>=0?`${fmt(left)} remaining after this`:`${fmt(-left)} over budget`}
                  </span>
                </div>
              );
            })()}

            <div style={{display:"flex",gap:8}}>
              {editTx&&(
                <button onClick={()=>{removeExpenseTx(editTx);closeForm();}} className="neu-btn"
                  style={{padding:"10px 16px",fontSize:14,fontWeight:600,color:P.wine}}>
                  Delete
                </button>
              )}
              <button onClick={submitTx}
                style={{flex:1,borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,
                  background:isFuture?P.br:P.jade,color:"#fff",border:"none",
                  opacity:(editTx?(!form.catId||!form.name||!form.amount)
                    :addMode==="goals"?(!form.goalId||!form.amount)
                    :addMode==="untracked"?(!form.catId||!form.amount)
                    :(!form.catId||!form.name||!form.amount))?.5:1}}>
                {editTx?"Save changes":addMode==="goals"?"Add to goal":addMode==="untracked"?"Transfer":isFuture?"Save planned transaction":"Record transaction"}
              </button>
            </div>
          </div>
        </div>
        </Portal>
      )}

      {/* ── quick transfer sheet ── */}
      {transferModal&&<Portal><QuickTransferSheet
        transferModal={transferModal}
        onClose={()=>setTransferModal(null)}
        onConfirm={(amount,date)=>{quickTransfer(transferModal.catId,transferModal.name,amount,date,budgetOwner);setTransferModal(null);}}
        fmt={fmt} cur={cur} viewMonth={viewMonth} isNow={isNow} usesPayPeriod={usesPayPeriod}/></Portal>}

      {/* ── reorder categories modal — controls both this log's grouping order and the envelope order above ── */}
      {showReorder&&(
        <Portal>
        <div className="modal-bg" onClick={()=>setShowReorder(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <h3 style={{margin:0,fontSize:16,fontWeight:600,color:P.ink}}>Reorder categories</h3>
              <button onClick={()=>setShowReorder(false)}
                style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
            </div>
            <div style={{fontSize:12,color:P.faint,marginBottom:14}}>
              Move categories up or down. This controls the order they appear in below, both here and in the envelope list above.
            </div>
            <div style={{borderRadius:12,overflow:"hidden",background:"rgba(0,0,0,.03)"}}>
              <div style={{maxHeight:"60vh",overflowY:"auto"}}>
                {(monthPlan.categories||[]).map((c,i,arr)=>{
                  const g=(monthPlan.groups||[]).find(gr=>gr.id===c.groupId);
                  return(
                    <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",
                      borderBottom:i<arr.length-1?"1px solid rgba(0,0,0,.06)":"none"}}>
                      <span style={{width:8,height:8,borderRadius:999,background:c.color,flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:600,color:P.ink,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{c.name}</div>
                        {g&&<div style={{fontSize:10,color:P.faint}}>{g.name}</div>}
                      </div>
                      <button onClick={()=>moveCat(c.id,-1)} disabled={i===0}
                        style={{background:"transparent",border:"none",borderRadius:8,padding:4,
                          color:i===0?P.faint:P.sub,opacity:i===0?.4:1}}>
                        <I.ArrowUp size={13}/>
                      </button>
                      <button onClick={()=>moveCat(c.id,1)} disabled={i===arr.length-1}
                        style={{background:"transparent",border:"none",borderRadius:8,padding:4,
                          color:i===arr.length-1?P.faint:P.sub,opacity:i===arr.length-1?.4:1}}>
                        <I.ArrowDown size={13}/>
                      </button>
                    </div>
                  );
                })}
              </div>
            </div>
            <button onClick={()=>setShowReorder(false)}
              style={{width:"100%",marginTop:14,borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,
                background:P.jade,color:"#fff",border:"none"}}>
              Done
            </button>
          </div>
        </div>
        </Portal>
      )}

      {/* ── create monthly plan modal ── */}
      {showPlanPicker&&(
        <Portal>
        <div className="modal-bg" onClick={()=>setShowPlanPicker(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <h3 style={{margin:0,fontSize:16,fontWeight:600}}>
                Create plan for {fmtMonth(viewMonth)}
              </h3>
              <button onClick={()=>setShowPlanPicker(false)}
                style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
            </div>

            <div style={{fontSize:13,color:P.sub,marginBottom:16,lineHeight:1.5}}>
              This creates a <strong>copy</strong> of an existing plan that you can adjust
              independently — different income, tweaked allocations — without changing the original.
            </div>

            <div style={{fontSize:12,color:P.sub,marginBottom:6,fontWeight:600}}>
              Clone from which plan?
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
              {ownerPlans.map(p=>(
                <button key={p.id} onClick={()=>setCloneSource(p.id)}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                    padding:"10px 14px",borderRadius:12,fontSize:14,textAlign:"left",border:"none",
                    background:cloneSource===p.id?P.jadeS:"rgba(0,0,0,.05)",
                    color:cloneSource===p.id?P.jadeD:P.ink}}>
                  <div>
                    <div style={{fontWeight:600}}>{p.name}</div>
                    <div style={{fontSize:11,color:P.faint,marginTop:2}}>
                      {cur} {(p.income||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})} · {(p.categories||[]).length} categories
                    </div>
                  </div>
                  {cloneSource===p.id&&<I.Check size={16} style={{color:P.jade,flexShrink:0}}/>}
                </button>
              ))}
            </div>

            <button onClick={handleCreatePlan} disabled={!cloneSource}
              style={{width:"100%",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,
                background:P.jade,color:"#fff",border:"none",opacity:cloneSource?1:.4}}>
              Create plan for {fmtMonth(viewMonth)}
            </button>
          </div>
        </div>
        </Portal>
      )}
    </div>
  );
}

/* ── QUICK TRANSFER SHEET — logs a transaction against an untracked category
   (e.g. Savings, Investment) and remembers the actual amount transferred,
   since it doesn't always match the budgeted figure exactly. ── */
function QuickTransferSheet({transferModal,onClose,onConfirm,fmt,cur,viewMonth,isNow,usesPayPeriod}){
  const[amount,setAmount]=useState(String(transferModal.suggested||transferModal.budget||""));
  const[date,setDate]=useState(isNow?new Date().toISOString().slice(0,10):(usesPayPeriod?viewMonth:viewMonth+"-01"));
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <h3 style={{margin:0,fontSize:16,fontWeight:600,color:P.ink}}>Transfer — {transferModal.name}</h3>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
        </div>
        <div style={{fontSize:12,color:P.faint,marginBottom:16}}>
          Logs a one-time transfer to {transferModal.name}. This counts against your salary but won't appear in detailed expense tracking.
        </div>

        <div style={{display:"flex",gap:6,marginBottom:14}}>
          <button onClick={()=>setAmount(String(transferModal.budget))}
            style={{flex:1,borderRadius:10,padding:"8px 0",fontSize:13,fontWeight:600,border:"none",
              background:Number(amount)===transferModal.budget?P.brS:"rgba(0,0,0,.05)",
              color:Number(amount)===transferModal.budget?P.br:P.sub}}>
            Budgeted {fmt(transferModal.budget)}
          </button>
          {transferModal.suggested&&transferModal.suggested!==transferModal.budget&&(
            <button onClick={()=>setAmount(String(transferModal.suggested))}
              style={{flex:1,borderRadius:10,padding:"8px 0",fontSize:13,fontWeight:600,border:"none",
                background:Number(amount)===transferModal.suggested?P.jadeS:"rgba(0,0,0,.05)",
                color:Number(amount)===transferModal.suggested?P.jadeD:P.sub}}>
              Last time {fmt(transferModal.suggested)}
            </button>
          )}
        </div>

        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Amount ({cur})</div>
            <input type="text" inputMode="decimal" value={amount} onChange={e=>setAmount(e.target.value)}
              onBlur={e=>setAmount(String(evalMathExpr(e.target.value,Number(amount)||0)))}
              onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}} autoFocus
              style={{width:"100%",borderRadius:10,padding:"10px",fontSize:18,fontWeight:600,background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
          </div>
          <div style={{flex:1}}>
            <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Date</div>
            <input type="date" value={date} onChange={e=>setDate(e.target.value)}
              style={{width:"100%",borderRadius:10,padding:"10px",fontSize:14,background:"rgba(0,0,0,.05)",border:"none",color:P.ink}}/>
          </div>
        </div>

        <button onClick={()=>{if(Number(amount)>0)onConfirm(Number(amount),date);}}
          style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,
            background:P.br,color:"#fff",border:"none",opacity:Number(amount)>0?1:.5}}>
          <I.Send size={14}/>Confirm transfer
        </button>
      </div>
    </div>
  );
}

/* ── HOUSEHOLD VIEW ── */
function HouseholdView({hh,setSplit,addExpense,updateExpense,removeExpense,fmt,owners}){
  const total=hh.expenses.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const mine=total*(hh.splitMine/100),theirs=total-mine;
  const card={background:P.neuBg,borderRadius:16,boxShadow:`6px 6px 13px ${P.neuLo},-6px -6px 13px ${P.neuHi}`};
  return(
    <div style={{background:P.neuBg,borderRadius:24,padding:"14px 12px 18px",margin:"0 -4px"}}>
      <div style={{...card,padding:16,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:600,color:P.sub}}>Shared monthly expenses</span>
          <span className="tnum" style={{fontSize:15,fontWeight:700,color:P.ink}}>{fmt(total)}</span>
        </div>

        {/* ── visual split bar ── */}
        <div style={{height:22,borderRadius:999,overflow:"hidden",display:"flex",marginBottom:6}}>
          <div style={{width:`${hh.splitMine}%`,background:P.gr,display:"flex",alignItems:"center",justifyContent:"center",transition:"width .3s"}}>
            {hh.splitMine>=14&&<span style={{fontSize:11,fontWeight:700,color:"#fff"}} className="tnum">{hh.splitMine}%</span>}
          </div>
          <div style={{width:`${100-hh.splitMine}%`,background:P.br,display:"flex",alignItems:"center",justifyContent:"center",transition:"width .3s"}}>
            {100-hh.splitMine>=14&&<span style={{fontSize:11,fontWeight:700,color:"#fff"}} className="tnum">{100-hh.splitMine}%</span>}
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:P.faint,marginBottom:12}}>
          <span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:7,height:7,borderRadius:999,background:P.gr,display:"inline-block"}}/>{owners.me}</span>
          <span style={{display:"flex",alignItems:"center",gap:4}}>{owners.wife}<span style={{width:7,height:7,borderRadius:999,background:P.br,display:"inline-block"}}/></span>
        </div>

        {/* ── metric cards ── */}
        <div style={{display:"flex",gap:12,marginBottom:12}}>
          <div style={{flex:1,background:P.grS,borderRadius:12,padding:12}}>
            <div style={{fontSize:11,color:P.grD}}>{owners.me}'s Share</div>
            <div className="serif tnum" style={{fontSize:22,fontWeight:600,color:P.grD}}>{fmt(mine)}</div>
          </div>
          <div style={{flex:1,background:P.brS,borderRadius:12,padding:12}}>
            <div style={{fontSize:11,color:P.br}}>{owners.wife}'s Share</div>
            <div className="serif tnum" style={{fontSize:22,fontWeight:600,color:P.br}}>{fmt(theirs)}</div>
          </div>
        </div>
        <input type="range" min="0" max="100" value={hh.splitMine} onChange={e=>setSplit(Number(e.target.value))} style={{width:"100%"}}/>
      </div>

      {/* ── recurring expenses — 2-column grid on wider screens, tight card list on mobile ── */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(240px,1fr))",gap:10,marginBottom:10}}>
        {hh.expenses.map(e=>(
          <div key={e.id} style={{...card,padding:"10px 14px",display:"flex",alignItems:"center",gap:8}}>
            <span style={{width:10,height:10,borderRadius:999,background:e.color,flexShrink:0}}/>
            <input value={e.name} onChange={ev=>updateExpense(e.id,{name:ev.target.value})} className="bare" style={{flex:1,minWidth:0,fontSize:14}}/>
            <input type="text" inputMode="decimal" value={e.amount} onChange={ev=>updateExpense(e.id,{amount:ev.target.value})}
              onBlur={ev=>updateExpense(e.id,{amount:evalMathExpr(ev.target.value,0)})}
              onKeyDown={ev=>{if(ev.key==="Enter")ev.currentTarget.blur();}}
              className="bare tnum" style={{width:84,textAlign:"right",fontSize:14,fontWeight:600}}/>
            <button onClick={()=>removeExpense(e.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.3,flexShrink:0}}><I.X size={15}/></button>
          </div>
        ))}
      </div>
      <button onClick={addExpense}
        style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,width:"100%",borderRadius:14,padding:"10px 16px",
          fontSize:14,fontWeight:500,color:P.gr,background:P.sf,border:`1px dashed ${P.line}`}}>
        <I.Plus size={14}/>Add shared expense
      </button>
    </div>
  );
}

/* ── BANKS VIEW — grid of "digital wallet pass" cards ── */
function BanksView({banks,addBank,updateBank,removeBank,convert,sarRate,mainCcy,owners,isSingle}){
  const[openId,setOpenId]=useState(null); // account id whose settings panel is expanded
  const ccy=mainCcy||"SAR";
  const fmtMain=n=>`${ccy} ${Math.round(n).toLocaleString("en-US")}`;
  const mainOf=b=>{const v=convert(b.balance,b.currency,ccy);return v==null?0:v;};
  const total=banks.reduce((s,b)=>s+mainOf(b),0);
  // secondary reference readouts — pick two other well-known currencies that
  // aren't already the selected base currency, so we're not just repeating it
  const refCcys=["USD","SAR","PHP"].filter(c=>c!==ccy).slice(0,2);
  const refTotals=refCcys.map(c=>({code:c,amount:convert?convert(total,ccy,c):null}));
  const meTotal=banks.filter(b=>b.owner==="me").reduce((s,b)=>s+mainOf(b),0);
  const wifeTotal=banks.filter(b=>b.owner==="wife").reduce((s,b)=>s+mainOf(b),0);

  const Card=b=>{
    const isOpen=openId===b.id;
    const accent=b.owner==="me"?P.jade:P.br;
    const accentS=b.owner==="me"?P.jadeS:P.brS;
    return(
      <div key={b.id} style={{...neu(18),overflow:"hidden",position:"relative",display:"flex",flexDirection:"column",minWidth:0}}>
        {/* accent strip — reads as the "card network" band of a wallet pass */}
        <div style={{height:5,background:accent}}/>
        <div style={{padding:16,flex:1,display:"flex",flexDirection:"column",gap:10}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
            <div style={{minWidth:0}}>
              <div style={{fontSize:11,fontWeight:600,color:accent,textTransform:"uppercase",letterSpacing:".05em"}}>{b.bank||"Bank"}</div>
              <div style={{fontSize:16,fontWeight:700,color:P.neuInk,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.name||"Account"}</div>
            </div>
            <button onClick={()=>setOpenId(isOpen?null:b.id)}
              title="Account settings" className="neu-btn"
              style={{flexShrink:0,borderRadius:10,padding:6,color:isOpen?accent:P.neuSub}}>
              <I.Settings size={14}/>
            </button>
          </div>

          <div>
            <div className="serif tnum" style={{fontSize:26,fontWeight:600,color:P.neuInk}}>
              {b.currency} {Number(b.balance||0).toLocaleString("en-US")}
            </div>
            {b.currency!==ccy&&<div className="tnum" style={{fontSize:12,color:P.neuSub,marginTop:2}}>≈ {fmtMain(mainOf(b))}</div>}
          </div>

          <div style={{marginTop:"auto",display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:10,fontWeight:600,borderRadius:999,padding:"2px 8px",background:accentS,color:accent}}>{b.currency}</span>
            <span style={{fontSize:10,color:P.neuSub}}>{COUNTRIES.find(([c])=>c===b.country)?.[1]||b.country}</span>
            {!isSingle&&<span style={{marginLeft:"auto",fontSize:10,fontWeight:600,color:accent}}>{owners[b.owner]}</span>}
          </div>
        </div>

        {/* ── settings panel — edit fields, collapsed by default ── */}
        {isOpen&&(
          <div style={{...neuInset(0),borderRadius:0,padding:"12px 16px",display:"flex",flexDirection:"column",gap:8,width:"100%",boxSizing:"border-box"}}>
            <div style={{display:"flex",gap:8,width:"100%",boxSizing:"border-box"}}>
              <input value={b.name} placeholder="Account name" onChange={e=>updateBank(b.id,{name:e.target.value})}
                className="bare" style={{...neu(8),flex:1,minWidth:0,fontSize:13,fontWeight:600,padding:"6px 8px",color:P.neuInk,boxSizing:"border-box"}}/>
              <input value={b.bank} placeholder="Bank name" onChange={e=>updateBank(b.id,{bank:e.target.value})}
                className="bare" style={{...neu(8),flex:1,minWidth:0,fontSize:13,padding:"6px 8px",color:P.neuInk,boxSizing:"border-box"}}/>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",width:"100%",boxSizing:"border-box"}}>
              <select value={b.country} onChange={e=>updateBank(b.id,{country:e.target.value})}
                style={{...neu(8),flex:1,minWidth:0,padding:"6px 8px",fontSize:12,border:"none",color:P.neuSub,boxSizing:"border-box"}}>
                {COUNTRIES.map(([c,l])=><option key={c} value={c}>{l}</option>)}
              </select>
              <select value={b.currency} onChange={e=>updateBank(b.id,{currency:e.target.value})}
                style={{...neu(8),flex:1,minWidth:0,padding:"6px 8px",fontSize:12,border:"none",color:P.neuSub,boxSizing:"border-box"}}>
                {BANK_CCY.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:12,color:P.neuSub}}>Balance ({b.currency})</span>
              <input type="text" inputMode="decimal" value={b.balance} onChange={e=>updateBank(b.id,{balance:e.target.value})}
                onBlur={e=>updateBank(b.id,{balance:evalMathExpr(e.target.value,0)})}
                onKeyDown={e=>{if(e.key==="Enter")e.currentTarget.blur();}}
                className="bare tnum" style={{...neuInset(8),flex:1,textAlign:"right",fontSize:14,fontWeight:600,padding:"6px 8px",color:P.neuInk}}/>
            </div>
            <button onClick={()=>{removeBank(b.id);setOpenId(null);}} className="neu-btn"
              style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,padding:"7px 0",
                fontSize:12,fontWeight:600,color:P.wine}}>
              <I.Trash size={12}/>Delete account
            </button>
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{background:P.neuBg,borderRadius:24,padding:"14px 12px 18px",margin:"0 -4px"}}>
      {/* ── top summary — total liquid assets, split by owner ── */}
      <div style={{background:P.deep,color:"#fff",borderRadius:18,padding:16,marginBottom:16,
        boxShadow:`7px 7px 15px ${P.neuLo},-7px -7px 15px ${P.neuHi}`,
        display:"flex",flexWrap:"wrap",gap:16,alignItems:"center"}}>
        <div style={{flex:"1 1 200px"}}>
          <div style={{fontSize:12,fontWeight:500,color:P.deepHi,marginBottom:4}}>Total liquid assets</div>
          <span className="serif tnum" style={{fontSize:30,fontWeight:600}}>{fmtMain(total)}</span>
          <div className="tnum" style={{marginTop:6,display:"flex",gap:16,color:P.deepHi,fontSize:14}}>
            {refTotals.map(({code,amount})=>
              <span key={code}>{amount!=null?`≈ ${code} ${Math.round(amount).toLocaleString("en-US")}`:`${code} —`}</span>
            )}
          </div>
        </div>
        {!isSingle&&
          <div style={{display:"flex",gap:10,flex:"1 1 220px"}}>
            <div style={{flex:1,background:"rgba(0,0,0,.2)",boxShadow:"inset 2px 2px 5px rgba(0,0,0,.3),inset -1px -1px 2px rgba(255,255,255,.05)",borderRadius:12,padding:"10px 12px"}}>
              <div style={{fontSize:11,color:P.deepHi}}>{owners.me}</div>
              <div className="tnum" style={{fontSize:16,fontWeight:700}}>{fmtMain(meTotal)}</div>
            </div>
            <div style={{flex:1,background:"rgba(0,0,0,.2)",boxShadow:"inset 2px 2px 5px rgba(0,0,0,.3),inset -1px -1px 2px rgba(255,255,255,.05)",borderRadius:12,padding:"10px 12px"}}>
              <div style={{fontSize:11,color:P.deepHi}}>{owners.wife}</div>
              <div className="tnum" style={{fontSize:16,fontWeight:700}}>{fmtMain(wifeTotal)}</div>
            </div>
          </div>}
      </div>

      {/* ── card grid — unified single grid for single-profile accounts,
           per-owner sections preserved for couple accounts ── */}
      {(isSingle?["me"]:["me","wife"]).map(ok=>{
        const items=banks.filter(b=>b.owner===ok);
        return(
          <section key={ok} style={{marginBottom:22}}>
            {!isSingle&&
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <span style={{width:8,height:8,borderRadius:999,background:ok==="me"?P.jade:P.br}}/>
                <h2 style={{fontSize:14,fontWeight:600,color:ok==="me"?P.jade:P.br,margin:0}}>{owners[ok]}'s accounts</h2>
              </div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
              {items.map(Card)}
              <button onClick={()=>addBank(ok)} className="neu-btn"
                style={{borderRadius:18,minHeight:150,color:P.jade,
                  display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,fontSize:13,fontWeight:500}}>
                <I.Plus size={20}/>{isSingle?"Add account":`Add ${owners[ok]}'s account`}
              </button>
            </div>
          </section>
        );
      })}
    </div>
  );
}

/* ── INVESTMENTS VIEW — trade log ── */
function InvestmentsView({invs,addInv,updateInv,removeInv,addTrade,removeTrade,livePrice,setLivePrice,sarRate,convert,cur,projection,setProjection,portHistory,addPortSnap}){
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[updatedAt,setUpdatedAt]=useState(null);
  const[tradeModal,setTradeModal]=useState(null); // invId
  const[tradeForm,setTradeForm]=useState({type:"buy",shares:"",price:"",date:new Date().toISOString().slice(0,10)});
  const[expandedId,setExpandedId]=useState(null);
  const[fetchingName,setFetchingName]=useState({});

  /* Look up a company / fund name for a ticker.
     1) Cloudflare proxy → Yahoo (best for ETFs like VWRA, using the mapped symbol)
     2) Finnhub search (good for US stocks)                                   */
  const fetchName=async(id,ticker)=>{
    const t=(ticker||"").trim().toUpperCase();
    if(!t)return;
    setFetchingName(s=>({...s,[id]:true}));
    let name=null;
    if(!PROXY_URL.startsWith("PASTE_")){
      try{
        const ys=toYahooSym(t);
        const res=await fetch(`${PROXY_URL}/name?symbol=${encodeURIComponent(ys)}`);
        if(res.ok){const j=await res.json();if(j&&j.name)name=j.name;}
      }catch(e){}
    }
    if(!name&&!FINNHUB_KEY.startsWith("PASTE_")){
      try{
        const res=await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(t)}&token=${FINNHUB_KEY}`);
        const j=await res.json();
        const list=j.result||[];
        const match=list.find(x=>x.symbol===t)||list.find(x=>x.symbol===t+".US")||list.find(x=>x.symbol===baseKey(t))||list[0];
        if(match&&match.description)name=match.description;
      }catch(e){}
    }
    if(name)updateInv(id,{name});
    setFetchingName(s=>{const n={...s};delete n[id];return n;});
  };

  const usd=n=>`$${(Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;

  const rows=invs.map(hld=>{
    const{shares,avgCost,totalCost}=holdingStats(hld.trades);
    const price=livePrice[baseKey(hld.ticker||"")]||0;
    const value=shares*price;
    const gain=value-totalCost;
    const gainPct=totalCost>0?(gain/totalCost)*100:0;
    return{...hld,shares,avgCost,totalCost,price,value,gain,gainPct};
  });
  const totVal=rows.reduce((s,r)=>s+r.value,0);
  const totCost=rows.reduce((s,r)=>s+r.totalCost,0);
  const totGain=totVal-totCost;
  const totGainPct=totCost>0?(totGain/totCost)*100:0;
  // Phase 3: holdings/prices stay natively USD (that's how tickers quote),
  // but the portfolio-level totals convert into the user's base_currency
  const totValBase=convert?convert(totVal,"USD",cur):null;
  const fmtBase=n=>`${cur} ${Math.round(Number(n)||0).toLocaleString("en-US")}`;

  const refresh=async()=>{
    const tickers=[...new Set(invs.map(h=>(h.ticker||"").trim().toUpperCase()).filter(Boolean))];
    if(!tickers.length){setErr("Add a ticker symbol first.");return;}
    setLoading(true);setErr("");
    try{
      const q=await fetchQuotes(tickers);
      setLivePrice(q);
      setUpdatedAt(Date.now());
      const hit=tickers.filter(t=>q[baseKey(t)]!=null).length;
      if(!hit)setErr("No prices found. Check your Worker URL or ticker symbols.");
      else if(hit<tickers.length)setErr(`Got ${hit}/${tickers.length} prices — remaining tickers not found.`);
      else setErr("");
      // auto-capture portfolio snapshot for the history chart
      const newTotVal=invs.reduce((s,hld)=>{
        const{shares}=holdingStats(hld.trades);
        const p=q[baseKey(hld.ticker||"")]||livePrice[baseKey(hld.ticker||"")]||0;
        return s+shares*p;
      },0);
      // convert to the user's base_currency before it hits the history array
      const newTotValBase=convert?convert(newTotVal,"USD",cur):newTotVal;
      if(newTotValBase>0)addPortSnap(newTotValBase);
    }catch(e){
      setErr(PROXY_URL.startsWith("PASTE_")&&FINNHUB_KEY.startsWith("PASTE_")
        ?"Set up your Cloudflare Worker (for VWRA/LSE) and/or Finnhub key (for US stocks) — see the setup guide."
        :"Price fetch failed — check your Worker URL or Finnhub key.");
    }
    setLoading(false);
  };

  const openTrade=invId=>{
    setTradeModal(invId);
    setTradeForm({type:"buy",shares:"",price:"",date:new Date().toISOString().slice(0,10)});
  };
  const submitTrade=()=>{
    if(!tradeForm.shares||!tradeForm.price)return;
    addTrade(tradeModal,{type:tradeForm.type,shares:Number(tradeForm.shares),price:Number(tradeForm.price),date:tradeForm.date});
    setTradeModal(null);
  };

  const gTone=n=>n>0?P.gr:n<0?P.red:P.sub;
  const series=projectSeries(totVal,projection.monthly,projection.years,projection.rate||8);
  const projData=series.map((v,i)=>({year:`Y${i}`,value:v}));

  return(
    <div style={{background:P.neuBg,borderRadius:24,padding:"14px 12px 18px",margin:"0 -4px"}}>
      {/* hero */}
      <div className="fade-up" style={{borderRadius:18,padding:20,marginBottom:16,background:P.deep,color:"#fff",
        boxShadow:`7px 7px 15px ${P.neuLo},-7px -7px 15px ${P.neuHi}`}}>
        <div style={{fontSize:12,fontWeight:500,color:P.deepHi,marginBottom:4}}>Portfolio value ({cur})</div>
        <span key={Math.round(totValBase??totVal)} className="serif tnum num-flash" style={{fontSize:38,fontWeight:600}}>{totValBase!=null?fmtBase(totValBase):"—"}</span>
        <div className="tnum" style={{display:"flex",flexWrap:"wrap",gap:16,marginTop:4,fontSize:14,color:P.deepHi}}>
          {cur!=="USD"&&<span>≈ {usd(totVal)}</span>}
          {(()=>{const php=convert&&cur!=="PHP"?convert(totVal,"USD","PHP"):null;return php!=null?<span>≈ ₱{Math.round(php).toLocaleString("en-US")}</span>:null;})()}
          {totValBase==null&&<span style={{color:"#E89B8C"}}>Loading live rates…</span>}
        </div>
        <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:20,fontSize:14}} className="tnum">
          <span style={{color:P.deepHi}}>Cost {usd(totCost)}</span>
          <span style={{color:totGain>=0?"#6FC6DA":"#E89B8C",fontWeight:600}}>
            {totGain>=0?"▲":"▼"} {usd(Math.abs(totGain))} ({totGainPct.toFixed(1)}%)
          </span>
        </div>
      </div>

      {/* portfolio history chart */}
      {portHistory.length>0&&(()=>{
        const pts=[...portHistory].sort((a,b)=>a.month.localeCompare(b.month));
        const first=pts[0].value,last=pts[pts.length-1].value;
        const trending=last>=first;
        const chartColor=trending?"#4ADE80":"#F87171";
        const fmtMo=m=>{const[y,mo]=m.split("-");return new Date(Number(y),Number(mo)-1,1).toLocaleDateString("en-US",{month:"short",year:"2-digit"});};
        const data=pts.map(p=>({label:fmtMo(p.month),value:p.value}));
        const pctChange=first>0?((last-first)/first*100):0;
        return(
          <div className="fade-up-1" style={{...neu(16),padding:16,marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <h3 style={{fontSize:14,fontWeight:600,color:P.neuSub,margin:0}}>Portfolio over time</h3>
              <span className="tnum" style={{fontSize:13,fontWeight:600,color:trending?P.jade:P.wine}}>
                {trending?"▲":"▼"} {Math.abs(pctChange).toFixed(1)}% total
              </span>
            </div>
            <div style={{width:"100%",height:160}}>
              <ResponsiveContainer>
                <LineChart data={data} margin={{top:4,right:8,bottom:0,left:-16}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={P.neuLo} opacity={.4}/>
                  <XAxis dataKey="label" tick={{fontSize:10,fill:P.neuSub}}/>
                  <YAxis tick={{fontSize:10,fill:P.neuSub}} tickFormatter={v=>`${cur} ${Math.round(v/1000)}k`}/>
                  <Tooltip formatter={v=>fmtBase(v)}/>
                  <Line type="monotone" dataKey="value" stroke={chartColor} strokeWidth={2.5} dot={{r:3,fill:chartColor}}/>
                </LineChart>
              </ResponsiveContainer>
            </div>
            <div style={{fontSize:11,color:P.neuSub,marginTop:6}}>
              Captured monthly when you refresh prices · {pts.length} data point{pts.length!==1?"s":""}
            </div>
          </div>
        );
      })()}

      {/* controls */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <h2 style={{fontSize:14,fontWeight:600,color:P.neuSub,margin:0}}>Holdings</h2>
        <button onClick={refresh} disabled={loading} className="neu-btn"
          style={{display:"flex",alignItems:"center",gap:6,padding:"6px 12px",fontSize:14,fontWeight:500,color:P.jade,opacity:loading?.6:1}}>
          <I.Refresh size={14} style={loading?{animation:"spin .9s linear infinite"}:null}/>
          {loading?"Fetching…":"Refresh prices"}
        </button>
      </div>
      {err&&<div style={{fontSize:12,color:P.wine,marginBottom:8,padding:"8px 12px",background:P.wineS,borderRadius:8}}>{err}</div>}
      {updatedAt&&!err&&<div style={{fontSize:11,color:P.neuSub,marginBottom:8}}>Prices updated {new Date(updatedAt).toLocaleTimeString()}</div>}

      {/* holdings list */}
      <div style={{...neu(16),overflow:"hidden",marginBottom:16}}>
        {rows.map(r=>(
          <div key={r.id} style={{borderBottom:"1px solid rgba(0,0,0,.06)"}}>
            {/* summary row */}
            <div style={{padding:"12px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <input value={r.ticker} placeholder="TICKER"
                  onChange={e=>updateInv(r.id,{ticker:e.target.value.toUpperCase()})}
                  onBlur={e=>{
                    const t=(e.target.value||"").trim().toUpperCase();
                    if(!t||r.name)return; // don't overwrite an existing name
                    fetchName(r.id,t);
                  }}
                  className="bare" style={{fontSize:14,fontWeight:700,width:80,letterSpacing:".03em",color:P.neuInk}}/>
                <input value={r.name} placeholder={fetchingName[r.id]?"fetching name…":"Name"} onChange={e=>updateInv(r.id,{name:e.target.value})} className="bare" style={{fontSize:13,color:P.neuSub,flex:1,minWidth:0}}/>
                <span className="tnum" style={{fontSize:14,fontWeight:600,color:P.neuInk}}>{usd(r.value)}</span>
                <button onClick={()=>removeInv(r.id)} style={{background:"transparent",border:"none",color:P.wine,opacity:.4}}><I.X size={15}/></button>
              </div>
              <div style={{marginTop:6,display:"flex",flexWrap:"wrap",alignItems:"center",gap:14,fontSize:13,color:P.neuSub}} className="tnum">
                <span>{r.shares.toFixed(4)} shares</span>
                <span>Avg {usd(r.avgCost)}</span>
                <span>Price {r.price>0?usd(r.price):"—"}</span>
                <span style={{color:gTone(r.gain),fontWeight:600,marginLeft:"auto"}}>
                  {r.gain>=0?"▲":"▼"} {usd(Math.abs(r.gain))} ({r.gainPct.toFixed(1)}%)
                </span>
              </div>
              {/* trade log toggle + add trade */}
              <div style={{marginTop:8,display:"flex",gap:8}}>
                <button onClick={()=>openTrade(r.id)} className="neu-btn"
                  style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",fontSize:12,fontWeight:500,color:P.jade}}>
                  <I.Plus size={12}/>Add trade
                </button>
                {(r.trades||[]).length>0&&(
                  <button onClick={()=>setExpandedId(expandedId===r.id?null:r.id)} className="neu-btn"
                    style={{display:"flex",alignItems:"center",gap:5,padding:"4px 10px",fontSize:12,color:P.neuSub}}>
                    {expandedId===r.id?"Hide":"Show"} {r.trades.length} trade{r.trades.length!==1?"s":""}
                  </button>
                )}
              </div>
            </div>

            {/* trade history */}
            {expandedId===r.id&&(r.trades||[]).length>0&&(
              <div style={{...neuInset(0),borderRadius:0,padding:"2px 0"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 32px",gap:4,padding:"6px 16px",fontSize:11,fontWeight:600,color:P.neuSub,textTransform:"uppercase",letterSpacing:".06em"}}>
                  <span>Date</span><span style={{textAlign:"right"}}>Type</span><span style={{textAlign:"right"}}>Shares</span><span style={{textAlign:"right"}}>Price</span><span/>
                </div>
                {[...(r.trades||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(tr=>(
                  <div key={tr.id} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 32px",gap:4,padding:"6px 16px",fontSize:13,alignItems:"center",borderTop:"1px solid rgba(0,0,0,.05)"}}>
                    <span className="tnum" style={{color:P.neuSub}}>{tr.date}</span>
                    <span style={{textAlign:"right",fontWeight:600,color:tr.type==="buy"?P.jade:P.wine,textTransform:"uppercase",fontSize:11}}>{tr.type}</span>
                    <span className="tnum" style={{textAlign:"right",color:P.neuInk}}>{(Number(tr.shares)||0).toFixed(4)}</span>
                    <span className="tnum" style={{textAlign:"right",color:P.neuInk}}>{usd(tr.price)}</span>
                    <button onClick={()=>removeTrade(r.id,tr.id)} style={{background:"transparent",border:"none",color:P.wine,opacity:.4,padding:4}}><I.X size={12}/></button>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
        <button onClick={addInv} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.jade,background:"transparent",border:"none"}}>
          <I.Plus size={14}/>Add holding
        </button>
      </div>

      {/* projection */}
      <div style={{...neu(16),padding:16}}>
        <h3 style={{fontSize:14,fontWeight:600,color:P.neuSub,margin:"0 0 8px"}}>Growth projection ({projection.rate||8}%/yr)</h3>
        <div style={{display:"flex",flexWrap:"wrap",gap:16,marginBottom:10,fontSize:13}}>
          <label style={{color:P.neuSub}}>+$/mo <input type="number" value={projection.monthly} onChange={e=>setProjection({monthly:Number(e.target.value)})} className="bare tnum" style={{width:80,fontWeight:600,color:P.neuInk}}/></label>
          <label style={{color:P.neuSub}}>Years <input type="number" value={projection.years} onChange={e=>setProjection({years:Number(e.target.value)})} className="bare tnum" style={{width:56,fontWeight:600,color:P.neuInk}}/></label>
          <label style={{color:P.neuSub}}>Rate % <input type="number" value={projection.rate??8} onChange={e=>setProjection({rate:Number(e.target.value)})} className="bare tnum" style={{width:48,fontWeight:600,color:P.neuInk}} step="0.5" min="0" max="30"/></label>
          <span className="tnum" style={{marginLeft:"auto",fontWeight:600,color:P.jade}}>→ ${series[series.length-1].toLocaleString("en-US")}</span>
        </div>
        <div style={{width:"100%",height:180}}>
          <ResponsiveContainer>
            <LineChart data={projData} margin={{top:8,right:8,bottom:0,left:-12}}>
              <CartesianGrid strokeDasharray="3 3" stroke={P.neuLo} opacity={.4}/>
              <XAxis dataKey="year" tick={{fontSize:11,fill:P.neuSub}}/>
              <YAxis tick={{fontSize:11,fill:P.neuSub}} tickFormatter={v=>`${Math.round(v/1000)}k`}/>
