<style>
:root{
  --bg:#E8EDF4;--ink:#15243B;--sub:#56657E;--faint:#8A98AD;
  --line:#D2DBE7;--sf:#FFFFFF;--sfA:#F0F4F9;
  --gr:#2C5FA8;--grD:#1B3E73;--grS:#E2EAF6;
  --br:#2E8BB0;--brS:#E0EEF4;--red:#C2533F;
  --deep:#15243B;--deepHi:#9DB0CC;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);transition:background .25s ease;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);-webkit-text-size-adjust:100%;}
.serif{font-family:"Iowan Old Style",Georgia,serif;}
.tnum{font-variant-numeric:tabular-nums;}
input.bare{background:transparent;border:none;outline:none;padding:1px 2px;border-radius:4px;transition:background .12s,box-shadow .12s;font:inherit;color:inherit;}
input.bare:hover{background:rgba(127,143,168,.12);}
input.bare:focus{background:rgba(91,143,217,.12);box-shadow:0 0 0 1px rgba(91,143,217,.4);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;}
input[type=number]{-moz-appearance:textfield;}
button{cursor:pointer;font:inherit;}
select{font:inherit;}

/* ── Keyframes ── */
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes numFlash{0%{opacity:1}30%{opacity:.35}100%{opacity:1}}
@keyframes slideInRight{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}
@keyframes sheetDown{from{opacity:0;transform:translateY(-24px)}to{opacity:1;transform:translateY(0)}}
@keyframes sheetBgIn{from{opacity:0}to{opacity:1}}

/* ── Top sheet (mobile-first modal alternative) — anchored near the top of
   the viewport so it's visible immediately on open, no scrolling needed,
   and stays clear of the on-screen keyboard which eats the bottom half. ── */
.sheet-bg{
  position:fixed;inset:0;z-index:40;display:flex;align-items:flex-start;justify-content:center;
  background:rgba(12,22,40,.45);
  animation:sheetBgIn .25s ease both;
  overflow-y:auto;
  padding:calc(env(safe-area-inset-top) + 16px) 12px 16px;
}
.sheet{
  border-radius:18px;padding:18px;
  width:100%;max-width:480px;max-height:calc(100vh - env(safe-area-inset-top) - 32px);overflow-y:auto;background:var(--sf);
  animation:sheetDown .28s cubic-bezier(.22,1,.36,1) both;
}
.sheet-handle{display:none;}


.spin{animation:spin .9s linear infinite;}
:focus-visible{outline:2px solid var(--gr);outline-offset:1px;}

/* ── Tab content fade ── */
.tab-enter{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both;}
.tab-enter-right{animation:slideInRight .45s cubic-bezier(.22,1,.36,1) both;}
.tab-enter-left{animation:slideInLeft .45s cubic-bezier(.22,1,.36,1) both;}

/* ── Cards / sections fade up on mount ── */
.fade-up{animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;}
.fade-up-1{animation:fadeUp .5s .1s cubic-bezier(.22,1,.36,1) both;}
.fade-up-2{animation:fadeUp .5s .2s cubic-bezier(.22,1,.36,1) both;}
.fade-up-3{animation:fadeUp .5s .3s cubic-bezier(.22,1,.36,1) both;}
.fade-up-4{animation:fadeUp .5s .4s cubic-bezier(.22,1,.36,1) both;}
.fade-up-5{animation:fadeUp .5s .5s cubic-bezier(.22,1,.36,1) both;}

/* ── List item appear ── */
.list-item-enter{animation:fadeUp .38s cubic-bezier(.22,1,.36,1) both;}

/* ── Number flash when value changes ── */
.num-flash{animation:numFlash .6s ease both;}

/* ── Modal overlay + panel ── */
.modal-bg{
  position:fixed;inset:0;z-index:40;display:flex;align-items:center;justify-content:center;padding:16px;
  background:rgba(12,22,40,.45);
  animation:overlayIn .3s ease both;
}
.modal{
  border-radius:18px;padding:20px;width:100%;max-width:400px;max-height:88vh;overflow-y:auto;background:var(--sf);
  animation:scaleIn .4s cubic-bezier(.22,1,.36,1) both;
}

/* ── Button & interactive transitions ── */
button{transition:opacity .18s,transform .15s,background .22s,color .22s,box-shadow .22s;}
button:active{transform:scale(.96);}
select{transition:background .22s;}

/* ── Progress bars ── */
.bar-animated{transition:width .8s cubic-bezier(.22,1,.36,1);}
.bar-color{transition:background .5s;}

/* ── Reduced motion override ── */
@media(prefers-reduced-motion:reduce){
  *{transition:none!important;animation:none!important;}
}

#root{padding-top:env(safe-area-inset-top);}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;font-family:-apple-system,sans-serif;color:#56657E;font-size:14px;transition:background .25s;}
.loader{width:32px;height:32px;border:3px solid #D2DBE7;border-top-color:#2C5FA8;border-radius:50%;animation:spin .8s linear infinite;}

const{useState,useEffect,useMemo,useRef,useCallback}=React;
/* Renders children directly onto document.body instead of in the normal DOM
   tree. Needed for any fixed-position overlay (modals/sheets): tab panes are
   wrapped in an entrance-animation div whose transform never fully clears
   (fill-mode "both" keeps translateX(0) applied after the animation ends),
   which silently turns that div into the containing block for *all*
   position:fixed descendants — so "fixed" modals inside it end up anchored
   to the scrollable page instead of the viewport. Portaling to <body> sidesteps
   that entirely. */
function Portal({children}){
  return ReactDOM.createPortal(children,document.body);
}
const _RC=(typeof Recharts!=='undefined')?Recharts:window.Recharts||{};
const{PieChart,Pie,Cell,ResponsiveContainer,LineChart,Line,XAxis,YAxis,CartesianGrid,Tooltip}=_RC;

/* ── Animation helpers ── */

/* Flash a DOM node's class briefly when a value changes */
function useFlash(val,ref){
  const prev=useRef(val);
  useEffect(()=>{
    if(prev.current===val){return;}
    prev.current=val;
    const el=ref.current;
    if(!el)return;
    el.classList.remove("num-flash");
    // force reflow so re-adding the class restarts the animation
    void el.offsetWidth;
    el.classList.add("num-flash");
    const t=setTimeout(()=>el.classList.remove("num-flash"),400);
    return()=>clearTimeout(t);
  },[val]);
}

/* Tab direction tracker so we can slide left or right */
const TAB_ORDER=["budget","expenses","household","banks","investments","networth","goals","currency","overview"];
function TabPane({tab,children}){
  const prevTab=useRef(tab);
  const dir=useRef("right");
  if(prevTab.current!==tab){
    const pi=TAB_ORDER.indexOf(prevTab.current);
    const ci=TAB_ORDER.indexOf(tab);
    dir.current=ci>pi?"right":"left";
    prevTab.current=tab;
  }
  const cls=dir.current==="right"?"tab-enter-right":"tab-enter-left";
  return <div key={tab} className={cls}>{children}</div>;
}

/* Staggered fade-up wrapper for a list of items */
function FadeList({items,renderItem,keyFn}){
  return items.map((item,i)=>(
    <div key={keyFn?keyFn(item):i} className={`fade-up-${Math.min(i+1,5)}`}>
      {renderItem(item,i)}
    </div>
  ));
}

   without needing prop-drilling or context. */

  const src=mode==="dark"?PALETTE_DARK:PALETTE_LIGHT;

  root.style.setProperty("--bg",src.bg);
  root.style.setProperty("--ink",src.ink);
  root.style.setProperty("--sub",src.sub);
  root.style.setProperty("--faint",src.faint);
  root.style.setProperty("--line",src.line);
  root.style.setProperty("--sf",src.sf);
  root.style.setProperty("--sfA",src.sfA);
  root.style.setProperty("--gr",src.gr);
  root.style.setProperty("--grD",src.grD);
  root.style.setProperty("--grS",src.grS);
  root.style.setProperty("--br",src.br);
  root.style.setProperty("--brS",src.brS);
  root.style.setProperty("--red",src.red);
  root.style.setProperty("--deep",src.deep);
  root.style.setProperty("--deepHi",src.deepHi);
  root.setAttribute("data-theme",mode);
  const meta=document.querySelector('meta[name="theme-color"]');
  if(meta)meta.setAttribute("content",src.bg);
}

   evaluates via Function constructor, and falls back to the previous value on
   anything invalid (empty, unsafe chars, NaN, division errors, etc). */
const MATH_CHARS_RE=/^[0-9+\-*/. ()]+$/;
const evalMathExpr=(raw,fallback=0)=>{
  if(raw==null)return fallback;
  const s=String(raw).trim();
  if(s==="")return fallback;
  if(!MATH_CHARS_RE.test(s))return Number(s)||fallback;

  }catch(e){return fallback;}
};

/* ── Pay-period utilities ──────────────────────────────────────────────────
   Pay-periods are an opt-in alternative to calendar-month budgeting, for
   people whose salary lands on a fixed day rather than the 1st. A period is
   identified by a "period key" — the ISO date (YYYY-MM-DD) of its START day
   — so it sorts and compares like any other date string. When pay-periods
   are off for an owner, the rest of the app keeps using plain "YYYY-MM"
   calendar-month keys exactly as before; these utilities are only called
   when `payPeriod.enabled` is true for that owner.

   "payday" = day of month (1-31) salary arrives; the period covering a given
   date runs from that day through the day before the same day next month.
   A payday beyond a short month (e.g. 31 in February) clamps to the last
   actual day of that month, the conventional way to handle this. ───────── */

/* Last valid calendar day of a given year/month (month is 1-12) */
function daysInCalMonth(y,m){return new Date(y,m,0).getDate();}

/* Resolve a payday (1-31) against a specific year/month, clamping to the
   month's last real day so "31" in February becomes that February's 28/29. */
function clampPayday(y,m,payday){return Math.min(Math.max(1,Number(payday)||1),daysInCalMonth(y,m));}

/* Build a Date for the period START that contains `dateStr`, given a payday.
   Returns a plain Date at local midnight. */
function periodStartFor(dateStr,payday){
  const d=new Date(dateStr+"T00:00:00");
  const y=d.getFullYear(),m=d.getMonth()+1,day=d.getDate();
  const thisMonthPayday=clampPayday(y,m,payday);
  if(day>=thisMonthPayday){
    return new Date(y,m-1,thisMonthPayday);
  }
  // falls before this month's payday → belongs to the period that started last month
  const py=m===1?y-1:y, pm=m===1?12:m-1;
  return new Date(py,pm-1,clampPayday(py,pm,payday));
}

/* The period KEY (YYYY-MM-DD of the period's start) containing a given date */
function periodKeyFor(dateStr,payday){
  const start=periodStartFor(dateStr,payday);
  return`${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,"0")}-${String(start.getDate()).padStart(2,"0")}`;
}

/* {start,end} Date objects (inclusive) for the period identified by a key */
function periodRange(periodKey,payday){
  let[y,m,d]=(periodKey||"").split("-").map(Number);
  if(!y||!m||!d){
    // Malformed or stale key — e.g. a calendar-month key ("YYYY-MM") briefly
    // passed in for one render right as pay-periods finish loading/turn on,
    // before the owning view's re-anchoring effect has run. Falling back to
    // the period containing today (instead of building an Invalid Date,
    // which throws once it hits toLocaleDateString) is what was producing
    // the stuck "Invalid Date" budget header.
    [y,m,d]=periodKeyFor(todayISO(),payday).split("-").map(Number);
  }
  const start=new Date(y,m-1,d);
  const nextY=m===12?y+1:y, nextM=m===12?1:m+1;
  const nextPayday=clampPayday(nextY,nextM,payday);
  const end=new Date(nextY,nextM-1,nextPayday-1);
  return{start,end};
}

/* Number of days in a period (inclusive of both ends) */
function periodLength(periodKey,payday){
  const{start,end}=periodRange(periodKey,payday);
  return Math.round((end-start)/86400000)+1;
}

/* Step a period key forward/back n periods */
function shiftPeriod(periodKey,payday,n){
  let key=periodKey;
  if(n>0){for(let i=0;i<n;i++){const{end}=periodRange(key,payday);const next=new Date(end);next.setDate(next.getDate()+1);key=periodKeyFor(`${next.getFullYear()}-${String(next.getMonth()+1).padStart(2,"0")}-${String(next.getDate()).padStart(2,"0")}`,payday);}}
  else if(n<0){for(let i=0;i<-n;i++){const{start}=periodRange(key,payday);const prevDay=new Date(start);prevDay.setDate(prevDay.getDate()-1);key=periodKeyFor(`${prevDay.getFullYear()}-${String(prevDay.getMonth()+1).padStart(2,"0")}-${String(prevDay.getDate()).padStart(2,"0")}`,payday);}}
  return key;
}

/* Human label for a period: "Jun 28 – Jul 27, 2026" */
function periodLabel(periodKey,payday){
  const{start,end}=periodRange(periodKey,payday);
  const sameYear=start.getFullYear()===end.getFullYear();
  const startStr=start.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  if(sameYear){
    const endStr=end.toLocaleDateString("en-US",{month:"short",day:"numeric"});
    return`${startStr} – ${endStr}, ${end.getFullYear()}`;
  }
  // crosses a year boundary: show both years explicitly, e.g. "Dec 28, 2025 – Jan 27, 2026"
  const startWithYear=start.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  const endWithYear=end.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  return`${startWithYear} – ${endWithYear}`;
}

/* Today's date as YYYY-MM-DD, local time */
function todayISO(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}

/* ── Unified period helpers — these are what views actually call.
   They check the owner's payPeriod settings and transparently fall back to
   plain calendar-month bucketing ("YYYY-MM") when pay-periods are off,
   so existing calendar-month logic and stored data are untouched. ───────── */
function ownerUsesPayPeriod(payPeriods,owner){
  const cfg=(payPeriods||{})[owner];
  return!!(cfg&&cfg.enabled&&cfg.payday);
}
function bucketKeyFor(dateStr,payPeriods,owner){
  const cfg=(payPeriods||{})[owner];
  if(cfg&&cfg.enabled&&cfg.payday)return periodKeyFor(dateStr,cfg.payday);
  return(dateStr||"").slice(0,7);
}
function bucketLabel(bucketKey,payPeriods,owner){
  const cfg=(payPeriods||{})[owner];
  if(cfg&&cfg.enabled&&cfg.payday)return periodLabel(bucketKey,cfg.payday);
  const[y,mo]=bucketKey.split("-");
  return new Date(Number(y),Number(mo)-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
}
function bucketShift(bucketKey,payPeriods,owner,n){
  const cfg=(payPeriods||{})[owner];
  if(cfg&&cfg.enabled&&cfg.payday)return shiftPeriod(bucketKey,cfg.payday,n);
  const[y,m]=bucketKey.split("-").map(Number);
  const d=new Date(y,m-1+n,1);
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
}
function bucketNow(payPeriods,owner){
  return bucketKeyFor(todayISO(),payPeriods,owner);
}
/* Days elapsed / total in the CURRENT bucket, for burn-rate projections.
   For calendar months this is identical to the old daysInMonth/dayOfMonth
   logic; for pay-periods it uses the period's actual start/end. */
function bucketProgress(bucketKey,payPeriods,owner){
  const cfg=(payPeriods||{})[owner];
  if(cfg&&cfg.enabled&&cfg.payday){
    const{start,end}=periodRange(bucketKey,cfg.payday);
    const total=periodLength(bucketKey,cfg.payday);
    const now=new Date();now.setHours(0,0,0,0);
    const elapsed=Math.max(1,Math.min(total,Math.round((now-start)/86400000)+1));
    return{elapsed,total};
  }
  const[y,m]=bucketKey.split("-").map(Number);
  const total=daysInCalMonth(y,m);
  const elapsed=new Date().getDate();
  return{elapsed,total};
}

   Worker fetches Yahoo Finance server-side (no CORS), returns JSON.

const FINNHUB_KEY="d8v0c6hr01qrt65ul4k0d8v0c6hr01qrt65ul4kg";

/* Map tickers to the right Yahoo symbol.
   VWRA → VWRA.L (LSE), bare US tickers stay as-is.                      */
const LSE_SET=new Set(["VWRA","VWRP","VWCE","VWRL","CSPX","EIMI","SWDA","IGLN","IUSA","ISF","HMWO","SSAC","VAGP","AGGG"]);
function toYahooSym(t){
  const b=t.toUpperCase().replace(/\.L$/i,"");
  return LSE_SET.has(b)?b+".L":b;
}
function baseKey(t){return t.toUpperCase().replace(/\.L$|\.AS$|\.DE$/i,"");}

async function fetchQuotes(tickers){
  const out={};

  /* ── 1. Cloudflare Worker → Yahoo Finance (handles VWRA + all tickers) */
  if(!PROXY_URL.startsWith("PASTE_")){
    const syms=tickers.map(toYahooSym).join(",");
    try{
      const r=await fetch(`${PROXY_URL}/quote?symbols=${encodeURIComponent(syms)}`);
      if(r.ok){
        const j=await r.json();
        Object.entries(j).forEach(([sym,price])=>{
          if(price>0)out[baseKey(sym)]=price;
        });
      }
    }catch(e){}
  }

  /* ── 2. Finnhub direct (US, real-time, no proxy needed) ── */
  if(!FINNHUB_KEY.startsWith("PASTE_")){
    const missing=tickers.filter(t=>!out[baseKey(t)]);
    await Promise.all(missing.map(async t=>{
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(baseKey(t))}&token=${FINNHUB_KEY}`);
        if(!r.ok)return;
        const j=await r.json();
        const p=j.c>0?j.c:(j.pc>0?j.pc:null);
        if(p)out[baseKey(t)]=p;
      }catch(e){}
    }));
  }

  if(Object.keys(out).length===0)throw new Error("no quotes");
  return out;
}

/* ── Projection helper ── */
function projectSeries(start,monthly,years,annualPct){
  const r=annualPct/100/12;const out=[];
  for(let y=0;y<=years;y++){
    const m=y*12;
    const fv=r===0?start+monthly*m:start*Math.pow(1+r,m)+monthly*((Math.pow(1+r,m)-1)/r);
    out.push(Math.round(fv));
  }
  return out;
}

/* ── Compute holding stats from trade log ── */
function holdingStats(trades=[]){
  let shares=0,cost=0;
  (trades||[]).forEach(tr=>{
    const s=Number(tr.shares)||0,p=Number(tr.price)||0;
    if(tr.type==="buy"){shares+=s;cost+=s*p;}
    else if(tr.type==="sell"){
      const avgBefore=shares>0?cost/shares:0;
      shares=Math.max(0,shares-s);
      cost=shares*avgBefore;
    }
  });
  const avgCost=shares>0?cost/shares:0;
  return{shares,avgCost,totalCost:cost};
}

/* ── Liability remaining balance (auto-decrements by month) ── */
function liabilityBalance(liab){
  if(!liab.installment)return Number(liab.value)||0;
  const{monthly,monthsRemaining,asOfDate}=liab;
  if(!monthly||!monthsRemaining||!asOfDate)return Number(liab.value)||0;
  const now=new Date();
  const ref=new Date(asOfDate);
  const elapsed=Math.max(0,(now.getFullYear()-ref.getFullYear())*12+(now.getMonth()-ref.getMonth()));
  const remaining=Math.max(0,monthsRemaining-elapsed);
  return(Number(monthly)||0)*remaining;
}
