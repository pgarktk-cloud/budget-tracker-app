          <input type="number" value={a.value} onChange={e=>updateAsset(a.id,{value:Number(e.target.value)})}
            className="bare tnum" style={{width:120,textAlign:"right",fontSize:14,fontWeight:600}}/>
        </div>
      ):(
        /* Liability installment mode */
        <div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <button onClick={()=>updateAsset(a.id,{installment:true})}
              style={{flex:1,borderRadius:8,padding:"5px 0",fontSize:12,fontWeight:600,background:a.installment?P.gr:"transparent",color:a.installment?"#fff":P.sub,border:`1px solid ${a.installment?P.gr:P.line}`}}>
              Installment
            </button>
            <button onClick={()=>updateAsset(a.id,{installment:false})}
              style={{flex:1,borderRadius:8,padding:"5px 0",fontSize:12,fontWeight:600,background:!a.installment?P.gr:"transparent",color:!a.installment?"#fff":P.sub,border:`1px solid ${!a.installment?P.gr:P.line}`}}>
              Fixed amount
            </button>
          </div>
          {a.installment?(
            <div style={{display:"flex",flexWrap:"wrap",gap:10,fontSize:13}}>
              <label style={{color:P.sub,display:"flex",flexDirection:"column",gap:3}}>
                <span style={{fontSize:11}}>Monthly payment ({a.currency})</span>
                <input type="number" value={a.monthly||""} onChange={e=>updateAsset(a.id,{monthly:Number(e.target.value)})}
                  className="bare tnum" style={{width:110,fontSize:14,fontWeight:600,padding:"4px 6px",background:P.sfA,borderRadius:6}}/>
              </label>
              <label style={{color:P.sub,display:"flex",flexDirection:"column",gap:3}}>
                <span style={{fontSize:11}}>Months remaining (as of)</span>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <input type="number" value={a.monthsRemaining||""} onChange={e=>updateAsset(a.id,{monthsRemaining:Number(e.target.value)})}
                    className="bare tnum" style={{width:56,fontSize:14,fontWeight:600,padding:"4px 6px",background:P.sfA,borderRadius:6}}/>
                  <input type="month" value={(a.asOfDate||"").slice(0,7)} onChange={e=>updateAsset(a.id,{asOfDate:e.target.value+"-01"})}
                    style={{fontSize:12,padding:"4px 6px",background:P.sfA,border:`1px solid ${P.line}`,borderRadius:6,color:P.ink}}/>
                </div>
              </label>
              {(a.monthly&&a.monthsRemaining&&a.asOfDate)&&(()=>{
                const bal=liabilityBalance(a);
                const now=new Date();const ref=new Date(a.asOfDate);
                const elapsed=Math.max(0,(now.getFullYear()-ref.getFullYear())*12+(now.getMonth()-ref.getMonth()));
                const remaining=Math.max(0,a.monthsRemaining-elapsed);
                return(
                  <div style={{width:"100%",background:P.sfA,borderRadius:10,padding:10,marginTop:4}}>
                    <div style={{fontSize:12,color:P.sub}}>Balance today: <strong className="tnum">{a.currency} {Math.round(bal).toLocaleString("en-US")}</strong></div>
                    <div style={{fontSize:11,color:P.faint,marginTop:2}}>{remaining} months remaining · {elapsed} months paid</div>
                    <div style={{marginTop:6,height:6,background:P.line,borderRadius:999,overflow:"hidden"}}>
                      <div style={{width:`${Math.min(100,(elapsed/a.monthsRemaining)*100)}%`,height:"100%",background:P.gr}}/>
                    </div>
                  </div>
                );
              })()}
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:12,color:P.faint}}>{a.currency}</span>
              <input type="number" value={a.value||""} onChange={e=>updateAsset(a.id,{value:Number(e.target.value)})}
                className="bare tnum" style={{width:120,textAlign:"right",fontSize:14,fontWeight:600}}/>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ── NET WORTH VIEW — installment liabilities ── */
function NetWorthView({netWorth,banksSar,invSar,assetSar,liabSar,sarRate,convert,ratesErr,assets,addAsset,updateAsset,removeAsset,history,captureSnapshot,addPastSnap,removeSnap}){
  const[gran,setGran]=useState("month");
  const[pm,setPm]=useState(new Date().toISOString().slice(0,7));
  const[pv,setPv]=useState("");
  const sar=n=>`SAR ${Math.round(n).toLocaleString("en-US")}`;
  const usd=sarRate?Math.round(netWorth/sarRate):null;
  const php=convert?convert(netWorth,"SAR","PHP"):null;
  const parts=[{label:"Bank accounts",value:banksSar,color:SEG[0]},{label:"Investments",value:invSar,color:SEG[3]},{label:"Other assets",value:assetSar,color:SEG[5]},{label:"Liabilities",value:-liabSar,color:P.red}];
  const gross=banksSar+invSar+assetSar;
  const fmtMo=m=>{const[y,mo]=m.split("-");return new Date(Number(y),Number(mo)-1,1).toLocaleDateString("en-US",{month:"short",year:"2-digit"});};
  const sorted=[...history].sort((a,b)=>a.month.localeCompare(b.month));
  let pts;
  if(gran==="year"){const m={};sorted.forEach(s=>{m[s.month.slice(0,4)]=s;});pts=Object.entries(m).map(([y,s])=>({label:y,net:s.net}));}
  else pts=sorted.map(s=>({label:fmtMo(s.month),net:s.net}));
  const last=sorted[sorted.length-1];
  const delta=last?netWorth-last.net:null;
  const assetItems=assets.filter(a=>a.kind==="asset");
  const liabItems=assets.filter(a=>a.kind==="liability");

  return(
    <div>
      <div style={{borderRadius:16,padding:20,marginBottom:16,background:P.ink,color:"#fff"}}>
        <div style={{fontSize:12,fontWeight:500,color:"#9DB0CC",marginBottom:4}}>Net worth</div>
        <span className="serif tnum" style={{fontSize:38,fontWeight:600}}>{sar(netWorth)}</span>
        <div className="tnum" style={{display:"flex",flexWrap:"wrap",gap:16,marginTop:6,color:"#9DB0CC",fontSize:14}}>
          <span>{usd!=null?`≈ $${usd.toLocaleString("en-US")}`:"USD —"}</span>
          <span>{php!=null?`≈ ₱${Math.round(php).toLocaleString("en-US")}`:"PHP —"}</span>
        </div>
        {(usd==null||php==null)&&<div style={{fontSize:11,marginTop:6,color:"#E89B8C"}}>{ratesErr?"Couldn't load live rates — tap refresh in Currency tab.":"Loading live rates…"}</div>}
        {delta!=null&&<div className="tnum" style={{fontSize:14,marginTop:6,color:delta>=0?"#6FC6DA":"#E89B8C"}}>{delta>=0?"▲":"▼"} {sar(Math.abs(delta))} since last snapshot</div>}
      </div>

      <div style={{borderRadius:16,padding:16,marginBottom:16,background:P.sf,border:`1px solid ${P.line}`}}>
        <h3 style={{fontSize:14,fontWeight:600,margin:"0 0 12px",color:P.sub}}>Composition</h3>
        <div style={{display:"flex",height:12,width:"100%",overflow:"hidden",borderRadius:999,marginBottom:12,background:P.sfA}}>
          {parts.slice(0,3).map(p=>gross>0&&p.value>0&&<div key={p.label} style={{width:`${(p.value/gross)*100}%`,height:"100%",background:p.color}}/>)}
        </div>
        {parts.map(p=>(
          <div key={p.label} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"4px 0",fontSize:14}}>
            <span style={{display:"flex",alignItems:"center",gap:8}}><span style={{width:10,height:10,borderRadius:999,background:p.color}}/>{p.label}</span>
            <span className="tnum" style={{color:p.value<0?P.red:P.sub}}>{p.value<0?`− ${sar(-p.value)}`:sar(p.value)}</span>
          </div>
        ))}
      </div>

      <div style={{borderRadius:16,overflow:"hidden",marginBottom:16,background:P.sf,border:`1px solid ${P.line}`}}>
        <div style={{padding:"10px 16px",fontSize:14,fontWeight:600,background:P.sfA,borderBottom:`1px solid ${P.line}`}}>Assets</div>
        {assetItems.map(a=><AssetRow key={a.id} a={a} updateAsset={updateAsset} removeAsset={removeAsset}/>)}
        <button onClick={()=>addAsset("asset")} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.gr,background:"transparent",border:"none"}}><I.Plus size={14}/>Add asset</button>
        <div style={{padding:"10px 16px",fontSize:14,fontWeight:600,background:P.sfA,borderTop:`1px solid ${P.line}`,borderBottom:`1px solid ${P.line}`}}>Liabilities</div>
        {liabItems.map(a=><AssetRow key={a.id} a={a} updateAsset={updateAsset} removeAsset={removeAsset}/>)}
        <button onClick={()=>addAsset("liability")} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.red,background:"transparent",border:"none"}}><I.Plus size={14}/>Add liability</button>
      </div>

      <div style={{borderRadius:16,padding:16,background:P.sf,border:`1px solid ${P.line}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <h3 style={{fontSize:14,fontWeight:600,margin:0,color:P.sub}}>Net worth over time</h3>
          <div style={{display:"flex",gap:4}}>
            {["month","year"].map(gv=>(
              <button key={gv} onClick={()=>setGran(gv)} style={{borderRadius:999,padding:"3px 10px",fontSize:12,textTransform:"capitalize",background:gran===gv?P.ink:P.sfA,color:gran===gv?"#fff":P.sub,border:"none"}}>{gv}</button>
            ))}
          </div>
        </div>
        {pts.length>0?(
          <div style={{width:"100%",height:200}}>
            <ResponsiveContainer>
              <LineChart data={pts} margin={{top:8,right:8,bottom:0,left:-12}}>
                <CartesianGrid strokeDasharray="3 3" stroke={P.sfA}/>
                <XAxis dataKey="label" tick={{fontSize:11,fill:P.faint}}/>
                <YAxis tick={{fontSize:11,fill:P.faint}} tickFormatter={v=>`${Math.round(v/1000)}k`}/>
                <Tooltip formatter={v=>sar(v)}/>
                <Line type="monotone" dataKey="net" stroke={P.gr} strokeWidth={2} dot={{r:3}}/>
              </LineChart>
            </ResponsiveContainer>
          </div>
        ):<p style={{fontSize:13,color:P.faint}}>No snapshots yet — capture today to start your timeline.</p>}
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:10,marginTop:12}}>
          <button onClick={captureSnapshot} style={{borderRadius:999,padding:"8px 14px",fontSize:14,fontWeight:500,background:P.gr,color:"#fff",border:"none"}}>Capture this month</button>
          <span style={{fontSize:12,color:P.faint}}>Saves {sar(netWorth)} to timeline</span>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"flex-end",gap:8,marginTop:12,paddingTop:12,borderTop:`1px solid ${P.sfA}`}}>
          <div><div style={{color:P.faint,fontSize:10}}>Month</div><input type="month" value={pm} onChange={e=>setPm(e.target.value)} style={{borderRadius:8,padding:"4px 8px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/></div>
          <div><div style={{color:P.faint,fontSize:10}}>Net worth (SAR)</div><input type="number" value={pv} placeholder="0" onChange={e=>setPv(e.target.value)} className="tnum" style={{borderRadius:8,padding:"4px 8px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink,width:120}}/></div>
          <button onClick={()=>{if(pm&&Number(pv)){addPastSnap(pm,Number(pv));setPv("");}}} style={{borderRadius:8,padding:"6px 12px",fontSize:14,fontWeight:500,background:P.sfA,color:P.gr,border:`1px solid ${P.line}`}}>Add entry</button>
        </div>
        {sorted.length>0&&(
          <div style={{marginTop:12,display:"flex",flexWrap:"wrap",gap:6}}>
            {sorted.map(s=>(
              <span key={s.id} className="tnum" style={{display:"inline-flex",alignItems:"center",gap:4,borderRadius:999,padding:"4px 10px",fontSize:12,background:P.sfA,color:P.sub}}>
                {fmtMo(s.month)} · {sar(s.net)}
                <button onClick={()=>removeSnap(s.id)} style={{background:"transparent",border:"none",color:P.red}}><I.X size={11}/></button>
              </span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── CURRENCY VIEW ── */
function CurrencyView({rates,ratesAt,ratesErr,ratesLoading,onRefresh,convert,fxAmount,setFxAmount,fxFrom,setFxFrom,fxTo,setFxTo}){
  const amount=fxAmount,from=fxFrom,to=fxTo;
  const setAmount=setFxAmount,setFrom=setFxFrom,setTo=setFxTo;
  const result=convert(amount,from,to);
  const one=convert(1,from,to);
  const card={background:P.sf,border:`1px solid ${P.line}`,borderRadius:16};
  return(
    <div>
      <div style={{...card,padding:16,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <span style={{fontSize:13,fontWeight:600,color:P.sub}}>Live converter</span>
          <button onClick={onRefresh} disabled={ratesLoading} style={{display:"flex",alignItems:"center",gap:6,borderRadius:999,padding:"5px 10px",fontSize:12,fontWeight:500,background:P.sfA,color:P.gr,border:`1px solid ${P.line}`}}>
            <I.Refresh size={13} style={ratesLoading?{animation:"spin .9s linear infinite"}:null}/>Refresh
          </button>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"center",gap:8}}>
          <input type="number" value={amount} onChange={e=>setAmount(Number(e.target.value))} className="tnum"
            style={{borderRadius:10,padding:"8px 10px",fontSize:18,fontWeight:600,width:130,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
          <select value={from} onChange={e=>setFrom(e.target.value)} style={{borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`}}>
            {FX_CODES.map(c=><option key={c}>{c}</option>)}
          </select>
          <button onClick={()=>{setFrom(to);setTo(from);}} style={{borderRadius:999,padding:8,background:P.sfA,border:`1px solid ${P.line}`,color:P.sub}}><I.Swap size={16}/></button>
          <select value={to} onChange={e=>setTo(e.target.value)} style={{borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`}}>
            {FX_CODES.map(c=><option key={c}>{c}</option>)}
          </select>
        </div>
        <div style={{marginTop:14}}>
          {result!=null
            ?<div>
              <div className="serif tnum" style={{fontSize:30,fontWeight:600,color:P.ink}}>{result.toLocaleString("en-US",{maximumFractionDigits:2})} <span style={{fontSize:16,color:P.sub}}>{to}</span></div>
              <div style={{fontSize:12,color:P.faint}}>1 {from} = {one.toLocaleString("en-US",{maximumFractionDigits:4})} {to}</div>
            </div>
            :<div style={{fontSize:14,color:P.red}}>{ratesErr?"Rates unavailable — tap refresh.":"Loading rates…"}</div>
          }
        </div>
      </div>
      <div style={{...card,padding:16}}>
        <div style={{fontSize:13,fontWeight:600,color:P.sub,marginBottom:10}}>Quick rates</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10}}>
          {[["USD","SAR"],["SAR","PHP"],["USD","PHP"],["AED","PHP"]].map(([f,t])=>{
            const v=convert(1,f,t);
            return(
              <div key={f+t} style={{borderRadius:12,padding:12,background:P.sfA}}>
                <div style={{fontSize:11,color:P.faint}}>1 {f} →</div>
                <div className="tnum" style={{fontSize:18,fontWeight:600,color:P.ink}}>
                  {v==null?"—":v.toLocaleString("en-US",{maximumFractionDigits:t==="PHP"?2:4})} <span style={{fontSize:12,color:P.sub}}>{t}</span>
                </div>
              </div>
            );
          })}
        </div>
        {ratesAt&&<div style={{fontSize:11,color:P.faint,marginTop:10}}>Updated {new Date(ratesAt).toLocaleString()}</div>}
      </div>
    </div>
  );
}


/* ── GOAL SQUARE CARD (top-level so inputs keep focus) ── */
function GoalSquare({g,fmt,updateGoal,removeGoal,openAdd,openDetails,openTypePicker}){
  const saved=(g.contributions||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
  const pctDone=g.target>0?Math.min(100,(saved/g.target)*100):0;
  const Icon=goalIcon(g.type);
  const R=26,C=2*Math.PI*R;
  return(
    <div style={{borderRadius:16,padding:14,background:P.sf,border:`1px solid ${P.line}`,display:"flex",flexDirection:"column",gap:8}}>
      {/* top row: type icon + delete */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={()=>openTypePicker(g.id)} title="Change goal type"
          style={{display:"flex",alignItems:"center",justifyContent:"center",width:34,height:34,borderRadius:10,
            background:g.color+"22",color:g.color,border:"none"}}>
          <Icon size={18}/>
        </button>
        <button onClick={()=>removeGoal(g.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4,padding:2}}><I.X size={15}/></button>
      </div>

      {/* name */}
      <input value={g.name} onChange={e=>updateGoal(g.id,{name:e.target.value})} className="bare"
        style={{fontSize:14,fontWeight:600,width:"100%",minWidth:0}}/>

      {/* ring progress */}
      <div style={{display:"flex",justifyContent:"center",padding:"2px 0"}}>
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle cx="36" cy="36" r={R} stroke={P.sfA} strokeWidth="7" fill="none"/>
          <circle cx="36" cy="36" r={R} stroke={g.color} strokeWidth="7" fill="none" strokeLinecap="round"
            strokeDasharray={C} strokeDashoffset={C*(1-pctDone/100)} transform="rotate(-90 36 36)"
            style={{transition:"stroke-dashoffset .5s"}}/>
          <text x="36" y="40" textAnchor="middle" fontSize="15" fontWeight="700" fill={P.ink} className="tnum">{pctDone.toFixed(0)}%</text>
        </svg>
      </div>

      {/* saved / target */}
      <div style={{textAlign:"center"}} className="tnum">
        <div style={{fontSize:14,fontWeight:700,color:P.ink}}>{fmt(saved)}</div>
        <div style={{fontSize:11,color:P.faint}}>of {fmt(g.target)}</div>
      </div>

      {/* actions */}
      <div style={{display:"flex",gap:6,marginTop:"auto"}}>
        <button onClick={()=>openAdd(g.id)}
          style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:4,borderRadius:999,padding:"6px 0",fontSize:12,fontWeight:600,background:g.color,color:"#fff",border:"none"}}>
          <I.Plus size={12}/>Add
        </button>
        <button onClick={()=>openDetails(g.id)} title="Details"
          style={{display:"flex",alignItems:"center",justifyContent:"center",borderRadius:999,padding:"6px 10px",fontSize:12,fontWeight:600,color:P.sub,background:P.sfA,border:`1px solid ${P.line}`}}>
          ⋯
        </button>
      </div>
    </div>
  );
}

                  const active=g.type===key;
                  return(
                    <button key={key} onClick={()=>{updateGoal(g.id,{type:key});setTypePicker(null);}}
                      style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,padding:"12px 6px",borderRadius:12,
                        background:active?g.color+"22":P.sfA,color:active?g.color:P.sub,
                        border:`1px solid ${active?g.color:P.line}`,fontSize:11,fontWeight:600,textAlign:"center",lineHeight:1.2}}>
                      <Icon size={22}/>{label}
                    </button>
                  );
                })}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Add money modal ── */}
      {addModal&&(()=>{
        const g=goals.find(x=>x.id===addModal);
        if(!g)return null;
        const saved=(g.contributions||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
        return(
          <div className="modal-bg" onClick={()=>setAddModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
                <h3 style={{margin:0,fontSize:16,fontWeight:600}}>Add money — {g.name}</h3>
                <button onClick={()=>setAddModal(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
              </div>
              <div style={{background:P.sfA,borderRadius:12,padding:12,marginBottom:16}}>
                <div style={{fontSize:12,color:P.sub}}>Current saved</div>
                <div className="serif tnum" style={{fontSize:24,fontWeight:600}}>{fmt(saved)}</div>
                <div style={{fontSize:12,color:P.faint}}>Target: {fmt(g.target)} · {g.target>0?((saved/g.target)*100).toFixed(0):0}% there</div>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Amount to add</div>
                <input type="number" value={addAmount} onChange={e=>setAddAmount(e.target.value)} placeholder="0" autoFocus
                  style={{width:"100%",borderRadius:10,padding:"10px",fontSize:18,fontWeight:600,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
              </div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Note (optional)</div>
                <input value={addNote} onChange={e=>setAddNote(e.target.value)} placeholder="e.g. Monthly deposit"
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
              </div>
              {addAmount&&Number(addAmount)>0&&(
                <div style={{fontSize:13,color:P.sub,marginBottom:12}} className="tnum">
                  New total: {fmt(saved+Number(addAmount))} ({g.target>0?(((saved+Number(addAmount))/g.target)*100).toFixed(0):0}%)
                </div>
              )}
              <button onClick={()=>{if(Number(addAmount)>0){addContribution(addModal,addAmount,addNote);setAddModal(null);}}}
                style={{width:"100%",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,background:P.gr,color:"#fff",border:"none"}}>
                Add {addAmount?fmt(Number(addAmount)):"money"}
              </button>
            </div>
          </div>
        );
      })()}

      {/* ── Details modal: edit target/monthly + contributions ── */}
      {detailModal&&(()=>{
        const g=goals.find(x=>x.id===detailModal);
        if(!g)return null;
        const saved=(g.contributions||[]).reduce((s,c)=>s+(Number(c.amount)||0),0);
        const remain=Math.max(0,g.target-saved);
        const months=g.monthly>0?Math.ceil(remain/g.monthly):null;
        const Icon=goalIcon(g.type);
        return(
          <div className="modal-bg" onClick={()=>setDetailModal(null)}>
            <div className="modal" onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                <span style={{display:"flex",alignItems:"center",justifyContent:"center",width:34,height:34,borderRadius:10,background:g.color+"22",color:g.color}}><Icon size={18}/></span>
                <input value={g.name} onChange={e=>updateGoal(g.id,{name:e.target.value})} className="bare" style={{fontSize:16,fontWeight:600,flex:1,minWidth:0}}/>
                <button onClick={()=>setDetailModal(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
              </div>

              <div style={{display:"flex",gap:10,marginBottom:14}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:P.faint,textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Target</div>
                  <input type="number" value={g.target} onChange={e=>updateGoal(g.id,{target:Number(e.target.value)})}
                    className="tnum" style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,fontWeight:600,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:P.faint,textTransform:"uppercase",letterSpacing:".06em",marginBottom:3}}>Monthly</div>
                  <input type="number" value={g.monthly} onChange={e=>updateGoal(g.id,{monthly:Number(e.target.value)})}
                    className="tnum" style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,fontWeight:600,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
                </div>
              </div>
              <div style={{fontSize:12,color:P.sub,marginBottom:14}} className="tnum">
                Saved {fmt(saved)} · {fmt(remain)} to go{months!=null?` · ~${months} mo at this pace`:""}
              </div>

              <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Contributions</div>
              {(g.contributions||[]).length>0?(
                <div style={{borderRadius:10,overflow:"hidden",border:`1px solid ${P.line}`,marginBottom:8}}>
                  {[...(g.contributions||[])].sort((a,b)=>b.date.localeCompare(a.date)).map(c=>(
                    <div key={c.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:`1px solid ${P.sfA}`,fontSize:13}}>
                      <span style={{color:P.faint,fontSize:11}}>{c.date}</span>
                      <span className="tnum" style={{fontWeight:600,color:P.gr}}>+{fmt(c.amount)}</span>
                      {c.note&&<span style={{color:P.sub,flex:1,fontSize:12}}>{c.note}</span>}
                      <button onClick={()=>removeContribution(g.id,c.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4,marginLeft:"auto"}}><I.X size={12}/></button>
                    </div>
                  ))}
                </div>
              ):<div style={{fontSize:12,color:P.faint,marginBottom:8}}>No contributions yet.</div>}

              <button onClick={()=>{setDetailModal(null);openAdd(g.id);}}
                style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:6,borderRadius:10,padding:"9px 0",fontSize:14,fontWeight:600,background:g.color,color:"#fff",border:"none"}}>
                <I.Plus size={14}/>Add money
              </button>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ── OVERVIEW VIEW ── */
function OverviewView({plan,fmt,pct,allocated,remaining}){
  const pieData=plan.groups.map(g=>({name:g.name,value:plan.categories.filter(c=>c.groupId===g.id).reduce((s,c)=>s+(Number(c.amount)||0),0)})).filter(d=>d.value>0);
  const card={background:P.sf,border:`1px solid ${P.line}`,borderRadius:16};
  return(
    <div>
      <div style={{...card,padding:16,marginBottom:16}}>
        <h3 style={{fontSize:14,fontWeight:600,color:P.sub,margin:"0 0 8px"}}>Where the {fmt(plan.income)} goes</h3>
        <div style={{width:"100%",height:240}}>
          <ResponsiveContainer>
            <PieChart>
              <Pie data={pieData} dataKey="value" nameKey="name" cx="50%" cy="50%" outerRadius={90} innerRadius={48} paddingAngle={2}>
                {pieData.map((_,i)=><Cell key={i} fill={SEG[i%SEG.length]}/>)}
              </Pie>
              <Tooltip formatter={v=>fmt(v)}/>
            </PieChart>
          </ResponsiveContainer>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:8}}>
          {pieData.map((d,i)=>(
            <span key={d.name} style={{display:"inline-flex",alignItems:"center",gap:6,fontSize:12,color:P.sub}}>
              <span style={{width:9,height:9,borderRadius:999,background:SEG[i%SEG.length]}}/>{d.name} · {pct(d.value).toFixed(0)}%
            </span>
          ))}
        </div>
      </div>
      <div style={{...card,padding:16}}>
        {[["Income",plan.income,P.ink],["Allocated",allocated,P.ink],["Unallocated / Over",remaining,remaining<0?P.red:P.gr]].map(([l,v,c])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",fontSize:14,padding:"5px 0",borderTop:l==="Unallocated / Over"?`1px solid ${P.sfA}`:"none",marginTop:l==="Unallocated / Over"?6:0}}>
            <span style={{color:P.sub}}>{l}</span><span className="tnum" style={{fontWeight:600,color:c}}>{l==="Unallocated / Over"&&remaining<0?"−":""}{fmt(Math.abs(v))}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── SETTINGS MODAL ── */
function SettingsModal({data,setData,onClose,pullKV,kvReady,lastSyncedAt,setOwnerName,owners}){
  const[confirm,setConfirm]=useState(false);
  const[msg,setMsg]=useState("");
  const fileRef=useRef(null);
  const flash=m=>{setMsg(m);setTimeout(()=>setMsg(""),2500);};
  const download=()=>{
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=url;a.download=`allocation-backup-${new Date().toISOString().slice(0,10)}.json`;
    document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);
    flash("Backup downloaded ✓");
  };
  const onFile=e=>{
    const f=e.target.files&&e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(String(r.result));if(!Array.isArray(d.plans))throw 0;setData(migrate(d));flash("Backup loaded ✓");}catch{flash("Not a valid backup.");}};
    r.readAsText(f);
  };
  const btn={background:P.sfA,border:`1px solid ${P.line}`,color:P.ink,borderRadius:10,padding:"8px 12px",fontSize:14,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"center",gap:6};
  return(
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h3 style={{margin:0,fontWeight:600}}>Settings</h3>
          <button onClick={onClose} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
        </div>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Who's who</div>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <input value={owners.me} onChange={e=>setOwnerName("me",e.target.value)} placeholder="Your name" style={{flex:1,borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
          <input value={owners.wife} onChange={e=>setOwnerName("wife",e.target.value)} placeholder="Wife's name" style={{flex:1,borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
        </div>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Currency label</div>
        <input value={data.currency} onChange={e=>setData(d=>({...d,currency:e.target.value}))} style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,marginBottom:16,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Cloudflare KV Sync</div>
        {kvReady
          ?<div style={{marginBottom:16}}>
            <div style={{fontSize:12,color:P.gr,marginBottom:8,padding:"8px 10px",background:P.grS,borderRadius:10}}>
              ✅ Sync active — no login needed · {lastSyncedAt?`Last synced ${lastSyncedAt.toLocaleTimeString()}`:"Not yet synced this session"}
            </div>
            <button onClick={pullKV} style={{...btn,width:"100%"}}><I.Cloud size={14}/>Pull latest from KV</button>
          </div>
          :<div style={{marginBottom:16,fontSize:12,color:P.sub,padding:"10px 12px",background:P.sfA,borderRadius:10,lineHeight:1.6}}>
            Add your Worker URL and Sync Token to <code>index.html</code> to enable sync.
            See the setup guide for instructions.
          </div>
        }
        <div style={{fontSize:12,fontWeight:600,color:P.sub,marginBottom:6}}>Manual backup</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
          <button onClick={download} style={btn}><I.Download size={14}/>Download</button>
          <button onClick={()=>fileRef.current&&fileRef.current.click()} style={btn}><I.Upload size={14}/>Import</button>
        </div>
        <input ref={fileRef} type="file" accept=".json" onChange={onFile} style={{display:"none"}}/>
        {msg&&<div style={{fontSize:12,color:P.gr,marginBottom:12}}>{msg}</div>}
        <button onClick={()=>confirm?(setData(defaultData()),flash("Reset done")):setConfirm(true)}
          style={{display:"flex",width:"100%",alignItems:"center",justifyContent:"center",gap:8,borderRadius:10,padding:"8px 12px",fontSize:14,fontWeight:500,marginTop:4,
            background:confirm?P.red:P.sfA,color:confirm?"#fff":P.red,border:`1px solid ${confirm?P.red:P.line}`}}>
          <I.Reset size={14}/>{confirm?"Tap again to confirm reset":"Reset to sample data"}
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
window.__hideLoading=function(){
  var el=document.getElementById("loading");
  if(el){el.style.opacity="0";el.style.transition="opacity 0.3s";setTimeout(function(){el.remove();},300);}
};
setTimeout(window.__hideLoading,8000);
</script>
