/* ── Stock quotes via Cloudflare Worker proxy ──
   Worker fetches Yahoo Finance server-side (no CORS), returns JSON.
   Finnhub handles US stocks directly as a fast fallback.                 */
const FINNHUB_KEY="d8v0c6hr01qrt65ul4k0d8v0c6hr01qrt65ul4kg";

/* Map tickers to the right Yahoo symbol.
   VWRA → VWRA.L (LSE), bare US tickers stay as-is.                      */
const LSE_SET=new Set(["VWRA","VWRP","VWCE","VWRL","CSPX","EIMI","SWDA","IGLN","IUSA","ISF","HMWO","SSAC","VAGP","AGGG"]);
function toYahooSym(t){
  const b=t.toUpperCase().replace(/\.L$/i,"");
  return LSE_SET.has(b)?b+".L":b;
}
function baseKey(t){return t.toUpperCase().replace(/\.L$|\.AS$|\.DE$/i,"");}

async function fetchQuotes(tickers){
  const out={};

  /* ── 1. Cloudflare Worker → Yahoo Finance (handles VWRA + all tickers) */
  if(!PROXY_URL.startsWith("PASTE_")){
    const syms=tickers.map(toYahooSym).join(",");
    try{
      const r=await fetch(`${PROXY_URL}/quote?symbols=${encodeURIComponent(syms)}`);
      if(r.ok){
        const j=await r.json();
        Object.entries(j).forEach(([sym,price])=>{
          if(price>0)out[baseKey(sym)]=price;
        });
      }
    }catch(e){}
  }

  /* ── 2. Finnhub direct (US, real-time, no proxy needed) ── */
  if(!FINNHUB_KEY.startsWith("PASTE_")){
    const missing=tickers.filter(t=>!out[baseKey(t)]);
    await Promise.all(missing.map(async t=>{
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(baseKey(t))}&token=${FINNHUB_KEY}`);
        if(!r.ok)return;
        const j=await r.json();
        const p=j.c>0?j.c:(j.pc>0?j.pc:null);
        if(p)out[baseKey(t)]=p;
      }catch(e){}
    }));
  }

  if(Object.keys(out).length===0)throw new Error("no quotes");
  return out;
}

/* ── Projection helper ── */
function projectSeries(start,monthly,years,annualPct){
  const r=annualPct/100/12;const out=[];
  for(let y=0;y<=years;y++){
    const m=y*12;
    const fv=r===0?start+monthly*m:start*Math.pow(1+r,m)+monthly*((Math.pow(1+r,m)-1)/r);
    out.push(Math.round(fv));
  }
  return out;
}

/* ── Compute holding stats from trade log ── */
function holdingStats(trades=[]){
  let shares=0,cost=0;
  (trades||[]).forEach(tr=>{
    const s=Number(tr.shares)||0,p=Number(tr.price)||0;
    if(tr.type==="buy"){shares+=s;cost+=s*p;}
    else if(tr.type==="sell"){
      const avgBefore=shares>0?cost/shares:0;
      shares=Math.max(0,shares-s);
      cost=shares*avgBefore;
    }
  });
  const avgCost=shares>0?cost/shares:0;
  return{shares,avgCost,totalCost:cost};
}

/* ── Liability remaining balance (auto-decrements by month) ── */
function liabilityBalance(liab){
  if(!liab.installment)return Number(liab.value)||0;
  const{monthly,monthsRemaining,asOfDate}=liab;
  if(!monthly||!monthsRemaining||!asOfDate)return Number(liab.value)||0;
  const now=new Date();
  const ref=new Date(asOfDate);
  const elapsed=Math.max(0,(now.getFullYear()-ref.getFullYear())*12+(now.getMonth()-ref.getMonth()));
  const remaining=Math.max(0,monthsRemaining-elapsed);
  return(Number(monthly)||0)*remaining;
}

function migrate(d){
  if(!d||typeof d!=="object")return defaultData();
  if(!d.owners)d.owners={me:"Me",wife:"My wife"};
  // migrate activePlanId from string to {me, wife}
  if(typeof d.activePlanId==="string"){
    const oldId=d.activePlanId;
    d.activePlanId={me:oldId,wife:null};
    // create a blank wife plan if none exists
    if(!(d.plans||[]).find(p=>p.owner==="wife")){
      const wid=uid();
      d.plans=[...(d.plans||[]),{id:wid,owner:"wife",name:"Monthly Salary",
        month:monthLabel(),income:0,
        groups:[{id:uid(),name:"Savings"},{id:uid(),name:"Essentials"},{id:uid(),name:"Personal"}],
        categories:[]}];
      d.activePlanId.wife=wid;
    }
  }
  if(!d.activePlanId||typeof d.activePlanId!=="object")d.activePlanId={me:(d.plans||[])[0]?.id,wife:null};
  // ensure all plans have an owner
  (d.plans||[]).forEach(p=>{if(!p.owner)p.owner="me";});
  // ensure wife activePlanId points to a real plan
  if(!d.activePlanId.wife){
    const wifePlan=(d.plans||[]).find(p=>p.owner==="wife");
    if(wifePlan)d.activePlanId.wife=wifePlan.id;
  }
  // ensure expenses have owner
  (d.expenses||[]).forEach(e=>{if(!e.owner)e.owner="me";});
  // ensure monthlyPlans have owner
  (d.monthlyPlans||[]).forEach(m=>{if(!m.owner)m.owner="me";});
  (d.banks||[]).forEach(b=>{if(!b.owner)b.owner="me";});
  (d.goals||[]).forEach(g=>{
    if(!g.owner)g.owner="me";
    if(!g.type)g.type="savings";
    // migrate old saved→contributions
    if(g.saved!==undefined&&!g.contributions){
      g.contributions=[{id:uid(),date:new Date().toISOString().slice(0,10),amount:g.saved,note:"Migrated balance"}];
      delete g.saved;
    }
    if(!g.contributions)g.contributions=[];
  });
  (d.plans||[]).forEach(plan=>{
    (plan.categories||[]).forEach(c=>{
      if(!c.subs)c.subs=[];
    });
  });
  (d.investments||[]).forEach(inv=>{
    // migrate old shares/avgCost→trades
    if(!inv.trades){
      const s=Number(inv.shares)||0,a=Number(inv.avgCost)||0;
      inv.trades=s>0?[{id:uid(),date:new Date().toISOString().slice(0,10),type:"buy",shares:s,price:a}]:[];
      delete inv.shares;delete inv.avgCost;
    }
  });
  (d.assets||[]).forEach(a=>{
    if(a.kind==="liability"&&!a.installment){a.installment=false;}
  });
  if(!d.livePrice)d.livePrice={};
  if(!d.portHistory)d.portHistory=[];
  if(!d.expenses)d.expenses=[];
  if(!d.monthlyPlans)d.monthlyPlans=[];
  return d;
}

/* ── Cloudflare KV Sync ──────────────────────────────────────────────────────
   No login ever required. Set SYNC_TOKEN to the same secret you put in worker.js.
   The Worker URL is already set above as PROXY_URL.
   ─────────────────────────────────────────────────────────────────────────── */
const SYNC_TOKEN="kgTZEPzv2cSIcG79rv04pZFeyK2mPg2bhw2gh";

const KVSync={
  lastPulledAt:null,
  _ready(){return !PROXY_URL.startsWith("PASTE_")&&!SYNC_TOKEN.startsWith("PASTE_");},
  _headers(){return{"Content-Type":"application/json","X-Sync-Token":SYNC_TOKEN};},
  async load(){
    if(!this._ready())return null;
    const r=await fetch(`${PROXY_URL}/sync`,{headers:this._headers()});
    if(!r.ok)return null;
    const j=await r.json();
    if(j.savedAt)this.lastPulledAt=j.savedAt;
    return j.data||null;
  },
  async save(data){
    if(!this._ready())return{ok:false,reason:"not configured"};
    const body=JSON.stringify({data,savedAt:new Date().toISOString(),lastPulledAt:this.lastPulledAt});
    const r=await fetch(`${PROXY_URL}/sync`,{method:"POST",headers:this._headers(),body});
    if(!r.ok)return{ok:false,reason:`HTTP ${r.status}`};
    const j=await r.json();
    if(j.savedAt)this.lastPulledAt=j.savedAt;
    return j;
  },
  async checkMeta(){
    if(!this._ready())return null;
    const r=await fetch(`${PROXY_URL}/sync/meta`,{headers:this._headers()});
    if(!r.ok)return null;
    return await r.json();
  },
};

function App(){

  const[syncMsg,setSyncMsg]=useState("");
  const[syncing,setSyncing]=useState(false);
  const[lastSyncedAt,setLastSyncedAt]=useState(null);
  const skipSave=useRef(false);
  const kvReady=!PROXY_URL.startsWith("PASTE_")&&!SYNC_TOKEN.startsWith("PASTE_");

  /* load */
  useEffect(()=>{
    try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)setData(migrate(JSON.parse(raw)));}catch(e){}
    setLoaded(true);
    if(typeof window.__hideLoading==="function")window.__hideLoading();
  },[]);

  /* persist */
  useEffect(()=>{
    if(!loaded)return;
    if(skipSave.current){skipSave.current=false;return;}
    const t=setTimeout(async()=>{
      try{localStorage.setItem(STORAGE_KEY,JSON.stringify(data));}catch(e){}
      if(kvReady){
        try{
          setSyncing(true);
          const result=await KVSync.save(data);
          if(result.conflict){
            setSyncMsg("⚠️ Conflict — tap Pull to get latest");
          }else{
            setLastSyncedAt(new Date());
            setSyncMsg("Synced ✓");
          }
        }catch(e){setSyncMsg("Sync failed — saved locally");}
        setSyncing(false);setTimeout(()=>setSyncMsg(""),3000);
      }
    },600);
    return()=>clearTimeout(t);
  },[data,loaded,kvReady]);

  /* KV pull — fetch latest from Cloudflare KV */
  const pullKV=async()=>{
    if(!kvReady){setSyncMsg("Add Worker URL + sync token first");setTimeout(()=>setSyncMsg(""),3000);return;}
    try{
      setSyncing(true);setSyncMsg("Pulling…");
      const remote=await KVSync.load();
      if(remote&&Array.isArray(remote.plans)){
        skipSave.current=true;
        setData(migrate(remote));
        setLastSyncedAt(new Date());
        setSyncMsg("Up to date ✓");
      }else setSyncMsg("Nothing saved yet — will sync on next change");
    }catch(e){setSyncMsg("Pull failed — check Worker URL");}
    setSyncing(false);setTimeout(()=>setSyncMsg(""),3000);

            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {syncMsg&&<span style={{fontSize:11,color:P.sub}}>{syncMsg}</span>}
              <button onClick={pullKV} title={kvReady?"Pull latest from Cloudflare KV":"Configure Worker URL and sync token to enable sync"}
                style={{display:"flex",alignItems:"center",gap:5,borderRadius:999,padding:"5px 10px",fontSize:12,fontWeight:500,
                  background:kvReady?P.grS:P.sf,color:kvReady?P.grD:P.sub,border:`1px solid ${kvReady?P.grS:P.line}`}}>
                <I.Cloud size={13} style={syncing?{animation:"spin .9s linear infinite"}:null}/>
                {lastSyncedAt?"Synced":kvReady?"Pull":"Sync"}
              </button>
              <button onClick={()=>setShowSettings(true)} style={{borderRadius:999,padding:8,color:P.sub,background:"transparent",border:"none"}}>
                <I.Settings size={18}/>
              </button>
            </div>
          </div>

          <div style={{marginTop:16,display:"flex",flexWrap:"wrap",alignItems:"flex-end",justifyContent:"space-between",gap:16}}>
            <div style={{display:"flex",alignItems:"center",gap:6,color:P.sub}}>
              <I.Wallet size={13}/>
              <span style={{fontSize:12}}>{data.owners?.me||"Me"} &amp; {data.owners?.wife||"Wife"}</span>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:11,color:P.faint,textTransform:"uppercase",letterSpacing:".1em"}}>{plan.month} · Income</div>
              <div style={{display:"flex",alignItems:"baseline",gap:6,justifyContent:"flex-end"}}>
                <span style={{fontSize:14,color:P.sub}}>{cur}</span>
                <input type="number" value={plan.income} onChange={e=>patchPlan({income:Number(e.target.value)})}
                  className="bare tnum serif" style={{fontSize:30,fontWeight:600,width:170,textAlign:"right",color:P.ink}}/>
              </div>
            </div>
          </div>
        </header>

        {/* tabs */}
        <nav style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:20}}>
          {TABS.map(([id,label,Icon])=>(
            <button key={id} onClick={()=>setTab(id)}
              style={tab===id
                ?{display:"flex",alignItems:"center",gap:6,borderRadius:999,padding:"6px 14px",fontSize:14,fontWeight:500,background:P.ink,color:"#fff",border:"none"}
                :{display:"flex",alignItems:"center",gap:6,borderRadius:999,padding:"6px 14px",fontSize:14,fontWeight:500,background:P.sf,color:P.sub,border:`1px solid ${P.line}`}}>
              <Icon size={14}/>{label}
            </button>
          ))}
        </nav>

        {tab==="budget"&&<BudgetView {...{planForMonth,monthlyPlans,clonePlanForMonth,removePlanForMonth,activePlanId,setCatsFor,setGrpsFor,patchPlanById,fmt,cur,budgetOwner,setBudgetOwner,owners:data.owners}}/>}
        {tab==="expenses"&&<ExpenseTrackerView {...{data,plans:data.plans,planForMonth,clonePlanForMonth,assignPlanToMonth,removePlanForMonth,expenses,addExpenseTx,removeExpenseTx,fmt,cur,budgetOwner,setBudgetOwner,owners:data.owners}}/>}
        {tab==="household"&&<HouseholdView {...{hh,setSplit,addExpense,updateExpense,removeExpense,fmt,owners:data.owners}}/>}
        {tab==="banks"&&<BanksView {...{banks,addBank,updateBank,removeBank,convert,sarRate,owners:data.owners}}/>}
        {tab==="investments"&&<InvestmentsView {...{invs,addInv,updateInv,removeInv,addTrade,removeTrade,livePrice,setLivePrice,sarRate,convert,projection:data.projection||{monthly:1500,years:20,rate:8},setProjection,portHistory,addPortSnap}}/>}
        {tab==="networth"&&<NetWorthView {...{netWorth,banksSar,invSar,assetSar,liabSar,sarRate,convert,ratesErr,assets,addAsset,updateAsset,removeAsset,history,captureSnapshot,addPastSnap,removeSnap}}/>}
        {tab==="currency"&&<CurrencyView {...{rates,ratesAt,ratesErr,ratesLoading,onRefresh:loadRates,convert,fxAmount,setFxAmount,fxFrom,setFxFrom,fxTo,setFxTo}}/>}
        {tab==="goals"&&<GoalsView {...{goals:data.goals,fmt,addGoal,updateGoal,removeGoal,addContribution,removeContribution,owners:data.owners}}/>}
        {tab==="overview"&&<OverviewView {...{plan,fmt,pct,allocated,remaining}}/>}
      </div>
      {showSettings&&<SettingsModal {...{data,setData,onClose:()=>setShowSettings(false),pullKV,kvReady,lastSyncedAt,setOwnerName,owners:data.owners}}/>}
    </div>
  );
}

/* ── BUDGET VIEW — month-aware, percentage shown inline beside amount ── */
function BudgetView({planForMonth,monthlyPlans,clonePlanForMonth,removePlanForMonth,activePlanId,setCatsFor,setGrpsFor,patchPlanById,fmt,cur,budgetOwner,setBudgetOwner,owners}){
  const nowMonth=new Date().toISOString().slice(0,7);
  const[viewMonth,setViewMonth]=useState(nowMonth);
  const[expandedSubs,setExpandedSubs]=useState({});
  const toggleSubs=id=>setExpandedSubs(s=>({...s,[id]:!s[id]}));
  const card={background:P.sf,border:`1px solid ${P.line}`,borderRadius:16};

  const addMonths=(ym,n)=>{const[y,m]=ym.split("-").map(Number);const d=new Date(y,m-1+n,1);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;};
  const fmtMonth=m=>{const[y,mo]=m.split("-");return new Date(Number(y),Number(mo)-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});};
  const isFuture=viewMonth>nowMonth;
  const isNow=viewMonth===nowMonth;
  const isPast=viewMonth<nowMonth;

  /* the plan that applies to the viewed month for this owner */
  const monthPlan=planForMonth(viewMonth,budgetOwner);
  const hasOwnPlan=!!(monthlyPlans||[]).find(m=>m.month===viewMonth&&m.owner===budgetOwner);
  /* Current month always edits the carry-forward base plan directly.
     Other months are only editable once a custom copy exists. */
  const editable=isNow||hasOwnPlan;
  const pid=monthPlan.id;

  /* keep a category's stored amount in sync with its sub-items' sum */
  const syncAmt=c=>{const subs=c.subs||[];return subs.length>0?{...c,amount:subs.reduce((s,x)=>s+(Number(x.amount)||0),0)}:c;};

  /* month-scoped mutators — all target the viewed month's plan id, atomically */
  const updateCat=(id,patch)=>setCatsFor(pid,cats=>cats.map(c=>c.id===id?{...c,...patch}:c));
  const addCat=gid=>setCatsFor(pid,cats=>[...cats,{id:uid(),name:"New category",amount:0,groupId:gid,color:SEG[cats.length%SEG.length],subs:[]}]);
  const removeCat=id=>setCatsFor(pid,cats=>cats.filter(c=>c.id!==id));
  const updateSub=(catId,subId,patch)=>setCatsFor(pid,cats=>cats.map(c=>c.id===catId?syncAmt({...c,subs:(c.subs||[]).map(s=>s.id===subId?{...s,...patch}:s)}):c));
  const removeSub=(catId,subId)=>setCatsFor(pid,cats=>cats.map(c=>c.id===catId?syncAmt({...c,subs:(c.subs||[]).filter(s=>s.id!==subId)}):c));
  const addGroup=()=>setGrpsFor(pid,gs=>[...gs,{id:uid(),name:"New group"}]);
  const renameGroup=(id,name)=>setGrpsFor(pid,gs=>gs.map(g=>g.id===id?{...g,name}:g));
  const removeGroup=id=>{setCatsFor(pid,cats=>cats.filter(c=>c.groupId!==id));setGrpsFor(pid,gs=>gs.filter(g=>g.id!==id));};
  const setIncome=v=>patchPlanById(pid,{income:Number(v)||0});

  const handleAddSub=catId=>{
    setCatsFor(pid,cats=>cats.map(c=>c.id===catId?syncAmt({...c,subs:[...(c.subs||[]),{id:uid(),name:"New item",amount:0}]}):c));
    setExpandedSubs(s=>({...s,[catId]:true}));
  };
  const handleSubChange=(catId,subId,patch)=>updateSub(catId,subId,patch);
  const handleRemoveSub=(catId,subId)=>removeSub(catId,subId);

  const effectiveAmt=c=>{
    const subs=c.subs||[];
    if(subs.length>0)return subs.reduce((s,sub)=>s+(Number(sub.amount)||0),0);
    return Number(c.amount)||0;
  };

  /* month-scoped totals */
  const income=Number(monthPlan.income)||0;
  const allocated=(monthPlan.categories||[]).reduce((s,c)=>s+effectiveAmt(c),0);
  const remaining=income-allocated;
  const pct=n=>income>0?((Number(n)||0)/income)*100:0;

  const createCopy=()=>clonePlanForMonth(viewMonth,activePlanId[budgetOwner],budgetOwner);

  return(
    <div>
      {/* ── owner toggle ── */}
      <OwnerToggle owner={budgetOwner} setOwner={setBudgetOwner} owners={owners}/>

      {/* ── month navigator ── */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,background:P.sf,borderRadius:16,padding:"10px 14px",border:`1px solid ${P.line}`}}>
        <button onClick={()=>setViewMonth(m=>addMonths(m,-1))}
          style={{borderRadius:999,padding:"4px 10px",fontSize:18,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink,lineHeight:1}}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:P.ink}}>{fmtMonth(viewMonth)}</div>
          <div style={{fontSize:11,fontWeight:600,marginTop:1,color:isFuture?P.br:isNow?P.gr:P.faint}}>
            {isFuture?"Planning ahead":isNow?"Current month":"Past month"}
          </div>
        </div>
        <button onClick={()=>setViewMonth(m=>addMonths(m,1))}
          style={{borderRadius:999,padding:"4px 10px",fontSize:18,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink,lineHeight:1}}>›</button>
        {viewMonth!==nowMonth&&(
          <button onClick={()=>setViewMonth(nowMonth)}
            style={{borderRadius:999,padding:"4px 10px",fontSize:12,fontWeight:600,background:P.grS,color:P.grD,border:"none"}}>Today</button>
        )}
      </div>

      {/* ── plan status banner ── */}
      <div style={{borderRadius:14,padding:"12px 14px",marginBottom:12,
        background:isNow?P.grS:hasOwnPlan?P.brS:P.sfA,
        border:`1px solid ${isNow?P.grS:hasOwnPlan?P.brS:P.line}`,
        display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:600,color:isNow?P.grD:hasOwnPlan?P.br:P.sub}}>
            {isNow?"📋 Carry-forward plan":hasOwnPlan?`📋 Custom plan for ${fmtMonth(viewMonth)}`:"📋 Carry-forward (preview)"}
          </div>
          <div style={{fontSize:11,color:isNow?P.gr:hasOwnPlan?P.br:P.faint,marginTop:2}}>
            {isNow
              ?"This is your base budget. Edits here carry forward to every future month automatically."
              :hasOwnPlan
                ?"A custom copy for this month. Edits here only affect this month."
                :`Showing your carry-forward budget. Create a copy to customize ${fmtMonth(viewMonth)} without touching other months.`}
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0}}>
          {!isNow&&(hasOwnPlan
            ?<button onClick={()=>removePlanForMonth(viewMonth,budgetOwner)}
                style={{fontSize:11,borderRadius:8,padding:"4px 10px",background:"transparent",border:`1px solid ${P.line}`,color:P.red,fontWeight:500}}>Remove</button>
            :<button onClick={createCopy}
                style={{fontSize:11,borderRadius:8,padding:"4px 10px",background:P.br,color:"#fff",border:"none",fontWeight:600,whiteSpace:"nowrap"}}>+ Create copy</button>
          )}
        </div>
      </div>

      {/* ── income + allocation summary ── */}
      <div style={{...card,padding:16,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"baseline",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>
          <div style={{display:"flex",alignItems:"baseline",gap:6}}>
            <span style={{fontSize:12,color:P.faint,textTransform:"uppercase",letterSpacing:".08em"}}>Income</span>
            <span style={{fontSize:13,color:P.sub}}>{cur}</span>
            <input type="number" value={income} disabled={!editable}
              onChange={e=>setIncome(e.target.value)}
              className="bare tnum serif" style={{fontSize:22,fontWeight:600,width:130,color:editable?P.ink:P.faint}}/>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <span style={{fontSize:13,fontWeight:600,color:P.sub}}>Allocated {fmt(allocated)}</span>
          <span style={{fontSize:13,fontWeight:600,color:remaining<0?P.red:P.gr}}>
            {remaining<0?"Over by ":"Left "}{fmt(Math.abs(remaining))}
          </span>
        </div>
        <div style={{marginTop:10,height:10,background:P.sfA,borderRadius:999,overflow:"hidden",display:"flex"}}>
          {(monthPlan.categories||[]).map(c=>(
            <div key={c.id} style={{width:`${pct(effectiveAmt(c))}%`,background:c.color}} title={c.name}/>
          ))}
        </div>
      </div>

      {/* ── locked preview hint for non-current months without a copy ── */}
      {!editable&&(
        <div style={{borderRadius:14,padding:"14px 16px",marginBottom:16,textAlign:"center",
          background:P.sf,border:`1px dashed ${P.line}`}}>
          <div style={{fontSize:13,color:P.sub,marginBottom:10}}>
            You're previewing your carry-forward budget for {fmtMonth(viewMonth)}.<br/>
            Create a copy to add categories or change amounts just for this month.
          </div>
          <button onClick={createCopy}
            style={{display:"inline-flex",alignItems:"center",gap:6,borderRadius:999,padding:"8px 16px",fontSize:14,fontWeight:600,background:P.br,color:"#fff",border:"none"}}>
            <I.Plus size={14}/>Create copy for {fmtMonth(viewMonth)}
          </button>
        </div>
      )}

      {editable&&(monthPlan.groups||[]).map(g=>{
        const items=(monthPlan.categories||[]).filter(c=>c.groupId===g.id);
        const groupTotal=items.reduce((s,c)=>s+effectiveAmt(c),0);
        return(
          <section key={g.id} style={{...card,overflow:"hidden",marginBottom:16}}>
            {/* Group header */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",background:P.sfA,borderBottom:`1px solid ${P.line}`}}>
              <input value={g.name} onChange={e=>renameGroup(g.id,e.target.value)} className="bare" style={{fontSize:14,fontWeight:600}}/>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:13,fontWeight:600,color:P.sub}} className="tnum">{fmt(groupTotal)}</span>
                <button onClick={()=>removeGroup(g.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4}}><I.Trash size={14}/></button>
              </div>
            </div>

            {items.map(c=>{
              const subs=c.subs||[];
              const hasSubs=subs.length>0;
              const effAmt=effectiveAmt(c);
              const subsOpen=expandedSubs[c.id];
              return(
                <div key={c.id} style={{borderBottom:`1px solid ${P.sfA}`}}>
                  {/* Category row */}
                  <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px"}}>
                    <span style={{width:10,height:10,borderRadius:999,background:c.color,flexShrink:0}}/>
                    <input value={c.name} onChange={e=>updateCat(c.id,{name:e.target.value})} className="bare" style={{flex:1,fontSize:14,minWidth:0,fontWeight:hasSubs?600:400}}/>
                    <span className="tnum" style={{fontSize:12,color:P.faint,width:44,textAlign:"right"}}>{pct(effAmt).toFixed(1)}%</span>
                    <div style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{fontSize:11,color:P.faint}}>{cur}</span>
                      {hasSubs
                        /* when subs exist, show computed total (read-only style) */
                        ?<span className="tnum" style={{width:88,textAlign:"right",fontSize:14,fontWeight:600,color:P.gr}}>{effAmt.toLocaleString("en-US")}</span>
                        /* no subs — manual input as before */
                        :<input type="number" value={c.amount} onChange={e=>updateCat(c.id,{amount:Number(e.target.value)})}
                          className="bare tnum" style={{width:88,textAlign:"right",fontSize:14,fontWeight:600}}/>
                      }
                    </div>
                    {/* sub-toggle button */}
                    <button onClick={()=>toggleSubs(c.id)} title={subsOpen?"Hide sub-items":"Show sub-items"}
                      style={{background:"transparent",border:"none",color:subsOpen?P.gr:P.faint,padding:2,display:"flex",alignItems:"center"}}>
                      <I.Chevron size={14} style={{transform:subsOpen?"rotate(180deg)":"rotate(0deg)",transition:"transform .2s"}}/>
                    </button>
                    <button onClick={()=>removeCat(c.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.3}}><I.X size={15}/></button>
                  </div>

                  {/* Sub-items panel */}
                  {subsOpen&&(
                    <div style={{background:"#F7FAFD",borderTop:`1px solid ${P.line}`}}>
                      {subs.map(sub=>(
                        <div key={sub.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 16px 7px 36px",borderBottom:`1px solid ${P.line}`}}>
                          {/* indent indicator */}
                          <span style={{width:6,height:6,borderRadius:999,background:P.faint,flexShrink:0}}/>
                          <input value={sub.name} onChange={e=>handleSubChange(c.id,sub.id,{name:e.target.value})}
                            className="bare" style={{flex:1,fontSize:13,minWidth:0,color:P.ink}}/>
                          <div style={{display:"flex",alignItems:"center",gap:4}}>
                            <span style={{fontSize:11,color:P.faint}}>{cur}</span>
                            <input type="number" value={sub.amount} onChange={e=>handleSubChange(c.id,sub.id,{amount:Number(e.target.value)})}
                              className="bare tnum" style={{width:80,textAlign:"right",fontSize:13,fontWeight:600}}/>
                          </div>
                          <button onClick={()=>handleRemoveSub(c.id,sub.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.35}}><I.X size={13}/></button>
                        </div>
                      ))}
                      {/* sub total when multiple subs */}
                      {subs.length>1&&(
                        <div style={{display:"flex",justifyContent:"flex-end",padding:"5px 16px 5px 36px",fontSize:12,color:P.sub}} className="tnum">
                          Subtotal: {cur} {effAmt.toLocaleString("en-US")}
                        </div>
                      )}
                      <button onClick={()=>handleAddSub(c.id)}
                        style={{display:"flex",alignItems:"center",gap:5,padding:"7px 16px 7px 36px",fontSize:13,color:P.gr,background:"transparent",border:"none",width:"100%"}}>
                        <I.Plus size={12}/>Add sub-item
                      </button>
                    </div>
                  )}

                  {/* Quick "add sub-item" link when panel is closed (only shows when no subs yet) */}
                  {!subsOpen&&!hasSubs&&(
                    <div style={{paddingLeft:36,paddingBottom:6,marginTop:-4}}>
                      <button onClick={()=>handleAddSub(c.id)}
                        style={{fontSize:11,color:P.faint,background:"transparent",border:"none",padding:"0 0 2px",display:"flex",alignItems:"center",gap:4}}>
                        <I.Plus size={10}/>add sub-items
                      </button>
                    </div>
                  )}
                </div>
              );
            })}

            <button onClick={()=>addCat(g.id)} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.gr,background:"transparent",border:"none"}}>
              <I.Plus size={14}/>Add category
            </button>
          </section>
        );
      })}
      {editable&&(
        <button onClick={addGroup} style={{display:"flex",alignItems:"center",gap:6,borderRadius:999,padding:"8px 14px",fontSize:14,fontWeight:500,background:P.sf,border:`1px dashed ${P.line}`,color:P.gr}}>
          <I.Plus size={14}/>Add group
        </button>
      )}
    </div>
  );
}



/* ── SHARED: Owner toggle pill (Me / Wife) ── */
function OwnerToggle({owner,setOwner,owners}){
  return(
    <div style={{display:"flex",gap:4,marginBottom:14,background:P.sfA,borderRadius:999,padding:3,width:"fit-content"}}>
      {["me","wife"].map(ok=>(
        <button key={ok} onClick={()=>setOwner(ok)}
          style={{borderRadius:999,padding:"6px 18px",fontSize:13,fontWeight:600,border:"none",
            background:owner===ok?(ok==="me"?P.gr:P.br):"transparent",
            color:owner===ok?"#fff":(ok==="me"?P.grD:P.br),
            transition:"background .15s,color .15s"}}>
          {owners[ok]}
        </button>
      ))}
    </div>
  );
}

/* ── SHARED: Plan switcher (shows only the current owner's plans) ── */
function PlanSwitcher({ownerPlans,plan,switchPlan,addPlan,removePlan,renamePlan,planMenu,setPlanMenu,fmt,cur}){
  if(!ownerPlans||ownerPlans.length===0)return null;
  return(
    <div style={{marginBottom:14,position:"relative"}}>
      <button onClick={()=>setPlanMenu(v=>!v)}
        style={{display:"flex",alignItems:"center",gap:6,fontSize:12,fontWeight:500,borderRadius:999,
          padding:"5px 12px",background:P.sf,border:`1px solid ${P.line}`,color:P.sub}}>
        <I.Layers size={13}/>{plan?.name||"Select plan"}<I.Chevron size={13}/>
      </button>
      {planMenu&&(
        <div style={{position:"absolute",zIndex:20,marginTop:4,borderRadius:12,padding:"4px 0",
          boxShadow:"0 8px 28px rgba(12,22,40,.18)",background:P.sf,border:`1px solid ${P.line}`,minWidth:280}}>
          {ownerPlans.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px"}}>
              <button onClick={()=>{switchPlan(p.id);setPlanMenu(false);}}
                style={{flexShrink:0,borderRadius:999,padding:4,background:"transparent",border:"none",
                  color:p.id===plan?.id?P.gr:P.faint}}>
                {p.id===plan?.id?<I.Check size={15}/>:<I.Layers size={14}/>}
              </button>
              <input value={p.name} onChange={e=>renamePlan(p.id,e.target.value)}
                className="bare" style={{flex:1,fontSize:14}}/>
              <span className="tnum" style={{fontSize:11,color:P.faint}}>
                {cur} {(p.income||0).toLocaleString("en-US")}
              </span>
              {ownerPlans.length>1&&(
                <button onClick={()=>removePlan(p.id)}
                  style={{background:"transparent",border:"none",color:P.red,opacity:.5}}>
                  <I.X size={14}/>
                </button>
              )}
            </div>
          ))}
          <div style={{borderTop:`1px solid ${P.line}`,marginTop:4,paddingTop:4}}>
            <button onClick={addPlan}
              style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"6px 10px",
                fontSize:13,color:P.gr,background:"transparent",border:"none"}}>
              <I.Plus size={14}/>New plan for this person
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── EXPENSE TRACKER VIEW ── */
function ExpenseTrackerView({data,plans,planForMonth,clonePlanForMonth,assignPlanToMonth,removePlanForMonth,expenses,addExpenseTx,removeExpenseTx,fmt,cur,budgetOwner,setBudgetOwner,owners}){
  const nowMonth=new Date().toISOString().slice(0,7);
  const[viewMonth,setViewMonth]=useState(nowMonth);
  const[showAdd,setShowAdd]=useState(false);
  const[filterCat,setFilterCat]=useState("all");
  const[collapsedMonths,setCollapsedMonths]=useState({});
  const[showPlanPicker,setShowPlanPicker]=useState(false);
  const[cloneSource,setCloneSource]=useState("");

  const addMonths=(ym,n)=>{
    const[y,m]=ym.split("-").map(Number);
    const d=new Date(y,m-1+n,1);
    return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
  };
  const fmtMonth=m=>{
    const[y,mo]=m.split("-");
    return new Date(Number(y),Number(mo)-1,1).toLocaleDateString("en-US",{month:"long",year:"numeric"});
  };
  const isFuture=viewMonth>nowMonth;
  const isNow=viewMonth===nowMonth;

  /* which plan applies to the viewed month */
  const monthPlan=planForMonth(viewMonth,budgetOwner);
  const hasOwnPlan=!!(data.monthlyPlans||[]).find(m=>m.month===viewMonth&&m.owner===budgetOwner);

  /* envelopes from the MONTH'S plan (not necessarily the active plan) */
  const envelopes=useMemo(()=>{
    const env=[];
    (monthPlan.groups||[]).forEach(g=>{
      (monthPlan.categories||[]).filter(c=>c.groupId===g.id).forEach(c=>{
        const effAmt=(c.subs||[]).length>0
          ?(c.subs||[]).reduce((s,sub)=>s+(Number(sub.amount)||0),0)
          :Number(c.amount)||0;
        if(effAmt>0)env.push({id:c.id,name:c.name,group:g.name,budget:effAmt,color:c.color});
      });
    });
    return env;
  },[monthPlan]);

  const viewMonthExpenses=useMemo(()=>
    expenses.filter(e=>e.date&&e.date.startsWith(viewMonth)&&(e.owner||'me')===budgetOwner)
  ,[expenses,viewMonth,budgetOwner]);

  const spentMap=useMemo(()=>{
    const m={};
    viewMonthExpenses.forEach(e=>{m[e.catId]=(m[e.catId]||0)+e.amount;});
    return m;
  },[viewMonthExpenses]);

  const totalBudget=envelopes.reduce((s,e)=>s+e.budget,0);
  const totalSpent=Object.values(spentMap).reduce((s,v)=>s+v,0);
  const totalLeft=totalBudget-totalSpent;

  const statusColor=(spent,budget)=>{
    if(budget===0)return P.sub;
    const r=spent/budget;
    if(r>=1)return P.red;
    if(r>=0.8)return"#E07B2A";
    return P.gr;
  };
  const statusBg=(spent,budget)=>{
    if(budget===0)return P.sfA;
    const r=spent/budget;
    if(r>=1)return"#FDF0EE";
    if(r>=0.8)return"#FEF4E8";
    return P.sfA;
  };

  const[form,setForm]=useState({catId:"",name:"",amount:"",date:viewMonth+"-01"});
  useEffect(()=>{setForm(f=>({...f,date:viewMonth+"-01"}));},[viewMonth]);

  const submitTx=()=>{
    if(!form.catId||!form.name||!form.amount)return;
    addExpenseTx(form.catId,form.name,Number(form.amount),form.date);
    setForm(f=>({...f,name:"",amount:"",date:viewMonth+"-01"}));
    setShowAdd(false);
  };

  /* transaction log grouped by month */
  const ownerExpenses=expenses.filter(e=>(e.owner||'me')===budgetOwner);
  const allFiltered=filterCat==="all"?[...ownerExpenses]:ownerExpenses.filter(e=>e.catId===filterCat);
  const byMonth={};
  allFiltered.forEach(tx=>{
    const mo=(tx.date||"").slice(0,7);
    if(!mo)return;
    if(!byMonth[mo])byMonth[mo]=[];
    byMonth[mo].push(tx);
  });
  const allMonths=Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));

  /* handle clone/assign */
  const handleCreatePlan=()=>{
    const sourceId=cloneSource||(ownerPlans[0]?.id||plans[0]?.id||"");
    if(sourceId)clonePlanForMonth(viewMonth,sourceId,budgetOwner);
    setShowPlanPicker(false);
    setCloneSource("");
  };
  const handleAssignExisting=(pid)=>{
    assignPlanToMonth(viewMonth,pid,budgetOwner);
    setShowPlanPicker(false);
  };

  /* owner's plans for the plan picker */
  const ownerPlans=(plans||[]).filter(p=>p.owner===budgetOwner);

  return(
    <div>
      {/* ── owner toggle ── */}
      <OwnerToggle owner={budgetOwner} setOwner={setBudgetOwner} owners={owners}/>

      {/* ── month navigator ── */}
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,background:P.sf,borderRadius:16,padding:"10px 14px",border:`1px solid ${P.line}`}}>
        <button onClick={()=>setViewMonth(m=>addMonths(m,-1))}
          style={{borderRadius:999,padding:"4px 10px",fontSize:18,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink,lineHeight:1}}>‹</button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,color:P.ink}}>{fmtMonth(viewMonth)}</div>
          <div style={{fontSize:11,fontWeight:600,marginTop:1,
            color:isFuture?P.br:isNow?P.gr:P.faint}}>
            {isFuture?"Planning ahead":isNow?"Current month":"Past month"}
          </div>
        </div>
        <button onClick={()=>setViewMonth(m=>addMonths(m,1))}
          style={{borderRadius:999,padding:"4px 10px",fontSize:18,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink,lineHeight:1}}>›</button>
        {viewMonth!==nowMonth&&(
          <button onClick={()=>setViewMonth(nowMonth)}
            style={{borderRadius:999,padding:"4px 10px",fontSize:12,fontWeight:600,background:P.grS,color:P.grD,border:"none"}}>
            Today
          </button>
        )}
      </div>

      {/* ── monthly plan banner ── */}
      <div style={{borderRadius:14,padding:"12px 14px",marginBottom:12,
        background:hasOwnPlan?P.grS:P.sfA,border:`1px solid ${hasOwnPlan?P.grS:P.line}`,
        display:"flex",alignItems:"center",gap:10}}>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:600,color:hasOwnPlan?P.grD:P.sub}}>
            {hasOwnPlan?`📋 ${monthPlan.name}`:"📋 Using default plan"}
          </div>
          <div style={{fontSize:11,color:hasOwnPlan?P.gr:P.faint,marginTop:2}}>
            {hasOwnPlan
              ?`Income: ${cur} ${(monthPlan.income||0).toLocaleString("en-US")} · Custom budget for ${fmtMonth(viewMonth)}`
              :`Showing allocations from "${monthPlan.name}". Create a custom plan for ${fmtMonth(viewMonth)} to set a different income or allocation.`
            }
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexShrink:0}}>
          {hasOwnPlan
            ?<button onClick={()=>removePlanForMonth(viewMonth,budgetOwner)}
                style={{fontSize:11,borderRadius:8,padding:"4px 10px",background:"transparent",
                  border:`1px solid ${P.line}`,color:P.red,fontWeight:500}}>
                Remove
              </button>
            :<button onClick={()=>{setCloneSource(plans[0]?.id||"");setShowPlanPicker(true);}}
                style={{fontSize:11,borderRadius:8,padding:"4px 10px",
                  background:P.gr,color:"#fff",border:"none",fontWeight:600}}>
                + Create plan
              </button>
          }
        </div>
      </div>

      {/* ── hero summary ── */}
      <div style={{borderRadius:16,padding:16,marginBottom:16,
        background:isFuture?`linear-gradient(135deg,${P.br} 0%,${P.grD} 100%)`:P.ink,color:"#fff"}}>
        <div style={{fontSize:12,fontWeight:500,color:"#9DB0CC",marginBottom:4}}>
          {fmtMonth(viewMonth)} {isFuture?"plan":"spending"}
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:20,alignItems:"baseline"}}>
          <div>
            <div style={{fontSize:11,color:"#9DB0CC"}}>{isFuture?"Planned":"Spent"}</div>
            <div className="serif tnum" style={{fontSize:28,fontWeight:600,
              color:totalSpent>totalBudget?"#F87171":"#fff"}}>{fmt(totalSpent)}</div>
          </div>
          <div>
            <div style={{fontSize:11,color:"#9DB0CC"}}>Budget</div>
            <div className="tnum" style={{fontSize:20,fontWeight:600,color:"#9DB0CC"}}>{fmt(totalBudget)}</div>
          </div>
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:11,color:"#9DB0CC"}}>{totalLeft>=0?(isFuture?"Available":"Remaining"):"Over budget"}</div>
            <div className="tnum" style={{fontSize:20,fontWeight:600,
              color:totalLeft>=0?"#4ADE80":"#F87171"}}>{fmt(Math.abs(totalLeft))}</div>
          </div>
        </div>
        <div style={{marginTop:12,height:6,background:"rgba(255,255,255,.15)",borderRadius:999,overflow:"hidden"}}>
          <div style={{width:`${Math.min(100,totalBudget>0?(totalSpent/totalBudget)*100:0)}%`,height:"100%",
            background:totalSpent>=totalBudget?"#F87171":totalSpent/totalBudget>=.8?"#E07B2A":"#4ADE80",
            transition:"width .4s"}}/>
        </div>
      </div>

      {/* ── envelopes ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <h2 style={{fontSize:14,fontWeight:600,color:P.sub,margin:0}}>Envelopes</h2>
        <button onClick={()=>setShowAdd(true)}
          style={{display:"flex",alignItems:"center",gap:6,borderRadius:999,padding:"6px 14px",
            fontSize:14,fontWeight:500,background:isFuture?P.br:P.gr,color:"#fff",border:"none"}}>
          <I.Plus size={14}/>{isFuture?"Plan transaction":"Add transaction"}
        </button>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
        {envelopes.length===0
          ?<div style={{borderRadius:14,padding:16,textAlign:"center",fontSize:13,color:P.faint,
              background:P.sf,border:`1px solid ${P.line}`}}>
              No budget categories found. Add categories in the Budget tab first.
            </div>
          :envelopes.map(env=>{
            const spent=spentMap[env.id]||0;
            const left=env.budget-spent;
            const ratio=env.budget>0?spent/env.budget:0;
            const color=statusColor(spent,env.budget);
            const bg=statusBg(spent,env.budget);
            return(
              <div key={env.id} style={{borderRadius:14,padding:"12px 16px",background:P.sf,border:`1px solid ${P.line}`}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                  <span style={{width:8,height:8,borderRadius:999,background:env.color,flexShrink:0}}/>
                  <span style={{flex:1,fontSize:14,fontWeight:600,color:P.ink}}>{env.name}</span>
                  <span style={{fontSize:11,color:P.faint}}>{env.group}</span>
                </div>
                <div style={{height:6,background:P.sfA,borderRadius:999,overflow:"hidden",marginBottom:6}}>
                  <div style={{width:`${Math.min(100,ratio*100)}%`,height:"100%",background:color,transition:"width .3s"}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:12}} className="tnum">
                  <span style={{color:P.sub}}>
                    {isFuture?"Planned":"Spent"} <strong style={{color:P.ink}}>{fmt(spent)}</strong> of {fmt(env.budget)}
                  </span>
                  <span style={{fontWeight:600,color,background:bg,borderRadius:8,padding:"1px 8px"}}>
                    {left>=0?`${fmt(left)} left`:`${fmt(-left)} over`}
                  </span>
                </div>
              </div>
            );
          })
        }
      </div>

      {/* ── transaction log — all months collapsible ── */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <h2 style={{fontSize:14,fontWeight:600,color:P.sub,margin:0}}>All transactions</h2>
        <select value={filterCat} onChange={e=>setFilterCat(e.target.value)}
          style={{borderRadius:999,padding:"4px 10px",fontSize:12,background:P.sfA,
            border:`1px solid ${P.line}`,color:P.sub}}>
          <option value="all">All categories</option>
          {envelopes.map(e=><option key={e.id} value={e.id}>{e.name}</option>)}
        </select>
      </div>

      {allMonths.length===0
        ?<div style={{borderRadius:16,padding:"24px 16px",textAlign:"center",fontSize:13,color:P.faint,
            background:P.sf,border:`1px solid ${P.line}`,marginBottom:20}}>
            No transactions yet. Tap "Add transaction" to start tracking.
          </div>
        :allMonths.map(mo=>{
          const txs=[...byMonth[mo]].sort((a,b)=>b.date.localeCompare(a.date));
          const isCurrent=mo===nowMonth;
          const isViewing=mo===viewMonth;
          const isFutureMo=mo>nowMonth;
          const defaultOpen=isCurrent||isFutureMo||isViewing;
          const isOpen=collapsedMonths[mo]===undefined?defaultOpen:!collapsedMonths[mo];
          const monthTotal=txs.reduce((s,t)=>s+t.amount,0);
          const moLabel=fmtMonth(mo);

          // use correct envelopes for THIS month's plan
          const moPlan=planForMonth(mo);
          const moEnvs=[];
          (moPlan.groups||[]).forEach(g=>{
            (moPlan.categories||[]).filter(c=>c.groupId===g.id).forEach(c=>{
              moEnvs.push({id:c.id,name:c.name,color:c.color});
            });
          });

          let headerBg=P.sfA;
          if(isCurrent)headerBg=P.grS;
          else if(isFutureMo)headerBg=P.brS;
          const labelColor=isCurrent?P.grD:isFutureMo?P.br:P.ink;

          return(
            <div key={mo} style={{borderRadius:16,overflow:"hidden",background:P.sf,
              border:`2px solid ${isViewing?P.gr:P.line}`,marginBottom:10,transition:"border-color .2s"}}>
              <button
                onClick={()=>setCollapsedMonths(c=>({...c,[mo]:isOpen}))}
                style={{display:"flex",alignItems:"center",justifyContent:"space-between",width:"100%",
                  padding:"12px 16px",background:headerBg,border:"none",cursor:"pointer",
                  borderBottom:isOpen?`1px solid ${P.line}`:"none",textAlign:"left"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <I.Chevron size={14} style={{color:P.sub,transform:isOpen?"rotate(180deg)":"rotate(0deg)",
                    transition:"transform .2s",flexShrink:0}}/>
                  <span style={{fontSize:14,fontWeight:700,color:labelColor}}>{moLabel}</span>
                  {isCurrent&&<span style={{fontSize:10,borderRadius:999,padding:"2px 7px",
                    background:P.gr,color:"#fff",fontWeight:700}}>NOW</span>}
                  {isFutureMo&&<span style={{fontSize:10,borderRadius:999,padding:"2px 7px",
                    background:P.br,color:"#fff",fontWeight:700}}>PLANNED</span>}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span className="tnum" style={{fontSize:12,color:P.sub}}>{txs.length} tx</span>
                  <span className="tnum" style={{fontSize:13,fontWeight:700,color:P.ink}}>{fmt(monthTotal)}</span>
                </div>
              </button>

              {isOpen&&txs.map((tx,idx)=>{
                const env=moEnvs.find(e=>e.id===tx.catId);
                return(
                  <div key={tx.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 16px",
                    borderBottom:idx<txs.length-1?`1px solid ${P.sfA}`:"none"}}>
                    <div style={{width:8,height:8,borderRadius:999,
                      background:env?.color||P.faint,flexShrink:0}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,fontWeight:500,color:P.ink,
                        whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{tx.name}</div>
                      <div style={{fontSize:11,color:P.faint}}>{tx.date}{env?` · ${env.name}`:""}</div>
                    </div>
                    <span className="tnum" style={{fontSize:14,fontWeight:600,color:P.ink}}>{fmt(tx.amount)}</span>
                    <button onClick={()=>removeExpenseTx(tx.id)}
                      style={{background:"transparent",border:"none",color:P.red,opacity:.4}}>
                      <I.X size={14}/>
                    </button>
                  </div>
                );
              })}
            </div>
          );
        })
      }

      {/* ── add transaction modal ── */}
      {showAdd&&(
        <div className="modal-bg" onClick={()=>setShowAdd(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
              <h3 style={{margin:0,fontSize:16,fontWeight:600}}>
                {isFuture?"Plan transaction":"Add transaction"}
              </h3>
              <button onClick={()=>setShowAdd(false)}
                style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
            </div>
            <div style={{fontSize:12,color:isFuture?P.br:P.faint,marginBottom:14}}>
              {isFuture?`Planning ahead for ${fmtMonth(viewMonth)}`:`Recording for ${fmtMonth(viewMonth)}`}
            </div>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Category</div>
              <select value={form.catId} onChange={e=>setForm(f=>({...f,catId:e.target.value}))}
                style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,
                  background:P.sfA,border:`1px solid ${form.catId?P.line:P.red}`,color:P.ink}}>
                <option value="">Select a category…</option>
                {(monthPlan.groups||[]).map(g=>(
                  <optgroup key={g.id} label={g.name}>
                    {(monthPlan.categories||[]).filter(c=>c.groupId===g.id).map(c=>(
                      <option key={c.id} value={c.id}>{c.name}</option>
                    ))}
                  </optgroup>
                ))}
              </select>
            </div>

            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Description</div>
              <input value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))}
                placeholder="e.g. Electricity bill"
                style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,
                  background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
            </div>

            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Amount ({cur})</div>
                <input type="number" value={form.amount}
                  onChange={e=>setForm(f=>({...f,amount:e.target.value}))} placeholder="0"
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,
                    background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>Date</div>
                <input type="date" value={form.date}
                  onChange={e=>setForm(f=>({...f,date:e.target.value}))}
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,
                    background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
              </div>
            </div>

            {form.catId&&form.amount&&(()=>{
              const env=envelopes.find(e=>e.id===form.catId);
              if(!env)return null;
              const already=spentMap[form.catId]||0;
              const after=already+Number(form.amount);
              const left=env.budget-after;
              return(
                <div style={{borderRadius:10,padding:10,marginBottom:12,
                  background:left<0?"#FDF0EE":left/env.budget<.2?"#FEF4E8":P.sfA,
                  fontSize:13}} className="tnum">
                  <span style={{color:P.sub}}>{env.name}: </span>
                  <span style={{fontWeight:600,color:statusColor(after,env.budget)}}>
                    {left>=0?`${fmt(left)} remaining after this`:`${fmt(-left)} over budget`}
                  </span>
                </div>
              );
            })()}

            <button onClick={submitTx}
              style={{width:"100%",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,
                background:isFuture?P.br:P.gr,color:"#fff",border:"none",
                opacity:(!form.catId||!form.name||!form.amount)?.5:1}}>
              {isFuture?"Save planned transaction":"Record transaction"}
            </button>
          </div>
        </div>
      )}

      {/* ── create monthly plan modal ── */}
      {showPlanPicker&&(
        <div className="modal-bg" onClick={()=>setShowPlanPicker(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <h3 style={{margin:0,fontSize:16,fontWeight:600}}>
                Create plan for {fmtMonth(viewMonth)}
              </h3>
              <button onClick={()=>setShowPlanPicker(false)}
                style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
            </div>

            <div style={{fontSize:13,color:P.sub,marginBottom:16,lineHeight:1.5}}>
              This creates a <strong>copy</strong> of an existing plan that you can adjust
              independently — different income, tweaked allocations — without changing the original.
            </div>

            <div style={{fontSize:12,color:P.sub,marginBottom:6,fontWeight:600}}>
              Clone from which plan?
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:20}}>
              {ownerPlans.map(p=>(
                <button key={p.id} onClick={()=>setCloneSource(p.id)}
                  style={{display:"flex",alignItems:"center",justifyContent:"space-between",
                    padding:"10px 14px",borderRadius:12,fontSize:14,textAlign:"left",
                    background:cloneSource===p.id?P.grS:P.sfA,
                    border:`2px solid ${cloneSource===p.id?P.gr:P.line}`,
                    color:cloneSource===p.id?P.grD:P.ink}}>
                  <div>
                    <div style={{fontWeight:600}}>{p.name}</div>
                    <div style={{fontSize:11,color:P.faint,marginTop:2}}>
                      {cur} {(p.income||0).toLocaleString("en-US")} · {(p.categories||[]).length} categories
                    </div>
                  </div>
                  {cloneSource===p.id&&<I.Check size={16} style={{color:P.gr,flexShrink:0}}/>}
                </button>
              ))}
            </div>

            <button onClick={handleCreatePlan} disabled={!cloneSource}
              style={{width:"100%",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,
                background:P.gr,color:"#fff",border:"none",opacity:cloneSource?1:.4}}>
              Create plan for {fmtMonth(viewMonth)}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── HOUSEHOLD VIEW ── */
function HouseholdView({hh,setSplit,addExpense,updateExpense,removeExpense,fmt,owners}){
  const total=hh.expenses.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const mine=total*(hh.splitMine/100),theirs=total-mine;
  const card={background:P.sf,border:`1px solid ${P.line}`,borderRadius:16};
  return(
    <div>
      <div style={{...card,padding:16,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:P.sub,marginBottom:10}}>Shared monthly expenses · {fmt(total)}</div>
        <div style={{display:"flex",gap:12,marginBottom:12}}>
          <div style={{flex:1,background:P.grS,borderRadius:12,padding:12}}>
            <div style={{fontSize:11,color:P.grD}}>{owners.me} pays ({hh.splitMine}%)</div>
            <div className="serif tnum" style={{fontSize:22,fontWeight:600,color:P.grD}}>{fmt(mine)}</div>
          </div>
          <div style={{flex:1,background:P.brS,borderRadius:12,padding:12}}>
            <div style={{fontSize:11,color:P.br}}>{owners.wife} pays ({100-hh.splitMine}%)</div>
            <div className="serif tnum" style={{fontSize:22,fontWeight:600,color:P.br}}>{fmt(theirs)}</div>
          </div>
        </div>
        <input type="range" min="0" max="100" value={hh.splitMine} onChange={e=>setSplit(Number(e.target.value))} style={{width:"100%"}}/>
      </div>
      <section style={{...card,overflow:"hidden"}}>
        {hh.expenses.map(e=>(
          <div key={e.id} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 16px",borderBottom:`1px solid ${P.sfA}`}}>
            <span style={{width:10,height:10,borderRadius:999,background:e.color,flexShrink:0}}/>
            <input value={e.name} onChange={ev=>updateExpense(e.id,{name:ev.target.value})} className="bare" style={{flex:1,fontSize:14}}/>
            <input type="number" value={e.amount} onChange={ev=>updateExpense(e.id,{amount:Number(ev.target.value)})}
              className="bare tnum" style={{width:92,textAlign:"right",fontSize:14,fontWeight:600}}/>
            <button onClick={()=>removeExpense(e.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.3}}><I.X size={15}/></button>
          </div>
        ))}
        <button onClick={addExpense} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.gr,background:"transparent",border:"none"}}>
          <I.Plus size={14}/>Add shared expense
        </button>
      </section>
    </div>
  );
}

/* ── BANKS VIEW ── */
function BanksView({banks,addBank,updateBank,removeBank,convert,sarRate,owners}){
  const sar=n=>`SAR ${Math.round(n).toLocaleString("en-US")}`;
  const sarOf=b=>{const v=convert(b.balance,b.currency,"SAR");return v==null?0:v;};
  const total=banks.reduce((s,b)=>s+sarOf(b),0);
  const usdTotal=sarRate?Math.round(total/sarRate):null;
  const phpTotal=convert?convert(total,"SAR","PHP"):null;
  const Row=b=>(
    <div key={b.id} style={{padding:"12px 16px",borderBottom:`1px solid ${P.sfA}`}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <input value={b.name} placeholder="Account name" onChange={e=>updateBank(b.id,{name:e.target.value})} className="bare" style={{fontSize:14,fontWeight:600,flex:1,minWidth:0}}/>
        <button onClick={()=>removeBank(b.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4}}><I.X size={15}/></button>
      </div>
      <div style={{marginTop:8,display:"flex",flexWrap:"wrap",alignItems:"center",gap:8}}>
        <input value={b.bank} placeholder="Bank name" onChange={e=>updateBank(b.id,{bank:e.target.value})} className="bare" style={{fontSize:12,color:P.sub,width:110}}/>
        <select value={b.country} onChange={e=>updateBank(b.id,{country:e.target.value})} style={{borderRadius:999,padding:"2px 8px",fontSize:12,background:P.sfA,border:`1px solid ${P.line}`,color:P.sub}}>
          {COUNTRIES.map(([c,l])=><option key={c} value={c}>{l}</option>)}
        </select>
        <select value={b.currency} onChange={e=>updateBank(b.id,{currency:e.target.value})} style={{borderRadius:999,padding:"2px 8px",fontSize:12,background:P.sfA,border:`1px solid ${P.line}`,color:P.sub}}>
          {BANK_CCY.map(c=><option key={c}>{c}</option>)}
        </select>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:12,color:P.faint}}>{b.currency}</span>
          <input type="number" value={b.balance} onChange={e=>updateBank(b.id,{balance:Number(e.target.value)})} className="bare tnum" style={{width:100,textAlign:"right",fontSize:14,fontWeight:600}}/>
        </div>
      </div>
      {b.currency!=="SAR"&&<div className="tnum" style={{fontSize:12,textAlign:"right",marginTop:4,color:P.faint}}>= {sar(sarOf(b))}</div>}
    </div>
  );
  return(
    <div>
      <div style={{background:P.ink,color:"#fff",borderRadius:16,padding:16,marginBottom:16}}>
        <div style={{fontSize:12,fontWeight:500,color:"#9DB0CC",marginBottom:4}}>Cash across all accounts</div>
        <span className="serif tnum" style={{fontSize:30,fontWeight:600}}>{sar(total)}</span>
        <div className="tnum" style={{marginTop:6,display:"flex",gap:16,color:"#9DB0CC",fontSize:14}}>
          <span>{usdTotal!=null?`≈ $${usdTotal.toLocaleString("en-US")}`:"USD —"}</span>
          <span>{phpTotal!=null?`≈ ₱${Math.round(phpTotal).toLocaleString("en-US")}`:"PHP —"}</span>
        </div>
      </div>
      {["me","wife"].map(ok=>{
        const items=banks.filter(b=>b.owner===ok);
        const sub=items.reduce((s,b)=>s+sarOf(b),0);
        return(
          <section key={ok} style={{marginBottom:16,borderRadius:16,overflow:"hidden",background:P.sf,border:`1px solid ${P.line}`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px",borderBottom:`1px solid ${P.line}`,background:ok==="me"?P.grS:P.brS}}>
              <span style={{fontSize:14,fontWeight:600,color:ok==="me"?P.grD:P.br}}>{owners[ok]}</span>
              <span className="tnum" style={{fontSize:14,fontWeight:600,color:P.sub}}>{sar(sub)}</span>
            </div>
            {items.map(Row)}
            <button onClick={()=>addBank(ok)} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.gr,background:"transparent",border:"none"}}>
              <I.Plus size={14}/>Add {owners[ok]}'s account
            </button>
          </section>
        );
      })}
    </div>
  );
}

/* ── INVESTMENTS VIEW — trade log ── */
function InvestmentsView({invs,addInv,updateInv,removeInv,addTrade,removeTrade,livePrice,setLivePrice,sarRate,convert,projection,setProjection,portHistory,addPortSnap}){
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");
  const[updatedAt,setUpdatedAt]=useState(null);
  const[tradeModal,setTradeModal]=useState(null); // invId
  const[tradeForm,setTradeForm]=useState({type:"buy",shares:"",price:"",date:new Date().toISOString().slice(0,10)});
  const[expandedId,setExpandedId]=useState(null);
  const[fetchingName,setFetchingName]=useState({});

  /* Look up a company / fund name for a ticker.
     1) Cloudflare proxy → Yahoo (best for ETFs like VWRA, using the mapped symbol)
     2) Finnhub search (good for US stocks)                                   */
  const fetchName=async(id,ticker)=>{
    const t=(ticker||"").trim().toUpperCase();
    if(!t)return;
    setFetchingName(s=>({...s,[id]:true}));
    let name=null;
    if(!PROXY_URL.startsWith("PASTE_")){
      try{
        const ys=toYahooSym(t);
        const res=await fetch(`${PROXY_URL}/name?symbol=${encodeURIComponent(ys)}`);
        if(res.ok){const j=await res.json();if(j&&j.name)name=j.name;}
      }catch(e){}
    }
    if(!name&&!FINNHUB_KEY.startsWith("PASTE_")){
      try{
        const res=await fetch(`https://finnhub.io/api/v1/search?q=${encodeURIComponent(t)}&token=${FINNHUB_KEY}`);
        const j=await res.json();
        const list=j.result||[];
        const match=list.find(x=>x.symbol===t)||list.find(x=>x.symbol===t+".US")||list.find(x=>x.symbol===baseKey(t))||list[0];
        if(match&&match.description)name=match.description;
      }catch(e){}
    }
    if(name)updateInv(id,{name});
    setFetchingName(s=>{const n={...s};delete n[id];return n;});
  };

  const usd=n=>`$${(Number(n)||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2})}`;

  const rows=invs.map(hld=>{
    const{shares,avgCost,totalCost}=holdingStats(hld.trades);
    const price=livePrice[baseKey(hld.ticker||"")]||0;
    const value=shares*price;
    const gain=value-totalCost;
    const gainPct=totalCost>0?(gain/totalCost)*100:0;
    return{...hld,shares,avgCost,totalCost,price,value,gain,gainPct};
  });
  const totVal=rows.reduce((s,r)=>s+r.value,0);
  const totCost=rows.reduce((s,r)=>s+r.totalCost,0);
  const totGain=totVal-totCost;
  const totGainPct=totCost>0?(totGain/totCost)*100:0;

  const refresh=async()=>{
    const tickers=[...new Set(invs.map(h=>(h.ticker||"").trim().toUpperCase()).filter(Boolean))];
    if(!tickers.length){setErr("Add a ticker symbol first.");return;}
    setLoading(true);setErr("");
    try{
      const q=await fetchQuotes(tickers);
      setLivePrice(q);
      setUpdatedAt(Date.now());
      const hit=tickers.filter(t=>q[baseKey(t)]!=null).length;
      if(!hit)setErr("No prices found. Check your Worker URL or ticker symbols.");
      else if(hit<tickers.length)setErr(`Got ${hit}/${tickers.length} prices — remaining tickers not found.`);
      else setErr("");
      // auto-capture portfolio snapshot for the history chart
      const newTotVal=invs.reduce((s,hld)=>{
        const{shares}=holdingStats(hld.trades);
        const p=q[baseKey(hld.ticker||"")]||livePrice[baseKey(hld.ticker||"")]||0;
        return s+shares*p;
      },0);
      if(newTotVal>0)addPortSnap(newTotVal);
    }catch(e){
      setErr(PROXY_URL.startsWith("PASTE_")&&FINNHUB_KEY.startsWith("PASTE_")
        ?"Set up your Cloudflare Worker (for VWRA/LSE) and/or Finnhub key (for US stocks) — see the setup guide."
        :"Price fetch failed — check your Worker URL or Finnhub key.");
    }
    setLoading(false);
  };

  const openTrade=invId=>{
    setTradeModal(invId);
    setTradeForm({type:"buy",shares:"",price:"",date:new Date().toISOString().slice(0,10)});
  };
  const submitTrade=()=>{
    if(!tradeForm.shares||!tradeForm.price)return;
    addTrade(tradeModal,{type:tradeForm.type,shares:Number(tradeForm.shares),price:Number(tradeForm.price),date:tradeForm.date});
    setTradeModal(null);
  };

  const gTone=n=>n>0?P.gr:n<0?P.red:P.sub;
  const series=projectSeries(totVal,projection.monthly,projection.years,projection.rate||8);
  const projData=series.map((v,i)=>({year:`Y${i}`,value:v}));

  return(
    <div>
      {/* hero */}
      <div style={{borderRadius:16,padding:20,marginBottom:16,background:P.ink,color:"#fff"}}>
        <div style={{fontSize:12,fontWeight:500,color:"#9DB0CC",marginBottom:4}}>Portfolio value (USD)</div>
        <span className="serif tnum" style={{fontSize:38,fontWeight:600}}>{usd(totVal)}</span>
        {(sarRate||convert)&&(
          <div className="tnum" style={{display:"flex",flexWrap:"wrap",gap:16,marginTop:4,fontSize:14,color:"#9DB0CC"}}>
            {sarRate&&<span>≈ SAR {Math.round(totVal*sarRate).toLocaleString("en-US")}</span>}
            {(()=>{const php=convert?convert(totVal,"USD","PHP"):null;return php!=null?<span>≈ ₱{Math.round(php).toLocaleString("en-US")}</span>:null;})()}
          </div>
        )}
        <div style={{marginTop:8,display:"flex",flexWrap:"wrap",gap:20,fontSize:14}} className="tnum">
          <span style={{color:"#9DB0CC"}}>Cost {usd(totCost)}</span>
          <span style={{color:totGain>=0?"#6FC6DA":"#E89B8C",fontWeight:600}}>
            {totGain>=0?"▲":"▼"} {usd(Math.abs(totGain))} ({totGainPct.toFixed(1)}%)
          </span>
        </div>
      </div>

      {/* portfolio history chart */}
      {portHistory.length>0&&(()=>{
        const pts=[...portHistory].sort((a,b)=>a.month.localeCompare(b.month));
        const first=pts[0].value,last=pts[pts.length-1].value;
        const trending=last>=first;
        const chartColor=trending?"#4ADE80":"#F87171";
        const fmtMo=m=>{const[y,mo]=m.split("-");return new Date(Number(y),Number(mo)-1,1).toLocaleDateString("en-US",{month:"short",year:"2-digit"});};
        const data=pts.map(p=>({label:fmtMo(p.month),value:p.value}));
        const pctChange=first>0?((last-first)/first*100):0;
        return(
          <div style={{borderRadius:16,padding:16,marginBottom:16,background:P.sf,border:`1px solid ${P.line}`}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
              <h3 style={{fontSize:14,fontWeight:600,color:P.sub,margin:0}}>Portfolio over time</h3>
              <span className="tnum" style={{fontSize:13,fontWeight:600,color:trending?P.gr:P.red}}>
                {trending?"▲":"▼"} {Math.abs(pctChange).toFixed(1)}% total
              </span>
            </div>
            <div style={{width:"100%",height:160}}>
              <ResponsiveContainer>
                <LineChart data={data} margin={{top:4,right:8,bottom:0,left:-16}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={P.sfA}/>
                  <XAxis dataKey="label" tick={{fontSize:10,fill:P.faint}}/>
                  <YAxis tick={{fontSize:10,fill:P.faint}} tickFormatter={v=>`$${Math.round(v/1000)}k`}/>
                  <Tooltip formatter={v=>`$${Math.round(v).toLocaleString("en-US")}`}/>
                  <Line type="monotone" dataKey="value" stroke={chartColor} strokeWidth={2.5} dot={{r:3,fill:chartColor}}/>
                </LineChart>
              </ResponsiveContainer>
            </div>
            <div style={{fontSize:11,color:P.faint,marginTop:6}}>
              Captured monthly when you refresh prices · {pts.length} data point{pts.length!==1?"s":""}
            </div>
          </div>
        );
      })()}

      {/* controls */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <h2 style={{fontSize:14,fontWeight:600,color:P.sub,margin:0}}>Holdings</h2>
        <button onClick={refresh} disabled={loading}
          style={{display:"flex",alignItems:"center",gap:6,borderRadius:999,padding:"6px 12px",fontSize:14,fontWeight:500,background:P.gr,color:"#fff",border:"none",opacity:loading?.6:1}}>
          <I.Refresh size={14} style={loading?{animation:"spin .9s linear infinite"}:null}/>
          {loading?"Fetching…":"Refresh prices"}
        </button>
      </div>
      {err&&<div style={{fontSize:12,color:P.red,marginBottom:8,padding:"8px 12px",background:"#FDF0EE",borderRadius:8}}>{err}</div>}
      {updatedAt&&!err&&<div style={{fontSize:11,color:P.faint,marginBottom:8}}>Prices updated {new Date(updatedAt).toLocaleTimeString()}</div>}

      {/* holdings list */}
      <div style={{borderRadius:16,overflow:"hidden",marginBottom:16,background:P.sf,border:`1px solid ${P.line}`}}>
        {rows.map(r=>(
          <div key={r.id} style={{borderBottom:`1px solid ${P.sfA}`}}>
            {/* summary row */}
            <div style={{padding:"12px 16px"}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <input value={r.ticker} placeholder="TICKER"
                  onChange={e=>updateInv(r.id,{ticker:e.target.value.toUpperCase()})}
                  onBlur={e=>{
                    const t=(e.target.value||"").trim().toUpperCase();
                    if(!t||r.name)return; // don't overwrite an existing name
                    fetchName(r.id,t);
                  }}
                  className="bare" style={{fontSize:14,fontWeight:700,width:80,letterSpacing:".03em"}}/>
                <input value={r.name} placeholder={fetchingName[r.id]?"fetching name…":"Name"} onChange={e=>updateInv(r.id,{name:e.target.value})} className="bare" style={{fontSize:13,color:P.sub,flex:1,minWidth:0}}/>
                <span className="tnum" style={{fontSize:14,fontWeight:600}}>{usd(r.value)}</span>
                <button onClick={()=>removeInv(r.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4}}><I.X size={15}/></button>
              </div>
              <div style={{marginTop:6,display:"flex",flexWrap:"wrap",alignItems:"center",gap:14,fontSize:13,color:P.sub}} className="tnum">
                <span>{r.shares.toFixed(4)} shares</span>
                <span>Avg {usd(r.avgCost)}</span>
                <span>Price {r.price>0?usd(r.price):"—"}</span>
                <span style={{color:gTone(r.gain),fontWeight:600,marginLeft:"auto"}}>
                  {r.gain>=0?"▲":"▼"} {usd(Math.abs(r.gain))} ({r.gainPct.toFixed(1)}%)
                </span>
              </div>
              {/* trade log toggle + add trade */}
              <div style={{marginTop:8,display:"flex",gap:8}}>
                <button onClick={()=>openTrade(r.id)}
                  style={{display:"flex",alignItems:"center",gap:5,borderRadius:999,padding:"4px 10px",fontSize:12,fontWeight:500,background:P.grS,color:P.grD,border:"none"}}>
                  <I.Plus size={12}/>Add trade
                </button>
                {(r.trades||[]).length>0&&(
                  <button onClick={()=>setExpandedId(expandedId===r.id?null:r.id)}
                    style={{display:"flex",alignItems:"center",gap:5,borderRadius:999,padding:"4px 10px",fontSize:12,color:P.sub,background:P.sfA,border:`1px solid ${P.line}`}}>
                    {expandedId===r.id?"Hide":"Show"} {r.trades.length} trade{r.trades.length!==1?"s":""}
                  </button>
                )}
              </div>
            </div>

            {/* trade history */}
            {expandedId===r.id&&(r.trades||[]).length>0&&(
              <div style={{background:P.sfA,borderTop:`1px solid ${P.line}`}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 32px",gap:4,padding:"6px 16px",fontSize:11,fontWeight:600,color:P.faint,textTransform:"uppercase",letterSpacing:".06em"}}>
                  <span>Date</span><span style={{textAlign:"right"}}>Type</span><span style={{textAlign:"right"}}>Shares</span><span style={{textAlign:"right"}}>Price</span><span/>
                </div>
                {[...(r.trades||[])].sort((a,b)=>a.date.localeCompare(b.date)).map(tr=>(
                  <div key={tr.id} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 80px 32px",gap:4,padding:"6px 16px",fontSize:13,alignItems:"center",borderTop:`1px solid ${P.line}`}}>
                    <span className="tnum" style={{color:P.sub}}>{tr.date}</span>
                    <span style={{textAlign:"right",fontWeight:600,color:tr.type==="buy"?P.gr:P.red,textTransform:"uppercase",fontSize:11}}>{tr.type}</span>
                    <span className="tnum" style={{textAlign:"right"}}>{(Number(tr.shares)||0).toFixed(4)}</span>
                    <span className="tnum" style={{textAlign:"right"}}>{usd(tr.price)}</span>
                    <button onClick={()=>removeTrade(r.id,tr.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4,padding:4}}><I.X size={12}/></button>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
        <button onClick={addInv} style={{display:"flex",alignItems:"center",gap:6,width:"100%",padding:"10px 16px",fontSize:14,fontWeight:500,color:P.gr,background:"transparent",border:"none"}}>
          <I.Plus size={14}/>Add holding
        </button>
      </div>

      {/* projection */}
      <div style={{borderRadius:16,padding:16,background:P.sf,border:`1px solid ${P.line}`}}>
        <h3 style={{fontSize:14,fontWeight:600,color:P.sub,margin:"0 0 8px"}}>Growth projection ({projection.rate||8}%/yr)</h3>
        <div style={{display:"flex",flexWrap:"wrap",gap:16,marginBottom:10,fontSize:13}}>
          <label style={{color:P.sub}}>+$/mo <input type="number" value={projection.monthly} onChange={e=>setProjection({monthly:Number(e.target.value)})} className="bare tnum" style={{width:80,fontWeight:600}}/></label>
          <label style={{color:P.sub}}>Years <input type="number" value={projection.years} onChange={e=>setProjection({years:Number(e.target.value)})} className="bare tnum" style={{width:56,fontWeight:600}}/></label>
          <label style={{color:P.sub}}>Rate % <input type="number" value={projection.rate??8} onChange={e=>setProjection({rate:Number(e.target.value)})} className="bare tnum" style={{width:48,fontWeight:600}} step="0.5" min="0" max="30"/></label>
          <span className="tnum" style={{marginLeft:"auto",fontWeight:600,color:P.gr}}>→ ${series[series.length-1].toLocaleString("en-US")}</span>
        </div>
        <div style={{width:"100%",height:180}}>
          <ResponsiveContainer>
            <LineChart data={projData} margin={{top:8,right:8,bottom:0,left:-12}}>
              <CartesianGrid strokeDasharray="3 3" stroke={P.sfA}/>
              <XAxis dataKey="year" tick={{fontSize:11,fill:P.faint}}/>
              <YAxis tick={{fontSize:11,fill:P.faint}} tickFormatter={v=>`${Math.round(v/1000)}k`}/>
              <Tooltip formatter={v=>`$${Math.round(v).toLocaleString("en-US")}`}/>
              <Line type="monotone" dataKey="value" stroke={P.br} strokeWidth={2} dot={false}/>
            </LineChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Add trade modal */}
      {tradeModal&&(
        <div className="modal-bg" onClick={()=>setTradeModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
              <h3 style={{margin:0,fontSize:16,fontWeight:600}}>
                Add trade — {invs.find(x=>x.id===tradeModal)?.ticker||""}
              </h3>
              <button onClick={()=>setTradeModal(null)} style={{background:"transparent",border:"none",color:P.sub}}><I.X size={18}/></button>
            </div>
            <div style={{display:"flex",gap:8,marginBottom:16}}>
              {["buy","sell"].map(t=>(
                <button key={t} onClick={()=>setTradeForm(f=>({...f,type:t}))}
                  style={{flex:1,borderRadius:10,padding:"8px 0",fontSize:14,fontWeight:600,textTransform:"capitalize",
                    background:tradeForm.type===t?(t==="buy"?P.gr:P.red):"transparent",
                    color:tradeForm.type===t?"#fff":(t==="buy"?P.gr:P.red),
                    border:`2px solid ${t==="buy"?P.gr:P.red}`}}>
                  {t==="buy"?"▲ Buy":"▼ Sell"}
                </button>
              ))}
            </div>
            {[["date","Date","date"],["shares","Shares","number"],["price","Price per share (USD)","number"]].map(([k,label,type])=>(
              <div key={k} style={{marginBottom:12}}>
                <div style={{fontSize:12,color:P.sub,marginBottom:4}}>{label}</div>
                <input type={type} value={tradeForm[k]} onChange={e=>setTradeForm(f=>({...f,[k]:e.target.value}))}
                  style={{width:"100%",borderRadius:10,padding:"8px 10px",fontSize:14,background:P.sfA,border:`1px solid ${P.line}`,color:P.ink}}/>
              </div>
            ))}
            {tradeForm.shares&&tradeForm.price&&(
              <div style={{background:P.sfA,borderRadius:10,padding:10,marginBottom:12,fontSize:13,color:P.sub}} className="tnum">
                Total: ${(Number(tradeForm.shares)*Number(tradeForm.price)).toLocaleString("en-US",{minimumFractionDigits:2})}
              </div>
            )}
            <button onClick={submitTrade}
              style={{width:"100%",borderRadius:10,padding:"10px 0",fontSize:14,fontWeight:600,
                background:tradeForm.type==="buy"?P.gr:P.red,color:"#fff",border:"none"}}>
              Confirm {tradeForm.type==="buy"?"Purchase":"Sale"}
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Asset / liability row (top-level so it doesn't remount on each keystroke) ── */
function AssetRow({a,updateAsset,removeAsset}){
  return(
    <div style={{padding:"12px 16px",borderBottom:`1px solid ${P.sfA}`}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
        <input value={a.name} onChange={e=>updateAsset(a.id,{name:e.target.value})} className="bare" style={{fontSize:14,fontWeight:600,flex:1,minWidth:0}}/>
        <select value={a.currency} onChange={e=>updateAsset(a.id,{currency:e.target.value})} style={{borderRadius:8,padding:"2px 6px",fontSize:12,background:P.sfA,border:`1px solid ${P.line}`,color:P.sub}}>
          {BANK_CCY.map(c=><option key={c}>{c}</option>)}
        </select>
        <button onClick={()=>removeAsset(a.id)} style={{background:"transparent",border:"none",color:P.red,opacity:.4}}><I.X size={15}/></button>
      </div>
      {a.kind==="asset"?(
        <div style={{display:"flex",alignItems:"center",gap:6}}>
          <span style={{fontSize:12,color:P.faint}}>{a.currency}</span>
