<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Allocation — Salary &amp; Net Worth</title>

<!-- PWA: lets you "Add to Home Screen" as a real app on iPad / iPhone / Android / Windows -->
<link rel="manifest" href="manifest.webmanifest" />
<meta name="theme-color" content="#15243B" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Allocation" />
<link rel="apple-touch-icon" href="icon-180.png" />

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js" crossorigin></script>
<!-- Google Identity for Drive sync -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
  :root{
    --bg:#E8EDF4; --ink:#15243B; --sub:#56657E; --faint:#8A98AD;
    --line:#D2DBE7; --surface:#FFFFFF; --surfaceAlt:#F0F4F9;
    --green:#2C5FA8; --greenDeep:#1B3E73; --greenSoft:#E2EAF6;
    --brass:#2E8BB0; --brassSoft:#E0EEF4; --danger:#C2533F;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    -webkit-text-size-adjust:100%;
  }
  .serif{font-family:"Iowan Old Style",Georgia,"Times New Roman",serif;}
  .tabular-nums{font-variant-numeric:tabular-nums;}
  input.bare{
    background:transparent;border:none;outline:none;padding:1px 2px;
    border-radius:4px;transition:background .12s,box-shadow .12s;font:inherit;color:inherit;
  }
  input.bare:hover{background:rgba(0,0,0,0.03);}
  input.bare:focus{background:rgba(44,95,168,0.08);box-shadow:0 0 0 1px rgba(44,95,168,0.35);}
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
  input[type=number]{-moz-appearance:textfield;}
  button{cursor:pointer;font:inherit;}
  .spin{animation:spin .9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  :focus-visible{outline:2px solid var(--green);outline-offset:1px;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important;}}
  /* safe-area padding so the app isn't under the iPad/iPhone notch when installed */
  #root{padding-top:env(safe-area-inset-top);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react" src="app.jsx"></script>
</body>
</html>
